async function handleSubmit(e) {
  e.preventDefault();
  const workDone = document.getElementById('workDone').value.trim();
  if (!workDone) {
    document.getElementById('workDoneError').classList.add('show');
    document.getElementById('workDone').focus();
    return;
  }

  const today = todayStr();
  const selectedMood = document.querySelector('.mood-btn.selected');
  const entry = {
    id: Date.now(),
    date: today,
    dayOfWeek: getDayName(today),
    workDone,
    reflection: document.getElementById('reflection')?.value.trim() || '',
    mood: selectedMood ? selectedMood.dataset.mood : '',
    energy: parseInt(document.getElementById('energySlider').value),
    planTomorrow: collectPlanTomorrow(),
    isMonday: isMonday(today),
    isFriday: isFriday(today),
    weeklyRetro: document.getElementById('weeklyRetro')?.value.trim() || '',
    aiReflection: null
  };

  // Update or create entry
  const existingIdx = state.entries.findIndex(e => e.date === today);
  if (existingIdx >= 0) {
    entry.id = state.entries[existingIdx].id;
    state.entries[existingIdx] = entry;
  } else {
    state.entries.push(entry);
  }
  saveState();

  // Refine planTomorrow into a clean checklist
  if (entry.planTomorrow && state.settings.baseUrl) {
    try {
      const refined = await callClaude(
        'You distill a rough "plan for tomorrow" into a crisp checklist. Each item: a punchy verb phrase (3-8 words). Merge overlapping ideas. Drop filler. Rewrite freely. IMPORTANT: if a line starts with "@someone", preserve that prefix exactly (e.g. "- @jane Review PR"). Output each item on its own line prefixed with "- ". Nothing else — no preamble, no numbering.',
        `Distill into a checklist:\n"${entry.planTomorrow}"`,
        300
      );
      const clean = refined.trim().replace(/^["']|["']$/g, '').replace(/\.$/, '');
      if (clean) {
        entry.planTomorrow = clean;
        if (existingIdx >= 0) state.entries[existingIdx] = entry;
        saveState();
      }
    } catch (_) { /* keep the raw text */ }
  }

  clearDraft();
  logMode = 'submitted';
  const panel = document.getElementById('panel-log');
  renderPostSubmit(panel, entry);

  // Fetch AI reflection
  if (state.settings.baseUrl) {
    try {
      const reflection = await callClaude(SYSTEM_PROMPT, buildDailyPrompt(entry), 300);
      entry.aiReflection = reflection;
      saveState();
      const aiContainer = document.getElementById('aiReflectionContent');
      if (aiContainer) {
        aiContainer.innerHTML = `<span class="ai-icon">💬</span><div class="ai-text">${formatCoachingNote(reflection)}</div>`;
        aiContainer.classList.add('fade-in');
      }
    } catch (err) {
      const aiContainer = document.getElementById('aiReflectionContent');
      if (aiContainer) {
        if (err.message === 'invalid_key') {
          aiContainer.innerHTML = `<span class="ai-icon">💬</span><div class="ai-text" style="color:var(--text-secondary)">Auth error — check your gateway settings.</div>`;
        } else {
          aiContainer.innerHTML = `<span class="ai-icon">💬</span><div class="ai-text" style="color:var(--text-secondary)">Couldn't reach the AI this time. Your entry is saved.</div><button class="btn-icon" style="float:right;margin-top:-24px" onclick="retryReflection()">↻</button>`;
        }
      }
    }
  }

  generateTldr(entry);
}

async function generateTldr(entry) {
  if (!state.settings.baseUrl) return;
  const sections = [];
  if (entry.workDone) sections.push(`Work done:\n"${entry.workDone}"`);
  if (entry.reflection) sections.push(`Reflection:\n"${entry.reflection}"`);
  if (entry.weeklyRetro) sections.push(`Weekly retro:\n"${entry.weeklyRetro}"`);
  if (!sections.length) return;
  try {
    const result = await callClaude(
      'You compress journal entries into bullet-point TLDRs. For each section, output the section header on its own line, then bullet points below it. Use this exact format:\n\nWork done:\n- bullet 1\n- bullet 2\n\nReflection:\n- bullet 1\n\nWeekly retro:\n- bullet 1\n\nEach bullet: concise verb phrase (3-8 words). Only include sections that were provided. No preamble.',
      sections.join('\n\n'),
      400
    );
    const tldr = {};
    let currentKey = null;
    for (const line of result.split('\n')) {
      const headerMatch = line.match(/^(Work done|Reflection|Weekly retro)\s*:/i);
      if (headerMatch) {
        currentKey = headerMatch[1].toLowerCase() === 'work done' ? 'workDone'
          : headerMatch[1].toLowerCase() === 'reflection' ? 'reflection' : 'weeklyRetro';
        tldr[currentKey] = '';
        continue;
      }
      if (currentKey && /^\s*[-•]/.test(line)) {
        tldr[currentKey] += (tldr[currentKey] ? '\n' : '') + line.trim();
      }
    }
    if (Object.keys(tldr).length) {
      entry.tldr = tldr;
      saveState();
      renderHistory();
    }
  } catch (_) { /* keep without tldr */ }
}

async function handleEditSubmit(entryId) {
  const workDone = document.getElementById('workDone').value.trim();
  if (!workDone) {
    document.getElementById('workDoneError').classList.add('show');
    document.getElementById('workDone').focus();
    return;
  }

  const newDate = document.getElementById('editDate').value;
  if (!newDate) {
    document.getElementById('editDateError').textContent = 'Please select a date.';
    document.getElementById('editDateError').classList.add('show');
    return;
  }

  const duplicate = state.entries.find(e => e.date === newDate && e.id !== entryId);
  if (duplicate) {
    document.getElementById('editDateError').textContent = 'An entry already exists for this date.';
    document.getElementById('editDateError').classList.add('show');
    return;
  }

  const entryIdx = state.entries.findIndex(e => e.id === entryId);
  if (entryIdx < 0) return;

  const existing = state.entries[entryIdx];
  const selectedMood = document.querySelector('.mood-btn.selected');

  state.entries[entryIdx] = {
    ...existing,
    date: newDate,
    dayOfWeek: getDayName(newDate),
    isMonday: isMonday(newDate),
    isFriday: isFriday(newDate),
    workDone,
    reflection: document.getElementById('reflection')?.value.trim() || '',
    mood: selectedMood ? selectedMood.dataset.mood : '',
    energy: parseInt(document.getElementById('energySlider').value),
    planTomorrow: collectPlanTomorrow(),
    weeklyRetro: document.getElementById('weeklyRetro')?.value.trim() || '',
  };

  saveState();
  editingEntryId = null;

  if (newDate === todayStr()) {
    logMode = 'submitted';
    renderLogTab();
  } else {
    logMode = 'form';
    renderLogTab();
    switchTab('history');
  }
  showToast('Entry updated');

  // Refine planTomorrow into a clean checklist
  const updated = state.entries[entryIdx];
  if (updated.planTomorrow && state.settings.baseUrl) {
    try {
      const refined = await callClaude(
        'You distill a rough "plan for tomorrow" into a crisp checklist. Each item: a punchy verb phrase (3-8 words). Merge overlapping ideas. Drop filler. Rewrite freely. IMPORTANT: if a line starts with "@someone", preserve that prefix exactly (e.g. "- @jane Review PR"). Output each item on its own line prefixed with "- ". Nothing else — no preamble, no numbering.',
        `Distill into a checklist:\n"${updated.planTomorrow}"`,
        300
      );
      const clean = refined.trim().replace(/^["']|["']$/g, '').replace(/\.$/, '');
      if (clean) {
        updated.planTomorrow = clean;
        saveState();
        renderHistory();
      }
    } catch (_) { /* keep the raw text */ }
  }

  // Regenerate coaching note
  if (state.settings.baseUrl) {
    try {
      const reflection = await callClaude(SYSTEM_PROMPT, buildDailyPrompt(updated), 300);
      updated.aiReflection = reflection;
      saveState();
      renderHistory();
    } catch (_) { /* keep existing reflection */ }
  }

  generateTldr(updated);
}

  const allVectors = [...new Set(allWins.flatMap(w => w.vectors))].sort();

  // Apply filters
  let wins = allWins;
  if (winsFilter.vector) {

  }
  if (winsFilter.search) {
    const q = winsFilter.search.toLowerCase();
    wins = wins.filter(w =>
      w.description.toLowerCase().includes(q) ||
      w.impact.toLowerCase().includes(q)
    );
  }

  container.innerHTML = `

    <div id="winsCards">
    ${wins.map(w => `

        <div class="wins-archive-date">${formatDateShort(w.date)} · <span class="vector-tag">${escapeHtml(w.vectors.join(', '))}</span></div>

function editWin(winId) {
  const win = state.wins.find(w => String(w.id) === String(winId));
  if (!win) return;
  const card = document.getElementById('win-archive-' + winId);
  if (!card) return;

  // Replace card content with edit form
  const actionsEl = card.querySelector('.wins-archive-card-actions');
  if (!actionsEl) return;
  actionsEl.outerHTML = `
    <div class="wins-edit-form" id="win-edit-${winId}">

function saveWinEdit(winId) {
  const win = state.wins.find(w => String(w.id) === String(winId));
  if (!win) return;
  const desc = document.getElementById('edit-desc-' + winId)?.value.trim();
  const impact = document.getElementById('edit-impact-' + winId)?.value.trim();
  if (desc) win.description = desc;
  if (impact) win.impact = impact;
  saveState();
  showToast('Win updated');
  const content = document.getElementById('briefsContent');
  if (content) renderWinsArchive(content);
}

function cancelWinEdit() {
  const content = document.getElementById('briefsContent');
  if (content) renderWinsArchive(content);
}

function deleteWin(winId) {
  const win = state.wins.find(w => String(w.id) === String(winId));
  if (!win) return;
  if (!confirm('Remove this win from your archive?')) return;
  win.status = 'dismissed';
  saveState();
  showToast('Win removed');
  const content = document.getElementById('briefsContent');
  if (content) renderWinsArchive(content);
}

function exportWins() {
  const wins = getConfirmedWins();
  if (wins.length === 0) { showToast('No wins to export.'); return; }

  // Apply current filters
  let filtered = wins;
  if (winsFilter.vector) filtered = filtered.filter(w => w.vectors.includes(winsFilter.vector));
  if (winsFilter.search) {
    const q = winsFilter.search.toLowerCase();
    filtered = filtered.filter(w => w.description.toLowerCase().includes(q) || w.impact.toLowerCase().includes(q));
  }

  const text = filtered.map((w, i) =>
    `${i + 1}. ${w.description}\n   Impact: ${w.impact}\n   Vector: ${w.vectors.join(', ')}\n   Date: ${w.date}`
  ).join('\n\n');

  navigator.clipboard.writeText(text).then(() => {
    showToast(`${filtered.length} win${filtered.length !== 1 ? 's' : ''} copied to clipboard`);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(`${filtered.length} win${filtered.length !== 1 ? 's' : ''} copied to clipboard`);
  });
}

async function generatePromoBrief() {
  const wins = getConfirmedWins();
  if (wins.length < 2) { showToast('Need at least 2 confirmed wins to generate a brief.'); return; }

  const briefContainer = document.getElementById('promoBriefContainer');
  if (!briefContainer) return;

  if (!state.settings.baseUrl) {
    showToast('Set up your AI gateway in Settings first.');
    return;
  }

  briefContainer.innerHTML = `
    <div class="brief-section" style="margin-top:var(--space-3xl)">
      <div class="section-header">Promotion Brief</div>
      <div class="brief-loading">
        <div class="brief-loading-text">Generating narrative from ${wins.length} wins...</div>
        <div class="progress-bar"><div class="progress-bar-fill"></div></div>
      </div>
    </div>
  `;

  const promo = state.settings.promotionNotes || 'No promotion notes provided.';
  const winsText = wins.map((w, i) =>
    `${i + 1}. ${w.description}\n   Impact: ${w.impact}\n   Vector: ${w.vectors.join(', ')}\n   Date: ${w.date}`
  ).join('\n\n');

  const prompt = `Here is context about this person's promotion goals:
<promotion_context>
${promo}
</promotion_context>

Here are their confirmed wins, most recent first:
<wins>
${winsText}
</wins>

Write a promotion brief — a 3-5 paragraph narrative that a manager could use to advocate for this person's promotion. Requirements:

1. Open with a thesis statement: what level this person is operating at and why
2. Group wins thematically by promotion vector, not chronologically
3. For each theme, lead with the pattern, then cite 2-3 specific wins as evidence
4. Frame everything as impact and behavioral change, not task completion
5. Close with a forward-looking statement about readiness

Write in third person ("Mo has demonstrated..."). Be specific — use the actual wins and their impacts. This should read like a compelling case, not a list.

Do not inflate or add wins that aren't listed. If the evidence is thin in an area, acknowledge it rather than stretching.`;

  try {
    const text = await callClaude(SYSTEM_PROMPT, prompt, 2000);
    briefContainer.innerHTML = `
      <div class="brief-section" style="margin-top:var(--space-3xl)">
        <div class="section-header-row">
          <span class="section-header" style="margin-bottom:0">Promotion Brief</span>
          <button class="btn-icon" onclick="copyPromoBrief()" title="Copy to clipboard">⧉</button>

        <div class="promo-brief" id="promoBriefText">${formatBriefText(text)}</div>
      </div>
    `;
  } catch (err) {
    briefContainer.innerHTML = `
      <div class="brief-section" style="margin-top:var(--space-3xl)">
        <div class="section-header">Promotion Brief</div>
        <div class="card" style="color:var(--accent-negative)">Failed to generate. Check your gateway settings and try again.</div>
      </div>

function renderBriefDetail(panel) {
  const brief = state.weeklyBriefs.find(b => b.id === currentBriefId);
  if (!brief) { briefsView = 'list'; renderBriefs(); return; }

  const isCurrentWeek = brief.weekOf === getWeekMonday(todayStr());
  const briefWins = brief.winsDetected || [];
  // Get win statuses from state.wins
  const winStatuses = briefWins.map((w, i) => {
    const stateWin = state.wins.find(sw => sw.sourceBriefId === brief.id && sw.description === w.description);
    return stateWin || { status: 'suggested', id: null };
  });

  panel.innerHTML = `
    <div class="brief-back">
      <button class="btn-ghost" onclick="backToBriefsList()">← Back to briefs</button>
    </div>
    <div class="brief-header">

    </div>

    <div class="brief-section">
      <div class="section-header">Wins Detected</div>
      ${briefWins.length === 0
        ? `<div class="card" style="color:var(--text-secondary)">${formatBriefText(brief.winsRaw || 'No wins detected this week.')}</div>`
        : briefWins.map((w, i) => {
          const ws = winStatuses[i];
          const isKept = ws.status === 'confirmed';
          const isDismissed = ws.status === 'dismissed';
          if (isDismissed && !isCurrentWeek) return '';
          return `
            <div class="win-card${isKept ? ' kept' : ''}${isDismissed ? ' dismissing' : ''}" id="win-${i}" data-brief="${brief.id}" data-win-idx="${i}">
              <div class="win-description">${escapeHtml(w.description)}</div>

              <div class="win-meta-value vector">${escapeHtml(w.vector)}</div>
              ${isKept ? '<div class="win-kept-badge">✓ Kept</div>'
                : isDismissed ? ''
                : isCurrentWeek ? `
                <div class="win-actions">
                  <button class="btn-positive" onclick="keepWin(${brief.id}, ${i})">✓ Keep</button>
                  <button class="btn-dismiss" onclick="dismissWin(${brief.id}, ${i})">✕ Dismiss</button>
                </div>` : '<div class="win-kept-badge" style="color:var(--text-muted)">Not reviewed</div>'

        }).join('')

  `;

async function startGenerateBrief() {
  const weekEntries = getCurrentWeekEntries();
  if (weekEntries.length === 0) {
    showToast('No entries this week to analyze.');
    return;
  }
  if (weekEntries.length < 3 && !confirm(`Briefs work best with 3+ entries. You have ${weekEntries.length} so far. Generate anyway?`)) {
    return;
  }

  switchTab('briefs');
  briefsView = 'loading';
  renderBriefs();

  try {
    const systemPrompt = SYSTEM_PROMPT + '\n\nFor this weekly brief, produce a structured response in exactly the format specified below. Do not deviate from the section structure.';
    const text = await callClaude(systemPrompt, buildWeeklyPrompt(weekEntries), 2000);
    const parsed = parseWeeklyBrief(text);
    const monday = getWeekMonday(todayStr());

    // Remove existing brief for this week
    state.weeklyBriefs = state.weeklyBriefs.filter(b => b.weekOf !== monday);
    // Remove suggested wins from this week's previous brief
    state.wins = state.wins.filter(w => !(w.sourceWeek === monday && w.status === 'suggested'));

    const brief = {
      id: Date.now(),
      weekOf: monday,
      patterns: parsed.patterns,
      vectorCheckIn: parsed.vectorCheckIn,
      winsDetected: parsed.winsDetected,
      winsRaw: parsed.winsRaw,
      oneOnOnePrep: parsed.oneOnOnePrep,
      raw: text
    };
    state.weeklyBriefs.push(brief);

    // Create win entries
    parsed.winsDetected.forEach(w => {
      state.wins.push({
        id: Date.now() + Math.random(),
        date: todayStr(),
        sourceWeek: monday,
        sourceBriefId: brief.id,
        description: w.description,
        impact: w.impact,
        vectors: [w.vector],
        status: 'suggested'
      });
    });

    saveState();
    briefsView = 'detail';
    currentBriefId = brief.id;
    renderBriefs();

  } catch (err) {
    briefsView = 'list';
    renderBriefs();
    if (err.message === 'no_key') {
      showToast('Set up your AI gateway in Settings first.');
    } else {
      showToast('Failed to generate brief. Check your gateway settings and try again.');
    }
  }
}

function keepWin(briefId, winIdx) {
  const brief = state.weeklyBriefs.find(b => b.id === briefId);
  if (!brief) return;
  const winData = brief.winsDetected[winIdx];
  const stateWin = state.wins.find(w => w.sourceBriefId === briefId && w.description === winData.description);
  if (stateWin) {
    stateWin.status = 'confirmed';
    saveState();
  }
  const card = document.getElementById('win-' + winIdx);
  if (card) {
    card.classList.add('kept');
    const actions = card.querySelector('.win-actions');
    if (actions) actions.outerHTML = '<div class="win-kept-badge">✓ Kept</div>';
  }
}

function dismissWin(briefId, winIdx) {
  const brief = state.weeklyBriefs.find(b => b.id === briefId);
  if (!brief) return;
  const winData = brief.winsDetected[winIdx];
  const stateWin = state.wins.find(w => w.sourceBriefId === briefId && w.description === winData.description);
  if (stateWin) {
    stateWin.status = 'dismissed';
    saveState();
  }
  const card = document.getElementById('win-' + winIdx);
  if (card) {
    card.classList.add('dismissing');
    setTimeout(() => { card.style.display = 'none'; }, 300);
  }
  showToast('Win dismissed ·', 5000, () => {
    if (stateWin) {
      stateWin.status = 'suggested';
      saveState();
      renderBriefDetail(document.getElementById('panel-briefs'));
    }
  });
}

function copyPrep() {
  const prepEl = document.getElementById('prepContent');
  if (!prepEl) return;
  const text = prepEl.innerText;
  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard');
  });
}

function attachSettingsListeners() {
  const saveField = (id, key) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('blur', (e) => { state.settings[key] = e.target.value.trim(); saveState(); });
  };

  if (settingsSubTab === 'profile') {
    saveField('settingName', 'name');
    saveField('settingRole', 'role');
    saveField('settingPromotion', 'promotionNotes');
  }

  if (settingsSubTab === 'integrations') {
    saveField('settingBaseUrl', 'baseUrl');
    saveField('settingProjectId', 'projectId');
    saveField('settingSlack', 'slackWebhook');

    const apiKeyEl = document.getElementById('settingApiKey');
    if (apiKeyEl) apiKeyEl.addEventListener('blur', (e) => { state.settings.apiKey = e.target.value.trim(); saveState(); });

    document.querySelectorAll('input[name="model"]').forEach(radio => {
      radio.addEventListener('change', (e) => { state.settings.model = e.target.value; saveState(); });
    });

    const ghTokenEl = document.getElementById('settingGhToken');

/* ========================================
   Utilities
   ======================================== */
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatBulletList(text) {
  if (!text) return '';
  const lines = text.split('\n').filter(l => l.trim());
  const hasBullets = lines.some(l => /^\s*[-•]/.test(l));
  if (!hasBullets) return escapeHtml(text);
  return '<ul class="history-bullets">' + lines.map(l => {
    const content = escapeHtml(l.replace(/^\s*[-•]\s*/, '').trim());
    return content ? `<li>${content}</li>` : '';
  }).filter(Boolean).join('') + '</ul>';
}

function formatCoachingNote(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  let inList = false;
  for (const line of lines) {
    const trimmed = line.trim();
    if (/^[-•*]\s/.test(trimmed)) {
      if (!inList) { html += '<ul>'; inList = true; }
      const content = escapeHtml(trimmed.replace(/^[-•*]\s+/, ''))
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html += `<li>${content}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (!trimmed) continue;
      const content = escapeHtml(trimmed)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html += `<p>${content}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function formatBriefText(text) {
  if (!text) return '<span style="color:var(--text-muted)">No content</span>';
  return escapeHtml(text)
    .replace(/\n\n/g, '</p><p style="margin-top:var(--space-md)">')
    .replace(/\n/g, '<br>');
}

const PIE_COLORS = [
  'var(--accent-600)', 'var(--accent-400)', 'var(--accent-800)',
  'var(--accent-300)', 'var(--accent-700)', 'var(--accent-500)',
  'var(--accent-200)', 'var(--accent-900)', 'var(--accent-100)', 'var(--accent-50)'
];

function buildComponentPieChart(componentCounts) {
  const entries = Object.entries(componentCounts).sort((a, b) => b[1] - a[1]);
  const total = entries.reduce((s, e) => s + e[1], 0);
  const r = 175;
  const cx = 200, cy = 200;
  let cumAngle = -Math.PI / 2;
  const slices = entries.map(([name, count], i) => {
    const angle = (count / total) * 2 * Math.PI;
    const startX = cx + r * Math.cos(cumAngle);
    const startY = cy + r * Math.sin(cumAngle);
    cumAngle += angle;
    const endX = cx + r * Math.cos(cumAngle);
    const endY = cy + r * Math.sin(cumAngle);
    const largeArc = angle > Math.PI ? 1 : 0;
    const color = PIE_COLORS[i % PIE_COLORS.length];
    // For a single item, draw a full circle
    if (entries.length === 1) {
      return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" class="pie-slice" data-name="${escapeHtml(name)}" data-count="${count}"/>`;
    }
    return `<path d="M${cx},${cy} L${startX},${startY} A${r},${r} 0 ${largeArc} 1 ${endX},${endY} Z" fill="${color}" class="pie-slice" data-name="${escapeHtml(name)}" data-count="${count}"/>`;
  });

  const legend = entries.slice(0, 10).map(([name, count]) =>
    `<div class="pie-legend-item" onclick="filterContribsByComponent('${escapeHtml(name).replace(/'/g, "\\'")}')">
      <span class="pie-legend-name">${escapeHtml(name)}</span>
      <span class="pie-legend-count">${count}</span>
    </div>`
  ).join('');

  return `<div class="pie-chart-row">
    <div class="pie-chart-wrap">
      <svg viewBox="0 0 400 400" width="400" height="400">${slices.join('')}</svg>
      <div class="pie-tooltip" id="pieTooltip"></div>
    </div>
    <div class="pie-legend">
      <div class="pie-legend-header">Top 10</div>
      ${legend}
    </div>
  </div>`;
}

function buildMonthLineChart(monthCounts) {
  const entries = Object.entries(monthCounts)
    .filter(([m]) => m !== 'unknown')
    .sort((a, b) => a[0].localeCompare(b[0]));
  if (entries.length < 2) return '';

  const maxCount = Math.max(...entries.map(e => e[1]));
  const padTop = 24, padBottom = 32, padLeft = 32, padRight = 16;
  const h = 160;
  const w = 800; // will scale via viewBox
  const chartW = w - padLeft - padRight;
  const chartH = h - padTop - padBottom;

  const points = entries.map(([month, count], i) => {
    const x = padLeft + (i / (entries.length - 1)) * chartW;
    const y = padTop + chartH - (count / maxCount) * chartH;
    return { x, y, month, count };
  });

  const polyline = points.map(p => `${p.x},${p.y}`).join(' ');

  // Fill area
  const areaPoints = `${padLeft},${padTop + chartH} ${polyline} ${points[points.length - 1].x},${padTop + chartH}`;

  // Y-axis labels
  const yLabels = [Math.ceil(maxCount / 2), maxCount].map(v => {
    const y = padTop + chartH - (v / maxCount) * chartH;
    return `<text x="${padLeft - 8}" y="${y + 4}" text-anchor="end" fill="var(--text-muted)" font-size="12" font-weight="500" font-family="var(--font-family)">${v}</text>
      <line x1="${padLeft}" y1="${y}" x2="${w - padRight}" y2="${y}" stroke="var(--text-muted)" stroke-width="0.75" stroke-dasharray="4 2"/>`;
  }).join('');

  // X-axis labels
  const xLabels = points.map(p => {
    const d = new Date(p.month + '-01T12:00:00');
    const label = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
    return `<text x="${p.x}" y="${h - 8}" text-anchor="middle" fill="var(--text-muted)" font-size="12" font-weight="500" font-family="var(--font-family)">${label}</text>`;
  }).join('');

  // Dots and hover targets
  const dots = points.map(p =>
    `<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--accent-600)" class="line-chart-dot" data-month="${p.month}" data-count="${p.count}"/>
     <circle cx="${p.x}" cy="${p.y}" r="16" fill="transparent" class="line-chart-hit" data-month="${p.month}" data-count="${p.count}"/>`
  ).join('');

  return `<div class="line-chart-wrap">
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" width="100%">
      ${yLabels}
      <line x1="${padLeft}" y1="${padTop + chartH}" x2="${w - padRight}" y2="${padTop + chartH}" stroke="var(--text-muted)" stroke-width="0.75"/>
      <polygon points="${areaPoints}" fill="var(--accent-100)" opacity="0.5"/>
      <polyline points="${polyline}" fill="none" stroke="var(--accent-600)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      ${xLabels}
    </svg>
    <div class="line-chart-tooltip" id="lineChartTooltip"></div>
  </div>`;
}

function initLineChartTooltip() {
  const wrap = document.querySelector('.line-chart-wrap');
  if (!wrap) return;
  const tooltip = document.getElementById('lineChartTooltip');
  wrap.addEventListener('mouseover', (e) => {
    const hit = e.target.closest('.line-chart-hit') || e.target.closest('.line-chart-dot');
    if (!hit || !tooltip) return;
    const d = new Date(hit.dataset.month + '-01T12:00:00');
    const label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    tooltip.textContent = label + ': ' + hit.dataset.count;
    tooltip.style.opacity = '1';
  });
  wrap.addEventListener('mouseout', () => {
    if (tooltip) tooltip.style.opacity = '0';
  });
  wrap.addEventListener('mousemove', (e) => {
    if (!tooltip) return;
    const rect = wrap.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 28) + 'px';
  });
}

function initPieTooltip() {
  const wrap = document.querySelector('.pie-chart-wrap');
  if (!wrap) return;
  const tooltip = document.getElementById('pieTooltip');
  wrap.addEventListener('mouseover', (e) => {
    const slice = e.target.closest('.pie-slice');
    if (!slice || !tooltip) return;
    const name = slice.dataset.name;
    const count = slice.dataset.count;
    tooltip.innerHTML = `<strong>${escapeHtml(name)}</strong> · ${count}`;
    tooltip.style.opacity = '1';
    tooltip.style.pointerEvents = 'auto';
    slice.style.opacity = '0.75';
  });
  wrap.addEventListener('mouseout', (e) => {
    const slice = e.target.closest('.pie-slice');
    if (slice) slice.style.opacity = '1';
    if (tooltip) { tooltip.style.opacity = '0'; tooltip.style.pointerEvents = 'none'; }
  });
  wrap.addEventListener('mousemove', (e) => {
    if (!tooltip) return;
    const rect = wrap.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 8) + 'px';
  });
  wrap.addEventListener('click', (e) => {
    const slice = e.target.closest('.pie-slice');
    if (!slice) return;
    filterContribsByComponent(slice.dataset.name);
  });
}

function getDateFilteredContribs() {
  let contribs = state.contributions;
  if (contribDateFrom) {
    contribs = contribs.filter(c => c.date && c.date !== 'unknown' && c.date >= contribDateFrom);
  }
  if (contribDateTo) {
    contribs = contribs.filter(c => c.date && c.date !== 'unknown' && c.date <= contribDateTo);
  }
  return contribs;
}

function renderContribDashboard(panel) {
  if (state.contributions.length === 0) {

  }

  const contribs = getDateFilteredContribs();

  // Stats
  const catCounts = {};
  const componentCounts = {};
  const monthCounts = {};
  for (const c of contribs) {
    catCounts[c.category] = (catCounts[c.category] || 0) + 1;

    const month = c.date && c.date !== 'unknown' ? c.date.substring(0, 7) : 'unknown';
    monthCounts[month] = (monthCounts[month] || 0) + 1;
  }

  // Filtered items for the entry list
  let filtered = [];

  if (contribFilterComponent) {
    filtered = contribs.filter(c => c.component === contribFilterComponent);
    filterLabel = contribFilterComponent + ' · ' + filtered.length + ' contribution' + (filtered.length !== 1 ? 's' : '');
  } else if (contribFilterCat) {
    filtered = contribs.filter(c => c.category === contribFilterCat);
    filterLabel = getCategoryLabel(contribFilterCat) + ' · ' + filtered.length + ' contribution' + (filtered.length !== 1 ? 's' : '');
  }

  // Compute filtered stats for pie chart and line chart when a category is selected
  const chartSource = filtered.length > 0 ? filtered : contribs;
  const filteredComponentCounts = {};
  const filteredMonthCounts = {};
  for (const c of chartSource) {
    if (c.component) filteredComponentCounts[c.component] = (filteredComponentCounts[c.component] || 0) + 1;
    const month = c.date && c.date !== 'unknown' ? c.date.substring(0, 7) : 'unknown';
    filteredMonthCounts[month] = (filteredMonthCounts[month] || 0) + 1;
  }

  const defaultFromDate = allDates.length ? allDates[0] : todayStr();

  // Group by category for the entry list
  const grouped = {};

    if (!grouped[c.category]) grouped[c.category] = [];
    grouped[c.category].push(c);
  }

  const hasDateFilter = contribDateFrom || contribDateTo;

  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-xl);gap:var(--space-md)">

        <div>
          <div style="font-size:15px;font-weight:500">Contributions for Hawkins Design System</div>
          ${hasDateFilter ? '<div style="font-size:11px;color:var(--text-muted)">filtered</div>' : ''}
        </div>
      </div>
      <button class="btn-secondary btn-accent" onclick="openContribImport()"><span class="hide-mobile">Import from Slack</span><span class="show-mobile">Import</span></button>
    </div>

    <div class="contrib-stats">
      <div class="contrib-date-filter">
        <label>From</label>
        <input type="date" id="contribDateFrom" value="${contribDateFrom || defaultFromDate}" onchange="updateContribDateFilter()">
        <label>To</label>
        <input type="date" id="contribDateTo" value="${contribDateTo || defaultToDate}" onchange="updateContribDateFilter()">
        ${hasDateFilter ? '<button class="btn-ghost" onclick="clearContribDateFilter()" style="font-size:12px">Clear</button>' : ''}
      </div>
    </div>

    <div class="contrib-cat-grid">
      ${CONTRIB_CATEGORIES.filter(c => catCounts[c.id]).map(c =>
        `<div class="contrib-cat-card${contribFilterCat === c.id ? ' active' : ''}" data-cat="${c.id}" onclick="filterContribs('${c.id}')">
          <div class="contrib-cat-card-label">${c.label}</div>
          <div class="contrib-cat-card-count">${catCounts[c.id]}</div>
        </div>`
      ).join('')}
    </div>

    ${Object.keys(filteredComponentCounts).length > 0 ? `
    <div class="contrib-section">
      <div class="contrib-section-label" onclick="toggleContribSection(this)">
        <span class="cta-icon">▾</span>
        Components mentioned${contribFilterCat ? ' — ' + getCategoryLabel(contribFilterCat) : ''}
      </div>
      <div class="contrib-section-body" id="contribPieChart">${buildComponentPieChart(filteredComponentCounts)}</div>
    </div>` : ''}

    ${Object.entries(filteredMonthCounts).filter(([m]) => m !== 'unknown').length >= 2 ? `
    <div class="contrib-section">
      <div class="contrib-section-label" onclick="toggleContribSection(this)">
        <span class="cta-icon">▾</span>
        Activity over time${contribFilterCat ? ' — ' + getCategoryLabel(contribFilterCat) : ''}
      </div>
      <div class="contrib-section-body">${buildMonthLineChart(filteredMonthCounts)}</div>
    </div>` : ''}

    ${filtered.length > 0 ? `
      <div class="contrib-section-label" style="justify-content:space-between">
        <span>Contributions${contribFilterCat ? ' — ' + getCategoryLabel(contribFilterCat) : (contribFilterComponent ? ' — ' + contribFilterComponent : '')}</span>
        <button class="btn-ghost" onclick="clearContribFilters()" style="font-size:12px">Clear filter</button>

      ${Object.entries(grouped).sort((a, b) => b[1].length - a[1].length).map(([cat, items]) => `
        <div class="contrib-section">

  setTimeout(() => { initPieTooltip(); initLineChartTooltip(); }, 0);

async function processContribImport() {
  const text = document.getElementById('contribPasteArea')?.value.trim();
  if (!text) {
    document.getElementById('contribImportError').classList.add('show');
    return;
  }

  if (!state.settings.baseUrl) {
    showToast('Set up your AI gateway in Settings first.');
    return;
  }

  const channel = document.querySelector('input[name="contribChannel"]:checked')?.value || '#hawkins-professional-design';
  const btn = document.getElementById('contribProcessBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Processing...';

  try {
    const prompt = `You parse raw Slack messages pasted from a design system channel.
Extract each distinct post/message from the user.
For each post, output a JSON array with objects containing:
- date: best guess ISO date from context (or "unknown")
- text: the message content (cleaned up, 1-2 sentences max)
- category: one of "bug-report", "feature-request", "design-feedback", "component-request", "documentation", "discussion"
- component: component name if mentioned (e.g. "Timeline", "ButtonGroup", "DatePicker") or null
Output only valid JSON. No preamble, no markdown fences.

Here are the pasted Slack messages:
${text}`;

    const result = await callClaude(
      'You are a structured data extraction tool. Output only valid JSON arrays. No prose, no markdown code fences.',
      prompt,
      2000
    );

    // Parse JSON from response
    let parsed;
    try {
      // Try to extract JSON from the response (handle markdown fences)
      const jsonMatch = result.match(/\[[\s\S]*\]/);
      parsed = JSON.parse(jsonMatch ? jsonMatch[0] : result);
    } catch (e) {
      showToast('Failed to parse AI response. Try again.');
      btn.disabled = false;
      btn.textContent = 'Process with AI';
      return;
    }

    if (!Array.isArray(parsed) || parsed.length === 0) {
      showToast('No messages extracted. Try pasting more content.');
      btn.disabled = false;
      btn.textContent = 'Process with AI';
      return;
    }

    // Prepare review data
    contribReviewData = parsed.map(item => ({
      id: Date.now() + Math.random(),
      date: item.date || 'unknown',
      channel: channel,
      text: item.text || '',
      category: CONTRIB_CATEGORIES.find(c => c.id === item.category) ? item.category : 'other',
      component: item.component || '',
      status: 'open',
      slackLink: ''
    }));

    contribView = 'review';
    renderContributions();

  } catch (err) {
    if (err.message === 'no_key') {
      showToast('Set up your AI gateway in Settings first.');
    } else {
      showToast('Failed to process. Check your gateway settings.');
    }
    btn.disabled = false;
    btn.textContent = 'Process with AI';
  }
}

    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:var(--space-xl)">
      Edit categories, components, or dates before saving. Remove any that aren't real contributions.
    </div>

    <div id="contribReviewList">
      ${contribReviewData.map((c, i) => `
        <div class="contrib-review-card" id="review-${i}">
          <div class="contrib-card-text">${escapeHtml(c.text)}</div>
          <div class="contrib-edit-row">
            <select data-field="category" data-idx="${i}" onchange="updateReviewItem(this)">
              ${CONTRIB_CATEGORIES.map(cat =>
                `<option value="${cat.id}" ${c.category === cat.id ? 'selected' : ''}>${cat.label}</option>`
              ).join('')}
            </select>
            <input type="text" data-field="component" data-idx="${i}" value="${escapeHtml(c.component)}" placeholder="Component..." onchange="updateReviewItem(this)" style="width:120px">
            <input type="date" data-field="date" data-idx="${i}" value="${c.date !== 'unknown' ? c.date : ''}" onchange="updateReviewItem(this)">
            <button class="btn-ghost" style="color:var(--text-muted);font-size:16px" onclick="removeReviewItem(${i})" title="Remove">✕</button>
          </div>
        </div>
      `).join('')}
    </div>

    <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-xl)">
      <button class="btn-primary" onclick="confirmContribImport()" style="flex:1">Save ${contribReviewData.length} Contributions</button>
      <button class="btn-dismiss" onclick="contribView='import';renderContributions()">Cancel</button>
    </div>
  `;
}

function updateReviewItem(el) {
  const idx = parseInt(el.dataset.idx);
  const field = el.dataset.field;
  if (idx < 0 || idx >= contribReviewData.length) return;
  if (field === 'date') {
    contribReviewData[idx].date = el.value || 'unknown';
  } else {
    contribReviewData[idx][field] = el.value;
  }
}

function removeReviewItem(idx) {
  contribReviewData.splice(idx, 1);
  renderContribReview(document.getElementById('panel-contributions'));
}

function confirmContribImport() {
  if (contribReviewData.length === 0) {
    showToast('Nothing to import.');
    return;
  }

  // Deduplicate: skip contributions with identical text
  const existingTexts = new Set(state.contributions.map(c => c.text));
  let added = 0;
  for (const c of contribReviewData) {
    if (!existingTexts.has(c.text)) {
      state.contributions.push(c);
      existingTexts.add(c.text);
      added++;
    }
  }

  saveState();
  contribReviewData = [];
  contribView = 'dashboard';
  renderContributions();
  showToast(`${added} contribution${added !== 1 ? 's' : ''} imported`);
}

function openContribDetail(id) {
  contribDetailId = id;
  contribView = 'detail';
  renderContributions();
}

function renderContribDetail(panel) {
  const c = state.contributions.find(x => String(x.id) === String(contribDetailId));
  if (!c) { contribView = 'dashboard'; renderContributions(); return; }

  panel.innerHTML = `
    <div style="margin-bottom:var(--space-xl)">
      <button class="btn-ghost" onclick="contribView='dashboard';contribDetailId=null;renderContributions()">← Back</button>
    </div>

    <div class="contrib-detail">
      <div class="form-group">
        <label class="form-label">Message</label>

      </div>

      <div class="contrib-detail-grid">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-input" id="contribEditCategory">
            ${CONTRIB_CATEGORIES.map(cat =>
              `<option value="${cat.id}" ${c.category === cat.id ? 'selected' : ''}>${cat.label}</option>`
            ).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Channel</label>
          <input class="form-input" id="contribEditChannel" value="${escapeHtml(c.channel)}" placeholder="#channel-name">
        </div>
      </div>

      <div class="contrib-detail-grid">
        <div class="form-group">
          <label class="form-label">Component</label>
          <input class="form-input" id="contribEditComponent" value="${escapeHtml(c.component)}" placeholder="e.g. Timeline">
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-input" type="date" id="contribEditDate" value="${c.date !== 'unknown' ? c.date : ''}">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Slack Link</label>
        <input class="form-input" id="contribEditLink" value="${escapeHtml(c.slackLink || '')}" placeholder="https://slack.com/...">
      </div>

      <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-lg)">
        <button class="btn-positive" onclick="saveContribDetail()">Save</button>
        <button class="btn-dismiss" onclick="contribView='dashboard';contribDetailId=null;renderContributions()">Cancel</button>
        <button class="btn-ghost" style="margin-left:auto;color:var(--accent-negative)" onclick="deleteContrib()">Delete</button>
      </div>
    </div>
  `;
}

function saveContribDetail() {
  const c = state.contributions.find(x => String(x.id) === String(contribDetailId));
  if (!c) return;

  c.text = document.getElementById('contribEditText')?.value.trim() || c.text;
  c.category = document.getElementById('contribEditCategory')?.value || c.category;
  c.component = document.getElementById('contribEditComponent')?.value.trim() || '';
  c.date = document.getElementById('contribEditDate')?.value || 'unknown';
  c.channel = document.getElementById('contribEditChannel')?.value.trim() || '';
  c.slackLink = document.getElementById('contribEditLink')?.value.trim() || '';

  saveState();
  contribView = 'dashboard';
  contribDetailId = null;
  renderContributions();
  showToast('Contribution updated');
}

function deleteContrib() {
  if (!confirm('Delete this contribution?')) return;
  state.contributions = state.contributions.filter(x => String(x.id) !== String(contribDetailId));
  saveState();
  contribView = 'dashboard';
  contribDetailId = null;
  renderContributions();
  showToast('Contribution deleted');
}

function formatEntriesForPrompt(entries) {
  if (!entries.length) return '(no entries)';
  return entries.map(e => {
    const parts = [`Date: ${e.date}`];
    if (e.intention) parts.push(`Intention: ${e.intention}`);
    if (e.workDone) parts.push(`Work done:\n${e.workDone}`);
    if (e.reflection) parts.push(`Reflection: ${e.reflection}`);
    return parts.join('\n');
  }).join('\n---\n');
}

const DRAFT_SYSTEM_PROMPT = `You are a concise writing assistant for a product designer at Netflix. Every draft you write MUST follow this structure:

**Problem** — What user or business problem needed solving (1-2 sentences)
**Context** — Brief relevant background so anyone can understand (1-2 sentences)
**Design Solution** — What you designed and key decisions (2-3 sentences)
**Impact** — Outcome, what changed, or expected result (1-2 sentences)

Rules:
- 250 words max. Be brief and high-level.
- Remove unnecessary detail — someone with zero context should quickly understand how the design solves the problem.
- Professional but casual tone. No preamble, no sign-off.
- Use markdown bold for the section labels.`;

function buildTop3Prompt() {
  const entries = getCurrentWeekEntries();
  const recent = getRecentEntries(5);
  const all = [...entries, ...recent.filter(r => !entries.find(e => e.date === r.date))];
  return {
    systemPrompt: DRAFT_SYSTEM_PROMPT,
    userPrompt: `Write a "Weekly Top 3" Slack post — 3 items, each following the Problem → Context → Design Solution → Impact structure. Keep each item compact (a few sentences total).\n\nJournal entries:\n${formatEntriesForPrompt(all)}`
  };
}

function buildDraftboardPrompt() {

let visibView = 'dashboard';
let visibDetailId = null;
let visibSuggestions = [];
let visibLogType = '';
let visibLogSubtype = '';
let visibDraftType = null;
let visibDraftText = '';

function getVisibTypeLabel(id) {
  return VISIBILITY_TYPES.find(t => t.id === id)?.label || id;
}

function getVisibTypeObj(id) {
  return VISIBILITY_TYPES.find(t => t.id === id);
}

const AUDIENCE_LABELS = { pod: 'CIA Pod', cbp: 'CBP', org: 'XD Org' };
function normalizeAudience(aud) {
  if (aud === 'team') return 'pod';
  if (aud === 'adjacent') return 'cbp';
  return aud;
}
function getAudienceLabel(aud) {
  return AUDIENCE_LABELS[normalizeAudience(aud)] || aud;
}

function getVisibActivitiesForWeek() {
  const monday = getWeekMonday(todayStr());
  const weekDates = getWeekDates(monday);
  return state.visibilityActivities.filter(a => weekDates.includes(a.date));
}

function getVisibActivitiesLast30() {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 30);
  const cutoffStr = cutoff.toISOString().split('T')[0];
  return state.visibilityActivities.filter(a => a.date >= cutoffStr);
}

function getLastActivityByType(typeId) {
  if (typeId === 'hawkins') {
    const visibDates = state.visibilityActivities.filter(a => a.type === 'hawkins').map(a => a.date);
    const contribDates = state.contributions.map(c => c.date).filter(d => d && d !== 'unknown');
    const allDates = [...visibDates, ...contribDates].sort().reverse();
    return allDates[0] || null;
  }
  const sorted = state.visibilityActivities.filter(a => a.type === typeId).sort((a, b) => b.date.localeCompare(a.date));
  return sorted[0]?.date || null;
}

function getStalenessNudges() {
  const today = todayStr();
  const nudges = [];
  for (const [typeId, threshold] of Object.entries(STALENESS_THRESHOLDS)) {
    const lastDate = getLastActivityByType(typeId);
    if (!lastDate) {
      nudges.push({ type: typeId, label: getVisibTypeLabel(typeId), daysSince: null });
    } else {
      const diff = Math.floor((new Date(today + 'T12:00:00') - new Date(lastDate + 'T12:00:00')) / (1000 * 60 * 60 * 24));
      if (diff > threshold) {
        nudges.push({ type: typeId, label: getVisibTypeLabel(typeId), daysSince: diff });
      }
    }
  }
  return nudges;
}

function computeVectorCoverage(activities) {
  const counts = {};
  ALL_VECTORS.forEach(v => counts[v] = 0);
  for (const a of activities) {
    if (a.vectors) a.vectors.forEach(v => { if (counts[v] !== undefined) counts[v]++; });
  }
  return counts;
}

function computeReachDistribution(activities) {
  const counts = { pod: 0, cbp: 0, org: 0 };
  for (const a of activities) {
    // Migrate legacy values
    const aud = a.audience === 'team' ? 'pod' : a.audience === 'adjacent' ? 'cbp' : a.audience;
    if (counts[aud] !== undefined) counts[aud]++;
  }
  const total = counts.pod + counts.cbp + counts.org;
  if (total === 0) return { pod: 0, cbp: 0, org: 0, total: 0 };
  return {
    pod: Math.round(counts.pod / total * 100),
    cbp: Math.round(counts.cbp / total * 100),
    org: Math.round(counts.org / total * 100),
    total
  };
}

function renderVisibility() {
  const panel = document.getElementById('panel-visibility');
  if (visibView === 'draft' && visibDraftType) { renderVisibDraft(panel); return; }
  if (visibView === 'log') { renderVisibLog(panel); return; }
  if (visibView === 'detail' && visibDetailId) { renderVisibDetail(panel); return; }
  renderVisibDashboard(panel);
}

function renderVisibDashboard(panel) {
  const activities = state.visibilityActivities;
  const weekActivities = getVisibActivitiesForWeek();
  const last30 = getVisibActivitiesLast30();
  const nudges = getStalenessNudges();
  const vectorCoverage = computeVectorCoverage(last30);
  const reach = computeReachDistribution(last30);

  // Weekly rhythm strip
  const monday = getWeekMonday(todayStr());
  const weekDates = getWeekDates(monday);
  const today = todayStr();
  const todayDow = new Date(today + 'T12:00:00').getDay(); // 1=Mon..5=Fri

  const RHYTHM_ICONS = { waywo: 'Slack.svg', draftboard: 'Draftboard.svg', hawkins: 'Hawkins.svg' };
  const rhythmHtml = WEEKLY_RHYTHM.map((r, i) => {
    const dateStr = weekDates[i];
    const hasActivity = weekActivities.some(a => a.date === dateStr);
    const isToday = dateStr === today;
    const icon = RHYTHM_ICONS[r.icon || r.type] || 'Slack.svg';
    return `<div class="visib-rhythm-card${hasActivity ? ' filled' : ''}${isToday ? ' today' : ''}" onclick="startVisibDraft('${RHYTHM_DRAFT_TYPES[i]}')">
      <span class="visib-rhythm-day-label">${r.day}</span>
      <img class="visib-rhythm-icon" src="${icon}" alt="${r.label}">
      <span class="visib-rhythm-sublabel">${r.label}</span>
    </div>`;
  }).join('');

  // Staleness nudges
  const nudgeHtml = nudges.length > 0 ? `<div class="visib-nudges">${nudges.map(n =>
    `<div class="visib-nudge">${n.daysSince === null ? `No ${n.label} logged yet` : `No ${n.label} in ${n.daysSince} days`}</div>`
  ).join('')}</div>` : '';

  // AI suggestions
  const suggestionsHtml = visibSuggestions.length > 0
    ? visibSuggestions.map((s, i) => `<div class="visib-suggestion-card">
        <div class="visib-suggestion-item">
          <div class="visib-suggestion-text">${escapeHtml(s)}</div>
          <button class="visib-suggestion-dismiss" onclick="dismissVisibSuggestion(${i})">×</button>
        </div>
      </div>`).join('')
    : '';

  // Vector coverage bars
  const maxCount = Math.max(1, ...Object.values(vectorCoverage));
  const vectorHtml = ALL_VECTORS.map(v => {
    const count = vectorCoverage[v];
    const pct = Math.round(count / maxCount * 100);
    return `<div class="visib-vector-row${count === 0 ? ' zero' : ''}">
      <span class="visib-vector-label">${v}</span>
      <div class="visib-vector-track"><div class="visib-vector-fill" style="width:${pct}%"></div></div>
      <span class="visib-vector-count">${count}</span>
    </div>`;
  }).join('');

  // Reach distribution bar
  const reachHtml = reach.total > 0
    ? `<div class="visib-reach-bar">
        <div class="visib-reach-segment pod" style="width:${reach.pod}%"></div>
        <div class="visib-reach-segment cbp" style="width:${reach.cbp}%"></div>
        <div class="visib-reach-segment org" style="width:${reach.org}%"></div>
      </div>
      <div class="visib-reach-legend">
        <span><span class="visib-reach-legend-dot pod"></span>CIA Pod ${reach.pod}%</span>
        <span><span class="visib-reach-legend-dot cbp"></span>CBP ${reach.cbp}%</span>
        <span><span class="visib-reach-legend-dot org"></span>XD Org ${reach.org}%</span>
      </div>`
    : `<div style="font-size:13px;color:var(--text-muted)">No activities logged yet</div>`;

  // Recent activity list
  const recent = [...activities].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 20);
  const recentHtml = recent.length > 0 ? recent.map(a => {
    const typeObj = getVisibTypeObj(a.type);
    return `<div class="visib-activity-card" onclick="openVisibDetail('${a.id}')">
      <div class="visib-activity-card-header">
        <span class="visib-activity-card-date">${formatDateShort(a.date)}</span>
        <span class="visib-type-badge">${getVisibTypeLabel(a.type)}${a.subtype ? ' · ' + escapeHtml(a.subtype) : ''}</span>
        <span class="visib-audience-tag ${normalizeAudience(a.audience)}">${getAudienceLabel(a.audience)}</span>
      </div>
      ${a.note ? `<div class="visib-activity-card-note">${escapeHtml(a.note)}</div>` : ''}
      <div class="visib-activity-card-vectors">${(a.vectors || []).join(' · ')}</div>
    </div>`;
  }).join('') : '';

  // Empty state
  if (activities.length === 0) {
    panel.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-xl)">
        <span style="font-size:15px;font-weight:600">Visibility</span>
        <button class="btn-secondary btn-accent" onclick="visibView='log';visibLogType='';visibLogSubtype='';renderVisibility()">Log Activity</button>
      </div>
      <div class="visib-rhythm-strip">${rhythmHtml}</div>
      <div class="empty-state">
        <div style="font-weight:600">Track where your work is visible and to whom.</div>
        <div class="empty-state-secondary">Log your first visibility activity to start building your record.</div>
      </div>`;
    return;
  }

  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-xl)">
      <span style="font-size:15px;font-weight:600">Visibility</span>
      <button class="btn-secondary btn-accent" onclick="visibView='log';visibLogType='';visibLogSubtype='';renderVisibility()">Log Activity</button>
    </div>

    <div class="visib-rhythm-strip">${rhythmHtml}</div>

    ${nudgeHtml}

    <div class="visib-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-md)">
        <span class="visib-section-title">AI Suggestions</span>
        <button class="btn-secondary" id="visibSuggestBtn" onclick="getVisibSuggestions()">Get Suggestions</button>
      </div>
      <div id="visibSuggestionsContainer">${suggestionsHtml}</div>
    </div>

    <div class="visib-section">
      <div class="visib-section-header" onclick="toggleVisibSection('vectors')">
        <span class="visib-section-title">Vector Coverage (30 days)</span>
        <span class="visib-section-toggle" id="visibVectorsToggle">▾</span>
      </div>
      <div id="visibVectorsBody">${vectorHtml}</div>
    </div>

    <div class="visib-section">
      <div class="visib-section-header" onclick="toggleVisibSection('reach')">
        <span class="visib-section-title">Reach Distribution (30 days)</span>
        <span class="visib-section-toggle" id="visibReachToggle">▾</span>
      </div>
      <div id="visibReachBody">${reachHtml}</div>
    </div>

    <div class="visib-section">
      <div class="visib-section-title" style="margin-bottom:var(--space-lg)">Recent Activity</div>
      ${recentHtml}
    </div>
  `;
}

function toggleVisibSection(section) {
  const body = document.getElementById(`visib${section.charAt(0).toUpperCase() + section.slice(1)}Body`);
  const toggle = document.getElementById(`visib${section.charAt(0).toUpperCase() + section.slice(1)}Toggle`);
  if (!body) return;
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  if (toggle) toggle.textContent = hidden ? '▾' : '▸';
}

function openVisibDetail(id) {
  visibDetailId = String(id);
  visibView = 'detail';
  renderVisibility();
}

function dismissVisibSuggestion(index) {
  visibSuggestions.splice(index, 1);
  const container = document.getElementById('visibSuggestionsContainer');
  if (container) {
    container.innerHTML = visibSuggestions.map((s, i) => `<div class="visib-suggestion-card">
      <div class="visib-suggestion-item">
        <div class="visib-suggestion-text">${escapeHtml(s)}</div>
        <button class="visib-suggestion-dismiss" onclick="dismissVisibSuggestion(${i})">×</button>
      </div>
    </div>`).join('');
  }
}

function renderVisibLog(panel) {
  const typeObj = visibLogType ? getVisibTypeObj(visibLogType) : null;
  const hasSubtypes = typeObj && typeObj.subtypes && typeObj.subtypes.length > 0;

  const typeGrid = VISIBILITY_TYPES.map(t =>
    `<button class="visib-type-btn${visibLogType === t.id ? ' selected' : ''}" onclick="selectVisibType('${t.id}')">${t.label}</button>`
  ).join('');

  const subtypeHtml = hasSubtypes ? `
    <div class="form-group">
      <label class="form-label">Subtype</label>
      <div style="display:flex;gap:var(--space-sm)">
        ${typeObj.subtypes.map(st =>
          `<button class="visib-type-btn${visibLogSubtype === st ? ' selected' : ''}" onclick="selectVisibSubtype('${st}')" style="flex:1">${st}</button>`
        ).join('')}
      </div>
    </div>` : '';

  const vectorsHtml = typeObj ? `
    <div class="form-group">
      <label class="form-label">Vectors</label>
      <div class="visib-vectors-display">
        ${typeObj.vectors.map(v => `<span class="visib-vector-tag">${v}</span>`).join('')}
      </div>
    </div>` : '';

  panel.innerHTML = `
    <div style="margin-bottom:var(--space-xl)">
      <button class="btn-ghost" onclick="visibView='dashboard';renderVisibility()">← Back</button>
    </div>

    <div class="visib-log-form">
      <div class="form-group">
        <label class="form-label">Activity Type</label>
        <div class="visib-type-grid">${typeGrid}</div>
      </div>

      ${subtypeHtml}
      ${vectorsHtml}

      <div class="form-group">
        <label class="form-label">Audience</label>
        <div class="visib-audience-picker">
          <label><input type="radio" name="visibAudience" value="pod" checked> CIA Pod</label>
          <label><input type="radio" name="visibAudience" value="cbp"> CBP</label>
          <label><input type="radio" name="visibAudience" value="org"> XD Org</label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" type="date" id="visibLogDate" value="${todayStr()}">
      </div>

      <div class="form-group">
        <label class="form-label">Note (optional)</label>
        <input class="form-input" id="visibLogNote" placeholder="One-liner about this activity">
      </div>

      <div class="form-group">
        <label class="form-label">Link (optional)</label>
        <input class="form-input" id="visibLogLink" placeholder="https://...">
      </div>

      <button class="btn-primary" onclick="saveVisibActivity()" ${!visibLogType ? 'disabled' : ''}>Save Activity</button>
    </div>
  `;
}

function selectVisibType(typeId) {
  visibLogType = typeId;
  visibLogSubtype = '';
  renderVisibLog(document.getElementById('panel-visibility'));
}

function selectVisibSubtype(subtype) {
  visibLogSubtype = subtype;
  const btns = document.querySelectorAll('.visib-log-form .visib-type-btn');
  // Refresh the subtype buttons
  renderVisibLog(document.getElementById('panel-visibility'));
}

function saveVisibActivity() {
  if (!visibLogType) return;
  const typeObj = getVisibTypeObj(visibLogType);
  const audience = document.querySelector('input[name="visibAudience"]:checked')?.value || 'pod';
  const date = document.getElementById('visibLogDate')?.value || todayStr();
  const note = document.getElementById('visibLogNote')?.value.trim() || '';
  const link = document.getElementById('visibLogLink')?.value.trim() || '';

  const activity = {
    id: Date.now(),
    date,
    type: visibLogType,
    subtype: visibLogSubtype || '',
    audience,
    note,
    link,
    vectors: typeObj ? [...typeObj.vectors] : []
  };

  state.visibilityActivities.push(activity);
  saveState();

  // Auto-log to today's "work done" if activity is for today
  if (date === todayStr()) {
    const label = getVisibTypeLabel(visibLogType) + (activity.subtype ? ' (' + activity.subtype + ')' : '');
    appendToWorkDone(label + (note ? ' — ' + note : ''));
  }

  visibView = 'dashboard';
  visibLogType = '';
  visibLogSubtype = '';
  renderVisibility();
  showToast('Activity logged');
}

async function getVisibSuggestions() {
  const btn = document.getElementById('visibSuggestBtn');
  const container = document.getElementById('visibSuggestionsContainer');
  if (!state.settings.baseUrl) {
    showToast('Set up API in Settings first');
    return;
  }

  const weekEntries = getCurrentWeekEntries();
  const weekActivities = getVisibActivitiesForWeek();
  const vectorCoverage = computeVectorCoverage(getVisibActivitiesLast30());

  if (weekEntries.length === 0) {
    container.innerHTML = `<div class="visib-suggestion-card"><div class="visib-suggestion-text">No daily log entries this week yet. Log your work first, then come back for suggestions.</div></div>`;
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const entriesText = weekEntries.map(e =>
    `[${e.date}] Work: ${e.workDone}${e.reflection ? ' | Reflection: ' + e.reflection : ''}`
  ).join('\n');

  const doneText = weekActivities.length > 0
    ? weekActivities.map(a => `- ${getVisibTypeLabel(a.type)}${a.subtype ? ' (' + a.subtype + ')' : ''} on ${a.date}${a.note ? ': ' + a.note : ''}`).join('\n')
    : 'None yet this week.';

  const lowVectors = ALL_VECTORS.filter(v => vectorCoverage[v] === 0);
  const vectorText = lowVectors.length > 0
    ? `Under-represented vectors (0 activities in 30 days): ${lowVectors.join(', ')}`
    : 'All vectors have some coverage.';

  const prompt = `You are helping a Senior Product Designer decide what to share and where to share it this week.

Here is what they logged in their daily journal this week:
${entriesText}

Visibility activities already done this week:
${doneText}

${vectorText}

Suggest 2-3 specific visibility activities they could do based on the work logged. Each suggestion should be:
- Tied to something concrete from their journal entries
- Specific about what to share and where (WAYWO post, Draftboard, Design Crit, Rationale Doc, or Hawkins)
- Brief: 1-2 sentences each

Output only the suggestions, one per line, no numbering, no preamble.`;

  try {
    const result = await callClaude(
      'You are a visibility coach for product designers. Be specific and actionable.',
      prompt,
      500
    );
    visibSuggestions = result.split('\n').map(s => s.trim()).filter(s => s.length > 0);
    container.innerHTML = visibSuggestions.map((s, i) => `<div class="visib-suggestion-card">
      <div class="visib-suggestion-item">
        <div class="visib-suggestion-text">${escapeHtml(s)}</div>
        <button class="visib-suggestion-dismiss" onclick="dismissVisibSuggestion(${i})">×</button>
      </div>
    </div>`).join('');
  } catch (e) {
    container.innerHTML = `<div class="visib-suggestion-card"><div class="visib-suggestion-text" style="color:var(--accent-negative)">Failed to get suggestions. Check your API settings.</div></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Get Suggestions';
  }
}

async function startVisibDraft(draftType) {
  const config = DRAFT_TYPE_CONFIG[draftType];
  if (!config) return;
  if (!state.settings.baseUrl) {
    showToast('Set up API in Settings first');
    return;
  }
  const weekEntries = getCurrentWeekEntries();
  const recentEntries = getRecentEntries(5);
  if (weekEntries.length === 0 && recentEntries.length === 0) {
    showToast('Log some daily entries first');
    return;
  }
  visibDraftType = draftType;
  visibDraftText = '';
  visibView = 'draft';
  renderVisibility();

  try {
    const builder = DRAFT_PROMPT_BUILDERS[draftType];
    const { systemPrompt, userPrompt } = builder();
    const result = await callClaude(systemPrompt, userPrompt, config.maxTokens);
    visibDraftText = result.trim();
  } catch (e) {
    if (e.message === 'no_key') {
      visibDraftText = '';
      showToast('Set up API in Settings first');
      visibView = 'dashboard';
    } else {
      visibDraftText = '';
      showToast('Failed to generate draft. Check API settings.');
      visibView = 'dashboard';
    }
  }
  renderVisibility();
}

function renderVisibDraft(panel) {
  const config = DRAFT_TYPE_CONFIG[visibDraftType];
  const label = config ? config.label : 'Draft';
  const isLoading = visibDraftText === '';

  panel.innerHTML = `
    <div style="margin-bottom:var(--space-xl)">
      <button class="btn-ghost" onclick="visibDraftBack()">← Back</button>
    </div>
    <div style="font-size:15px;font-weight:600;margin-bottom:var(--space-lg)">${escapeHtml(label)} Draft</div>
    ${isLoading
      ? `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--space-md);padding:80px 0;color:var(--text-muted)">
           <span class="spinner dark" style="width:24px;height:24px;border-width:3px"></span>
           <span style="font-size:14px">Generating draft...</span>
         </div>`
      : `<div id="visibDraftDisplay" class="visib-draft-display">${renderSimpleMarkdown(visibDraftText)}</div>
         <textarea id="visibDraftTextarea" class="form-input visib-draft-edit" style="display:none">${escapeHtml(visibDraftText)}</textarea>
         <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-lg);align-items:stretch">
           <button class="btn-secondary btn-accent" onclick="copyVisibDraft()" style="flex:1;justify-content:center;padding-top:var(--space-md);padding-bottom:var(--space-md)">Copy</button>
           <button class="btn-secondary" onclick="saveVisibDraft()" style="color:var(--text-primary);padding-top:var(--space-md);padding-bottom:var(--space-md)">Save & Log</button>
           <button class="btn-secondary" onclick="toggleVisibDraftEdit()" id="visibDraftEditBtn" style="color:var(--text-primary);padding-top:var(--space-md);padding-bottom:var(--space-md)">Edit</button>
           <button class="btn-secondary" onclick="regenerateVisibDraft()" style="color:var(--text-primary);padding-top:var(--space-md);padding-bottom:var(--space-md)">Regenerate</button>
         </div>`
    }`;
}

function renderSimpleMarkdown(text) {
  return text
    .split('\n\n').map(block => {
      block = block.trim();
      if (!block) return '';
      if (block.startsWith('### ')) return `<h4>${escapeHtml(block.slice(4))}</h4>`;
      if (block.startsWith('## ')) return `<h3>${escapeHtml(block.slice(3))}</h3>`;
      if (block.startsWith('# ')) return `<h2>${escapeHtml(block.slice(2))}</h2>`;
      const lines = block.split('\n');
      if (lines.every(l => /^[-*] /.test(l.trim()))) {
        return '<ul>' + lines.map(l => `<li>${escapeHtml(l.trim().replace(/^[-*] /, '')).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</li>`).join('') + '</ul>';
      }
      return `<p>${escapeHtml(block).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</p>`;
    }).join('');
}

function toggleVisibDraftEdit() {
  const display = document.getElementById('visibDraftDisplay');
  const textarea = document.getElementById('visibDraftTextarea');
  const btn = document.getElementById('visibDraftEditBtn');
  if (!display || !textarea) return;
  const editing = textarea.style.display !== 'none';
  if (editing) {
    visibDraftText = textarea.value;
    display.innerHTML = renderSimpleMarkdown(visibDraftText);
    display.style.display = '';
    textarea.style.display = 'none';
    btn.textContent = 'Edit';
  } else {
    textarea.value = visibDraftText;
    display.style.display = 'none';
    textarea.style.display = '';
    textarea.focus();
    btn.textContent = 'Preview';
  }
}

function copyVisibDraft() {
  const textarea = document.getElementById('visibDraftTextarea');
  const editing = textarea && textarea.style.display !== 'none';
  const text = editing ? textarea.value : visibDraftText;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
  } else {
    const tmp = document.createElement('textarea');
    tmp.value = text;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);
    showToast('Copied to clipboard');
  }
}

function saveVisibDraft() {
  const textarea = document.getElementById('visibDraftTextarea');
  const editing = textarea && textarea.style.display !== 'none';
  const text = (editing ? textarea.value : visibDraftText).trim();
  if (!text) return;

  const config = DRAFT_TYPE_CONFIG[visibDraftType];
  const typeObj = getVisibTypeObj(config.visibType);

  const activity = {
    id: Date.now(),
    date: todayStr(),
    type: config.visibType,
    subtype: config.subtype || '',
    audience: config.audience,
    note: text,
    link: '',
    vectors: typeObj ? [...typeObj.vectors] : []
  };

  state.visibilityActivities.push(activity);
  saveState();

  const label = getVisibTypeLabel(config.visibType) + (config.subtype ? ' (' + config.subtype + ')' : '');
  appendToWorkDone(label);

  visibDraftType = null;
  visibDraftText = '';
  visibView = 'dashboard';
  renderVisibility();
  showToast('Draft saved & activity logged');
}

function visibDraftBack() {
  visibDraftType = null;
  visibDraftText = '';
  visibView = 'dashboard';
  renderVisibility();
}

async function regenerateVisibDraft() {
  const config = DRAFT_TYPE_CONFIG[visibDraftType];
  if (!config) return;
  visibDraftText = '';
  renderVisibility();
  try {
    const builder = DRAFT_PROMPT_BUILDERS[visibDraftType];
    const { systemPrompt, userPrompt } = builder();
    const result = await callClaude(systemPrompt, userPrompt, config.maxTokens);
    visibDraftText = result.trim();
  } catch (e) {
    showToast('Failed to regenerate. Check API settings.');
    visibDraftText = '(generation failed — try again)';
  }
  renderVisibility();
}

function renderVisibDetail(panel) {
  const a = state.visibilityActivities.find(x => String(x.id) === String(visibDetailId));
  if (!a) { visibView = 'dashboard'; visibDetailId = null; renderVisibility(); return; }

  const typeGrid = VISIBILITY_TYPES.map(t =>
    `<button class="visib-type-btn${a.type === t.id ? ' selected' : ''}" onclick="document.querySelectorAll('#visibDetailTypeGrid .visib-type-btn').forEach(b=>b.classList.remove('selected'));this.classList.add('selected');document.getElementById('visibDetailType').value='${t.id}';updateVisibDetailVectors('${t.id}')">${t.label}</button>`
  ).join('');

  const typeObj = getVisibTypeObj(a.type);
  const hasSubtypes = typeObj && typeObj.subtypes && typeObj.subtypes.length > 0;

  panel.innerHTML = `
    <div style="margin-bottom:var(--space-xl)">
      <button class="btn-ghost" onclick="visibView='dashboard';visibDetailId=null;renderVisibility()">← Back</button>
    </div>

    <div class="contrib-detail">
      <input type="hidden" id="visibDetailType" value="${a.type}">

      <div class="form-group">
        <label class="form-label">Activity Type</label>
        <div class="visib-type-grid" id="visibDetailTypeGrid">${typeGrid}</div>
      </div>

      ${hasSubtypes ? `<div class="form-group">
        <label class="form-label">Subtype</label>
        <select class="form-input" id="visibDetailSubtype">
          <option value="">—</option>
          ${typeObj.subtypes.map(st => `<option value="${st}" ${a.subtype === st ? 'selected' : ''}>${st}</option>`).join('')}
        </select>
      </div>` : '<input type="hidden" id="visibDetailSubtype" value="">'}

      <div class="form-group">
        <label class="form-label">Vectors</label>
        <div class="visib-vectors-display" id="visibDetailVectors">
          ${(a.vectors || []).map(v => `<span class="visib-vector-tag">${v}</span>`).join('')}
        </div>
      </div>

      <div class="contrib-detail-grid">
        <div class="form-group">
          <label class="form-label">Audience</label>
          <select class="form-input" id="visibDetailAudience">
            <option value="pod" ${normalizeAudience(a.audience) === 'pod' ? 'selected' : ''}>CIA Pod</option>
            <option value="cbp" ${normalizeAudience(a.audience) === 'cbp' ? 'selected' : ''}>CBP</option>
            <option value="org" ${normalizeAudience(a.audience) === 'org' ? 'selected' : ''}>XD Org</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-input" type="date" id="visibDetailDate" value="${a.date}">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Note</label>
        <input class="form-input" id="visibDetailNote" value="${escapeHtml(a.note || '')}" placeholder="One-liner">
      </div>

      <div class="form-group">
        <label class="form-label">Link</label>
        <input class="form-input" id="visibDetailLink" value="${escapeHtml(a.link || '')}" placeholder="https://...">
      </div>

      <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-lg)">
        <button class="btn-positive" onclick="saveVisibDetail()">Save</button>
        <button class="btn-dismiss" onclick="visibView='dashboard';visibDetailId=null;renderVisibility()">Cancel</button>
        <button class="btn-ghost" style="margin-left:auto;color:var(--accent-negative)" onclick="deleteVisibActivity()">Delete</button>
      </div>
    </div>
  `;
}

function updateVisibDetailVectors(typeId) {
  const typeObj = getVisibTypeObj(typeId);
  const container = document.getElementById('visibDetailVectors');
  if (container && typeObj) {
    container.innerHTML = typeObj.vectors.map(v => `<span class="visib-vector-tag">${v}</span>`).join('');
  }
}

function saveVisibDetail() {
  const a = state.visibilityActivities.find(x => String(x.id) === String(visibDetailId));
  if (!a) return;

  const newType = document.getElementById('visibDetailType')?.value || a.type;
  const typeObj = getVisibTypeObj(newType);

  a.type = newType;
  a.subtype = document.getElementById('visibDetailSubtype')?.value || '';
  a.audience = document.getElementById('visibDetailAudience')?.value || a.audience;
  a.date = document.getElementById('visibDetailDate')?.value || a.date;
  a.note = document.getElementById('visibDetailNote')?.value.trim() || '';
  a.link = document.getElementById('visibDetailLink')?.value.trim() || '';
  a.vectors = typeObj ? [...typeObj.vectors] : a.vectors;

  saveState();
  visibView = 'dashboard';
  visibDetailId = null;
  renderVisibility();
  showToast('Activity updated');
}

function deleteVisibActivity() {
  if (!confirm('Delete this activity?')) return;
  state.visibilityActivities = state.visibilityActivities.filter(x => String(x.id) !== String(visibDetailId));
  saveState();
  visibView = 'dashboard';
  visibDetailId = null;
  renderVisibility();
  showToast('Activity deleted');
}

/* ========================================
   Init
   ======================================== */
async function backfillTldrs() {
  if (!state.settings.baseUrl) return;

  // One-time migration: regenerate all TLDRs in bullet format
  const migrationKey = 'workos_tldr_bullet_v1';
  if (!localStorage.getItem(migrationKey)) {
    for (const entry of state.entries) {
      if (entry.workDone || entry.reflection || entry.weeklyRetro) {
        delete entry.tldr;
      }
    }
    saveState();
    localStorage.setItem(migrationKey, '1');
  }

  const unprocessed = state.entries.filter(e => !e.tldr && (e.workDone || e.reflection || e.weeklyRetro));
  for (const entry of unprocessed) {
    await generateTldr(entry);
  }
}

async function init() {
  loadState();

  // Pull latest from cloud if sync is configured
  if (state.settings.ghToken && state.settings.ghGistId) {
    const result = await syncPull();
    if (result === 'ok') updateSyncStatus('synced');
  }

  const today = todayStr();
  const todayEntry = getEntryForDate(today);

  if (todayEntry) {
    logMode = 'submitted';
  } else if (isMonday(today) && !getWeekIntention(today)) {
    logMode = 'intention';
  }

  renderTabNav();
  renderLogTab();
  renderSettings();

  // Backfill TLDRs for entries that haven't been processed
  backfillTldrs();
}

init();
</script>
