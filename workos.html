async function processContribImport() {
  const text = document.getElementById('contribPasteArea')?.value.trim();
  if (!text) {
    document.getElementById('contribImportError').classList.add('show');
    return;
  }

  if (!state.settings.baseUrl) {
    showToast('Set up your AI gateway in Settings first.');
    return;
  }

  const channel = document.querySelector('input[name="contribChannel"]:checked')?.value || '#hawkins-professional-design';
  const btn = document.getElementById('contribProcessBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Processing...';

  try {
    const prompt = `You parse raw Slack messages pasted from a design system channel.
Extract each distinct post/message from the user.
For each post, output a JSON array with objects containing:
- date: best guess ISO date from context (or "unknown")
- text: the message content (cleaned up, 1-2 sentences max)
- category: one of "bug-report", "feature-request", "design-feedback", "component-request", "documentation", "discussion"
- component: component name if mentioned (e.g. "Timeline", "ButtonGroup", "DatePicker") or null
Output only valid JSON. No preamble, no markdown fences.

Here are the pasted Slack messages:
${text}`;

    const result = await callClaude(
      'You are a structured data extraction tool. Output only valid JSON arrays. No prose, no markdown code fences.',
      prompt,
      2000
    );

    // Parse JSON from response
    let parsed;
    try {
      // Try to extract JSON from the response (handle markdown fences)
      const jsonMatch = result.match(/\[[\s\S]*\]/);
      parsed = JSON.parse(jsonMatch ? jsonMatch[0] : result);
    } catch (e) {
      showToast('Failed to parse AI response. Try again.');
      btn.disabled = false;
      btn.textContent = 'Process with AI';
      return;
    }

    if (!Array.isArray(parsed) || parsed.length === 0) {
      showToast('No messages extracted. Try pasting more content.');
      btn.disabled = false;
      btn.textContent = 'Process with AI';
      return;
    }

    // Prepare review data
    contribReviewData = parsed.map(item => ({
      id: Date.now() + Math.random(),
      date: item.date || 'unknown',
      channel: channel,
      text: item.text || '',
      category: CONTRIB_CATEGORIES.find(c => c.id === item.category) ? item.category : 'other',
      component: item.component || '',
      status: 'open',
      slackLink: ''
    }));

    contribView = 'review';
    renderContributions();

  } catch (err) {
    if (err.message === 'no_key') {
      showToast('Set up your AI gateway in Settings first.');
    } else {
      showToast('Failed to process. Check your gateway settings.');
    }
    btn.disabled = false;
    btn.textContent = 'Process with AI';
  }
}

function renderContribReview(panel) {
  panel.innerHTML = `
    <div style="margin-bottom:var(--space-xl)">
      <button class="btn-ghost" onclick="contribView='import';renderContributions()">← Back to import</button>
    </div>

    <div style="font-size:15px;font-weight:500;margin-bottom:var(--space-sm)">Review ${contribReviewData.length} extracted contributions</div>
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:var(--space-xl)">
      Edit categories, components, or dates before saving. Remove any that aren't real contributions.
    </div>

    <div id="contribReviewList">
      ${contribReviewData.map((c, i) => `
        <div class="contrib-review-card" id="review-${i}">
          <div class="contrib-card-text">${escapeHtml(c.text)}</div>
          <div class="contrib-edit-row">
            <select data-field="category" data-idx="${i}" onchange="updateReviewItem(this)">
              ${CONTRIB_CATEGORIES.map(cat =>
                `<option value="${cat.id}" ${c.category === cat.id ? 'selected' : ''}>${cat.label}</option>`
              ).join('')}
            </select>
            <input type="text" data-field="component" data-idx="${i}" value="${escapeHtml(c.component)}" placeholder="Component..." onchange="updateReviewItem(this)" style="width:120px">
            <input type="date" data-field="date" data-idx="${i}" value="${c.date !== 'unknown' ? c.date : ''}" onchange="updateReviewItem(this)">
            <button class="btn-ghost" style="color:var(--text-muted);font-size:16px" onclick="removeReviewItem(${i})" title="Remove">✕</button>
          </div>
        </div>
      `).join('')}
    </div>

    <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-xl)">
      <button class="btn-primary" onclick="confirmContribImport()" style="flex:1">Save ${contribReviewData.length} Contributions</button>
      <button class="btn-dismiss" onclick="contribView='import';renderContributions()">Cancel</button>
    </div>
  `;
}

function updateReviewItem(el) {
  const idx = parseInt(el.dataset.idx);
  const field = el.dataset.field;
  if (idx < 0 || idx >= contribReviewData.length) return;
  if (field === 'date') {
    contribReviewData[idx].date = el.value || 'unknown';
  } else {
    contribReviewData[idx][field] = el.value;
  }
}

function removeReviewItem(idx) {
  contribReviewData.splice(idx, 1);
  renderContribReview(document.getElementById('panel-contributions'));
}

function confirmContribImport() {
  if (contribReviewData.length === 0) {
    showToast('Nothing to import.');
    return;
  }

  // Deduplicate: skip contributions with identical text
  const existingTexts = new Set(state.contributions.map(c => c.text));
  let added = 0;
  for (const c of contribReviewData) {
    if (!existingTexts.has(c.text)) {
      state.contributions.push(c);
      existingTexts.add(c.text);
      added++;
    }
  }

  saveState();
  contribReviewData = [];
  contribView = 'dashboard';
  renderContributions();
  showToast(`${added} contribution${added !== 1 ? 's' : ''} imported`);
}

function saveContribDetail() {
  const c = state.contributions.find(x => String(x.id) === String(contribDetailId));
  if (!c) return;

  c.text = document.getElementById('contribEditText')?.value.trim() || c.text;
  c.category = document.getElementById('contribEditCategory')?.value || c.category;
  c.component = document.getElementById('contribEditComponent')?.value.trim() || '';
  c.date = document.getElementById('contribEditDate')?.value || 'unknown';
  c.channel = document.getElementById('contribEditChannel')?.value.trim() || '';
  c.slackLink = document.getElementById('contribEditLink')?.value.trim() || '';

  saveState();
  contribView = 'dashboard';
  contribDetailId = null;
  renderContributions();
  showToast('Contribution updated');
}

function deleteContrib() {
  if (!confirm('Delete this contribution?')) return;
  state.contributions = state.contributions.filter(x => String(x.id) !== String(contribDetailId));
  saveState();
  contribView = 'dashboard';
  contribDetailId = null;
  renderContributions();
  showToast('Contribution deleted');
}

function formatEntriesForPrompt(entries) {
  if (!entries.length) return '(no entries)';
  return entries.map(e => {
    const parts = [`Date: ${e.date}`];
    if (e.intention) parts.push(`Intention: ${e.intention}`);
    if (e.workDone) parts.push(`Work done:\n${e.workDone}`);
    if (e.reflection) parts.push(`Reflection: ${e.reflection}`);
    return parts.join('\n');
  }).join('\n---\n');
}

const DRAFT_SYSTEM_PROMPT = `You are a concise writing assistant for a product designer at Netflix. Every draft you write MUST follow this structure:

**Problem** — What user or business problem needed solving (1-2 sentences)
**Context** — Brief relevant background so anyone can understand (1-2 sentences)
**Design Solution** — What you designed and key decisions (2-3 sentences)
**Impact** — Outcome, what changed, or expected result (1-2 sentences)

Rules:
- 250 words max. Be brief and high-level.
- Remove unnecessary detail — someone with zero context should quickly understand how the design solves the problem.
- Professional but casual tone. No preamble, no sign-off.
- Use markdown bold for the section labels.`;

}

let visibView = 'dashboard';
let visibDetailId = null;
let visibSuggestions = [];
let visibLogType = '';
let visibLogSubtype = '';
let visibDraftType = null;
let visibDraftText = '';

function getVisibTypeLabel(id) {
  return getVisibilityTypes().find(t => t.id === id)?.label || id;
}

function getVisibTypeObj(id) {
  return getVisibilityTypes().find(t => t.id === id);
}

const AUDIENCE_LABELS = { pod: 'CIA Pod', cbp: 'CBP', org: 'XD Org' };
function normalizeAudience(aud) {
  if (aud === 'team') return 'pod';
  if (aud === 'adjacent') return 'cbp';
  return aud;
}
function getAudienceLabel(aud) {
  return AUDIENCE_LABELS[normalizeAudience(aud)] || aud;
}

function getVisibActivitiesForWeek() {
  const monday = getWeekMonday(todayStr());
  const weekDates = getWeekDates(monday);
  return state.visibilityActivities.filter(a => weekDates.includes(a.date));
}

function getVisibActivitiesLast30() {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 30);
  const cutoffStr = cutoff.toISOString().split('T')[0];
  return state.visibilityActivities.filter(a => a.date >= cutoffStr);
}

function getLastActivityByType(typeId) {
  if (typeId === 'hawkins') {
    const visibDates = state.visibilityActivities.filter(a => a.type === 'hawkins').map(a => a.date);
    const contribDates = state.contributions.map(c => c.date).filter(d => d && d !== 'unknown');
    const allDates = [...visibDates, ...contribDates].sort().reverse();
    return allDates[0] || null;
  }
  const sorted = state.visibilityActivities.filter(a => a.type === typeId).sort((a, b) => b.date.localeCompare(a.date));
  return sorted[0]?.date || null;
}

function getStalenessNudges() {
  const today = todayStr();
  const nudges = [];
  for (const [typeId, threshold] of Object.entries(STALENESS_THRESHOLDS)) {
    const lastDate = getLastActivityByType(typeId);
    if (!lastDate) {
      nudges.push({ type: typeId, label: getVisibTypeLabel(typeId), daysSince: null });
    } else {
      const diff = Math.floor((new Date(today + 'T12:00:00') - new Date(lastDate + 'T12:00:00')) / (1000 * 60 * 60 * 24));
      if (diff > threshold) {
        nudges.push({ type: typeId, label: getVisibTypeLabel(typeId), daysSince: diff });
      }
    }
  }
  return nudges;
}

function computeVectorCoverage(activities) {
  const counts = {};
  ALL_VECTORS.forEach(v => counts[v] = 0);
  for (const a of activities) {
    if (a.vectors) a.vectors.forEach(v => { if (counts[v] !== undefined) counts[v]++; });
  }
  return counts;
}

function computeReachDistribution(activities) {
  const counts = { pod: 0, cbp: 0, org: 0 };
  for (const a of activities) {
    // Migrate legacy values
    const aud = a.audience === 'team' ? 'pod' : a.audience === 'adjacent' ? 'cbp' : a.audience;
    if (counts[aud] !== undefined) counts[aud]++;
  }
  const total = counts.pod + counts.cbp + counts.org;
  if (total === 0) return { pod: 0, cbp: 0, org: 0, total: 0 };
  return {
    pod: Math.round(counts.pod / total * 100),
    cbp: Math.round(counts.cbp / total * 100),
    org: Math.round(counts.org / total * 100),
    total
  };
}

function renderVisibility() {
  const panel = document.getElementById('panel-visibility');
  if (visibView === 'draft' && visibDraftType) { renderVisibDraft(panel); return; }
  if (visibView === 'log') { renderVisibLog(panel); return; }
  if (visibView === 'detail' && visibDetailId) { renderVisibDetail(panel); return; }
  renderVisibDashboard(panel);
}

function renderVisibDashboard(panel) {
  const activities = state.visibilityActivities;
  const weekActivities = getVisibActivitiesForWeek();
  const last30 = getVisibActivitiesLast30();
  const nudges = getStalenessNudges();
  const vectorCoverage = computeVectorCoverage(last30);
  const reach = computeReachDistribution(last30);

  // Weekly rhythm strip
  const monday = getWeekMonday(todayStr());
  const weekDates = getWeekDates(monday);
  const today = todayStr();
  const todayDow = new Date(today + 'T12:00:00').getDay(); // 1=Mon..5=Fri

  const RHYTHM_ICONS = { waywo: 'Slack.svg', draftboard: 'Draftboard.svg', hawkins: 'Hawkins.svg' };
  const rhythmHtml = WEEKLY_RHYTHM.map((r, i) => {
    const dateStr = weekDates[i];
    const hasActivity = weekActivities.some(a => a.date === dateStr);
    const isToday = dateStr === today;
    const icon = RHYTHM_ICONS[r.icon || r.type] || 'Slack.svg';
    return `<div class="visib-rhythm-card${hasActivity ? ' filled' : ''}${isToday ? ' today' : ''}" onclick="startVisibDraft('${RHYTHM_DRAFT_TYPES[i]}')">
      <span class="visib-rhythm-day-label">${r.day}</span>
      <img class="visib-rhythm-icon" src="${icon}" alt="${r.label}">
      <span class="visib-rhythm-sublabel">${r.label}</span>
    </div>`;
  }).join('');

  // Staleness nudges
  const nudgeHtml = nudges.length > 0 ? `<div class="visib-nudges">${nudges.map(n =>
    `<div class="visib-nudge">${n.daysSince === null ? `No ${n.label} logged yet` : `No ${n.label} in ${n.daysSince} days`}</div>`
  ).join('')}</div>` : '';

  // AI suggestions
  const suggestionsHtml = visibSuggestions.length > 0
    ? visibSuggestions.map((s, i) => `<div class="visib-suggestion-card">
        <div class="visib-suggestion-item">
          <div class="visib-suggestion-text">${escapeHtml(s)}</div>
          <button class="visib-suggestion-dismiss" onclick="dismissVisibSuggestion(${i})">×</button>
        </div>
      </div>`).join('')
    : '';

  // Vector coverage bars
  const maxCount = Math.max(1, ...Object.values(vectorCoverage));
  const vectorHtml = ALL_VECTORS.map(v => {
    const count = vectorCoverage[v];
    const pct = Math.round(count / maxCount * 100);
    return `<div class="visib-vector-row${count === 0 ? ' zero' : ''}">
      <span class="visib-vector-label">${v}</span>
      <div class="visib-vector-track"><div class="visib-vector-fill" style="width:${pct}%"></div></div>
      <span class="visib-vector-count">${count}</span>
    </div>`;
  }).join('');

  // Reach × Evidence matrix
  const reachLevels = ['team', 'function', 'cross-functional', 'organization'];
  const evidenceTypes = ['shared', 'referenced', 'invited', 'decided'];
  const reachLabels = { team: 'Team', 'function': 'Function', 'cross-functional': 'Cross-func', organization: 'Org' };
  const evidenceLabels = { shared: 'Shared', referenced: 'Referenced', invited: 'Invited', decided: 'Decided' };
  const matrixCounts = {};
  for (const r of reachLevels) for (const e of evidenceTypes) matrixCounts[r + ':' + e] = 0;
  for (const a of last30) {
    const r = a.reach || 'team';
    const e = a.evidenceType || 'shared';
    const key = r + ':' + e;
    if (matrixCounts[key] !== undefined) matrixCounts[key]++;
  }
  const matrixHtml = `<table class="visib-matrix">
    <tr><th></th>${evidenceTypes.map(e => `<th>${evidenceLabels[e]}</th>`).join('')}</tr>
    ${reachLevels.map(r => `<tr>
      <td class="visib-matrix-row-label">${reachLabels[r]}</td>
      ${evidenceTypes.map(e => {
        const count = matrixCounts[r + ':' + e];
        const level = count >= 3 ? 'high' : count >= 1 ? 'mid' : 'empty';
        return `<td class="visib-matrix-cell ${level}" onclick="showMatrixDetail('${r}','${e}')">${count || ''}</td>`;
      }).join('')}
    </tr>`).join('')}
  </table>
  <div class="visib-matrix-legend"><span class="visib-matrix-dot high"></span> 3+ <span class="visib-matrix-dot mid"></span> 1-2 <span class="visib-matrix-dot empty"></span> none</div>`;

  // Recent activity list
  const recent = [...activities].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 20);
  const recentHtml = recent.length > 0 ? recent.map(a => {

function saveVisibActivity() {
  if (!visibLogType) return;
  const typeObj = getVisibTypeObj(visibLogType);
  const reach = document.querySelector('input[name="visibReach"]:checked')?.value || 'team';
  const evidenceType = document.querySelector('input[name="visibEvidence"]:checked')?.value || 'shared';
  const date = document.getElementById('visibLogDate')?.value || todayStr();
  const note = document.getElementById('visibLogNote')?.value.trim() || '';
  const link = document.getElementById('visibLogLink')?.value.trim() || '';

  const activity = {
    id: Date.now(),
    date,
    type: visibLogType,
    subtype: visibLogSubtype || '',
    reach,
    evidenceType,
    audience: reach, // legacy compat
    note,
    link,
    vectors: typeObj ? [...typeObj.vectors] : []
  };

  state.visibilityActivities.push(activity);

async function getVisibSuggestions() {
  const btn = document.getElementById('visibSuggestBtn');
  const container = document.getElementById('visibSuggestionsContainer');
  if (!state.settings.baseUrl) {
    showToast('Set up API in Settings first');
    return;
  }

  const weekEntries = getCurrentWeekEntries();
  const weekActivities = getVisibActivitiesForWeek();
  const vectorCoverage = computeVectorCoverage(getVisibActivitiesLast30());

  if (weekEntries.length === 0) {
    container.innerHTML = `<div class="visib-suggestion-card"><div class="visib-suggestion-text">No daily log entries this week yet. Log your work first, then come back for suggestions.</div></div>`;
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const entriesText = weekEntries.map(e =>
    `[${e.date}] Work: ${e.workDone}${e.reflection ? ' | Reflection: ' + e.reflection : ''}`
  ).join('\n');

  const doneText = weekActivities.length > 0
    ? weekActivities.map(a => `- ${getVisibTypeLabel(a.type)}${a.subtype ? ' (' + a.subtype + ')' : ''} on ${a.date}${a.note ? ': ' + a.note : ''}`).join('\n')
    : 'None yet this week.';

  const lowVectors = ALL_VECTORS.filter(v => vectorCoverage[v] === 0);
  const vectorText = lowVectors.length > 0
    ? `Under-represented vectors (0 activities in 30 days): ${lowVectors.join(', ')}`
    : 'All vectors have some coverage.';

  const prompt = `You are helping a Senior Product Designer decide what to share and where to share it this week.

Here is what they logged in their daily journal this week:
${entriesText}

Visibility activities already done this week:
${doneText}

${vectorText}

Suggest 2-3 specific visibility activities they could do based on the work logged. Each suggestion should be:
- Tied to something concrete from their journal entries
- Specific about what to share and where (WAYWO post, Draftboard, Design Crit, Rationale Doc, or Hawkins)
- Brief: 1-2 sentences each

Output only the suggestions, one per line, no numbering, no preamble.`;

  try {
    const result = await callClaude(
      'You are a visibility coach for product designers. Be specific and actionable.',
      prompt,
      500
    );
    visibSuggestions = result.split('\n').map(s => s.trim()).filter(s => s.length > 0);
    container.innerHTML = visibSuggestions.map((s, i) => `<div class="visib-suggestion-card">
      <div class="visib-suggestion-item">
        <div class="visib-suggestion-text">${escapeHtml(s)}</div>
        <button class="visib-suggestion-dismiss" onclick="dismissVisibSuggestion(${i})">×</button>
      </div>
    </div>`).join('');
  } catch (e) {
    container.innerHTML = `<div class="visib-suggestion-card"><div class="visib-suggestion-text" style="color:var(--accent-negative)">Failed to get suggestions. Check your API settings.</div></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Get Suggestions';
  }
}

async function startVisibDraft(draftType) {
  const config = DRAFT_TYPE_CONFIG[draftType];
  if (!config) return;
  if (!state.settings.baseUrl) {
    showToast('Set up API in Settings first');
    return;
  }
  const weekEntries = getCurrentWeekEntries();
  const recentEntries = getRecentEntries(5);
  if (weekEntries.length === 0 && recentEntries.length === 0) {
    showToast('Log some daily entries first');
    return;
  }
  visibDraftType = draftType;
  visibDraftText = '';
  visibView = 'draft';
  renderVisibility();

  try {
    const builder = DRAFT_PROMPT_BUILDERS[draftType];
    const { systemPrompt, userPrompt } = builder();
    const result = await callClaude(systemPrompt, userPrompt, config.maxTokens);
    visibDraftText = result.trim();
  } catch (e) {
    if (e.message === 'no_key') {
      visibDraftText = '';
      showToast('Set up API in Settings first');
      visibView = 'dashboard';
    } else {
      visibDraftText = '';
      showToast('Failed to generate draft. Check API settings.');
      visibView = 'dashboard';
    }
  }
  renderVisibility();
}

         </div>`

function renderSimpleMarkdown(text) {
  return text
    .split('\n\n').map(block => {
      block = block.trim();
      if (!block) return '';
      if (block.startsWith('### ')) return `<h4>${escapeHtml(block.slice(4))}</h4>`;
      if (block.startsWith('## ')) return `<h3>${escapeHtml(block.slice(3))}</h3>`;
      if (block.startsWith('# ')) return `<h2>${escapeHtml(block.slice(2))}</h2>`;
      const lines = block.split('\n');
      if (lines.every(l => /^[-*] /.test(l.trim()))) {
        return '<ul>' + lines.map(l => `<li>${escapeHtml(l.trim().replace(/^[-*] /, '')).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</li>`).join('') + '</ul>';
      }
      return `<p>${escapeHtml(block).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</p>`;
    }).join('');
}

function toggleVisibDraftEdit() {
  const display = document.getElementById('visibDraftDisplay');
  const textarea = document.getElementById('visibDraftTextarea');
  const btn = document.getElementById('visibDraftEditBtn');
  if (!display || !textarea) return;
  const editing = textarea.style.display !== 'none';
  if (editing) {
    visibDraftText = textarea.value;
    display.innerHTML = renderSimpleMarkdown(visibDraftText);
    display.style.display = '';
    textarea.style.display = 'none';
    btn.textContent = 'Edit';
  } else {
    textarea.value = visibDraftText;
    display.style.display = 'none';
    textarea.style.display = '';
    textarea.focus();
    btn.textContent = 'Preview';
  }
}

function copyVisibDraft() {
  const textarea = document.getElementById('visibDraftTextarea');
  const editing = textarea && textarea.style.display !== 'none';
  const text = editing ? textarea.value : visibDraftText;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
  } else {
    const tmp = document.createElement('textarea');
    tmp.value = text;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);
    showToast('Copied to clipboard');
  }
}

function saveVisibDraft() {
  const textarea = document.getElementById('visibDraftTextarea');
  const editing = textarea && textarea.style.display !== 'none';
  const text = (editing ? textarea.value : visibDraftText).trim();
  if (!text) return;

  const config = DRAFT_TYPE_CONFIG[visibDraftType];
  const typeObj = getVisibTypeObj(config.visibType);

  const activity = {
    id: Date.now(),
    date: todayStr(),
    type: config.visibType,
    subtype: config.subtype || '',
    audience: config.audience,
    note: text,
    link: '',
    vectors: typeObj ? [...typeObj.vectors] : []
  };

  state.visibilityActivities.push(activity);
  saveState();

  const label = getVisibTypeLabel(config.visibType) + (config.subtype ? ' (' + config.subtype + ')' : '');
  appendToWorkDone(label);

  visibDraftType = null;
  visibDraftText = '';
  visibView = 'dashboard';
  renderVisibility();
  showToast('Draft saved & activity logged');
}

function visibDraftBack() {

      <div class="form-group">
        <label class="form-label">Link</label>
        <input class="form-input" id="visibDetailLink" value="${escapeHtml(a.link || '')}" placeholder="https://...">
      </div>

      <div style="display:flex;gap:var(--space-sm);margin-top:var(--space-lg)">
        <button class="btn-positive" onclick="saveVisibDetail()">Save</button>
        <button class="btn-dismiss" onclick="visibView='dashboard';visibDetailId=null;renderVisibility()">Cancel</button>
        <button class="btn-ghost" style="margin-left:auto;color:var(--accent-negative)" onclick="deleteVisibActivity()">Delete</button>
      </div>
    </div>
  `;
}

function updateVisibDetailVectors(typeId) {
  const typeObj = getVisibTypeObj(typeId);
  const container = document.getElementById('visibDetailVectors');
  if (container && typeObj) {
    container.innerHTML = typeObj.vectors.map(v => `<span class="visib-vector-tag">${v}</span>`).join('');
  }
}

function saveVisibDetail() {
  const a = state.visibilityActivities.find(x => String(x.id) === String(visibDetailId));
  if (!a) return;

  const newType = document.getElementById('visibDetailType')?.value || a.type;
  const typeObj = getVisibTypeObj(newType);

  a.type = newType;
  a.subtype = document.getElementById('visibDetailSubtype')?.value || '';
  a.audience = document.getElementById('visibDetailAudience')?.value || a.audience;
  a.date = document.getElementById('visibDetailDate')?.value || a.date;
  a.note = document.getElementById('visibDetailNote')?.value.trim() || '';
  a.link = document.getElementById('visibDetailLink')?.value.trim() || '';
  a.vectors = typeObj ? [...typeObj.vectors] : a.vectors;

  saveState();
  visibView = 'dashboard';
  visibDetailId = null;
  renderVisibility();
  showToast('Activity updated');
}

function deleteVisibActivity() {
  if (!confirm('Delete this activity?')) return;
  state.visibilityActivities = state.visibilityActivities.filter(x => String(x.id) !== String(visibDetailId));
  saveState();
  visibView = 'dashboard';
  visibDetailId = null;
  renderVisibility();
  showToast('Activity deleted');
}

/* ========================================
   Init
   ======================================== */
async function backfillTldrs() {
  if (!state.settings.baseUrl) return;

  // One-time migration: regenerate all TLDRs in bullet format
  const migrationKey = 'workos_tldr_bullet_v1';
  if (!localStorage.getItem(migrationKey)) {
    for (const entry of state.entries) {
      if (entry.workDone || entry.reflection || entry.weeklyRetro) {
        delete entry.tldr;
      }
    }
    saveState();
    localStorage.setItem(migrationKey, '1');
  }

  const unprocessed = state.entries.filter(e => !e.tldr && (e.workDone || e.reflection || e.weeklyRetro));
  for (const entry of unprocessed) {
    await generateTldr(entry);
  }
}

async function init() {
  loadState();
  runMigrations();

  const today = todayStr();
  const todayEntry = getEntryForDate(today);

  if (todayEntry) {
    logMode = 'submitted';
  }
  // Weekly intention modal removed — replaced by Monday weekly triage on Dashboard

  renderTabNav();
  renderDashboard();
  renderSettings();

  // Pull latest from cloud in background, then re-render if data changed
  if (state.settings.ghToken && state.settings.ghGistId) {
    syncPull().then(result => {
      if (result === 'ok') {
        updateSyncStatus('synced');
        renderTabNav();
        renderDashboard();
      }
    });
  }

  // Backfill TLDRs for entries that haven't been processed
  backfillTldrs();

  // Auto-generate weekly brief on Friday mornings
  if (isFriday(todayStr()) && state.settings.baseUrl) {
    const monday = getWeekMonday(todayStr());
    const existingBrief = state.weeklyBriefs.find(b => b.weekOf === monday);
    const weekEntries = getCurrentWeekEntries();
    if (!existingBrief && weekEntries.length >= 3) {
      startGenerateBrief();
    }
  }

  // Auto-fetch meetings on load and every 15 minutes
  if (state.settings.features.meetings !== false && state.settings.ghToken && state.settings.meetingsGistId) {
    fetchMeetings();
    setInterval(() => {
      if (state.settings.features.meetings !== false && state.settings.ghToken && state.settings.meetingsGistId) fetchMeetings();
    }, 15 * 60 * 1000);
  }
}

init();

// Handle URL hash for direct mobile access
if (window.location.hash === '#triage') {
  setTimeout(() => openMobileTriage('inbox'), 500);
} else if (window.location.hash === '#today') {
  setTimeout(() => openMobileTriage('today'), 500);
}
</script>
