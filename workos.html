<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<title>WorkOS</title>
<style>
/* ========================================
   Design Tokens
   ======================================== */
:root {
  --surface-page: #f5eee0;
  --surface-card: #f5eee0;
  --surface-ai: #efe7d8;
  --surface-toast: #5d524b;
  --text-primary: #5d524b;
  --text-secondary: #7a6f67;
  --text-ai: #5d524b;
  --text-muted: #a89e96;
  --text-inverse: #f5eee0;
  /* Accent scale — warm gold, hue ~43° */
  --accent-50:  #fdf8ee;
  --accent-100: #faf0d6;
  --accent-200: #f6e5b8;
  --accent-300: #e8d08e;
  --accent-400: #d4b566;
  --accent-500: #bf9f4e;
  --accent-600: #a3853a;
  --accent-700: #86692d;
  --accent-800: #6a5024;
  --accent-900: #4d3a1a;

  --accent-coaching: var(--accent-600);
  --accent-positive: #8a9a6b;
  --accent-negative: #c47a6e;
  --accent-interactive: var(--accent-500);
  --accent-interactive-hover: var(--accent-700);
  --border-default: #e2d9ca;
  --border-muted: #e8e0d2;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;
  --space-4xl: 48px;
  --radius-sm: 8px;
  --radius-md: 10px;
  --radius-lg: 12px;
  --font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
  --duration-fast: 200ms;
  --duration-normal: 300ms;
  --easing-default: ease-out;
}

/* ========================================
   Reset & Base
   ======================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; overflow-y: scroll; }
body {
  font-family: var(--font-family);
  background: var(--surface-page);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

/* ========================================
   App Shell
   ======================================== */
#app {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 var(--space-2xl);
  padding-bottom: 80px;
}
.app-header {
  padding: var(--space-xl) 0 var(--space-lg);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  justify-content: space-between;
  margin-bottom: var(--space-3xl);
}
.app-name {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 6px;
}
.app-logo-wrap {
  display: inline-block;
  width: 27px;
  height: 18px;
  overflow: hidden;
  flex-shrink: 0;
  margin-right: 4px;
}
.app-logo {
  display: block;
  pointer-events: none;
}
.app-tagline {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 400;
}

/* ========================================
   Tab Navigation
   ======================================== */
.tab-nav {
  display: flex;
  gap: var(--space-xs);
  align-items: center;
}
.tab-btn {
  background: none;
  border: none;
  padding: var(--space-xs) var(--space-md);
  font: 13px/1 var(--font-family);
  font-weight: 400;
  color: var(--text-muted);
  cursor: pointer;
  transition: color var(--duration-fast);
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active {
  color: var(--text-primary);
  font-weight: 600;
}

/* ========================================
   Panels
   ======================================== */
.panel { display: none; }
.panel.active { display: block; }

/* ========================================
   Form Elements
   ======================================== */
.form-group { margin-bottom: var(--space-xl); }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: var(--space-xs);
  letter-spacing: 0;
}
.form-textarea, .form-input {
  width: 100%;
  padding: 4px var(--space-sm);
  border: none;
  border-bottom: 1px solid var(--border-default);
  border-radius: 0;
  font: 15px/1.6 var(--font-family);
  color: var(--text-primary);
  background: transparent;
  resize: vertical;
  transition: border-color var(--duration-fast);
}
.form-textarea:focus, .form-input:focus {
  outline: none;
  border-bottom-color: var(--accent-interactive);
}
.form-textarea { min-height: 80px; }
.form-textarea.lg { min-height: 120px; }
.form-error {
  font-size: 13px;
  color: var(--accent-negative);
  margin-top: var(--space-xs);
  display: none;
}
.form-error.show { display: block; }
.form-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: var(--space-xs);
}

/* ========================================
   Mood Picker
   ======================================== */
.mood-picker {
  display: flex;
  gap: var(--space-sm);
  flex-wrap: wrap;
}
.mood-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid transparent;
  background: transparent;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color var(--duration-fast), transform var(--duration-fast);
}
.mood-btn:hover { border-color: var(--border-default); }
.mood-btn.selected {
  border-color: var(--accent-coaching);
  transform: scale(1.1);
}

/* ========================================
   Energy Slider
   ======================================== */
.energy-row {
  display: flex;
  align-items: center;
  gap: var(--space-md);
}
.energy-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  border-radius: 3px;
  background: var(--border-default);
  outline: none;
}
.energy-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent-coaching);
  cursor: pointer;
  border: 2px solid var(--surface-card);
  box-shadow: 0 1px 3px rgba(26,26,24,0.2);
}
.energy-value {
  font-size: 15px;
  font-weight: 500;
  color: var(--accent-coaching);
  min-width: 36px;
  text-align: right;
  font-family: "SF Pro Rounded", -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ========================================
   Week Strip
   ======================================== */
.date-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: var(--space-xl);
}
.date-today {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-primary);
}
.date-label {
  font-size: 13px;
  color: var(--accent-coaching);
  font-weight: 500;
}
.week-strip {
  display: flex;
  gap: var(--space-sm);
  align-items: center;
  margin-bottom: var(--space-lg);
}
.week-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-xs);
}
.week-day-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}
.week-day-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--border-default);
}
.week-day-dot.filled { background: var(--accent-coaching); }
.week-day-dot.today { box-shadow: 0 0 0 2px var(--surface-page), 0 0 0 3px var(--accent-coaching); }
.streak-badge {
  font-size: 13px;
  color: var(--text-muted);
  margin-left: auto;
  padding-left: var(--space-lg);
}
.streak-badge strong {
  color: var(--accent-coaching);
  font-weight: 600;
}

/* ========================================
   Buttons
   ======================================== */
.btn-primary {
  width: 100%;
  padding: var(--space-md) var(--space-xl);
  background: var(--text-primary);
  color: var(--text-inverse);
  border: none;
  border-radius: var(--radius-sm);
  font: 15px var(--font-family);
  font-weight: 500;
  cursor: pointer;
  transition: opacity var(--duration-fast);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-sm);
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary {
  display: inline-flex;
  align-items: center;
  padding: var(--space-sm) var(--space-xl);
  background: var(--surface-ai);
  color: var(--accent-interactive);
  border: none;
  border-radius: var(--radius-sm);
  font: 13px var(--font-family);
  font-weight: 500;
  cursor: pointer;
  transition: background var(--duration-fast), color var(--duration-fast);
}
.btn-secondary:hover {
  background: var(--accent-200);
  color: var(--accent-interactive);
}
.btn-accent {
  background: var(--accent-300);
  color: var(--text-primary);
}
.btn-accent:hover {
  opacity: 0.9;
  background: var(--accent-300);
  color: var(--text-primary);
}
.btn-ghost {
  background: none;
  border: none;
  color: var(--accent-interactive);
  font: 13px var(--font-family);
  font-weight: 500;
  cursor: pointer;
  padding: var(--space-xs) 0;
}
.btn-ghost:hover { text-decoration: underline; }
.btn-icon {
  background: none;
  border: none;
  color: var(--accent-interactive);
  font-size: 18px;
  cursor: pointer;
  padding: var(--space-xs);
  line-height: 1;
  transition: color var(--duration-fast);
}
.btn-icon:hover { color: var(--accent-interactive-hover); }
.btn-positive {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  padding: 6px var(--space-lg);
  background: var(--surface-ai);
  color: var(--accent-positive);
  border: none;
  border-radius: var(--radius-sm);
  font: 13px var(--font-family);
  font-weight: 500;
  cursor: pointer;
  transition: background var(--duration-fast), color var(--duration-fast);
}
.btn-positive:hover { background: var(--accent-positive); color: var(--text-primary); }
.btn-dismiss {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  padding: 6px var(--space-lg);
  background: var(--surface-ai);
  color: var(--text-muted);
  border: none;
  border-radius: var(--radius-sm);
  font: 13px var(--font-family);
  font-weight: 500;
  cursor: pointer;
  transition: color var(--duration-fast), background var(--duration-fast);
}
.btn-dismiss:hover { color: var(--accent-negative); background: #FDE7E9; }

/* ========================================
   Cards
   ======================================== */
.card {
  background: var(--surface-card);
  border-radius: var(--radius-lg);
  padding: var(--space-xl);
}
.card-bordered {
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.card-ai {
  background: var(--surface-ai);
  border-radius: var(--radius-lg);
  padding: var(--space-xl);
  margin-top: var(--space-md);
}
.card-ai .ai-icon {
  font-size: 16px;
  margin-bottom: var(--space-sm);
  display: block;
  color: var(--accent-coaching);
}
.card-ai .ai-text {
  color: var(--text-ai);
  font-size: 15px;
  line-height: 1.6;
}

/* Entry card (post-submit) */
.entry-card {
  position: relative;
}
.entry-card-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: var(--space-md);
}
.entry-card-date {
  font-size: 15px;
  font-weight: 500;
}
.entry-card-saved {
  font-size: 13px;
  font-weight: 500;
  color: var(--accent-positive);
}
.entry-card-edit {
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  margin-left: var(--space-sm);
  transition: color var(--duration-fast);
}
.entry-card-edit:hover { color: var(--text-secondary); }
.entry-card-body {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text-primary);
  margin-bottom: var(--space-md);
  white-space: pre-wrap;
}
.entry-card-meta {
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  gap: var(--space-md);
}

/* Win card */
.win-card {
  background: var(--surface-card);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  border-radius: var(--radius-md);
  padding: var(--space-lg);
  margin-bottom: var(--space-md);
  transition: box-shadow var(--duration-fast), opacity var(--duration-fast);
}
.win-card.kept {
  border-left: 3px solid var(--accent-positive);
}
.win-card.dismissing {
  opacity: 0;
  transform: scale(0.98);
  transition: opacity var(--duration-fast), transform var(--duration-fast);
}
.win-description {
  font-size: 15px;
  line-height: 1.6;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: var(--space-sm);
}
.win-meta-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.04em;
  margin-top: var(--space-sm);
}
.win-meta-value {
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.5;
}
.win-meta-value.vector {
  color: var(--accent-coaching);
}
.win-actions {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}
.win-kept-badge {
  font-size: 13px;
  font-weight: 500;
  color: var(--accent-positive);
  margin-top: var(--space-md);
}

/* ========================================
   Weekly Brief
   ======================================== */
.brief-header {
  margin-bottom: var(--space-3xl);
}
.brief-title {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: -0.01em;
}
.brief-date {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: var(--space-xs);
}
.brief-back {
  margin-bottom: var(--space-xl);
}
.section-header {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: var(--space-lg);
}
.section-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-lg);
}
.brief-section {
  margin-bottom: var(--space-3xl);
}
.brief-section .card {
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}

/* ========================================
   Nudge Card
   ======================================== */
.nudge-card {
  background: var(--surface-ai);
  border-radius: var(--radius-lg);
  padding: var(--space-xl);
  text-align: center;
  margin-top: var(--space-xl);
}
.nudge-card.solid { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.nudge-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-primary);
}
.nudge-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: var(--space-xs);
  margin-bottom: var(--space-lg);
}

/* ========================================
   Briefs Tab Sub-Navigation
   ======================================== */
.sub-nav {
  display: flex;
  gap: var(--space-xl);
  margin-bottom: var(--space-3xl);
}
.sub-nav-btn {
  background: none;
  border: none;
  font: 13px var(--font-family);
  font-weight: 400;
  color: var(--text-muted);
  cursor: pointer;
  padding-bottom: var(--space-xs);
  border-bottom: 2px solid transparent;
  transition: color var(--duration-fast);
}
.sub-nav-btn:hover { color: var(--text-primary); }
.sub-nav-btn.active {
  font-weight: 600;
  color: var(--text-primary);
  border-bottom: 2px solid var(--accent-interactive);
}

/* ========================================
   History Tab
   ======================================== */
.history-entry {
  margin-bottom: var(--space-xl);
}
.history-entry-header {
  display: flex;
  align-items: baseline;
  gap: 32px;
}
.history-entry-date {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-secondary);
}
.history-entry-mood-emoji {
  font-size: 18px;
  margin-left: var(--space-sm);
  vertical-align: middle;
}
.history-entry-mood {
  font-size: 13px;
  color: var(--text-secondary);
  margin-left: var(--space-sm);
}
.history-entry-edit {
  font-family: monospace;
  font-size: 12px;
  font-weight: 400;
  color: var(--accent-interactive);
  cursor: pointer;
}
.history-entry-edit:hover {
  color: var(--accent-interactive-hover);
}
.history-section-label {
  display: flex;
  align-items: center;
  gap: 32px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0;
  color: var(--text-muted);
  margin-top: var(--space-xl);
  margin-bottom: var(--space-xs);
}
.section-emoji {
  font-size: 16px;
  line-height: 1;
  margin-right: -26px;
}
.history-section-label:first-of-type {
  margin-top: var(--space-lg);
}
.history-section-body {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-primary);
  white-space: pre-wrap;
}
.history-bullets {
  margin: 0;
  padding-left: var(--space-xl);
  list-style: disc;
}
.history-bullets li {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-primary);
}
.history-entry-body {
  font-size: 15px;
  line-height: 1.6;
  margin-top: var(--space-sm);
  white-space: pre-wrap;
}
.history-reflection {
  background: var(--surface-ai);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-top: var(--space-sm);
}
.hidden { display: none; }
.show-mobile { display: none; }
.history-reflection .ai-icon {
  font-size: 14px;
  color: var(--accent-coaching);
  margin-bottom: var(--space-xs);
  display: block;
}
.history-reflection .ai-text {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-ai);
}
.ai-text p {
  margin: 0 0 var(--space-sm) 0;
}
.ai-text ul {
  margin: var(--space-sm) 0;
  padding-left: var(--space-xl);
}
.ai-text li {
  margin-bottom: var(--space-xs);
}
.history-divider {
  border: none;
  margin: var(--space-2xl) 0;
  height: 0;
}

/* ========================================
   Past Briefs List
   ======================================== */
.past-brief-row {
  background: var(--surface-card);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-md);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: box-shadow var(--duration-fast);
}
.past-brief-row:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
.past-brief-info {}
.past-brief-week {
  font-size: 15px;
  font-weight: 500;
}
.past-brief-meta {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}
.past-brief-wins {
  font-size: 13px;
  color: var(--text-secondary);
}

/* ========================================
   Wins Archive
   ======================================== */
.wins-header {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: var(--space-xl);
}
.wins-archive-card {
  background: var(--surface-card);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  border-left: 3px solid var(--accent-positive);
  border-radius: var(--radius-md);
  padding: var(--space-lg);
  margin-bottom: var(--space-md);
}
.wins-archive-date {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: var(--space-sm);
}
.wins-archive-date .vector-tag {
  color: var(--accent-coaching);
}
.wins-toolbar {
  display: flex;
  gap: var(--space-sm);
  margin-bottom: var(--space-xl);
  flex-wrap: wrap;
  align-items: center;
}
.wins-filter {
  padding: 6px var(--space-md);
  border: none;
  border-bottom: 1px solid var(--border-default);
  border-radius: 0;
  font: 13px var(--font-family);
  color: var(--text-primary);
  background: transparent;
  min-width: 120px;
}
.wins-filter:focus { outline: none; border-bottom-color: var(--accent-interactive); }
.wins-search {
  flex: 1;
  min-width: 150px;
  padding: 6px var(--space-md);
  border: none;
  border-bottom: 1px solid var(--border-default);
  border-radius: 0;
  font: 13px var(--font-family);
  color: var(--text-primary);
  background: transparent;
}
.wins-search:focus { outline: none; border-bottom-color: var(--accent-interactive); }
.wins-actions-bar {
  display: flex;
  gap: var(--space-sm);
  margin-left: auto;
}
.wins-archive-card-actions {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}
.wins-edit-form { margin-top: var(--space-md); }
.wins-edit-form textarea {
  width: 100%;
  padding: var(--space-sm);
  border: none;
  border-bottom: 1px solid var(--border-default);
  border-radius: 0;
  font: 13px/1.5 var(--font-family);
  color: var(--text-primary);
  resize: vertical;
  min-height: 48px;
  margin-bottom: var(--space-sm);
}
.wins-edit-form textarea:focus { outline: none; border-bottom-color: var(--accent-interactive); }
.promo-brief {
  background: var(--surface-ai);
  border-radius: var(--radius-lg);
  padding: var(--space-xl);
  white-space: pre-wrap;
  font-size: 15px;
  line-height: 1.6;
  margin-top: var(--space-xl);
}

/* ========================================
   Settings
   ======================================== */
.settings-section {
  margin-bottom: var(--space-3xl);
}
.settings-section-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: var(--space-lg);
}
.settings-section-title + .form-hint {
  margin-top: -12px;
}
.api-status {
  font-size: 13px;
  margin-top: var(--space-xs);
}
.api-status.valid { color: var(--accent-positive); }
.api-status.invalid { color: var(--accent-negative); }
.api-status.checking { color: var(--text-secondary); }
.model-selector {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
  margin-top: var(--space-sm);
}
.model-option {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
}
.model-option input { accent-color: var(--accent-coaching); }

/* Feature Toggles */
.feature-toggle-row { display: flex; align-items: center; justify-content: space-between; padding: var(--space-md) 0; border-bottom: 1px solid var(--border-default); }
.feature-toggle-row:last-child { border-bottom: none; }
.feature-toggle-info { display: flex; flex-direction: column; gap: 2px; }
.feature-toggle-label { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.feature-toggle-desc { font-size: 12px; color: var(--text-muted); }
.toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-switch .slider { position: absolute; inset: 0; background: var(--border-default); border-radius: 11px; cursor: pointer; transition: background 0.2s; }
.toggle-switch .slider::before { content: ''; position: absolute; left: 3px; top: 3px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform 0.2s; }
.toggle-switch input:checked + .slider { background: var(--accent-interactive); }
.toggle-switch input:checked + .slider::before { transform: translateX(18px); }

/* ========================================
   Empty States
   ======================================== */
.empty-state {
  text-align: center;
  padding: var(--space-4xl) var(--space-xl);
  color: var(--text-primary);
  font-size: 15px;
  font-weight: 600;
  line-height: 1.6;
}
.empty-state-secondary {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  margin-top: var(--space-sm);
}

/* ========================================
   Loading
   ======================================== */
.loading-dots {
  color: var(--text-muted);
  font-size: 20px;
  letter-spacing: 4px;
}
.loading-dots span {
  animation: dotPulse 1.2s infinite;
  display: inline-block;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}
.brief-loading {
  text-align: center;
  padding: var(--space-4xl) 0;
}
.brief-loading-text {
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: var(--space-lg);
}
.progress-bar {
  width: 200px;
  height: 4px;
  border-radius: 2px;
  background: var(--border-default);
  margin: 0 auto;
  overflow: hidden;
}
.progress-bar-fill {
  width: 40%;
  height: 100%;
  background: var(--accent-coaching);
  border-radius: 2px;
  animation: progressSlide 1.5s ease-in-out infinite;
}
@keyframes progressSlide {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(350%); }
}

/* ========================================
   Toast
   ======================================== */
#toast-container {
  position: fixed;
  bottom: var(--space-2xl);
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  pointer-events: none;
}
.toast {
  background: var(--surface-toast);
  color: var(--text-inverse);
  font: 13px var(--font-family);
  font-weight: 500;
  border-radius: var(--radius-sm);
  padding: 10px var(--space-lg);
  box-shadow: 0 4px 12px rgba(26,26,24,0.15);
  pointer-events: auto;
  animation: toastIn var(--duration-fast) var(--easing-default);
  white-space: nowrap;
}
.toast.exiting {
  animation: toastOut var(--duration-normal) var(--easing-default) forwards;
}
.toast .toast-undo {
  color: var(--text-inverse);
  text-decoration: underline;
  cursor: pointer;
  margin-left: var(--space-sm);
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toastOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* ========================================
   Fade Animations
   ======================================== */
.fade-in {
  animation: fadeIn var(--duration-normal) var(--easing-default);
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ========================================
   Spinner
   ======================================== */
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--text-inverse);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
.spinner.dark {
  border-color: var(--text-muted);
  border-top-color: transparent;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ========================================
   Log Tab — Journal Styles
   ======================================== */
#panel-log {
  transition: background 600ms ease;
}
#panel-log .log-greeting {
  font-family: Times;
  font-size: 16px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
#panel-log .log-header-row {

  align-items: center;
  justify-content: space-between;

}
#panel-log .log-header-right {

}
#panel-log .date-today {

#panel-log .date-label {

#panel-log .streak-badge {

#panel-log .form-group {

#panel-log .mood-energy-row {

#panel-log .mood-energy-row .form-group {

#panel-log .form-label {

#panel-log .form-textarea::placeholder {

#panel-log .mood-btn {

#panel-log .plan-tomorrow-group {

.plan-rows {

}
.plan-row {

.plan-row-remove {

.plan-row-remove:hover {

.plan-add-row {

#panel-log .btn-primary,
#panel-visibility .btn-primary {

#panel-log .entry-card .entry-card-body {

#panel-log .entry-reflection {

   Intention Screen & Reminder
   ======================================== */
.intention-screen {

}
.intention-screen .form-group {

  text-align: left;
  margin-top: var(--space-3xl);
}
.intention-screen .form-textarea {
  border: none;
  border-bottom: 1px solid var(--border-default);
  border-radius: 0;
  background: transparent;
  font-size: 18px;
  line-height: 1.7;
  resize: none;
  padding: var(--space-sm) 0;
  font-family: Times, serif;
}
.intention-screen .form-textarea::placeholder {
  font-style: italic;
  color: var(--text-muted);
}
.intention-screen .form-textarea:focus {
  border-color: var(--accent-coaching);
  outline: none;
}
.intention-screen .btn-primary {
  margin-top: var(--space-xl);

  padding: var(--space-lg) var(--space-xl);
}
.intention-screen .btn-ghost {

}
.coaching-recap {
  margin-top: var(--space-xl);
  margin-bottom: var(--space-3xl);
  padding-bottom: var(--space-2xl);
  border-bottom: 1px solid var(--border-muted);
}
.coaching-recap ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}
.coaching-recap li {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-secondary);
  display: flex;
  align-items: baseline;
  gap: var(--space-sm);
}
.coaching-recap li::before {

.coaching-recap .coaching-recap-link {

  color: var(--accent-interactive);

.coaching-recap .coaching-recap-link:hover {

}
.reminder-col-label {
  display: flex;
  align-items: baseline;

  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;

  margin-bottom: var(--space-sm);
}
.reminder-cta {
  font-family: monospace;
  font-size: 12px;
  font-weight: 400;

}
.cta-icon {

.reminder-cta:hover {

}
.intention-reminder {

  font-size: 14px;
  color: var(--text-secondary);
  margin-top: var(--space-3xl);

}

  padding-bottom: 0;

}
.intention-edit-btn {

  color: var(--text-muted);
  margin-top: var(--space-lg);
}
.intention-edit-btn:hover {
  color: var(--text-secondary);
}
.intention-checklist {
  display: grid;
  grid-template-columns: 1fr 1fr;

}
.reminders-row .intention-checklist {

  user-select: none;

.intention-check-item:active {

}
.intention-check-item.dragging {

}

}

  flex-shrink: 0;
  margin-top: 4px;
}
.intention-check-item.done {

  color: var(--text-muted);
}
.plan-checklist {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
}
.plan-check-item {
  display: flex;
  align-items: flex-start;
  gap: var(--space-sm);
  padding: 2px 0;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-secondary);
  cursor: grab;
  border-radius: 4px;
  transition: background 0.15s, opacity 0.15s;
  user-select: none;
}
.plan-check-item:active {
  cursor: grabbing;
}
.plan-check-item.dragging {
  opacity: 0.4;
}
.plan-check-item.drag-over {
  border-top: 2px solid var(--accent-300, #f59e0b);
  margin-top: -2px;
}
.plan-check-item.priority,
.intention-check-item.priority {
  font-weight: 600;
  color: var(--text-primary);
}
.plan-check-item.done {
  text-decoration: line-through;
  color: var(--text-muted);
}
.plan-check-item.done.priority {
  font-weight: 400;
  color: var(--text-muted);
}
.plan-check-item input[type="checkbox"] {
  accent-color: var(--accent-positive);
  flex-shrink: 0;
  margin-top: 4px;
}
.drag-handle {
  color: var(--text-secondary);
  font-size: 14px;
  flex-shrink: 0;
  opacity: 0.5;
  cursor: grab;
  line-height: 1;

}
.plan-check-item:hover .drag-handle,
.intention-check-item:hover .drag-handle {
  opacity: 1;
}
.intention-edit {
  margin-bottom: var(--space-xl);
}
.intention-edit .form-textarea {

  border-bottom: 1px solid var(--border-default);
  border-radius: 0;
  background: transparent;
  font-size: 15px;
  line-height: 1.6;
  resize: none;
  padding: var(--space-sm) 0;
  font-family: Times, serif;
  min-height: 60px;
}
.intention-edit .form-textarea:focus {
  border-color: var(--accent-coaching);
  outline: none;
}
.intention-edit-actions {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-sm);
}

/* ========================================
   Contributions Tab
   ======================================== */
.contrib-total-badge {

}
.contrib-stat strong {

.contrib-cat-grid {

.contrib-cat-card {

.contrib-cat-card.active { background: var(--accent-200); }
.contrib-cat-card-count {

.contrib-cat-card-label {

  font-weight: 500;

  letter-spacing: -0.01em;

}
.contrib-cat-card.active .contrib-cat-card-label { color: var(--text-primary); }
.contrib-cat-card-count { color: var(--text-primary); }
.contrib-date-filter {
  display: flex;
  gap: var(--space-sm);
  align-items: center;
}
.contrib-date-filter label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--text-muted);
}
.contrib-date-filter input[type="date"] {
  padding: 4px 8px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  font: 12px var(--font-family);
  color: var(--text-primary);
  background: transparent;
}
.contrib-pills {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-xs);
  margin-bottom: var(--space-xl);
}
.category-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: opacity var(--duration-fast);
}
.category-pill:hover { opacity: 0.8; }
.category-pill.active { box-shadow: 0 0 0 2px var(--text-primary); }
.category-pill[data-cat="bug-report"] { background: #fde7e9; color: #a8453a; }
.category-pill[data-cat="feature-request"] { background: #e8f0fe; color: #3a6ea8; }
.category-pill[data-cat="design-feedback"] { background: #f3e8fd; color: #7a3aa8; }
.category-pill[data-cat="component-request"] { background: #e8fdf0; color: #3aa85c; }

<div id="app">
  <header class="app-header">
    <span class="app-name"><span class="app-logo-wrap"><object class="app-logo" data="logo.svg" type="image/svg+xml" width="27" height="21"></object></span>WorkOS</span>
    <nav class="tab-nav" id="tabNav"></nav>
  </header>

  <div id="panel-log" class="panel active"></div>
  <div id="panel-history" class="panel"></div>
  <div id="panel-briefs" class="panel"></div>
  <div id="panel-contributions" class="panel"></div>
  <div id="panel-visibility" class="panel"></div>
  <div id="panel-settings" class="panel"></div>
</div>

<div id="toast-container"></div>

<script>
/* ========================================
   State
   ======================================== */
let state = {
  settings: { name: '', role: '', baseUrl: '', projectId: '', apiKey: '', model: 'sonnet', slackWebhook: '', promotionNotes: '', ghToken: '', ghGistId: '', features: { contributions: true, visibility: true } },
  entries: [],
  wins: [],
  weeklyBriefs: [],
  intentions: {},
  dayPriorities: {},
  dayPlanChecked: {},
  contributions: [],
  visibilityActivities: []
};

let logMode = 'form'; // 'form' | 'submitted' | 'intention' | 'editing'
let editingEntryId = null;
let briefsView = 'list'; // 'list' | 'loading' | 'detail'
let briefsSubView = 'this-week'; // 'this-week' | 'past-briefs' | 'wins'
let currentBriefId = null;
let pendingFormData = null;
let settingsSubTab = 'profile';

function loadState() {
  try {
    const raw = localStorage.getItem('workos_state');
    if (raw) {
      const saved = JSON.parse(raw);
      state.settings = { ...state.settings, ...saved.settings };
      state.settings.features = { contributions: true, visibility: true, ...saved.settings?.features };
      state.entries = saved.entries || [];
      state.wins = saved.wins || [];
      state.weeklyBriefs = saved.weeklyBriefs || [];
      state.intentions = saved.intentions || {};
      state.dayPriorities = saved.dayPriorities || {};
      state.dayPlanChecked = saved.dayPlanChecked || {};
      state.contributions = saved.contributions || [];
      state.visibilityActivities = saved.visibilityActivities || [];

      // Migrate old weeklyIntention values from entries
      for (const entry of state.entries) {
        if (entry.weeklyIntention) {
          const monday = getWeekMonday(entry.date);
          if (!state.intentions[monday]) {
            state.intentions[monday] = entry.weeklyIntention;
          }
        }
      }
    }
  } catch (e) { console.error('Failed to load state:', e); }
}

function saveState() {
  try {
    localStorage.setItem('workos_state', JSON.stringify(state));
  } catch (e) {
    console.error('Failed to save state:', e);
    showToast('Storage nearly full. Export your data in Settings.');
  }
  debouncedSyncPush();
}

/* ========================================
   GitHub Gist Sync
   ======================================== */
let syncPushTimer = null;
let syncInFlight = false;

function debouncedSyncPush() {
  if (!state.settings.ghToken) return;
  if (syncPushTimer) clearTimeout(syncPushTimer);
  syncPushTimer = setTimeout(() => syncPush(), 2000);
}

async function syncPush() {
  if (!state.settings.ghToken || syncInFlight) return;
  syncInFlight = true;
  try {
    // Build sync payload with ONLY safe fields — never include tokens
    const syncState = {
      settings: {
        name: state.settings.name || '',
        role: state.settings.role || '',
        baseUrl: state.settings.baseUrl || '',
        projectId: state.settings.projectId || '',
        model: state.settings.model || 'sonnet',
        slackWebhook: state.settings.slackWebhook || '',
        promotionNotes: state.settings.promotionNotes || ''
      },
      entries: state.entries,
      wins: state.wins,
      weeklyBriefs: state.weeklyBriefs,
      intentions: state.intentions,
      dayPriorities: state.dayPriorities,
      dayPlanChecked: state.dayPlanChecked,
      contributions: state.contributions,
      visibilityActivities: state.visibilityActivities
    };
    const content = JSON.stringify(syncState, null, 2);
    const headers = {
      'Authorization': 'token ' + state.settings.ghToken,
      'Content-Type': 'application/json'
    };

    if (state.settings.ghGistId) {
      // Update existing gist
      const res = await fetch('https://api.github.com/gists/' + state.settings.ghGistId, {
        method: 'PATCH',
        headers,
        body: JSON.stringify({ files: { 'workos-state.json': { content } } })
      });
      if (res.status === 404) {
        // Gist was deleted, create a new one
        state.settings.ghGistId = '';
        await syncPush();
        return;
      }
      if (!res.ok) throw new Error('sync_push_failed');
    } else {
      // Create new gist
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers,
        body: JSON.stringify({
          description: 'app-sync-data',
          public: false,
          files: { 'workos-state.json': { content } }
        })
      });
      if (!res.ok) throw new Error('sync_create_failed');
      const data = await res.json();
      state.settings.ghGistId = data.id;
      localStorage.setItem('workos_state', JSON.stringify(state));
      const gistIdEl = document.getElementById('settingGistId');
      if (gistIdEl) gistIdEl.value = data.id;
    }
    updateSyncStatus('synced');
  } catch (e) {
    console.error('Sync push failed:', e);
    updateSyncStatus('error');
  } finally {
    syncInFlight = false;
  }
}

async function syncPull() {
  if (!state.settings.ghToken || !state.settings.ghGistId) return 'no_config';
  try {
    const res = await fetch('https://api.github.com/gists/' + state.settings.ghGistId, {
      headers: { 'Authorization': 'token ' + state.settings.ghToken }
    });
    if (res.status === 401 || res.status === 403) return 'auth_error';
    if (res.status === 404) return 'not_found';
    if (!res.ok) return 'error';
    const data = await res.json();
    const file = data.files['workos-state.json'];
    if (!file) return 'empty';
    const remote = JSON.parse(file.content);
    // Merge: use remote data but keep local sync settings
    const localToken = state.settings.ghToken;
    const localGistId = state.settings.ghGistId;
    state.settings = { ...state.settings, ...remote.settings };
    state.settings.ghToken = localToken;
    state.settings.ghGistId = localGistId;
    state.entries = remote.entries || [];
    state.wins = remote.wins || [];
    state.weeklyBriefs = remote.weeklyBriefs || [];
    state.intentions = remote.intentions || {};
    state.dayPriorities = remote.dayPriorities || {};
    state.dayPlanChecked = remote.dayPlanChecked || {};
    state.contributions = remote.contributions || [];
    state.visibilityActivities = remote.visibilityActivities || [];
    localStorage.setItem('workos_state', JSON.stringify(state));
    return 'ok';
  } catch (e) {
    console.error('Sync pull failed:', e);
    return 'error';
  }
}

function updateSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (status === 'synced') {
    el.className = 'api-status valid';
    el.textContent = '✓ Synced — ' + new Date().toLocaleTimeString();
  } else if (status === 'syncing') {
    el.className = 'api-status checking';
    el.textContent = 'Syncing...';
  } else if (status === 'error') {
    el.className = 'api-status invalid';
    el.textContent = '✕ Sync failed — check token';
  }
}

async function manualSync() {
  // Force-read inputs in case blur didn't fire (iOS Safari)
  const tokenEl = document.getElementById('settingGhToken');
  const gistEl = document.getElementById('settingGistId');
  if (tokenEl) { state.settings.ghToken = tokenEl.value.trim(); }
  if (gistEl) { state.settings.ghGistId = gistEl.value.trim(); }
  localStorage.setItem('workos_state', JSON.stringify(state));

  if (!state.settings.ghToken) {
    updateSyncStatus('error');
    showToast('Enter a GitHub token first');
    return;
  }

  updateSyncStatus('syncing');
  const result = await syncPull();
  if (result === 'ok') {
    updateSyncStatus('synced');
    renderLogTab();
    renderSettings();
    showToast('Data synced from cloud');
  } else if (result === 'auth_error') {
    updateSyncStatus('error');
    showToast('Auth failed — token may be revoked or missing gist scope');
  } else if (result === 'not_found' || result === 'no_config' || result === 'empty') {
    await syncPush();
    showToast('Data pushed to cloud');
  } else {
    await syncPush();
    showToast('Data pushed to cloud');
  }
}

/* ========================================
   Date Utilities
   ======================================== */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function getDayName(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long' });
}

function getDayShort(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 3);
}

function formatDateDisplay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDateWithYear(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function isMonday(dateStr) { return new Date(dateStr + 'T12:00:00').getDay() === 1; }
function isFriday(dateStr) { return new Date(dateStr + 'T12:00:00').getDay() === 5; }

function getWeekMonday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d);
  mon.setDate(mon.getDate() + diff);
  return mon.toISOString().split('T')[0];
}

function getWeekDates(mondayStr) {
  const dates = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(mondayStr + 'T12:00:00');
    d.setDate(d.getDate() + i);
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates;
}

function getWeekFriday(mondayStr) {
  const d = new Date(mondayStr + 'T12:00:00');
  d.setDate(d.getDate() + 4);
  return d.toISOString().split('T')[0];
}

function formatWeekRange(mondayStr) {
  return formatDateShort(mondayStr) + ' – ' + formatDateShort(getWeekFriday(mondayStr));
}

function getCurrentWeekEntries() {
  const monday = getWeekMonday(todayStr());
  const weekDates = getWeekDates(monday);
  return state.entries.filter(e => weekDates.includes(e.date)).sort((a, b) => a.date.localeCompare(b.date));
}

function getEntryForDate(dateStr) {
  return state.entries.find(e => e.date === dateStr);
}

function getRecentEntries(count = 3) {
  const today = todayStr();
  return state.entries
    .filter(e => e.date < today)
    .sort((a, b) => b.date.localeCompare(a.date))
    .slice(0, count);
}

function getStreak() {
  let streak = 0;
  const d = new Date();
  while (true) {
    const dateStr = d.toISOString().split('T')[0];
    const dayOfWeek = d.getDay();
    if (dayOfWeek === 0 || dayOfWeek === 6) {
      d.setDate(d.getDate() - 1);
      continue;
    }
    if (getEntryForDate(dateStr)) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else if (dateStr === todayStr()) {
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function getPreviousWeekBrief() {
  const currentMonday = getWeekMonday(todayStr());
  return state.weeklyBriefs
    .filter(b => b.weekOf < currentMonday)
    .sort((a, b) => b.weekOf.localeCompare(a.weekOf))[0] || null;
}

function getCurrentWeekBrief() {
  const monday = getWeekMonday(todayStr());
  return state.weeklyBriefs.find(b => b.weekOf === monday) || null;
}

function getConfirmedWins() {
  return state.wins.filter(w => w.status === 'confirmed').sort((a, b) => b.date.localeCompare(a.date));
}

/* ========================================
   Toast
   ======================================== */
let toastTimeout = null;

function showToast(message, duration = 3000, undoCallback = null) {
  const container = document.getElementById('toast-container');
  container.innerHTML = '';
  if (toastTimeout) clearTimeout(toastTimeout);

  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = message + (undoCallback ? ' <span class="toast-undo">Undo</span>' : '');
  container.appendChild(toast);

  if (undoCallback) {
    toast.querySelector('.toast-undo').onclick = () => {
      undoCallback();
      container.innerHTML = '';
      if (toastTimeout) clearTimeout(toastTimeout);
    };
  }

  toastTimeout = setTimeout(() => {
    toast.classList.add('exiting');
    setTimeout(() => { container.innerHTML = ''; }, 300);
  }, duration);
}

function renderTabNav() {
  const f = state.settings.features || {};
  const tabs = [
    { id: 'log', label: 'Log' },
    { id: 'history', label: 'History' },
    { id: 'briefs', label: 'Briefs' },
    f.contributions !== false ? { id: 'contributions', label: 'Contributions' } : null,
    f.visibility !== false ? { id: 'visibility', label: 'Visibility' } : null,
    { id: 'settings', label: '⚙', style: 'font-size:24px;line-height:1', title: 'Settings' }
  ].filter(Boolean);

  const active = document.querySelector('.tab-btn.active')?.dataset.tab || 'log';
  document.getElementById('tabNav').innerHTML = tabs.map(t =>
    `<button class="tab-btn${t.id === active ? ' active' : ''}" data-tab="${t.id}"${t.title ? ` title="${t.title}"` : ''}${t.style ? ` style="${t.style}"` : ''}>${t.label}</button>`
  ).join('');
}

function toggleFeature(feature) {
  state.settings.features[feature] = !state.settings.features[feature];
  saveState();
  renderTabNav();
  const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
  if (activeTab === feature && !state.settings.features[feature]) switchTab('log');
}

/* ========================================
   Tab Switching
   ======================================== */
function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabName);
  });
  document.querySelectorAll('.panel').forEach(panel => {
    panel.classList.toggle('active', panel.id === 'panel-' + tabName);
  });
  if (tabName === 'history') renderHistory();
  if (tabName === 'briefs') renderBriefs();
  if (tabName === 'contributions') renderContributions();
  if (tabName === 'visibility') renderVisibility();
  if (tabName === 'log') renderLogTab();
  if (tabName === 'settings') renderSettings();
}

document.getElementById('tabNav').addEventListener('click', (e) => {
  if (e.target.classList.contains('tab-btn')) {
    switchTab(e.target.dataset.tab);
  }
});

   API Integration
   ======================================== */
const SYSTEM_PROMPT = `You are a career coach embedded in a personal work journal. Your user is a Senior Product Designer working toward promotion.

Your role:
- Surface patterns and connections the user hasn't noticed
- Connect daily work to longer-term career trajectory
- Be direct and specific — never generic or cheerful
- Treat the user as a smart professional, not a student
- When you notice tension, name it plainly

Your rules:
- NEVER summarize what the user just wrote — they already know
- NEVER use phrases like "Great work!" or "Keep it up!" or "It sounds like you had a productive day"
- NEVER give generic career advice ("make sure to communicate with your manager")
- DO notice what's unsaid — gaps, avoidance, repeated friction
- DO connect dots across multiple entries when patterns emerge
- DO name tensions honestly ("You keep mentioning this project positively but your energy drops every time it comes up")

Your format — strict, no deviation:
1. Analysis: 2-4 sentences max. Direct, poignant. Name what matters.
2. Action items: a bulleted list of specific, actionable next steps. Each item starts with a verb.

Nothing else. No preamble, no sign-off.`;

async function callClaude(systemPrompt, userPrompt, maxTokens) {
  if (!state.settings.baseUrl) throw new Error('no_key');

  const model = state.settings.model === 'opus' ? 'claude-opus-4-6' : 'claude-sonnet-4-6';
  const baseUrl = state.settings.baseUrl.replace(/\/+$/, '');

  const headers = { 'Content-Type': 'application/json' };
  if (state.settings.projectId) {
    headers['x-netflix-copilot-project-id'] = state.settings.projectId;
  }
  if (state.settings.apiKey) {
    headers['Authorization'] = 'Bearer ' + state.settings.apiKey;
  }

  const res = await fetch(baseUrl + '/v1/chat/completions', {
    method: 'POST',
    headers,
    body: JSON.stringify({
      model,
      max_tokens: maxTokens,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userPrompt }
      ]
    })
  });

  if (!res.ok) {
    if (res.status === 401 || res.status === 403) throw new Error('invalid_key');
    if (res.status === 429) throw new Error('rate_limited');
    throw new Error('api_error');
  }

  const data = await res.json();
  return data.choices[0].message.content;
}

function buildDailyPrompt(entry) {
  const promo = state.settings.promotionNotes || 'No promotion notes provided yet.';
  const recent = getRecentEntries(3);

  let recentText = '';
  if (recent.length > 0) {
    recentText = recent.map(e =>
      `[${e.date} — ${getDayName(e.date)}]\nWork: ${e.workDone}\nReflection: ${e.reflection || '(none)'}\nMood: ${e.mood || 'not set'} | Energy: ${e.energy}/10` +
      (e.aiReflection ? `\nPrevious coaching note: ${e.aiReflection}` : '')
    ).join('\n\n');
  }

  const weekIntention = getWeekIntention(entry.date);
  let todayText = `Date: ${entry.date} (${getDayName(entry.date)})\nWork done: ${entry.workDone}\nReflection: ${entry.reflection || '(none)'}\nMood: ${entry.mood || 'not set'} | Energy: ${entry.energy}/10`;
  if (weekIntention) todayText += `\nWeekly intention: ${weekIntention}`;
  if (entry.isFriday && entry.weeklyRetro) todayText += `\nWeekly retro: ${entry.weeklyRetro}`;
  if (entry.planTomorrow) todayText += `\nTomorrow's plan: ${entry.planTomorrow}`;

  return `Here is context about this person's promotion goals:\n<promotion_context>\n${promo}\n</promotion_context>\n\n${recent.length > 0 ? `Here are their recent daily entries for continuity:\n<recent_entries>\n${recentText}\n</recent_entries>\n\n` : ''}Here is today's entry:\n<today>\n${todayText}\n</today>\n\nWrite a 2-3 sentence coaching reflection on today's entry. Focus on ONE of these (pick whichever is most relevant today):\n\n- A pattern across recent days the user might not see\n- A tension or contradiction worth examining\n- A connection between today's work and their promotion goals\n- Something notably absent — what aren't they mentioning?\n- An energy/mood shift and what might be driving it\n\nDo not address more than one. Depth over breadth. No preamble, no sign-off. Just the reflection.`;
}

function buildWeeklyPrompt(weekEntries) {
  const promo = state.settings.promotionNotes || 'No promotion notes provided yet.';
  const prevBrief = getPreviousWeekBrief();

  let prevText = '';
  if (prevBrief) {
    const prevWins = state.wins.filter(w => w.status === 'confirmed' && w.date >= prevBrief.weekOf && w.date <= getWeekFriday(prevBrief.weekOf));
    prevText = `Here is last week's brief for continuity:\n<last_week>\nPatterns: ${prevBrief.patterns}\nVector check-in: ${prevBrief.vectorCheckIn}\nWins: ${prevWins.length > 0 ? prevWins.map(w => w.description).join('; ') : 'None confirmed'}\nKey 1:1 talking points: ${prevBrief.oneOnOnePrep}\n</last_week>\n\n`;
  }

  const monday = weekEntries.length > 0 ? getWeekMonday(weekEntries[0].date) : getWeekMonday(todayStr());
  const weekIntention = getWeekIntention(monday);
  const intentionText = weekIntention ? `\nWeekly intention: ${weekIntention}\n` : '';

  const entriesText = weekEntries.map(e => {
    let t = `[${e.date} — ${getDayName(e.date)}]\nWork: ${e.workDone}\nReflection: ${e.reflection || '(none)'}\nMood: ${e.mood || 'not set'} | Energy: ${e.energy}/10`;
    if (e.weeklyRetro) t += `\nWeekly retro: ${e.weeklyRetro}`;
    if (e.planTomorrow) t += `\nTomorrow: ${e.planTomorrow}`;
    t += `\nCoaching note: ${e.aiReflection || 'none'}`;
    return t;
  }).join('\n---\n');

  return `Here is context about this person's promotion goals:\n<promotion_context>\n${promo}\n</promotion_context>\n\n${prevText}${intentionText ? `This week's intention set by the user:\n<weekly_intention>\n${weekIntention}\n</weekly_intention>\n\n` : ''}Here are all entries from this week:\n<week_entries>\n${entriesText}\n</week_entries>\n\nProduce a weekly brief in this exact format:\n\n## PATTERNS\n3-4 observations about this week. Focus on non-obvious connections, recurring themes, energy trends, and shifts from last week. Each observation should be 1-2 sentences. Name specific days and details — never be vague.\n\n## VECTORS\nMap this week's work against the promotion context above. For each relevant promotion area mentioned in the context:\n- What evidence from this week supports growth in this area?\n- What's missing or declining?\n- If no promotion context was provided, instead note 2-3 areas where this week's work demonstrated senior-level behavior, and 1 area that stayed at the current level.\n\n## WINS\nIdentify 2-4 potential wins from this week. A win is NOT a task completed — it's an outcome that had impact beyond the immediate work.\n\nFor each win, output in this exact format:\nWIN: [one-sentence description of the achievement]\nIMPACT: [what changed, improved, or was unblocked because of this]\nVECTOR: [which promotion area this maps to, or "general" if none fit]\n\nRules for wins:\n- Frame as impact, not activity ("Unblocked the checkout team's redesign" not "Reviewed checkout designs")\n- If nothing this week rises to "win" level, say so honestly — do not inflate routine work\n- It is better to surface 1 real win than 4 weak ones\n\n## 1:1 PREP\nWrite 3-4 talking points for the user's next 1:1 with their manager, ranked by career importance (most important first). Each should be 2-3 sentences with specific evidence from this week's entries.\n\nInclude:\n- At least one point about a promotion-relevant area where the user demonstrated growth (with specific example)\n- At least one point about a challenge, blocker, or area where the user needs support\n- If a win was detected, frame one point around making that win visible\n\nDo NOT include:\n- Generic items ("I'd like to discuss my career growth")\n- Status updates the manager already knows\n- Anything without specific evidence from this week`;
}

function parseWeeklyBrief(text) {
  const sections = { patterns: '', vectorCheckIn: '', winsRaw: '', oneOnOnePrep: '' };
  const parts = text.split(/^## /m).filter(Boolean);

  for (const part of parts) {
    const firstLine = part.split('\n')[0].trim().toUpperCase();
    const content = part.split('\n').slice(1).join('\n').trim();
    if (firstLine.includes('PATTERN')) sections.patterns = content;
    else if (firstLine.includes('VECTOR')) sections.vectorCheckIn = content;
    else if (firstLine.includes('WIN')) sections.winsRaw = content;
    else if (firstLine.includes('1:1') || firstLine.includes('PREP')) sections.oneOnOnePrep = content;
  }

  const wins = [];
  const winRegex = /WIN:\s*(.+?)(?:\n)IMPACT:\s*(.+?)(?:\n)VECTOR:\s*(.+?)(?=\n\s*\n|\n*WIN:|\s*$)/gs;
  let match;
  while ((match = winRegex.exec(sections.winsRaw)) !== null) {
    wins.push({ description: match[1].trim(), impact: match[2].trim(), vector: match[3].trim() });
  }

  return { ...sections, winsDetected: wins };
}

function getGreeting() {
  const hour = new Date().getHours();
  const name = state.settings.name || '';
  const nameStr = name ? ', ' + name : '';
  if (hour < 12) return 'Good morning' + nameStr;
  if (hour < 17) return 'Good afternoon' + nameStr;
  return 'Good evening' + nameStr;
}

/* ========================================
   Intentions
   ======================================== */
function getWeekIntention(dateStr) {
  const monday = getWeekMonday(dateStr);
  return state.intentions[monday] || '';
}

function saveIntention(text) {
  const monday = getWeekMonday(todayStr());
  state.intentions[monday] = text;
  saveState();
}

function renderIntentionScreen(panel) {
  const today = todayStr();
  panel.innerHTML = `
    <div class="intention-screen">
      <div class="log-greeting">${getGreeting()}</div>
      <div class="date-header">
        <span class="date-today">${formatDateDisplay(today)}</span>
        <span class="date-label" style="margin-top:var(--space-sm)">Start of week</span>
      </div>
      <div class="form-group">
        <label class="form-label">What do you want this week to be about?</label>
        <textarea class="form-textarea lg" id="intentionText" placeholder="Set a direction for the week ahead..."></textarea>
      </div>
      <button class="btn-primary" onclick="submitIntention()">Set intention</button>
      <button class="btn-ghost" onclick="skipIntention()">Skip for now</button>
    </div>
  `;
}

async function submitIntention() {
  const text = document.getElementById('intentionText')?.value.trim();
  if (!text) { logMode = 'form'; renderLogTab(); return; }

  // Save raw immediately, then refine
  saveIntention(text);
  logMode = 'form';
  renderLogTab();

  if (state.settings.baseUrl) {
    try {
      const refined = await callClaude(
        'You sharpen a rambling weekly intention into a tight checklist. Ruthlessly compress — each item should be a punchy verb phrase (3-8 words). Merge overlapping ideas. Drop filler. Rewrite freely; do not preserve the original wording. Output each item on its own line prefixed with "- [ ] ". Nothing else.',
        `Distill into a checklist:\n"${text}"`,
        300
      );
      const clean = refined.trim().replace(/^["']|["']$/g, '').replace(/\.$/, '');
      if (clean) saveIntention(clean);
      renderLogTab();
    } catch (_) { /* keep the raw text */ }
  }
}

function skipIntention() {
  logMode = 'form';
  renderLogTab();
}

function getIntentionLines(text) {
  return text.split('\n').filter(l => l.trim()).map(line => ({
    text: line.replace(/^-\s*\[[ x]\]\s*/, '').replace(/^-\s*/, ''),
    checked: /^-\s*\[x\]/i.test(line)
  }));
}

function formatIntentionChecklist(text) {
  const lines = getIntentionLines(text);
  // Count unchecked items to determine top-3 priority
  let uncheckedSeen = 0;
  return lines.map((item, i) => {
    const isPriority = !item.checked && uncheckedSeen < 3;
    if (!item.checked) uncheckedSeen++;
    const classes = ['intention-check-item', item.checked ? 'done' : '', isPriority ? 'priority' : ''].filter(Boolean).join(' ');
    return `<div class="${classes}" draggable="true" data-idx="${i}"><span class="drag-handle">⠿</span><input type="checkbox" ${item.checked ? 'checked' : ''} data-idx="${i}" onchange="toggleIntentionItem(this)"><span>${escapeHtml(item.text)}</span></div>`;
  }).join('');
}

function appendToWorkDone(text) {
  const textarea = document.getElementById('workDone');
  if (!textarea) return;
  const current = textarea.value.trim();
  const line = `- ${text}`;
  if (current.includes(line)) return;
  textarea.value = current ? `${current}\n${line}` : line;
  saveDraft();
}

function removeFromWorkDone(text) {
  const textarea = document.getElementById('workDone');
  if (!textarea) return;
  const line = `- ${text}`;
  textarea.value = textarea.value.split('\n').filter(l => l.trim() !== line).join('\n');
  saveDraft();
}

function toggleIntentionItem(checkbox) {
  const monday = getWeekMonday(todayStr());
  const intention = state.intentions[monday];
  if (!intention) return;
  const idx = parseInt(checkbox.dataset.idx);
  const lines = intention.split('\n').filter(l => l.trim());
  if (idx < 0 || idx >= lines.length) return;
  const clean = lines[idx].replace(/^-\s*\[[ x]\]\s*/, '').replace(/^-\s*/, '');
  lines[idx] = `- [${checkbox.checked ? 'x' : ' '}] ${clean}`;
  state.intentions[monday] = lines.join('\n');
  saveState();
  // Update visual state without full re-render
  const label = checkbox.closest('.intention-check-item');
  if (label) label.classList.toggle('done', checkbox.checked);
  // Auto-log to work done
  if (checkbox.checked) appendToWorkDone(clean);
  else removeFromWorkDone(clean);
}

function initIntentionDragDrop() {
  const container = document.querySelector('.intention-checklist');
  if (!container) return;
  let dragIdx = null;

  container.addEventListener('dragstart', (e) => {
    const item = e.target.closest('.intention-check-item');
    if (!item) return;
    dragIdx = parseInt(item.dataset.idx);
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });

  container.addEventListener('dragend', (e) => {
    const item = e.target.closest('.intention-check-item');
    if (item) item.classList.remove('dragging');
    container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragIdx = null;
  });

  container.addEventListener('dragover', (e) => {
    e.preventDefault();
    const item = e.target.closest('.intention-check-item');
    if (!item || parseInt(item.dataset.idx) === dragIdx) return;
    container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    item.classList.add('drag-over');
  });

  container.addEventListener('dragleave', (e) => {
    const item = e.target.closest('.intention-check-item');
    if (item) item.classList.remove('drag-over');
  });

  container.addEventListener('drop', (e) => {
    e.preventDefault();
    const target = e.target.closest('.intention-check-item');
    if (!target || dragIdx === null) return;
    const dropIdx = parseInt(target.dataset.idx);
    if (dropIdx === dragIdx) return;

    const monday = getWeekMonday(todayStr());
    const intention = state.intentions[monday];
    if (!intention) return;
    const lines = intention.split('\n').filter(l => l.trim());
    const moved = lines.splice(dragIdx, 1)[0];
    lines.splice(dropIdx, 0, moved);
    state.intentions[monday] = lines.join('\n');
    saveState();
    renderLogTab();
  });
}

function parsePlanRowData(planText) {
  if (!planText) return [];
  return planText.split('\n').filter(l => l.trim()).map(line => {
    const clean = line.replace(/^[-•]\s*/, '').replace(/^\d+[.)]\s*/, '').trim();
    const match = clean.match(/^@(\S+)\s+(.+)$/);
    if (match) return { who: match[1], action: match[2] };
    return { who: '', action: clean };
  });
}

function renderPlanRows(planText) {
  const rows = parsePlanRowData(planText);
  if (!rows.length) rows.push({ who: '', action: '' });
  return rows.map((r, i) => renderPlanRowHtml(i, r.who, r.action)).join('');
}

function renderPlanRowHtml(idx, who, action) {
  return `<div class="plan-row" data-row="${idx}">
    <input class="plan-row-who" type="text" placeholder="@who" value="${escapeHtml(who ? (who.startsWith('@') ? who : '@' + who) : '')}" />
    <input class="plan-row-action" type="text" placeholder="Action item..." value="${escapeHtml(action)}" />
    <span class="plan-row-remove" onclick="removePlanRow(this)" title="Remove">&times;</span>
  </div>`;
}

function addPlanRow(focus = true) {
  const container = document.getElementById('planTomorrowRows');
  if (!container) return;
  const idx = container.children.length;
  container.insertAdjacentHTML('beforeend', renderPlanRowHtml(idx, '', ''));
  if (focus) {
    container.lastElementChild.querySelector('.plan-row-who').focus();
  }
}

function autoGrowPlanRows() {
  const container = document.getElementById('planTomorrowRows');
  if (!container) return;
  const rows = container.querySelectorAll('.plan-row');
  if (!rows.length) return;
  const lastRow = rows[rows.length - 1];
  const action = lastRow.querySelector('.plan-row-action').value.trim();
  if (action) addPlanRow(false);
}

function removePlanRow(el) {
  const row = el.closest('.plan-row');
  const container = document.getElementById('planTomorrowRows');
  if (container && container.children.length > 1) {
    row.remove();
  } else {
    // Last row — just clear it
    row.querySelector('.plan-row-who').value = '';
    row.querySelector('.plan-row-action').value = '';
  }
}

function collectPlanTomorrow() {
  const container = document.getElementById('planTomorrowRows');
  if (!container) return '';
  return [...container.querySelectorAll('.plan-row')].map(row => {
    const who = row.querySelector('.plan-row-who').value.trim();
    const action = row.querySelector('.plan-row-action').value.trim();
    if (!action) return '';
    return who ? `- ${who} ${action}` : `- ${action}`;
  }).filter(Boolean).join('\n');
}

function getPlanItems(planText) {
  return planText.split('\n').filter(l => l.trim())
    .map(l => l.replace(/^[-•]\s*/, '').replace(/^\d+[.)]\s*/, '').replace(/^-\s*\[[ x]\]\s*/i, '').trim())
    .filter(Boolean);
}

function getDayOrder(itemCount) {
  const today = todayStr();
  const order = state.dayPriorities[today];
  // Validate: must be an array of correct length with all indices present
  if (Array.isArray(order) && order.length === itemCount && [...order].sort((a,b)=>a-b).every((v,i)=>v===i)) {
    return order;
  }
  return null; // no custom order yet
}

function saveDayOrder(order) {
  const today = todayStr();
  state.dayPriorities[today] = order;
  saveState();
}

function resetDayOrder() {
  const today = todayStr();
  delete state.dayPriorities[today];
  saveState();
  renderLogTab();
}

function togglePlanCheck(checkbox) {
  const today = todayStr();
  if (!state.dayPlanChecked[today]) state.dayPlanChecked[today] = [];
  const idx = parseInt(checkbox.dataset.idx);
  const arr = state.dayPlanChecked[today];
  const pos = arr.indexOf(idx);
  if (checkbox.checked && pos < 0) arr.push(idx);
  if (!checkbox.checked && pos >= 0) arr.splice(pos, 1);
  saveState();
  const item = checkbox.closest('.plan-check-item');
  if (item) item.classList.toggle('done', checkbox.checked);
  // Auto-log to work done
  const wrapper = document.getElementById('planReminderWrapper');
  if (wrapper) {
    const items = JSON.parse(wrapper.dataset.items || '[]');
    const text = items[idx] || '';
    if (checkbox.checked) appendToWorkDone(text);
    else removeFromWorkDone(text);
  }
}

function formatPlanItemText(text) {
  // Add " - " between @someone and the action
  const match = text.match(/^(@\S+)\s+(.+)$/);
  if (match) return `<strong>${escapeHtml(match[1])}</strong> — ${escapeHtml(match[2])}`;
  return escapeHtml(text);
}

function renderPlanChecklistInner(items) {
  const today = todayStr();
  const checked = state.dayPlanChecked[today] || [];
  const order = getDayOrder(items.length);
  const indices = order || items.map((_, i) => i);
  return indices.map((origIdx, rank) => {
    const text = items[origIdx];
    const isChecked = checked.includes(origIdx);
    const classes = ['plan-check-item', rank < 3 ? 'priority' : '', isChecked ? 'done' : ''].filter(Boolean).join(' ');
    return `<div class="${classes}" draggable="true" data-rank="${rank}">
      <span class="drag-handle">⠿</span>
      <input type="checkbox" ${isChecked ? 'checked' : ''} data-idx="${origIdx}" onchange="togglePlanCheck(this)">
      <span>${formatPlanItemText(text)}</span>
    </div>`;
  }).join('');
}

function initPlanDragDrop() {
  const container = document.querySelector('#planReminderWrapper .plan-checklist');
  if (!container) return;
  let dragIdx = null;

  container.addEventListener('dragstart', (e) => {
    const item = e.target.closest('.plan-check-item');
    if (!item) return;
    dragIdx = parseInt(item.dataset.rank);
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });

  container.addEventListener('dragend', (e) => {
    const item = e.target.closest('.plan-check-item');
    if (item) item.classList.remove('dragging');
    container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragIdx = null;
  });

  container.addEventListener('dragover', (e) => {
    e.preventDefault();
    const item = e.target.closest('.plan-check-item');
    if (!item || parseInt(item.dataset.rank) === dragIdx) return;
    container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    item.classList.add('drag-over');
  });

  container.addEventListener('dragleave', (e) => {
    const item = e.target.closest('.plan-check-item');
    if (item) item.classList.remove('drag-over');
  });

  container.addEventListener('drop', (e) => {
    e.preventDefault();
    const target = e.target.closest('.plan-check-item');
    if (!target || dragIdx === null) return;
    const dropIdx = parseInt(target.dataset.rank);
    if (dropIdx === dragIdx) return;

    const items = JSON.parse(document.getElementById('planReminderWrapper').dataset.items || '[]');
    const currentOrder = getDayOrder(items.length) || items.map((_, i) => i);
    const moved = currentOrder.splice(dragIdx, 1)[0];
    currentOrder.splice(dropIdx, 0, moved);
    saveDayOrder(currentOrder);

    container.innerHTML = renderPlanChecklistInner(items);
    // Re-init isn't needed since we're using event delegation on the container
  });
}

function renderPlanReminderInner(items, includeVisibTask = false) {
  const vTask = includeVisibTask ? getTodayVisibilityTask() : null;
  const vHtml = vTask ? `<div class="plan-check-item${vTask.done ? ' done' : ''}">
    <span class="drag-handle">⠿</span>
    <input type="checkbox" ${vTask.done ? 'checked' : ''} onchange="this.checked=${vTask.done};visibView='log';visibLogType='';visibLogSubtype='';switchTab('visibility')">
    <span><a href="#" onclick="event.preventDefault();visibView='log';visibLogType='';visibLogSubtype='';switchTab('visibility')" style="color:var(--accent-coaching);text-decoration:none;font-weight:500">${escapeHtml(vTask.label)}</a></span>
  </div>` : '';
  return `<div class="plan-checklist">
    ${renderPlanChecklistInner(items)}${vHtml}
  </div>`;
}

function getPlanLabelCta(items) {
  const order = getDayOrder(items.length);
  return order
    ? '<span class="reminder-cta" onclick="resetDayOrder()">Reset order</span>'
    : '';
}

function getTodayVisibilityTask() {
  const dow = new Date(todayStr() + 'T12:00:00').getDay(); // 0=Sun..6=Sat
  if (dow < 1 || dow > 5) return null;
  const rhythm = WEEKLY_RHYTHM[dow - 1];
  if (!rhythm) return null;
  // Check if already logged today
  const alreadyDone = state.visibilityActivities.some(a => a.date === todayStr());
  return { label: rhythm.label, done: alreadyDone };
}

function renderPlanReminder(planText, includeVisibTask = false) {
  const items = getPlanItems(planText);
  if (!items.length) return '';
  return `<div id="planReminderWrapper" data-items='${JSON.stringify(items).replace(/'/g, "&#39;")}'>
    ${renderPlanReminderInner(items, includeVisibTask)}
  </div>`;
}

function renderCoachingRecap() {
  const recent = getRecentEntries(5);
  const withNotes = recent.filter(e => e.aiReflection);
  if (!withNotes.length) return '';

  const bullets = withNotes.map(entry => {
    // Extract action items (lines starting with - or •), or first sentence as fallback
    const lines = entry.aiReflection.split('\n').filter(l => l.trim());
    const actionLines = lines.filter(l => /^\s*[-•]/.test(l));
    const summary = actionLines.length
      ? actionLines[0].replace(/^\s*[-•]\s*/, '').trim()
      : lines[0]?.substring(0, 120).trim() || '';
    if (!summary) return '';
    const d = new Date(entry.date + 'T12:00:00');
    const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short' }) + ' ' + (d.getMonth() + 1) + '/' + d.getDate();
    return `<li><span>${escapeHtml(summary)}</span><a class="coaching-recap-link" href="#" onclick="event.preventDefault();editEntryById(${entry.id});setTimeout(()=>{const r=document.querySelector('.history-reflection');if(r)r.scrollIntoView({behavior:'smooth'})},100)">${dateLabel}</a></li>`;
  }).filter(Boolean);

  if (!bullets.length) return '';

  return `<div class="coaching-recap">
    <div class="reminder-col-label">Recent coaching notes</div>
    <ul>${bullets.join('')}</ul>
  </div>`;
}

function renderReminders(weekIntention, previousPlan) {
  const hasPlan = previousPlan && previousPlan.trim();
  const hasIntention = !!weekIntention;

  const intentionEditBlock = weekIntention ? `
    <div class="intention-edit" id="intentionEditBlock" style="display:none">
      <textarea class="form-textarea" id="intentionEditText" rows="5">${escapeHtml(weekIntention)}</textarea>
      <div class="intention-edit-actions">
        <button class="btn-positive" onclick="saveIntentionEdit()">Save</button>
        <button class="btn-dismiss" onclick="cancelIntentionEdit()">Cancel</button>
      </div>
    </div>` : '';

  const planItems = hasPlan ? getPlanItems(previousPlan) : [];

  if (hasPlan && hasIntention) {
    const isChecklist = weekIntention.includes('- [');
    const intentionDisplay = isChecklist
      ? `<div class="intention-checklist">${formatIntentionChecklist(weekIntention)}</div>`
      : `<div onclick="openIntentionEdit()" style="cursor:pointer">${escapeHtml(weekIntention)}</div>`;
    const coachingRecap = renderCoachingRecap();
    return `<div class="reminders-row">
        <div>
          <div class="reminder-col-label">Yesterday's plan ${getPlanLabelCta(planItems)}</div>
          ${renderPlanReminder(previousPlan, true)}
        </div>
        <div>
          <div class="reminder-col-label">Weekly intention <span class="reminder-cta" onclick="openIntentionEdit()">Edit</span></div>
          ${intentionDisplay}
        </div>
      </div>
      ${coachingRecap}
      ${intentionEditBlock}`;
  }

  const coachingRecap = renderCoachingRecap();

  if (hasIntention) {
    return renderIntentionReminder(weekIntention) + coachingRecap;
  }

  if (hasPlan) {
    return `<div class="intention-reminder">
        <div class="reminder-col-label">Yesterday's plan ${getPlanLabelCta(planItems)}</div>
        ${renderPlanReminder(previousPlan, true)}
      </div>
      ${coachingRecap}
      <div style="margin-bottom:var(--space-xl)"><button class="btn-ghost" onclick="logMode='intention';renderLogTab()">+ Set weekly intention</button></div>`;
  }

  return coachingRecap + '<div style="margin-bottom:var(--space-xl)"><button class="btn-ghost" onclick="logMode=\'intention\';renderLogTab()">+ Set weekly intention</button></div>';
}

function renderIntentionReminder(intention) {
  const isChecklist = intention.includes('- [');
  const display = isChecklist
    ? `<div class="intention-checklist">${formatIntentionChecklist(intention, false)}</div>`
    : `<div onclick="openIntentionEdit()" style="cursor:pointer">${escapeHtml(intention)}</div>`;
  return `<div class="intention-reminder">
      <div class="reminder-col-label">Weekly intention <span class="reminder-cta" onclick="openIntentionEdit()">Edit</span></div>
      ${display}
    </div>
    <div class="intention-edit" id="intentionEditBlock" style="display:none">
      <textarea class="form-textarea" id="intentionEditText" rows="5">${escapeHtml(intention)}</textarea>
      <div class="intention-edit-actions">
        <button class="btn-positive" onclick="saveIntentionEdit()">Save</button>
        <button class="btn-dismiss" onclick="cancelIntentionEdit()">Cancel</button>
      </div>
    </div>`;
}

function openIntentionEdit() {
  const reminder = document.querySelector('.intention-reminder');
  const remindersRow = document.querySelector('.reminders-row');
  const coachingRecap = document.querySelector('.coaching-recap');
  const editBlock = document.getElementById('intentionEditBlock');
  if (reminder) reminder.style.display = 'none';
  if (remindersRow) remindersRow.style.display = 'none';
  if (coachingRecap) coachingRecap.style.display = 'none';
  if (editBlock) editBlock.style.display = 'block';
}

async function saveIntentionEdit() {
  const text = document.getElementById('intentionEditText')?.value.trim();
  if (!text) { cancelIntentionEdit(); return; }

  saveIntention(text);
  showToast('Intention updated');
  renderLogTab();

  if (state.settings.baseUrl) {
    try {
      const refined = await callClaude(
        'You sharpen a rambling weekly intention into a tight checklist. Ruthlessly compress — each item should be a punchy verb phrase (3-8 words). Merge overlapping ideas. Drop filler. Rewrite freely; do not preserve the original wording. Output each item on its own line prefixed with "- [ ] ". Nothing else.',
        `Distill into a checklist:\n"${text}"`,
        300
      );
      const clean = refined.trim().replace(/^["']|["']$/g, '').replace(/\.$/, '');
      if (clean) saveIntention(clean);
      renderLogTab();
    } catch (_) { /* keep the raw text */ }
  }
}

function cancelIntentionEdit() {
  const reminder = document.querySelector('.intention-reminder');
  const remindersRow = document.querySelector('.reminders-row');
  const coachingRecap = document.querySelector('.coaching-recap');
  const editBlock = document.getElementById('intentionEditBlock');
  if (reminder) reminder.style.display = '';
  if (remindersRow) remindersRow.style.display = '';
  if (coachingRecap) coachingRecap.style.display = '';
  if (editBlock) editBlock.style.display = 'none';
}

/* ========================================
   Log Tab
   ======================================== */
function renderLogTab() {
  const panel = document.getElementById('panel-log');
  const today = todayStr();
  const existingEntry = getEntryForDate(today);

  if (logMode === 'intention') {
    renderIntentionScreen(panel);
    return;
  }

  if (existingEntry && logMode === 'submitted') {
    renderPostSubmit(panel, existingEntry);
    return;
  }

  if (logMode === 'editing' && editingEntryId) {
    const editEntry = state.entries.find(e => e.id === editingEntryId);
    if (editEntry) {
      renderEditForm(panel, editEntry);
      return;
    }
  }

  logMode = 'form';
  const draft = loadDraft();
  const weekIntention = getWeekIntention(today);
  const dayName = getDayName(today);

  const fri = isFriday(today);
  const monday = getWeekMonday(today);

  const streak = getStreak();

          <label class="form-label">Mood</label>
          <div class="mood-picker" id="moodPicker">
            ${['😊', '😐', '😤', '🔥', '😴', '😰'].map(m =>
              `<button type="button" class="mood-btn${(existingEntry?.mood || draft?.mood) === m ? ' selected' : ''}" data-mood="${m}">${m}</button>`

          </div>
        </div>

      </div>

      <div class="form-group">
        <label class="form-label">Reflection</label>
        <textarea class="form-textarea" id="reflection" placeholder="How did today feel? Anything on your mind...">${existingEntry?.reflection || draft?.reflection || ''}</textarea>
      </div>

      ${fri ? `<div class="form-group">
        <label class="form-label">Weekly retrospective</label>
        <textarea class="form-textarea" id="weeklyRetro" placeholder="How did this week go? What did you learn?">${existingEntry?.weeklyRetro || draft?.weeklyRetro || ''}</textarea>
