/* ---- Meetings Insights ---- */

function getPeriodRange(period) {
  const now = new Date();
  const todayStr = now.toISOString().slice(0, 10);
  if (period === 'today') {
    return { start: new Date(todayStr + 'T00:00:00'), end: new Date(todayStr + 'T23:59:59') };
  }
  if (period === 'week') {
    const d = new Date(now);
    d.setDate(d.getDate() - ((d.getDay() + 6) % 7)); // Monday
    return { start: new Date(d.toISOString().slice(0, 10) + 'T00:00:00'), end: now };
  }
  if (period === 'month') {
    return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: now };
  }
  if (period === 'quarter') {
    const qMonth = Math.floor(now.getMonth() / 3) * 3;
    return { start: new Date(now.getFullYear(), qMonth, 1), end: now };
  }
  if (period === 'year') {
    return { start: new Date(now.getFullYear(), 0, 1), end: now };
  }
  return null; // 'all'
}

function getPreviousPeriodRange(period) {
  const cur = getPeriodRange(period);
  if (!cur) return null;
  const len = cur.end.getTime() - cur.start.getTime();
  return { start: new Date(cur.start.getTime() - len), end: new Date(cur.start.getTime() - 1) };
}

function filterMeetingsByRange(range) {
  if (!range) return state.meetings;
  return state.meetings.filter(m => {
    if (!m.date) return false;
    const d = new Date(m.date);
    return d >= range.start && d <= range.end;
  });
}

function getFilteredMeetings() {
  return filterMeetingsByRange(getPeriodRange(meetingsInsightsPeriod));
}

function getMeetingDateBuckets(meetings) {
  const granularity = (meetingsInsightsPeriod === 'today' || meetingsInsightsPeriod === 'week' || meetingsInsightsPeriod === 'month') ? 'day'
    : meetingsInsightsPeriod === 'quarter' ? 'week' : 'month';
  const buckets = {};
  meetings.forEach(m => {
    if (!m.date) return;
    const d = new Date(m.date);
    let key;
    if (granularity === 'day') key = m.date.substring(0, 10);
    else if (granularity === 'week') {
      const mon = new Date(d);
      mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
      key = mon.toISOString().slice(0, 10);
    } else {
      key = d.toISOString().slice(0, 7);
    }
    if (!buckets[key]) buckets[key] = { count: 0, totalDuration: 0 };
    buckets[key].count++;
    buckets[key].totalDuration += meetingDuration(m);
  });
  return { granularity, buckets };
}

function buildInsightsPeriodFilter(hidden) {
  const periods = [
    { id: 'today', label: 'Today' },
    { id: 'week', label: 'This Week' },
    { id: 'month', label: 'This Month' },
    { id: 'quarter', label: 'This Quarter' },
    { id: 'year', label: 'This Year' },
    { id: 'all', label: 'All' }
  ];
  return `<div class="mi-period-filter" style="margin-bottom:0${hidden ? ';visibility:hidden' : ''}">${periods.map(p =>
    `<button class="mi-period-btn${meetingsInsightsPeriod === p.id ? ' active' : ''}" onclick="meetingsInsightsPeriod='${p.id}';renderMeetings()">${p.label}</button>`
  ).join('')}</div>`;
}

function meetingDuration(m) { return parseInt(m.duration, 10) || 0; }

function computeParticipation(m) {
  if (!m.transcript || !state.settings.name) return null;
  const userName = state.settings.name.trim().toLowerCase();
  if (!userName) return null;
  // Match lines like: "[00:02:15] Speaker Name: text" or "00:02:15 Speaker Name: text" or "Speaker Name 00:02:15: text"
  const lineRegex = /^(?:\[?(\d{1,2}:\d{2}(?::\d{2})?)\]?\s+(.+?):\s|^(.+?)\s+\[?(\d{1,2}:\d{2}(?::\d{2})?)\]?:\s)/;
  const lines = m.transcript.split('\n');
  const segments = [];
  for (const line of lines) {
    const match = line.match(lineRegex);
    if (!match) continue;
    const timeStr = match[1] || match[4];
    const speaker = (match[2] || match[3] || '').trim();
    const parts = timeStr.split(':').map(Number);
    const secs = parts.length === 3 ? parts[0] * 3600 + parts[1] * 60 + parts[2] : parts[0] * 60 + parts[1];
    segments.push({ secs, speaker: speaker.toLowerCase() });
  }
  if (segments.length < 2) return null;
  // Merge consecutive segments by same speaker, accumulate time by speaker
  const speakerTime = {};
  const meetDur = meetingDuration(m);
  const lastStart = segments[segments.length - 1].secs;
  const avgGap = (lastStart - segments[0].secs) / (segments.length - 1);
  const lastDur = meetDur > lastStart ? meetDur - lastStart : Math.round(avgGap);

  // Count lines per speaker for zero-duration fallback
  const speakerLines = {};
  let totalTime = 0;
  for (let i = 0; i < segments.length; i++) {
    const sp = segments[i].speaker;
    speakerLines[sp] = (speakerLines[sp] || 0) + 1;
    const dur = (i < segments.length - 1) ? segments[i + 1].secs - segments[i].secs : lastDur;
    if (dur > 0) {
      speakerTime[sp] = (speakerTime[sp] || 0) + dur;
      totalTime += dur;
    }
  }
  // If a speaker has lines but 0 time (all zero-gap), give them a proportional share based on line count
  const allSpeakers = Object.keys(speakerLines);
  const zeroTimeSpeakers = allSpeakers.filter(sp => !speakerTime[sp] || speakerTime[sp] === 0);
  if (zeroTimeSpeakers.length > 0 && totalTime > 0) {
    const totalLines = Object.values(speakerLines).reduce((a, b) => a + b, 0);
    for (const sp of zeroTimeSpeakers) {
      const share = (speakerLines[sp] / totalLines) * totalTime * 0.1; // small share
      speakerTime[sp] = share;
      totalTime += share;
    }
  }

  if (totalTime <= 0) return null;
  // Find user's time — match first name, full name, or partial
  const userParts = userName.split(/\s+/);
  let userTime = 0;
  for (const [sp, time] of Object.entries(speakerTime)) {
    if (sp === userName || userParts.some(p => p.length > 1 && sp === p) || sp.includes(userName) || userName.includes(sp)) {
      userTime += time;
    }
  }
  console.log('Participation debug:', m.title, { speakerTime, speakerLines, totalTime, userTime, userName, pct: Math.round(userTime / totalTime * 100) });
  return { pct: Math.round(userTime / totalTime * 100), speakingTime: Math.round(userTime) };
}

function computePeriodStats(meetings) {
  const total = meetings.length;
  const totalSec = meetings.reduce((s, m) => s + meetingDuration(m), 0);
  const totalHours = totalSec / 3600;
  const avgMin = total > 0 ? Math.round(totalSec / total / 60) : 0;
  let pctSum = 0, pctCount = 0, speakingTotal = 0;
  meetings.forEach(m => {
    const p = computeParticipation(m);
    if (p) { pctSum += p.pct; pctCount++; speakingTotal += p.speakingTime; }
  });
  const avgParticipation = pctCount > 0 ? Math.round(pctSum / pctCount) : null;
  const speakingHours = speakingTotal / 3600;
  return { total, totalHours, avgMin, avgParticipation, speakingHours };
}

function formatDelta(current, previous, unit) {
  if (previous === null || previous === undefined) return '';
  const diff = current - previous;
  if (diff === 0) return `<span class="mi-delta mi-delta-flat">—</span>`;
  const sign = diff > 0 ? '+' : '';
  const cls = diff > 0 ? 'mi-delta-up' : 'mi-delta-down';
  const val = unit === 'h' ? (diff > 0 ? '+' : '') + diff.toFixed(1) : sign + Math.round(diff);
  return `<span class="mi-delta ${cls}">${val}</span>`;
}

function buildInsightsSummaryStats(meetings) {
  const cur = computePeriodStats(meetings);
  const prevRange = getPreviousPeriodRange(meetingsInsightsPeriod);
  const prev = prevRange ? computePeriodStats(filterMeetingsByRange(prevRange)) : null;

  const deltaTotal = prev ? formatDelta(cur.total, prev.total, '') : '';
  const deltaHours = prev ? formatDelta(cur.totalHours, prev.totalHours, 'h') : '';
  const deltaAvg = prev ? formatDelta(cur.avgMin, prev.avgMin, '') : '';

  const prevLabel = meetingsInsightsPeriod === 'today' ? 'vs yesterday' :
                    meetingsInsightsPeriod === 'week' ? 'vs last week' :
                    meetingsInsightsPeriod === 'month' ? 'vs last month' :
                    meetingsInsightsPeriod === 'quarter' ? 'vs last quarter' :
                    meetingsInsightsPeriod === 'year' ? 'vs last year' : '';

  const deltaParticipation = prev && cur.avgParticipation !== null && prev.avgParticipation !== null ? formatDelta(cur.avgParticipation, prev.avgParticipation, '') : '';
  const deltaSpeaking = prev ? formatDelta(cur.speakingHours, prev.speakingHours, 'h') : '';

  return `<div class="mi-stats-row">
    <div class="mi-stat"><strong>${cur.total}</strong>meetings ${deltaTotal}</div>
    <div class="mi-stat"><strong>${cur.totalHours.toFixed(1)}</strong>hours ${deltaHours}</div>
    <div class="mi-stat"><strong>${cur.avgMin}</strong>avg min ${deltaAvg}</div>
    ${cur.avgParticipation !== null ? `<div class="mi-stat"><strong>${cur.avgParticipation}%</strong>avg participation ${deltaParticipation}</div>` : ''}
    ${cur.speakingHours > 0 ? `<div class="mi-stat"><strong>${cur.speakingHours.toFixed(1)}</strong>h speaking ${deltaSpeaking}</div>` : ''}
  </div>
  ${prevLabel ? `<div class="mi-comparison-label">${prevLabel}</div>` : ''}`;
}

function buildMeetingTypeBreakdown(meetings) {
  const counts = {};
  meetings.forEach(m => { const t = m.type || 'other'; counts[t] = (counts[t] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const max = sorted.length > 0 ? sorted[0][1] : 1;
  return `<div class="mi-section">
    <div class="mi-section-label">Type Breakdown</div>
    ${sorted.map(([typeId, count]) => {
      const info = MEETING_TYPES[typeId] || MEETING_TYPES['other'];
      const pct = (count / max * 100).toFixed(1);
      return `<div class="mi-type-row">
        <div class="mi-type-label">${escapeHtml(info.label)}</div>
        <div class="mi-type-track"><div class="mi-type-fill" style="width:${pct}%;background:${info.color.text}"></div></div>
        <div class="mi-type-count">${count}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function buildParticipationInsights(meetings) {
  const contextLabels = {
    '1:1':             ['Mostly listening', 'Balanced dialogue', 'Driving the conversation'],
    'design-review':   ['Observing', 'Contributing', 'Presenting / leading'],
    'team-standup':    ['Minimal updates', 'Normal share', 'Dominating standup'],
    'cross-functional':['Listening in', 'Active contributor', 'Driving alignment'],
    'strategic':       ['Absorbing context', 'Engaged participant', 'Key voice'],
    'brainstorm':      ['Quiet observer', 'Active ideator', 'Leading ideation'],
    'user-research':   ['Good listening ratio', 'Balanced facilitation', 'Over-talking (flag)'],
    'hawkins':         ['Listening', 'Contributing', 'Leading discussion'],
    'other':           ['Low participation', 'Moderate', 'High participation']
  };

  // Group participation data by type
  const byType = {};
  meetings.forEach(m => {
    const p = computeParticipation(m);
    if (!p) return;
    const t = m.type || 'other';
    if (!byType[t]) byType[t] = [];
    byType[t].push(p.pct);
  });

  const types = Object.entries(byType).sort((a, b) => {
    const avgA = a[1].reduce((s, v) => s + v, 0) / a[1].length;
    const avgB = b[1].reduce((s, v) => s + v, 0) / b[1].length;
    return avgB - avgA;
  });

  if (types.length === 0) return '';

  const rows = types.map(([typeId, pcts]) => {
    const avg = Math.round(pcts.reduce((s, v) => s + v, 0) / pcts.length);
    const info = MEETING_TYPES[typeId] || MEETING_TYPES['other'];
    const labels = contextLabels[typeId] || contextLabels['other'];
    const tier = avg < 25 ? 0 : avg <= 50 ? 1 : 2;
    const label = labels[tier];
    const isWarning = typeId === 'user-research' && tier === 2;
    return `<div class="mi-participation-row">
      <div class="mi-participation-label" style="color:${info.color.text}">${escapeHtml(info.label)}</div>
      <div class="mi-participation-track"><div class="mi-participation-fill" style="width:${avg}%;background:${isWarning ? '#c53030' : info.color.text}"></div></div>
      <div class="mi-participation-pct">${avg}%</div>
      <div class="mi-participation-context${isWarning ? ' warning' : ''}">${escapeHtml(label)}</div>
    </div>`;
  }).join('');

  return `<div class="mi-section">
    <div class="mi-section-label">Participation by Meeting Type</div>
    ${rows}
  </div>`;
}

function buildMeetingsBarChart(bucketData, yLabel, chartId) {
  const entries = Object.entries(bucketData).sort((a, b) => a[0].localeCompare(b[0]));
  if (entries.length < 1) return `<div style="color:var(--text-muted);font-size:13px;padding:var(--space-md) 0">Not enough data for chart</div>`;

  const values = entries.map(e => e[1]);
  const maxVal = Math.max(...values) || 1;
  const padTop = 24, padBottom = 32, padLeft = 32, padRight = 16;
  const h = 160, w = 800;
  const chartW = w - padLeft - padRight;
  const chartH = h - padTop - padBottom;
  const barGap = Math.max(2, Math.min(6, chartW / entries.length * 0.15));
  const barW = (chartW - barGap * (entries.length - 1)) / entries.length;

  const yLabels = [Math.ceil(maxVal / 2), Math.ceil(maxVal)].map(v => {
    const y = padTop + chartH - (v / maxVal) * chartH;
    return `<text x="${padLeft - 8}" y="${y + 4}" text-anchor="end" fill="var(--text-muted)" font-size="12" font-weight="500" font-family="var(--font-family)">${v}</text>
      <line x1="${padLeft}" y1="${y}" x2="${w - padRight}" y2="${y}" stroke="var(--text-muted)" stroke-width="0.75" stroke-dasharray="4 2"/>`;
  }).join('');

  const xStep = Math.max(1, Math.floor(entries.length / 8));
  const bars = entries.map(([label, val], i) => {
    const x = padLeft + i * (barW + barGap);
    const barH = (val / maxVal) * chartH;
    const y = padTop + chartH - barH;
    const r = Math.min(3, barW / 2);
    return `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="${r}" ry="${r}" fill="var(--accent-600)" opacity="0.8" class="mi-bar" data-label="${label}" data-val="${val}"/>
     <rect x="${x}" y="${padTop}" width="${barW}" height="${chartH}" fill="transparent" class="mi-bar-hit" data-label="${label}" data-val="${val}"/>`;
  }).join('');

  const xLabels = entries.filter((_, i) => i % xStep === 0 || i === entries.length - 1).map(([label], i) => {
    const idx = entries.findIndex(e => e[0] === label);
    const x = padLeft + idx * (barW + barGap) + barW / 2;
    let display = label;
    if (label.length >= 10) {
      const d = new Date(label.substring(0, 10) + 'T12:00:00');
      display = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    } else if (label.length === 7) {
      const d = new Date(label + '-01T12:00:00');
      display = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
    }
    return `<text x="${x}" y="${h - 8}" text-anchor="middle" fill="var(--text-muted)" font-size="12" font-weight="500" font-family="var(--font-family)">${display}</text>`;
  }).join('');

  return `<div class="line-chart-wrap" id="${chartId}">
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" width="100%">
      ${yLabels}
      <line x1="${padLeft}" y1="${padTop + chartH}" x2="${w - padRight}" y2="${padTop + chartH}" stroke="var(--text-muted)" stroke-width="0.75"/>
      ${bars}
      ${xLabels}
    </svg>
    <div class="line-chart-tooltip"></div>
  </div>`;
}

function buildMeetingLoadChart(bucketInfo) {
  const data = {};
  Object.entries(bucketInfo.buckets).forEach(([k, v]) => { data[k] = v.count; });
  return `<div class="mi-section">

function buildMeetingDurationChart(bucketInfo) {

  return `<div class="mi-section">

    ${buildMeetingsBarChart(data, 'Hours', 'miDurationChart')}

}

function computeMoodEnergyCorrelation(meetings) {
  const moodScores = { '😊': 5, '🔥': 4, '😐': 3, '😤': 2, '😰': 1, '😴': 1 };
  // Sum meeting hours per date
  const hoursByDate = {};
  meetings.forEach(m => {
    const d = m.date ? meetingDateStr(m) : '';
    if (d) hoursByDate[d] = (hoursByDate[d] || 0) + meetingDuration(m) / 3600;
  });
  // Filter entries to same period as meetings
  const range = getPeriodRange(meetingsInsightsPeriod);
  const periodEntries = range ? state.entries.filter(e => {
    if (!e.date) return false;
    const d = new Date(e.date + 'T12:00:00');
    return d >= range.start && d <= range.end;
  }) : state.entries;
  // Group journal entries by light (<1h) vs heavy (>2h)
  const groups = { light: { energy: [], mood: [] }, heavy: { energy: [], mood: [] } };
  periodEntries.forEach(entry => {
    if (!entry.date) return;
    const hrs = hoursByDate[entry.date] || 0;
    const group = hrs < 1 ? 'light' : hrs > 2 ? 'heavy' : null;
    if (!group) return;
    if (entry.energy) groups[group].energy.push(entry.energy);
    if (entry.mood && moodScores[entry.mood] !== undefined) groups[group].mood.push(moodScores[entry.mood]);
  });
  const avg = arr => arr.length > 0 ? arr.reduce((a, b) => a + b, 0) / arr.length : null;
  return {
    light: { avgEnergy: avg(groups.light.energy), avgMood: avg(groups.light.mood), days: groups.light.energy.length },
    heavy: { avgEnergy: avg(groups.heavy.energy), avgMood: avg(groups.heavy.mood), days: groups.heavy.energy.length }
  };
}

function buildMoodEnergyCorrelation(meetings) {
  const data = computeMoodEnergyCorrelation(meetings);
  if (data.light.days === 0 && data.heavy.days === 0) {
    return `<div class="mi-section">
      <div class="mi-section-label">Mood &amp; Energy Correlation</div>
      <div style="color:var(--text-muted);font-size:13px">No journal entries with matching meeting dates to correlate.</div>
    </div>`;
  }

  function renderCard(title, d, color) {
    const energyPct = d.avgEnergy !== null ? (d.avgEnergy / 10 * 100).toFixed(0) : 0;
    const moodPct = d.avgMood !== null ? (d.avgMood / 5 * 100).toFixed(0) : 0;
    return `<div class="mi-correlation-card">
      <h4>${title}</h4>
      <div class="mi-corr-metric">
        <div class="mi-corr-label">Energy</div>
        <div class="mi-corr-track"><div class="mi-corr-fill" style="width:${energyPct}%;background:${color}"></div></div>
        <div class="mi-corr-value">${d.avgEnergy !== null ? d.avgEnergy.toFixed(1) : '—'}</div>
      </div>
      <div class="mi-corr-metric">
        <div class="mi-corr-label">Mood</div>
        <div class="mi-corr-track"><div class="mi-corr-fill" style="width:${moodPct}%;background:${color}"></div></div>
        <div class="mi-corr-value">${d.avgMood !== null ? d.avgMood.toFixed(1) : '—'}</div>
      </div>
      <div class="mi-corr-sample">(n=${d.days} days)</div>
    </div>`;
  }

  return `<div class="mi-section">
    <div class="mi-section-label">Mood &amp; Energy Correlation</div>
    <div class="mi-correlation-row">
      ${renderCard('Light Days (<1h meetings)', data.light, '#3aa85c')}
      ${renderCard('Heavy Days (>2h meetings)', data.heavy, '#c53030')}
    </div>
  </div>`;
}

function attachMeetingsInsightsListeners() {
  document.querySelectorAll('#panel-meetings .line-chart-wrap').forEach(wrap => {
    const tooltip = wrap.querySelector('.line-chart-tooltip');
    if (!tooltip) return;
    wrap.addEventListener('mouseover', (e) => {
      const hit = e.target.closest('.mi-bar-hit') || e.target.closest('.mi-bar');
      if (!hit) return;
      let label = hit.dataset.label;
      if (label && label.length >= 10) {
        const d = new Date(label.substring(0, 10) + 'T12:00:00');
        label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } else if (label && label.length === 7) {
        const d = new Date(label + '-01T12:00:00');
        label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      }
      tooltip.textContent = label + ': ' + hit.dataset.val;
      tooltip.style.opacity = '1';
    });
    wrap.addEventListener('mouseout', () => { tooltip.style.opacity = '0'; });
    wrap.addEventListener('mousemove', (e) => {
      const rect = wrap.getBoundingClientRect();
      tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (e.clientY - rect.top - 28) + 'px';
    });
  });
}

function meetingMatchesSearch(m, q) {
  if (!q) return true;
  const lower = q.toLowerCase();
  if ((m.title || '').toLowerCase().includes(lower)) return true;
  if ((m.summary || '').toLowerCase().includes(lower)) return true;
  if ((m.participants || '').toLowerCase().includes(lower)) return true;
  if (m.insights) {
    for (const v of Object.values(m.insights)) {
      if (v && typeof v === 'string' && v.toLowerCase().includes(lower)) return true;
    }
  }
  return false;
}

function setMeetingsTypeFilter(type) {
  meetingsTypeFilter = meetingsTypeFilter === type ? null : type;
  renderMeetings();
}

let _meetingsSearchTimer = null;
function onMeetingsSearch(val) {
  meetingsSearchQuery = val;
  clearTimeout(_meetingsSearchTimer);
  _meetingsSearchTimer = setTimeout(() => {
    renderMeetings();
    // Restore focus and cursor to search input
    const input = document.querySelector('.meeting-filter-search');
    if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
  }, 250);
}

function meetingsEntriesHtml() {
  if (state.meetings.length === 0) {
    return `<div style="color:var(--text-muted);text-align:center;padding:var(--space-xl) 0">
      ${state.settings.meetingsGistId ? 'No meetings yet. Click "Fetch Meetings" to sync from your gist.' : 'Configure a Meetings Gist ID in Settings to start syncing meetings.'}
    </div>`;
  }

  // Count types present for chips
  const typeCounts = {};
  state.meetings.forEach(m => {
    const t = m.type || 'other';
    typeCounts[t] = (typeCounts[t] || 0) + 1;
  });

  // Filter chips — only show types that have meetings
  const chipTypes = Object.entries(MEETING_TYPES).filter(([k]) => typeCounts[k]);
  const chipsHtml = chipTypes.map(([k, v]) => {
    const active = meetingsTypeFilter === k;
    const dimmed = meetingsTypeFilter && meetingsTypeFilter !== k;
    return `<span class="meeting-type-chip${active ? ' active' : ''}${dimmed ? ' dimmed' : ''}" style="color:${v.color.text};background:${v.color.bg}" onclick="setMeetingsTypeFilter('${k}')">${escapeHtml(v.label)} (${typeCounts[k]})</span>`;
  }).join('');

  // Filter bar
  const filterBar = `<div style="margin-bottom:var(--space-lg)">
    <input class="meeting-filter-search" type="text" placeholder="Search meetings..." value="${escapeHtml(meetingsSearchQuery)}" oninput="onMeetingsSearch(this.value)">
    <div class="meeting-filter-bar" style="margin-top:var(--space-sm);margin-bottom:0">${chipsHtml}</div>
  </div>`;

  // Apply filters
  let filtered = [...state.meetings];
  if (meetingsTypeFilter) filtered = filtered.filter(m => (m.type || 'other') === meetingsTypeFilter);
  if (meetingsSearchQuery) filtered = filtered.filter(m => meetingMatchesSearch(m, meetingsSearchQuery));

  // Sort newest-first
  filtered.sort((a, b) => {
    const da = meetingDateStr(a) || '';
    const db = meetingDateStr(b) || '';
    return db.localeCompare(da);
  });

  if (filtered.length === 0) {
    return `<div class="settings-section">${filterBar}
      <div style="color:var(--text-muted);text-align:center;padding:var(--space-xl) 0">No meetings match your filters.</div>
    </div>`;
  }

  // Group by week
  const today = todayStr();
  const thisMonday = getWeekMonday(today);
  const lastMonday = (() => { const d = new Date(thisMonday + 'T12:00:00'); d.setDate(d.getDate() - 7); return d.toISOString().split('T')[0]; })();

  const groups = [];
  let currentGroup = null;

  for (const m of filtered) {
    const md = meetingDateStr(m) || '1970-01-01';
    const monday = getWeekMonday(md);

    if (!currentGroup || currentGroup.monday !== monday) {
      let label;
      if (monday === thisMonday) label = 'This Week';
      else if (monday === lastMonday) label = 'Last Week';
      else {
        const fri = getWeekFriday(monday);
        const monDate = new Date(monday + 'T12:00:00');
        const friDate = new Date(fri + 'T12:00:00');
        label = monDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' – ' + friDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }
      currentGroup = { monday, label, meetings: [] };
      groups.push(currentGroup);
    }
    currentGroup.meetings.push(m);
  }

  // Render groups
  let html = '';

  for (const group of groups) {
    html += `<div class="meeting-week-header">${escapeHtml(group.label)} <span style="font-weight:400">(${group.meetings.length})</span></div>`;
    for (const m of group.meetings) {
      const md = meetingDateStr(m);
      if (md === today) {
        html += renderMeetingCard(m);
      } else {
        html += renderMeetingCompactRow(m);
      }
    }
  }

  return `<div class="settings-section">${filterBar}${html}</div>`;
}

function attachMeetingsListeners() {
  const meetingsGistIdEl = document.getElementById('settingMeetingsGistId');
  if (meetingsGistIdEl) meetingsGistIdEl.addEventListener('blur', (e) => { state.settings.meetingsGistId = e.target.value.trim(); saveState(); });

  const createMeetingsBtn = document.getElementById('createMeetingsGistBtn');
  if (createMeetingsBtn) createMeetingsBtn.addEventListener('click', () => createMeetingsGist());

  const fetchMeetingsBtn = document.getElementById('fetchMeetingsBtn');
  if (fetchMeetingsBtn) fetchMeetingsBtn.addEventListener('click', () => fetchMeetings());

  const fetchMeetingsBtnEntries = document.getElementById('fetchMeetingsBtnEntries');
  if (fetchMeetingsBtnEntries) fetchMeetingsBtnEntries.addEventListener('click', () => fetchMeetings());

  const importMeetingsBtn = document.getElementById('importMeetingsBtn');
  if (importMeetingsBtn) importMeetingsBtn.addEventListener('click', () => showMeetingImport());

  const saveMeetingTypeBtn = document.getElementById('saveMeetingTypeSettingsBtn');
  if (saveMeetingTypeBtn) saveMeetingTypeBtn.addEventListener('click', () => {
    const sysPromptEl = document.getElementById('settingMeetingSystemPrompt');
    if (sysPromptEl) {
      const val = sysPromptEl.value.trim();
      state.settings.meetingSystemPrompt = val || '';
    }
    if (!state.settings.meetingTypeSignals) state.settings.meetingTypeSignals = {};
    if (!state.settings.meetingTypePrompts) state.settings.meetingTypePrompts = {};
    document.querySelectorAll('.meeting-type-signals-input').forEach(el => {
      const typeId = el.dataset.typeId;
      const val = el.value.trim();
      if (val) {
        state.settings.meetingTypeSignals[typeId] = val.split(',').map(s => s.trim()).filter(Boolean);
      } else {
        delete state.settings.meetingTypeSignals[typeId];
      }
    });
    document.querySelectorAll('.meeting-type-prompt-input').forEach(el => {
      const typeId = el.dataset.typeId;
      const val = el.value.trim();
      if (val) {
        state.settings.meetingTypePrompts[typeId] = val;
      } else {
        delete state.settings.meetingTypePrompts[typeId];
      }
    });
    saveState();
    showToast('Meeting type settings saved');
  });

  // Mobile swipe between meeting entries
  if (window.innerWidth <= 600) {
    const cards = document.querySelectorAll('.meeting-card');
    let currentCardIdx = 0;
    const panel = document.getElementById('panel-meetings');
    let touchStartX = 0;
    panel.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    panel.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) < 60) return;
      // Find current visible card
      const scrollTop = window.scrollY;
      const headerHeight = 60;
      cards.forEach((card, i) => {
        if (card.getBoundingClientRect().top < 150) currentCardIdx = i;
      });
      const headerOffset = 56;
      if (dx < -60 && currentCardIdx < cards.length - 1) {
        const y = cards[currentCardIdx + 1].getBoundingClientRect().top + window.scrollY - headerOffset;
        window.scrollTo({ top: y, behavior: 'smooth' });
      } else if (dx > 60 && currentCardIdx > 0) {
        const y = cards[currentCardIdx - 1].getBoundingClientRect().top + window.scrollY - headerOffset;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }
    });
  }
}

function renderSettings() {
  const panel = document.getElementById('panel-settings');
  const tabs = [
    { id: 'profile', label: 'Profile' },
    { id: 'features', label: 'Features' },
    { id: 'integrations', label: 'Integrations' },
    { id: 'meetings', label: 'Meetings' },
    { id: 'data', label: 'Data' },
    { id: 'about', label: 'About' }
  ];
  const tabNav = tabs.map(t =>
    `<button class="sub-nav-btn${settingsSubTab === t.id ? ' active' : ''}" onclick="settingsSubTab='${t.id}';renderSettings()">${t.label}</button>`
  ).join('');

  let content = '';
  if (settingsSubTab === 'profile') content = settingsProfileHtml();
  else if (settingsSubTab === 'features') content = settingsFeaturesHtml();
  else if (settingsSubTab === 'integrations') content = settingsIntegrationsHtml();
  else if (settingsSubTab === 'meetings') content = meetingsSettingsHtml();
  else if (settingsSubTab === 'data') content = settingsDataHtml();
  else if (settingsSubTab === 'about') content = settingsAboutHtml();

  panel.innerHTML = `<div class="sub-nav">${tabNav}</div>${content}`;
  attachSettingsListeners();
}

function settingsAboutHtml() {
  // Merge patch releases into their parent version for display
  const displayReleases = [];
  let pendingPatchChanges = [];
  for (const release of WORKOS_CHANGELOG) {
    if (release.patch) {
      pendingPatchChanges.push(...release.changes);
    } else {
      const merged = [...pendingPatchChanges, ...release.changes];
      pendingPatchChanges = [];
      displayReleases.push({ ...release, changes: merged });
    }
  }
  const changelogHtml = displayReleases.map((release, i) => `
    <div class="changelog-release" onclick="const l=this.querySelector('.changelog-list');const c=this.querySelector('.changelog-chevron');const h=l.classList.toggle('hidden');c.textContent=h?'▸':'▾'">
      <div class="changelog-version-header">
        <span class="changelog-version-tag">v${release.version}</span>
        <span class="changelog-date">${new Date(release.date + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</span>
        <span class="changelog-chevron">${i === 0 ? '▾' : '▸'}</span>
      </div>
      <ul class="changelog-list${i === 0 ? '' : ' hidden'}">${release.changes.map(c => `<li>${escapeHtml(c)}</li>`).join('')}</ul>
    </div>`
  ).join('');

  return `
    <div class="settings-section">
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:var(--space-md)">Current WorkOS version: <strong>v${WORKOS_VERSION}</strong></div>
      ${changelogHtml}
    </div>`;
}

/* ---- Slack Integration ---- */
const SLACK_PROXY_BASE = 'http://localhost:8090/slack';

async function slackApiFetch(method, params = {}) {
  const token = state.settings.slackToken;
  if (!token) throw new Error('No Slack token configured');
  const qs = new URLSearchParams(params).toString();
  const url = SLACK_PROXY_BASE + '/' + method + (qs ? '?' + qs : '');
  const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
  if (!res.ok) throw new Error('Slack API HTTP ' + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Slack API error');
  return data;
}

async function syncSlackReactions() {
  const statusEl = document.getElementById('slackTokenStatus');
  // Save token from input if not yet saved
  const inputEl = document.getElementById('settingSlackToken');
  if (inputEl && inputEl.value.trim()) {
    state.settings.slackToken = inputEl.value.trim();
    saveState();
  }
  if (!state.settings.slackToken) {
    showToast('Enter a Slack token first');
    return;
  }
  if (statusEl) { statusEl.className = 'api-status checking'; statusEl.textContent = 'Syncing reactions...'; }

  try {
    const syncedSet = new Set(state.slackSyncedTs || []);
    const channelNameCache = new Map();
    const newTodos = [];
    let cursor = '';

    // Paginate reactions.list
    do {
      const params = { count: '100', full: 'true' };
      if (cursor) params.cursor = cursor;
      const data = await slackApiFetch('reactions.list', params);
      const items = data.items || [];

      for (const item of items) {
        if (item.type !== 'message' || !item.message) continue;
        const msg = item.message;
        const reactions = msg.reactions || [];
        const hasWorkos = reactions.some(r => r.name === 'workos');
        if (!hasWorkos) continue;

        const channel = item.channel;
        const ts = msg.ts;
        const dedupKey = channel + ':' + ts;
        if (syncedSet.has(dedupKey)) continue;

        // Enrich: get channel name
        let channelName = channelNameCache.get(channel);
        if (!channelName) {
          try {
            const info = await slackApiFetch('conversations.info', { channel });
            channelName = (info.channel && info.channel.name) || channel;
          } catch (e) {
            channelName = channel;
          }
          channelNameCache.set(channel, channelName);
        }

        // Enrich: get permalink
        let permalink = '';
        try {
          const pl = await slackApiFetch('chat.getPermalink', { channel, message_ts: ts });
          permalink = pl.permalink || '';
        } catch (e) { /* permalink is optional */ }

        const todoText = (msg.text || '').substring(0, 500) || '(no text)';
        newTodos.push({
          id: 'slack_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
          text: todoText,
          status: 'open',
          priority: 'inbox',
          source: 'slack',
          sourceTitle: '#' + channelName,
          slackChannel: channel,
          slackChannelName: channelName,
          slackTs: ts,
          slackPermalink: permalink,
          createdAt: new Date().toISOString(),
          completedAt: null,
          scheduledFor: null,
          parentId: null,
          triagedAt: null,
          deferCount: 0
        });
        syncedSet.add(dedupKey);
      }

      cursor = (data.response_metadata && data.response_metadata.next_cursor) || '';
    } while (cursor);

    // Persist
    state.slackSyncedTs = [...syncedSet];
    if (newTodos.length > 0) {
      state.todos.push(...newTodos);
    }
    saveState();
    renderTodos();

    if (statusEl) { statusEl.className = 'api-status valid'; statusEl.textContent = 'Synced'; }
    showToast(newTodos.length > 0 ? newTodos.length + ' new item' + (newTodos.length !== 1 ? 's' : '') + ' from Slack' : 'Already up to date');
  } catch (e) {
    console.error('Slack sync failed:', e);
    if (statusEl) { statusEl.className = 'api-status invalid'; statusEl.textContent = 'Error: ' + e.message; }
    showToast('Slack sync failed: ' + e.message);
  }
}

function connectGoogleCalendar() {
  if (!state.settings.googleClientId) {
    showToast('Enter your OAuth Client ID first');
    return;
  }
  if (typeof google === 'undefined' || !google.accounts) {
    showToast('Google Identity Services library not loaded. Check your network connection.');
    return;
  }
  const statusEl = document.getElementById('gcalStatus');
  if (statusEl) { statusEl.className = 'api-status'; statusEl.textContent = 'Opening consent screen...'; }
  const tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: state.settings.googleClientId,
    scope: 'https://www.googleapis.com/auth/calendar.readonly',
    callback: async (response) => {
      if (response.error) {
        if (statusEl) { statusEl.className = 'api-status invalid'; statusEl.textContent = 'Auth failed: ' + response.error; }
        return;
      }
      googleToken = { access_token: response.access_token };
      // Fetch user email to display
      try {
        const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { 'Authorization': 'Bearer ' + response.access_token }
        });
        if (info.ok) {
          const data = await info.json();
          googleToken.email = data.email;
        }
      } catch (e) { /* email display is optional */ }
      showToast('Google Calendar connected');
      renderSettings();
    }
  });
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function disconnectGoogleCalendar() {
  if (googleToken && googleToken.access_token) {
    google.accounts.oauth2.revoke(googleToken.access_token, () => {});
  }
  googleToken = null;
  showToast('Google Calendar disconnected');
  renderSettings();
}

async function testGoogleCalendar() {
  const resultEl = document.getElementById('gcalTestResult');
  if (!resultEl) return;
  if (!googleToken || !googleToken.access_token) {
    resultEl.innerHTML = '<div class="api-status invalid">Not connected</div>';
    return;
  }
  resultEl.innerHTML = '<div class="api-status">Fetching today\'s events...</div>';
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
  const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).toISOString();
  const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(start)}&timeMax=${encodeURIComponent(end)}&singleEvents=true&orderBy=startTime`;
  try {
    const res = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + googleToken.access_token }
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 403 || res.status === 401) {
        resultEl.innerHTML = `<div class="api-status invalid">Access denied (${res.status}). Your Google Workspace admin may be blocking this app. This means the Calendar pipeline won't work without admin approval.</div>`;
      } else {
        resultEl.innerHTML = `<div class="api-status invalid">Error ${res.status}: ${err.error?.message || 'Unknown error'}</div>`;
      }
      return;
    }
    const data = await res.json();
    const events = data.items || [];
    if (events.length === 0) {
      resultEl.innerHTML = '<div class="api-status valid">Success! No events on your calendar today.</div>';
    } else {
      const list = events.map(e => `<li>${escapeHtml(e.summary || '(no title)')} — ${formatEventTime(e)}</li>`).join('');
      resultEl.innerHTML = `<div class="api-status valid">Success! ${events.length} event${events.length === 1 ? '' : 's'} today:</div><ul style="margin:var(--space-xs) 0 0 var(--space-lg);color:var(--text-secondary);font-size:0.92rem">${list}</ul>`;
    }
  } catch (e) {
    resultEl.innerHTML = `<div class="api-status invalid">Network error: ${e.message}</div>`;
  }
}

function formatEventTime(event) {
  if (event.start?.dateTime) {
    const t = new Date(event.start.dateTime);
    return t.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }
  return 'all day';
}

async function exportAllToObsidian() {
  const vaultPath = state.settings.obsidianVaultPath;
  if (!vaultPath) { showToast('Set Obsidian Vault Path first'); return; }
  const statusEl = document.getElementById('mempalaceStatus');
  // Disable all export buttons during operation
  const btns = document.querySelectorAll('.settings-card button');
  btns.forEach(b => { if (b.textContent.includes('Export') || b.textContent.includes('Mine')) b.disabled = true; });
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--text-muted)">Preparing export...</span>';
  try {
    const files = [];
    for (const entry of (state.entries || [])) {
      files.push({ path: 'entries/' + (entry.date || 'unknown') + '.md', content: entryToMarkdown(entry) });
    }
    // Clean transcripts in parallel with concurrency limit of 3
    const meetingsToClean = (state.meetings || []).filter(m => m.transcript && m.transcript.length > 100);
    const meetingsNoClean = (state.meetings || []).filter(m => !m.transcript || m.transcript.length <= 100);
    let cleaned = 0;
    const totalToClean = meetingsToClean.length;
    // Process in chunks of 3 for parallel cleaning
    for (let i = 0; i < meetingsToClean.length; i += 3) {
      const chunk = meetingsToClean.slice(i, i + 3);
      if (statusEl) statusEl.innerHTML = `<span style="color:var(--text-muted)">Cleaning transcripts ${cleaned + 1}–${Math.min(cleaned + chunk.length, totalToClean)} of ${totalToClean}...</span>`;
      const results = await Promise.all(chunk.map(m =>
        cleanTranscriptForExport(m.transcript, m.title).then(ct => {
          const slug = (m.title || 'meeting').toLowerCase().replace(/[^a-z0-9]+/g, '-').substring(0, 40);
          const idSuffix = m.id ? '-' + String(m.id).slice(-4) : '';
          return { path: 'meetings/' + meetingDateStr(m) + '-' + slug + idSuffix + '.md', content: meetingToMarkdown(m, ct) };
        })
      ));
      files.push(...results);
      cleaned += chunk.length;
    }
    // Add meetings without transcripts (no cleaning needed)
    for (const m of meetingsNoClean) {
      const slug = (m.title || 'meeting').toLowerCase().replace(/[^a-z0-9]+/g, '-').substring(0, 40);
      const idSuffix = m.id ? '-' + String(m.id).slice(-4) : '';
      files.push({ path: 'meetings/' + meetingDateStr(m) + '-' + slug + idSuffix + '.md', content: meetingToMarkdown(m) });
    }
    for (const brief of (state.weeklyBriefs || [])) {
      files.push({ path: 'briefs/' + (brief.id || brief.weekId || 'brief') + '.md', content: briefToMarkdown(brief) });
    }
    if (files.length === 0) { showToast('Nothing to export'); return; }
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--text-muted)">Writing ${files.length} files...</span>`;
    const url = (state.settings.mempalaceServerUrl || 'http://localhost:8091').replace(/\/$/, '');
    const resp = await fetch(url + '/export', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ vault_path: vaultPath, files }),
      signal: AbortSignal.timeout(30000)
    });
    const data = await resp.json();
    if (resp.ok) {
      if (statusEl) statusEl.innerHTML = `<span class="valid">Exported ${data.count} files</span>`;
      showToast(`Exported ${data.count} files to Obsidian`);
    } else {
      if (statusEl) statusEl.innerHTML = `<span class="invalid">${escapeHtml(data.detail || 'Export failed')}</span>`;
    }
  } catch (e) {
    if (statusEl) statusEl.innerHTML = '<span class="invalid">Export failed: ' + escapeHtml(e.message) + '</span>';
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}

function restoreBackup() {
  const backup = localStorage.getItem('workos_state_backup');
  if (!backup) { showToast('No backup available'); return; }
  try {
    const parsed = JSON.parse(backup);
    const entryCount = (parsed.entries || []).length;
    const latestDate = (parsed.entries || []).map(e => e.date).sort().reverse()[0] || 'unknown';
    if (!confirm('Restore from backup? (' + entryCount + ' entries, latest: ' + latestDate + ')\n\nThis will replace your current data.')) return;
    localStorage.setItem('workos_state', backup);
    location.reload();
  } catch (e) {
    showToast('Backup is corrupted');
  }
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    file.text().then(text => {
      try {
        const imported = JSON.parse(text);
        if (!imported.entries && !imported.settings) {
          showToast('Invalid WorkOS export file');
          return;
        }
        if (!confirm('This will replace all your current data. Continue?')) return;
        localStorage.setItem('workos_state', text);
        location.reload();
      } catch (err) {
        showToast('Failed to parse import file');
      }
    });
  };
  input.click();
}

function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `workos-export-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported');
}

async function testConnection() {
  const status = document.getElementById('apiStatus');
  if (!state.settings.baseUrl) {
    status.className = 'api-status invalid';
    status.textContent = 'Set a Gateway Base URL first.';
    return;
  }
  status.className = 'api-status checking';
  status.textContent = 'Checking...';
  try {
    await callClaude('You are helpful.', 'Say hi.', 5, 'Test Connection');
    status.className = 'api-status valid';
    status.textContent = '✓ Connected';
  } catch (err) {
    if (err.message === 'invalid_key') {
      status.className = 'api-status invalid';
      status.textContent = '✕ Auth failed — check credentials';
    } else {
      status.className = 'api-status invalid';
      status.textContent = '✕ Connection failed — check URL and try again';
    }
  }
}

function showApiUsageModal() {
  let currentFilter = '7d';

  function fmtTokens(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000) return (n / 1_000).toFixed(1) + 'k';
    return String(n);
  }
  function fmtCost(c) {
    if (c < 0.01 && c > 0) return '<$0.01';
    return '$' + c.toFixed(2);
  }

  function getFilteredLog(filter) {
    const now = Date.now();
    const log = state.apiUsageLog || [];
    if (filter === 'all') return log;
    let cutoff;
    if (filter === 'today') {
      const d = new Date(); d.setHours(0,0,0,0); cutoff = d.getTime();
    } else if (filter === '7d') {
      cutoff = now - 7 * 86400000;
    } else {
      cutoff = now - 30 * 86400000;
    }
    return log.filter(e => e.ts >= cutoff);
  }

  function renderModalContent() {
    const filtered = getFilteredLog(currentFilter);
    const filters = [
      { key: 'today', label: 'Today' },
      { key: '7d', label: '7 days' },
      { key: '30d', label: '30 days' },
      { key: 'all', label: 'All time' }
    ];

    const totalCalls = filtered.length;
    const totalTokens = filtered.reduce((s, e) => s + (e.total_tokens || 0), 0);
    const totalCost = filtered.reduce((s, e) => s + (e.cost || 0), 0);
    const totalErrors = filtered.filter(e => e.error).length;
    const errorRate = totalCalls > 0 ? Math.round(totalErrors / totalCalls * 100) : 0;

    // Group by feature
    const byFeature = {};
    for (const e of filtered) {
      const f = e.feature || 'Unknown';
      if (!byFeature[f]) byFeature[f] = { calls: 0, errors: 0, input: 0, output: 0, total: 0, cost: 0 };
      byFeature[f].calls++;
      if (e.error) byFeature[f].errors++;
      byFeature[f].input += e.prompt_tokens || 0;
      byFeature[f].output += e.completion_tokens || 0;
      byFeature[f].total += e.total_tokens || 0;
      byFeature[f].cost += e.cost || 0;
    }
    const sorted = Object.entries(byFeature).sort((a, b) => b[1].total - a[1].total);

    let tableHtml = '';
    if (sorted.length === 0) {
      tableHtml = '<div class="usage-empty">No API calls in this period</div>';
    } else {
      tableHtml = `<table class="usage-table">
        <thead><tr><th>Feature</th><th>Calls</th><th>Errors</th><th>Input</th><th>Output</th><th>Total</th><th>Cost</th></tr></thead>
        <tbody>${sorted.map(([name, d]) => {
          const errPct = d.calls > 0 && d.errors > 0 ? ` (${Math.round(d.errors / d.calls * 100)}%)` : '';
          const errStyle = d.errors > 0 ? ' style="color:var(--accent-negative)"' : '';
          return `<tr>
          <td>${escapeHtml(name)}</td>
          <td>${d.calls}</td>
          <td${errStyle}>${d.errors}${errPct}</td>
          <td>${fmtTokens(d.input)}</td>
          <td>${fmtTokens(d.output)}</td>
          <td>${fmtTokens(d.total)}</td>
          <td>${fmtCost(d.cost)}</td>
        </tr>`;
        }).join('')}</tbody>
      </table>`;
    }

    return `
      <div class="usage-filter-bar">
        ${filters.map(f => `<button class="usage-filter-btn${f.key === currentFilter ? ' active' : ''}" data-filter="${f.key}">${f.label}</button>`).join('')}
      </div>
      <div class="usage-summary">
        <div class="usage-stat"><div class="usage-stat-value">${totalCalls}</div><div class="usage-stat-label">API Calls</div></div>
        <div class="usage-stat"><div class="usage-stat-value">${fmtTokens(totalTokens)}</div><div class="usage-stat-label">Tokens</div></div>
        <div class="usage-stat"><div class="usage-stat-value">${fmtCost(totalCost)}</div><div class="usage-stat-label">Est. Cost</div></div>
        <div class="usage-stat"><div class="usage-stat-value">${totalErrors}${errorRate > 0 ? ` <span style="font-size:13px;color:var(--accent-negative)">(${errorRate}%)</span>` : ''}</div><div class="usage-stat-label">Errors</div></div>
      </div>
      ${tableHtml}`;
  }

  // Create backdrop
  const backdrop = document.createElement('div');
  backdrop.className = 'reflection-modal-backdrop';
  backdrop.innerHTML = `<div class="usage-modal">
    <div class="usage-modal-header">
      <h3>API Usage</h3>
      <button class="btn-icon" onclick="this.closest('.reflection-modal-backdrop').remove()" style="font-size:18px">&times;</button>
    </div>
    <div class="usage-modal-body" id="usageModalBody">${renderModalContent()}</div>
  </div>`;
  document.body.appendChild(backdrop);

  // Click backdrop to close
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.remove(); });

  // Escape to close
  const escHandler = (e) => { if (e.key === 'Escape') { backdrop.remove(); document.removeEventListener('keydown', escHandler); } };
  document.addEventListener('keydown', escHandler);

  // Filter button delegation
  backdrop.addEventListener('click', (e) => {
    const btn = e.target.closest('.usage-filter-btn');
    if (!btn) return;
    currentFilter = btn.dataset.filter;
    const body = document.getElementById('usageModalBody');
    if (body) body.innerHTML = renderModalContent();
  });
}

/* ========================================
   Utilities
   ======================================== */
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatBulletList(text) {
  if (!text) return '';
  const lines = text.split('\n').filter(l => l.trim());
  const hasBullets = lines.some(l => /^\s*[-•*]\s/.test(l) || /^\s*\d+\.\s/.test(l));
  if (!hasBullets) {
    // No bullets — render as paragraphs with inline markdown
    return lines.map(l => {
      const stripped = l.trim().replace(/^#{1,4}\s+/, '');
      return `<p>${formatInlineMarkdown(stripped)}</p>`;
    }).join('');
  }
  let html = '';
  let inList = false;
  for (const line of lines) {
    const trimmed = line.trim();
    if (/^[-•*]\s/.test(trimmed) || /^\d+\.\s/.test(trimmed)) {
      if (!inList) { html += '<ul class="history-bullets">'; inList = true; }
      const content = trimmed.replace(/^[-•*]\s+/, '').replace(/^\d+\.\s+/, '');
      html += `<li>${formatInlineMarkdown(content)}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      const stripped = trimmed.replace(/^#{1,4}\s+/, '');
      html += `<p>${formatInlineMarkdown(stripped)}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function formatCoachingNote(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  let inList = false;
  for (const line of lines) {
    const trimmed = line.trim();
    if (/^[-•*]\s/.test(trimmed)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${formatInlineMarkdown(trimmed.replace(/^[-•*]\s+/, ''))}</li>`;
    } else if (/^\d+\.\s/.test(trimmed)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${formatInlineMarkdown(trimmed.replace(/^\d+\.\s+/, ''))}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (!trimmed) continue;
      // Strip markdown headers
      const stripped = trimmed.replace(/^#{1,4}\s+/, '');
      html += `<p>${formatInlineMarkdown(stripped)}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function formatInlineMarkdown(text) {
  return escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/__(.+?)__/g, '<strong>$1</strong>')
    .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:var(--bg-primary);padding:1px 4px;border-radius:2px;font-size:0.9em">$1</code>')
    .replace(/&gt;\s?(.+)/g, '<span style="border-left:2px solid var(--border-default);padding-left:var(--space-sm);color:var(--text-muted)">$1</span>');
}

function formatBriefText(text) {
  if (!text) return '<span style="color:var(--text-muted)">No content</span>';
  return formatBulletList(text);
}

const PIE_COLORS = [
  'var(--accent-600)', 'var(--accent-400)', 'var(--accent-800)',
  'var(--accent-300)', 'var(--accent-700)', 'var(--accent-500)',
  'var(--accent-200)', 'var(--accent-900)', 'var(--accent-100)', 'var(--accent-50)'
];

function buildComponentPieChart(componentCounts) {
  const entries = Object.entries(componentCounts).sort((a, b) => b[1] - a[1]);
  const total = entries.reduce((s, e) => s + e[1], 0);
  const r = 175;
  const cx = 200, cy = 200;
  let cumAngle = -Math.PI / 2;
  const slices = entries.map(([name, count], i) => {
    const angle = (count / total) * 2 * Math.PI;
    const startX = cx + r * Math.cos(cumAngle);
    const startY = cy + r * Math.sin(cumAngle);
    cumAngle += angle;
    const endX = cx + r * Math.cos(cumAngle);
    const endY = cy + r * Math.sin(cumAngle);
    const largeArc = angle > Math.PI ? 1 : 0;
    const color = PIE_COLORS[i % PIE_COLORS.length];
    // For a single item, draw a full circle
    if (entries.length === 1) {
      return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" class="pie-slice" data-name="${escapeHtml(name)}" data-count="${count}"/>`;
    }
    return `<path d="M${cx},${cy} L${startX},${startY} A${r},${r} 0 ${largeArc} 1 ${endX},${endY} Z" fill="${color}" class="pie-slice" data-name="${escapeHtml(name)}" data-count="${count}"/>`;
  });

  const legend = entries.slice(0, 10).map(([name, count]) =>
    `<div class="pie-legend-item" onclick="filterContribsByComponent('${escapeHtml(name).replace(/'/g, "\\'")}')">
      <span class="pie-legend-name">${escapeHtml(name)}</span>
      <span class="pie-legend-count">${count}</span>
    </div>`
  ).join('');

  return `<div class="pie-chart-row">
    <div class="pie-chart-wrap">
      <svg viewBox="0 0 400 400" width="400" height="400">${slices.join('')}</svg>
      <div class="pie-tooltip" id="pieTooltip"></div>
    </div>
    <div class="pie-legend">
      <div class="pie-legend-header">Top 10</div>
      ${legend}
    </div>
  </div>`;
}

function buildMonthLineChart(monthCounts) {
  const entries = Object.entries(monthCounts)
    .filter(([m]) => m !== 'unknown')
    .sort((a, b) => a[0].localeCompare(b[0]));
  if (entries.length < 2) return '';

  const maxCount = Math.max(...entries.map(e => e[1]));
  const padTop = 24, padBottom = 32, padLeft = 32, padRight = 16;
  const h = 160;
  const w = 800; // will scale via viewBox
  const chartW = w - padLeft - padRight;
  const chartH = h - padTop - padBottom;

  const points = entries.map(([month, count], i) => {
    const x = padLeft + (i / (entries.length - 1)) * chartW;
    const y = padTop + chartH - (count / maxCount) * chartH;
    return { x, y, month, count };
  });

  const polyline = points.map(p => `${p.x},${p.y}`).join(' ');

  // Fill area
  const areaPoints = `${padLeft},${padTop + chartH} ${polyline} ${points[points.length - 1].x},${padTop + chartH}`;

  // Y-axis labels
  const yLabels = [Math.ceil(maxCount / 2), maxCount].map(v => {
    const y = padTop + chartH - (v / maxCount) * chartH;
    return `<text x="${padLeft - 8}" y="${y + 4}" text-anchor="end" fill="var(--text-muted)" font-size="12" font-weight="500" font-family="var(--font-family)">${v}</text>
      <line x1="${padLeft}" y1="${y}" x2="${w - padRight}" y2="${y}" stroke="var(--text-muted)" stroke-width="0.75" stroke-dasharray="4 2"/>`;
  }).join('');

  // X-axis labels
  const xLabels = points.map(p => {
    const d = new Date(p.month + '-01T12:00:00');
    const label = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
    return `<text x="${p.x}" y="${h - 8}" text-anchor="middle" fill="var(--text-muted)" font-size="12" font-weight="500" font-family="var(--font-family)">${label}</text>`;
  }).join('');

  // Dots and hover targets
  const dots = points.map(p =>
    `<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--accent-600)" class="line-chart-dot" data-month="${p.month}" data-count="${p.count}"/>
     <circle cx="${p.x}" cy="${p.y}" r="16" fill="transparent" class="line-chart-hit" data-month="${p.month}" data-count="${p.count}"/>`
  ).join('');

  return `<div class="line-chart-wrap">
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" width="100%">
      ${yLabels}
      <line x1="${padLeft}" y1="${padTop + chartH}" x2="${w - padRight}" y2="${padTop + chartH}" stroke="var(--text-muted)" stroke-width="0.75"/>
      <polygon points="${areaPoints}" fill="var(--accent-100)" opacity="0.5"/>
      <polyline points="${polyline}" fill="none" stroke="var(--accent-600)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      ${xLabels}
    </svg>
    <div class="line-chart-tooltip" id="lineChartTooltip"></div>
  </div>`;
}

function initLineChartTooltip() {
  const wrap = document.querySelector('.line-chart-wrap');
  if (!wrap) return;
  const tooltip = document.getElementById('lineChartTooltip');
  wrap.addEventListener('mouseover', (e) => {
    const hit = e.target.closest('.line-chart-hit') || e.target.closest('.line-chart-dot');
    if (!hit || !tooltip) return;
    const d = new Date(hit.dataset.month + '-01T12:00:00');
    const label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    tooltip.textContent = label + ': ' + hit.dataset.count;
    tooltip.style.opacity = '1';
  });
  wrap.addEventListener('mouseout', () => {
    if (tooltip) tooltip.style.opacity = '0';
  });
  wrap.addEventListener('mousemove', (e) => {
    if (!tooltip) return;
    const rect = wrap.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 28) + 'px';
  });
}

function initPieTooltip() {
  const wrap = document.querySelector('.pie-chart-wrap');
  if (!wrap) return;
  const tooltip = document.getElementById('pieTooltip');
  wrap.addEventListener('mouseover', (e) => {
    const slice = e.target.closest('.pie-slice');
    if (!slice || !tooltip) return;
    const name = slice.dataset.name;
    const count = slice.dataset.count;
    tooltip.innerHTML = `<strong>${escapeHtml(name)}</strong> · ${count}`;
    tooltip.style.opacity = '1';
    tooltip.style.pointerEvents = 'auto';
    slice.style.opacity = '0.75';
  });
  wrap.addEventListener('mouseout', (e) => {
    const slice = e.target.closest('.pie-slice');
    if (slice) slice.style.opacity = '1';
    if (tooltip) { tooltip.style.opacity = '0'; tooltip.style.pointerEvents = 'none'; }
  });
  wrap.addEventListener('mousemove', (e) => {
    if (!tooltip) return;
    const rect = wrap.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 8) + 'px';
  });
  wrap.addEventListener('click', (e) => {
    const slice = e.target.closest('.pie-slice');
    if (!slice) return;
    filterContribsByComponent(slice.dataset.name);
  });
}

function filterContribsByComponent(name) {
  contribFilterComponent = contribFilterComponent === name ? '' : name;
  contribFilterCat = '';
  renderContributions();
}

function getDateFilteredContribs() {
  let contribs = state.contributions;
  if (contribDateFrom) {
    contribs = contribs.filter(c => c.date && c.date !== 'unknown' && c.date >= contribDateFrom);
  }
  if (contribDateTo) {
    contribs = contribs.filter(c => c.date && c.date !== 'unknown' && c.date <= contribDateTo);
  }
  return contribs;
}

async function processContribImport() {
  const text = document.getElementById('contribPasteArea')?.value.trim();
  if (!text) {
    document.getElementById('contribImportError').classList.add('show');
    return;
  }

  if (!state.settings.baseUrl) {
    showToast('Set up your AI gateway in Settings first.');
    return;
  }

  const channel = document.querySelector('input[name="contribChannel"]:checked')?.value || '#hawkins-professional-design';
  const btn = document.getElementById('contribProcessBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Processing...';

  try {
    const prompt = `You parse raw Slack messages pasted from a design system channel.
Extract each distinct post/message from the user.
For each post, output a JSON array with objects containing:
- date: best guess ISO date from context (or "unknown")
- text: the message content (cleaned up, 1-2 sentences max)
- category: one of "bug-report", "feature-request", "design-feedback", "component-request", "documentation", "discussion"
- component: component name if mentioned (e.g. "Timeline", "ButtonGroup", "DatePicker") or null
Output only valid JSON. No preamble, no markdown fences.

Here are the pasted Slack messages:
${text}`;

    const result = await callClaude(
      'You are a structured data extraction tool. Output only valid JSON arrays. No prose, no markdown code fences.',
      prompt,
      2000,
      'Slack Import'
    );

    // Parse JSON from response
    let parsed;
    try {
      // Try to extract JSON from the response (handle markdown fences)
      const jsonMatch = result.match(/\[[\s\S]*\]/);
      parsed = JSON.parse(jsonMatch ? jsonMatch[0] : result);
    } catch (e) {
      showToast('Failed to parse AI response. Try again.');
      btn.disabled = false;
      btn.textContent = 'Process with AI';
      return;
    }

    if (!Array.isArray(parsed) || parsed.length === 0) {
      showToast('No messages extracted. Try pasting more content.');
      btn.disabled = false;
      btn.textContent = 'Process with AI';
      return;
    }

    // Prepare review data
    contribReviewData = parsed.map(item => ({
      id: Date.now() + Math.random(),
      date: item.date || 'unknown',
      channel: channel,
      text: item.text || '',
      category: CONTRIB_CATEGORIES.find(c => c.id === item.category) ? item.category : 'other',
      component: item.component || '',
      status: 'open',
      slackLink: ''
    }));

    contribView = 'review';
    renderContributions();

  } catch (err) {
    if (err.message === 'no_key') {
      showToast('Set up your AI gateway in Settings first.');
    } else {
      showToast('Failed to process. Check your gateway settings.');
    }
    btn.disabled = false;
    btn.textContent = 'Process with AI';
  }
}

function getTypeMonogram(typeId) {
  if (TYPE_MONOGRAMS[typeId]) return TYPE_MONOGRAMS[typeId];
  // Generate monogram from label for custom types
  const label = getVisibTypeLabel(typeId);
  const words = label.split(/\s+/);
  const text = words.length >= 2
    ? (words[0][0] + words[1][0]).toUpperCase()
    : label.substring(0, 2).toUpperCase();
  // Deterministic color from ID
  let hash = 0;
  for (let i = 0; i < typeId.length; i++) hash = ((hash << 5) - hash) + typeId.charCodeAt(i);
  const hue = Math.abs(hash) % 360;
  return { text, color: `hsl(${hue}, 55%, 50%)` };
}

// --- Meeting → Visibility auto-detection ---
const INSIGHT_VISIBILITY_MAP = {
  stakeholdersInfluenced: { reach: 'cross-functional', evidenceType: 'decided' },
  feedbackOnWork:         { reach: 'function', evidenceType: 'referenced' },
  userContributions:      { reach: 'team', evidenceType: 'shared' },
  whatPresented:          { reach: 'function', evidenceType: 'shared' },
  blockersResolved:       { reach: 'cross-functional', evidenceType: 'decided' },
  feedbackReceived:       { reach: 'team', evidenceType: 'referenced' },
  commitments:            { reach: 'team', evidenceType: 'decided' },
  scopeDecisions:         { reach: 'organization', evidenceType: 'decided' },
  opportunities:          { reach: 'organization', evidenceType: 'invited' }
};

// Reach overrides based on meeting type
const MEETING_TYPE_REACH_OVERRIDES = {
  feedbackOnWork:    { '1:1': 'team' },
  userContributions: { 'cross-functional': 'cross-functional' },
  whatPresented:     { strategic: 'organization' }
};

const EVIDENCE_STRENGTH = { decided: 4, invited: 3, referenced: 2, shared: 1 };
const REACH_STRENGTH = { organization: 4, 'cross-functional': 3, 'function': 2, team: 1 };

function detectVisibilityFromMeeting(meeting) {
  if (!meeting || !meeting.insights || !meeting.id) return;
  const dismissed = new Set(state.dismissedVisibilityKeys || []);
  const existingIds = new Set((state.pendingVisibility || []).map(p => p.meetingId + ':' + p.insightKey));

  // Count dismissals per insightKey+meetingType for auto-suppression
  const dismissalCounts = {};
  for (const dk of dismissed) {
    // dk format: meetingId:insightKey — look up meeting type
    const [mId, iKey] = dk.split(':');
    if (!iKey) continue;
    const m = (state.meetings || []).find(x => x.id === mId);
    const mt = m?.type || 'other';
    const countKey = iKey + ':' + mt;
    dismissalCounts[countKey] = (dismissalCounts[countKey] || 0) + 1;
  }

  const candidates = [];
  for (const [insightKey, defaults] of Object.entries(INSIGHT_VISIBILITY_MAP)) {
    const insightValue = meeting.insights[insightKey];
    // Skip empty insights
    if (!insightValue || (typeof insightValue === 'string' && insightValue.trim().length === 0) ||
        (Array.isArray(insightValue) && insightValue.length === 0)) continue;

    const dedupKey = meeting.id + ':' + insightKey;
    if (dismissed.has(dedupKey) || existingIds.has(dedupKey)) continue;

    // Auto-suppress if 3+ dismissals of same insightKey from same meeting type
    const meetingType = meeting.type || 'other';
    const suppressKey = insightKey + ':' + meetingType;
    if ((dismissalCounts[suppressKey] || 0) >= 3) continue;

    // Calculate reach with meeting-type override
    let reach = defaults.reach;
    const overrides = MEETING_TYPE_REACH_OVERRIDES[insightKey];
    if (overrides && overrides[meetingType]) {
      reach = overrides[meetingType];
    }

    const evidenceType = defaults.evidenceType;
    const note = typeof insightValue === 'string' ? insightValue.substring(0, 120) :
                 Array.isArray(insightValue) ? insightValue.join(', ').substring(0, 120) : '';

    candidates.push({
      id: 'pv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      meetingId: meeting.id,
      meetingTitle: meeting.title || 'Untitled meeting',
      meetingDate: meeting.date ? meeting.date.slice(0, 10) : todayStr(),
      reach,
      evidenceType,
      insightKey,
      note,
      vectors: meeting.insightVectorTags || [],
      detectedAt: new Date().toISOString(),
      _score: (REACH_STRENGTH[reach] || 1) * (EVIDENCE_STRENGTH[evidenceType] || 1)
    });
  }

  // Cap at 2 per meeting: highest reach × strongest evidence
  candidates.sort((a, b) => b._score - a._score);
  const capped = candidates.slice(0, 2);
  // Track overflow count for "See N more" link
  if (candidates.length > 2) {
    capped._overflowCount = candidates.length - 2;
    capped._overflowMeetingId = meeting.id;
    capped._allCandidates = candidates;
  }

  for (const c of capped) {
    delete c._score;
    state.pendingVisibility.push(c);
  }

  if (capped.length > 0) {
    saveState();
    renderTabNav(); // Update badge
  }
}

function getVisibTypeLabel(id) {
  if (id === 'meeting') return 'Meeting Evidence';
  return getVisibilityTypes().find(t => t.id === id)?.label || id;
}

function getVisibTypeObj(id) {
  return getVisibilityTypes().find(t => t.id === id);
}

const AUDIENCE_LABELS = { pod: 'CIA Pod', cbp: 'CBP', org: 'XD Org' };
function normalizeAudience(aud) {
  if (aud === 'team') return 'pod';
  if (aud === 'adjacent') return 'cbp';
  return aud;
}
function getAudienceLabel(aud) {
  return AUDIENCE_LABELS[normalizeAudience(aud)] || aud;
}

function getVisibActivitiesForWeek() {
  const monday = getWeekMonday(todayStr());
  const weekDates = getWeekDates(monday);
  return state.visibilityActivities.filter(a => weekDates.includes(a.date));
}

function getVisibActivitiesLast30() {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 30);
  const cutoffStr = cutoff.toISOString().split('T')[0];
  return state.visibilityActivities.filter(a => a.date >= cutoffStr);
}

function getLastActivityByType(typeId) {
  if (typeId === 'hawkins') {
    const visibDates = state.visibilityActivities.filter(a => a.type === 'hawkins').map(a => a.date);
    const contribDates = state.contributions.map(c => c.date).filter(d => d && d !== 'unknown');
    const allDates = [...visibDates, ...contribDates].sort().reverse();
    return allDates[0] || null;
  }
  const sorted = state.visibilityActivities.filter(a => a.type === typeId).sort((a, b) => b.date.localeCompare(a.date));
  return sorted[0]?.date || null;
}

function getStalenessNudges() {
  const today = todayStr();
  const nudges = [];
  for (const [typeId, threshold] of Object.entries(getStalenessThresholds())) {
    const lastDate = getLastActivityByType(typeId);
    if (!lastDate) {
      nudges.push({ type: typeId, label: getVisibTypeLabel(typeId), daysSince: null });
    } else {
      const diff = Math.floor((new Date(today + 'T12:00:00') - new Date(lastDate + 'T12:00:00')) / (1000 * 60 * 60 * 24));
      if (diff > threshold) {
        nudges.push({ type: typeId, label: getVisibTypeLabel(typeId), daysSince: diff });
      }
    }
  }
  return nudges;
}

function computeVectorCoverage(activities) {
  const counts = {};
  ALL_VECTORS.forEach(v => counts[v] = 0);
  for (const a of activities) {
    if (a.vectors) a.vectors.forEach(v => { if (counts[v] !== undefined) counts[v]++; });
  }
  return counts;
}

function computeReachDistribution(activities) {
  const counts = { pod: 0, cbp: 0, org: 0 };
  for (const a of activities) {
    // Migrate legacy values
    const aud = a.audience === 'team' ? 'pod' : a.audience === 'adjacent' ? 'cbp' : a.audience;
    if (counts[aud] !== undefined) counts[aud]++;
  }
  const total = counts.pod + counts.cbp + counts.org;
  if (total === 0) return { pod: 0, cbp: 0, org: 0, total: 0 };
  return {
    pod: Math.round(counts.pod / total * 100),
    cbp: Math.round(counts.cbp / total * 100),
    org: Math.round(counts.org / total * 100),
    total
  };
}

function togglePendingVector(btn, id, vector) {
  const item = (state.pendingVisibility || []).find(p => p.id === id);
  if (!item) return;
  if (!item.vectors) item.vectors = [];
  const idx = item.vectors.indexOf(vector);
  if (idx >= 0) {
    item.vectors.splice(idx, 1);
    btn.style.background = 'transparent';
    btn.style.color = 'var(--text-muted)';
    btn.classList.remove('selected');
  } else {
    item.vectors.push(vector);
    btn.style.background = 'var(--accent-interactive)';
    btn.style.color = '#fff';
    btn.classList.add('selected');
  }
}

function savePendingVisibility(id) {
  const item = (state.pendingVisibility || []).find(p => p.id === id);
  if (!item) return;

  const reach = document.querySelector(`input[name="pendingReach-${id}"]:checked`)?.value || item.reach;
  const evidence = document.querySelector(`input[name="pendingEvidence-${id}"]:checked`)?.value || item.evidenceType;

  const activity = {

async function getVisibSuggestions() {
  const btn = document.getElementById('visibSuggestBtn');
  const container = document.getElementById('visibSuggestionsContainer');
  if (!state.settings.baseUrl) {
    showToast('Set up API in Settings first');
    return;
  }

  const weekEntries = getCurrentWeekEntries();
  const weekActivities = getVisibActivitiesForWeek();
  const vectorCoverage = computeVectorCoverage(getVisibActivitiesLast30());

  if (weekEntries.length === 0) {
    container.innerHTML = `<div class="visib-suggestion-card"><div class="visib-suggestion-text">No daily log entries this week yet. Log your work first, then come back for suggestions.</div></div>`;
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const entriesText = weekEntries.map(e =>
    `[${e.date}] Work: ${e.workDone}${e.reflection ? ' | Reflection: ' + e.reflection : ''}`
  ).join('\n');

  const doneText = weekActivities.length > 0
    ? weekActivities.map(a => `- ${getVisibTypeLabel(a.type)}${a.subtype ? ' (' + a.subtype + ')' : ''} on ${a.date}${a.note ? ': ' + a.note : ''}`).join('\n')
    : 'None yet this week.';

  const lowVectors = ALL_VECTORS.filter(v => vectorCoverage[v] === 0);
  const vectorText = lowVectors.length > 0
    ? `Under-represented vectors (0 activities in 30 days): ${lowVectors.join(', ')}`
    : 'All vectors have some coverage.';

  const prompt = `You are helping a Senior Product Designer decide what to share and where to share it this week.

Here is what they logged in their daily journal this week:
${entriesText}

Visibility activities already done this week:
${doneText}

${vectorText}

Suggest 2-3 specific visibility activities they could do based on the work logged. Each suggestion should be:
- Tied to something concrete from their journal entries
- Specific about what to share and where (WAYWO post, Draftboard, Design Crit, Rationale Doc, or Hawkins)
- Brief: 1-2 sentences each

Output only the suggestions, one per line, no numbering, no preamble.`;

  try {
    const result = await callClaude(
      'You are a visibility coach for product designers. Be specific and actionable.',
      prompt,
      500,
      'Visibility Suggestions'
    );
    visibSuggestions = result.split('\n').map(s => s.trim()).filter(s => s.length > 0);
    container.innerHTML = visibSuggestions.map((s, i) => `<div class="visib-suggestion-card">
      <div class="visib-suggestion-item">
        <div class="visib-suggestion-text">${escapeHtml(s)}</div>
        <button class="visib-suggestion-dismiss" onclick="dismissVisibSuggestion(${i})">×</button>
      </div>
    </div>`).join('');
  } catch (e) {
    container.innerHTML = `<div class="visib-suggestion-card"><div class="visib-suggestion-text" style="color:var(--accent-negative)">Failed to get suggestions. Check your API settings.</div></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Get Suggestions';
  }
}

async function startVisibDraft(draftType) {
  let config = DRAFT_TYPE_CONFIG[draftType];
  let builder = DRAFT_PROMPT_BUILDERS[draftType];

  // If no built-in config, check if it's a custom/generic type
  if (!config && !builder) {
    // draftType might be a type ID — build generic config
    const typeLabel = getVisibTypeLabel(draftType);
    config = { label: typeLabel, visibType: draftType, maxTokens: 500 };
    builder = () => buildGenericDraftPrompt(typeLabel);
  }

  if (!config) return;
  if (!state.settings.baseUrl) {
    showToast('Set up API in Settings first');
    return;
  }
  const weekEntries = getCurrentWeekEntries();
  const recentEntries = getRecentEntries(5);
  if (weekEntries.length === 0 && recentEntries.length === 0) {
    showToast('Log some daily entries first');
    return;
  }
  visibDraftType = draftType;
  visibDraftText = '';
  visibDraftHumanized = false;
  visibView = 'draft';
  renderVisibility();

  try {
    if (!builder) builder = DRAFT_PROMPT_BUILDERS[draftType];
    const { systemPrompt, userPrompt } = builder();
    const result = await callClaude(systemPrompt, userPrompt, config.maxTokens, 'Visibility Draft');
    visibDraftText = result.trim();
  } catch (e) {
    if (e.message === 'no_key') {
      visibDraftText = '';
      showToast('Set up API in Settings first');
      visibView = 'dashboard';
    } else {
      visibDraftText = '';
      showToast('Failed to generate draft. Check API settings.');
      visibView = 'dashboard';
    }
  }
  renderVisibility();
}

function renderSimpleMarkdown(text) {
  return text
    .split('\n\n').map(block => {
      block = block.trim();
      if (!block) return '';
      if (block.startsWith('### ')) return `<h4>${escapeHtml(block.slice(4))}</h4>`;
      if (block.startsWith('## ')) return `<h3>${escapeHtml(block.slice(3))}</h3>`;
      if (block.startsWith('# ')) return `<h2>${escapeHtml(block.slice(2))}</h2>`;
      const lines = block.split('\n');
      if (lines.every(l => /^[-*] /.test(l.trim()))) {
        return '<ul>' + lines.map(l => `<li>${escapeHtml(l.trim().replace(/^[-*] /, '')).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</li>`).join('') + '</ul>';
      }
      return `<p>${escapeHtml(block).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</p>`;
    }).join('');
}

function toggleVisibDraftEdit() {
  const display = document.getElementById('visibDraftDisplay');
  const textarea = document.getElementById('visibDraftTextarea');
  const btn = document.getElementById('visibDraftEditBtn');
  if (!display || !textarea) return;
  const editing = textarea.style.display !== 'none';
  if (editing) {
    visibDraftText = textarea.value;
    display.innerHTML = renderSimpleMarkdown(visibDraftText);
    display.style.display = '';
    textarea.style.display = 'none';
    btn.textContent = 'Edit';
  } else {
    textarea.value = visibDraftText;
    display.style.display = 'none';
    textarea.style.display = '';
    textarea.focus();
    btn.textContent = 'Preview';
  }
}

function copyVisibDraft() {
  const textarea = document.getElementById('visibDraftTextarea');
  const editing = textarea && textarea.style.display !== 'none';
  const text = editing ? textarea.value : visibDraftText;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
  } else {
    const tmp = document.createElement('textarea');
    tmp.value = text;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);
    showToast('Copied to clipboard');
  }
}

function saveVisibDraft() {

  const editing = textarea && textarea.style.display !== 'none';
  const text = (editing ? textarea.value : visibDraftText).trim();
  if (!text) return;

  const config = DRAFT_TYPE_CONFIG[visibDraftType] || { visibType: visibDraftType, subtype: '', audience: 'team' };
  const typeObj = getVisibTypeObj(config.visibType);

  const activity = {
    id: Date.now(),
    date: todayStr(),
    type: config.visibType,
    subtype: config.subtype || '',
    reach: config.audience === 'pod' ? 'team' : config.audience === 'cbp' ? 'function' : config.audience === 'org' ? 'organization' : 'team',
    evidenceType: 'shared',
    audience: config.audience,
    note: text,
    link: '',

  state.visibilityActivities.push(activity);
