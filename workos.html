function renderChatHistory() {
  if (state.chatSessions.length === 0) {
    return '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;padding:var(--space-xl)">No past conversations yet</div>';
  }
  const sorted = [...state.chatSessions].sort((a, b) => b.updatedAt - a.updatedAt);
  return '<div class="chat-history-list">' + sorted.map(s => {
    const date = new Date(s.updatedAt);
    const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const msgCount = s.messages.filter(m => m.role === 'user').length;
    return `<div class="chat-history-item" onclick="viewChatSession('${s.id}')">
      <div class="chat-history-title">${escapeHtml(s.title)}</div>
      <div class="chat-history-meta">${dateStr} · ${msgCount} message${msgCount !== 1 ? 's' : ''}</div>
    </div>`;
  }).join('') + '</div>';
}

function renderChatSessionView() {
  const session = state.chatSessions.find(s => s.id === viewingSessionId);
  if (!session) { chatSubView = 'history'; renderChat(); return ''; }

  const messagesHtml = session.messages.map((m, idx) => {
    if (m.role === 'user') {
      return `<div class="chat-msg chat-msg-user"><div class="chat-bubble">${escapeHtml(m.content)}</div></div>`;
    } else {
      return `<div class="chat-msg chat-msg-assistant"><div>
        <div class="chat-bubble">${formatBulletList(m.content)}</div>
        <div class="chat-actions">
          <button onclick="saveChatInsight(${idx})">Save Insight</button>
          <button onclick="copyChatMessage(${idx})">Copy</button>
        </div>
      </div></div>`;
    }
  }).join('');

  return `<div class="chat-container" style="height:calc(100vh - 160px)">
    <div style="padding:var(--space-sm) var(--space-md);display:flex;gap:var(--space-sm);align-items:center;border-bottom:1px solid var(--border-default)">
      <button class="btn-ghost" onclick="chatSubView='history';renderChat()" style="font-size:13px">&larr; Back</button>
      <span style="font-weight:500;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(session.title)}</span>
      <button class="btn-secondary" style="font-size:12px" onclick="resumeChatSession('${session.id}')">Resume</button>
      <button class="btn-ghost" style="font-size:12px;color:var(--text-muted)" onclick="deleteChatSession('${session.id}')">Delete</button>
    </div>
    <div class="chat-messages" style="flex:1;overflow-y:auto">${messagesHtml}</div>
  </div>`;
}

function archiveAndNewChat() {
  if (state.activeChatSession && state.activeChatSession.messages.length > 0) {
    state.chatSessions.unshift(state.activeChatSession);
    if (state.chatSessions.length > 30) state.chatSessions = state.chatSessions.slice(0, 30);
  }
  state.activeChatSession = null;
  saveState();
  chatSubView = 'chat';
  renderChat();
  showToast('Chat archived');
}

function viewChatSession(id) {
  viewingSessionId = id;
  chatSubView = 'view';
  renderChat();
}

function resumeChatSession(id) {
  if (state.activeChatSession && state.activeChatSession.messages.length > 0) {
    state.chatSessions.unshift(state.activeChatSession);
  }
  const idx = state.chatSessions.findIndex(s => s.id === id);
  if (idx === -1) return;
  state.activeChatSession = state.chatSessions.splice(idx, 1)[0];
  if (state.chatSessions.length > 30) state.chatSessions = state.chatSessions.slice(0, 30);
  saveState();
  chatSubView = 'chat';
  renderChat();
  showToast('Chat resumed');
}

function deleteChatSession(id) {
  state.chatSessions = state.chatSessions.filter(s => s.id !== id);
  saveState();
  chatSubView = 'history';
  renderChat();
  showToast('Chat deleted');
}

async function sendChatMessage() {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text || chatLoading) return;

  if (!state.activeChatSession) {
    state.activeChatSession = {
      id: 'chat_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      title: text.length > 80 ? text.substring(0, 80) + '...' : text,
      messages: [],
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
  }

  state.activeChatSession.messages.push({ role: 'user', content: text, timestamp: Date.now() });
  state.activeChatSession.updatedAt = Date.now();
  chatLoading = true;
  renderChat();

  try {
    const systemPrompt = buildChatSystemPrompt();
    const messages = getChatMessages();
    const tier2 = await buildChatTier2Context(text);
    const apiMessages = messages.map((m, i) => {
      if (i === messages.length - 1 && m.role === 'user' && tier2) {
        return { role: m.role, content: m.content + tier2 };
      }
      return { role: m.role, content: m.content };
    });

    const response = await callClaudeChat(systemPrompt, apiMessages, 2000, 'Career Chat');
    state.activeChatSession.messages.push({ role: 'assistant', content: response, timestamp: Date.now() });
    state.activeChatSession.updatedAt = Date.now();
  } catch (err) {
    const errorMessages = {
      no_key: 'No API key configured. Go to Settings → Integrations to set up your API connection.',
      invalid_key: 'API key is invalid or expired. Check Settings → Integrations.',
      rate_limited: 'Rate limited — wait a moment and try again.'
    };
    const errorText = errorMessages[err.message] || ('Something went wrong: ' + err.message);
    state.activeChatSession.messages.push({ role: 'assistant', content: errorText, timestamp: Date.now() });
    state.activeChatSession.updatedAt = Date.now();
  }

  chatLoading = false;
  saveState();
  renderChat();
}

function sendChatFromPrompt(text) {
  const input = document.getElementById('chatInput');
  if (input) input.value = text;
  sendChatMessage();
}

function handleChatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
}

function autoResizeChatInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function saveChatInsight(msgIdx) {
  const msg = getDisplayedMessages()[msgIdx];
  if (!msg || msg.role !== 'assistant') return;

  const cs = state.coachingState;
  cs.activeObservations.push({
    id: 'obs-' + Date.now(),
    topic: msg.content.substring(0, 150),
    firstSurfaced: new Date().toISOString().split('T')[0],
    lastSurfaced: new Date().toISOString().split('T')[0],
    timesShown: 1,
    evidence: [],
    status: 'active',
    source: 'chat'
  });

  if (cs.activeObservations.length > 10) {
    const oldest = cs.activeObservations.sort((a, b) => a.timesShown - b.timesShown)[0];
    cs.activeObservations = cs.activeObservations.filter(o => o.id !== oldest.id);
    cs.resolvedObservations.push({ ...oldest, status: 'expired' });
  }

  cs.lastUpdated = new Date().toISOString();
  saveState();
  showToast('Insight saved to coaching observations');
}

function copyChatMessage(msgIdx) {
  const msg = getDisplayedMessages()[msgIdx];
  if (!msg) return;
  navigator.clipboard.writeText(msg.content).then(() => {
    showToast('Copied to clipboard');
  }).catch(() => {
    showToast('Failed to copy');
  });
}

function renderTodos() {
  const panel = document.getElementById('panel-todos');
  if (!panel) return;
  const counts = getTodoCounts();
  const primaryFilters = [
    { key: 'inbox', label: 'Inbox' },
    { key: 'today', label: 'Today' },
    { key: 'tomorrow', label: 'Next Day' },
    { key: 'this-week', label: 'This Week' },
    { key: 'backlog', label: 'Backlog' }
  ];
  const overflowFilters = [
    { key: 'done', label: 'Done' },
    { key: 'deleted', label: 'Deleted' }
  ];
  const filters = [...primaryFilters, ...overflowFilters];

  // Search mode: filter across all buckets
  const isSearching = todosSearchQuery.trim().length > 0;
  let items;
  if (isSearching) {
    const q = todosSearchQuery.trim().toLowerCase();
    items = (state.todos || []).filter(t => t.text && t.text.toLowerCase().includes(q))
      .sort((a, b) => {
        const pOrder = { today: 0, tomorrow: 1, 'this-week': 2, inbox: 3, backlog: 4, later: 5 };
        const statusOrder = a.status === 'done' ? 1 : 0;
        const statusOrderB = b.status === 'done' ? 1 : 0;
        return statusOrder - statusOrderB || (pOrder[a.priority] ?? 9) - (pOrder[b.priority] ?? 9);
      });
  } else if (todosFilter === 'deleted') {
    items = (state.todos || []).filter(t => t.status === 'dismissed').sort((a, b) => (b.completedAt || '').localeCompare(a.completedAt || ''));
  } else if (todosFilter === 'done') {
    items = (state.todos || []).filter(t => t.status === 'done').sort((a, b) => (b.starred ? 1 : 0) - (a.starred ? 1 : 0) || (b.completedAt || '').localeCompare(a.completedAt || ''));
  } else {
    items = (state.todos || []).filter(t => t.status === 'open' && (t.priority === todosFilter || (todosFilter === 'backlog' && t.priority === 'later'))).sort((a, b) => (b.starred ? 1 : 0) - (a.starred ? 1 : 0) || (a.createdAt || '').localeCompare(b.createdAt || ''));
  }

  // Apply age filter (not during search)
  if (!isSearching && todosAgeFilter !== 'all' && items.length > 0) {
    const now = Date.now();
    const cutoffs = { '1d': 86400000, '1w': 604800000, '2w': 1209600000, '1m': 2592000000 };
    const cutoff = cutoffs[todosAgeFilter];
    if (cutoff) items = items.filter(t => t.createdAt && (now - new Date(t.createdAt).getTime()) >= cutoff);
  }

  const isMobile = window.innerWidth <= 600;
  const visibleFilters = isMobile ? primaryFilters : filters;
  const isOverflowActive = isMobile && overflowFilters.some(f => f.key === todosFilter);
  let filterHtml = visibleFilters.map(f => {
    const count = !isMobile && counts[f.key] ? ' (' + counts[f.key] + ')' : '';
    return `<button class="sub-nav-btn${todosFilter === f.key ? ' active' : ''}" onclick="todosFilter='${f.key}';todosAgeFilter='all';renderTodos()">${f.label}${count}</button>`;
  }).join('');
  if (isMobile) {
    const overflowLabel = isOverflowActive ? overflowFilters.find(f => f.key === todosFilter).label : '···';
    filterHtml += `<div style="position:relative;display:inline-block">
      <button class="sub-nav-btn${isOverflowActive ? ' active' : ''}" onclick="this.nextElementSibling.classList.toggle('hidden')">${overflowLabel}</button>
      <div class="hidden" style="position:absolute;right:0;top:100%;margin-top:4px;background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-sm);box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:20;min-width:120px">
        ${overflowFilters.map(f => `<button style="display:block;width:100%;text-align:left;padding:var(--space-sm) var(--space-md);border:none;background:none;font-size:13px;color:var(--text-primary);cursor:pointer" onclick="todosFilter='${f.key}';todosAgeFilter='all';renderTodos()">${f.label}</button>`).join('')}
      </div>
    </div>`;
  }

  const triageBtnHtml = todosFilter === 'inbox' && items.length > 0
    ? `<button class="btn-secondary btn-accent" style="font-size:${isMobile ? '15px' : '12px'};${isMobile ? 'width:100%;padding:var(--space-lg) var(--space-xl);display:flex;justify-content:center;align-items:center' : ''}" onclick="openMobileTriage('inbox')">Triage Todos (${items.length})</button>`
    : '';

  const slackSyncBtn = state.settings.slackToken
    ? `<button class="btn-secondary" style="font-size:12px" onclick="syncSlackReactions()">Sync from Slack</button>`
    : '';

  const emptyMessages = {
    inbox: 'No new action items. Meeting action items will appear here automatically.',
    today: 'No items for today. Move items here from Inbox.',
    'this-week': 'No items for this week.',
    later: 'No items in the backlog.',
    done: 'No completed items yet.',
    deleted: 'No deleted items.'
  };

  let listHtml;
  if (isSearching) {
    if (!items.length) {
      listHtml = `<div class="todo-empty">No todos matching "${escapeHtml(todosSearchQuery.trim())}"</div>`;
    } else {
      const bucketLabels = { inbox: 'Inbox', today: 'Today', tomorrow: 'Tomorrow', 'this-week': 'This Week', backlog: 'Backlog', later: 'Backlog' };
      const bucketOrder = ['today', 'tomorrow', 'this-week', 'inbox', 'backlog'];
      const grouped = {};
      items.forEach(t => {
        const bucket = t.status === 'done' ? 'done' : (t.priority === 'later' ? 'backlog' : t.priority);
        (grouped[bucket] = grouped[bucket] || []).push(t);
      });
      listHtml = [...bucketOrder, 'done']
        .filter(b => grouped[b]?.length)
        .map(b => `<div class="todo-search-group-label">${b === 'done' ? 'Done' : bucketLabels[b] || b}</div>` + grouped[b].map(t => renderTodoItem(t)).join(''))
        .join('');
    }
  } else if (!items.length) {
    listHtml = `<div class="todo-empty">${emptyMessages[todosFilter]}</div>`;
  } else {
    listHtml = items.map(t => renderTodoItem(t)).join('');
  }

  panel.innerHTML = `
    <div style="margin-bottom:var(--space-xl)">
      <div class="sub-nav" style="margin-bottom:0">${filterHtml}</div>
      ${triageBtnHtml || slackSyncBtn ? `<div style="margin-top:var(--space-md);display:flex;gap:var(--space-sm);flex-wrap:wrap">${triageBtnHtml}${slackSyncBtn}</div>` : ''}
    </div>
    <div class="todo-unified-input" style="display:flex;gap:var(--space-sm);align-items:center">
      ${(todosFilter === 'done' || todosFilter === 'deleted' || todosInputMode === 'search')
        ? `<input type="text" id="todoUnifiedInput" style="flex:1" class="todo-search"
            placeholder="Search todos..." value="${escapeHtml(todosSearchQuery)}"
            oninput="todosSearchQuery=this.value;const _c=this.selectionStart;renderTodos();const _s=document.getElementById('todoUnifiedInput');_s.focus();_s.setSelectionRange(_c,_c)"
            onkeydown="if(event.key==='Escape'){todosInputMode='add';todosSearchQuery='';renderTodos()}">`
        : `<input type="text" id="todoUnifiedInput" style="flex:1" class="todo-add-input"
            placeholder="Add a todo..."
            onkeydown="if(event.key==='Enter'){addManualTodo();event.preventDefault()}">`
      }
      ${todosInputMode === 'add' && todosFilter !== 'done' && todosFilter !== 'deleted'
        ? `<button class="todo-add-recurrence${newTodoRecurrence ? ' active' : ''}" onclick="toggleNewTodoRecurrenceMenu(this)">${recurrenceLabel(newTodoRecurrence)}</button>`
        : ''}
      ${todosFilter !== 'done' && todosFilter !== 'deleted'
        ? (todosInputMode === 'search'
          ? `<button class="btn-icon" onclick="todosInputMode='add';todosSearchQuery='';renderTodos()" style="font-size:16px;color:var(--text-muted)" title="Close search">✕</button>`
          : `<button class="btn-icon" onclick="todosInputMode='search';renderTodos();setTimeout(()=>document.getElementById('todoUnifiedInput')?.focus(),0)" style="font-size:14px;color:var(--text-muted)" title="Search todos">🔍</button>`)
        : (todosSearchQuery ? `<button class="btn-icon" onclick="todosSearchQuery='';renderTodos()" style="font-size:16px;color:var(--text-muted)" title="Clear search">✕</button>` : '')
      }
    </div>
    <div class="todo-list">${listHtml}</div>
  `;
}

function renderTodoItem(todo) {
  const isDone = todo.status === 'done';
  const isManual = !todo.meetingId;
  const meeting = isManual ? null : state.meetings.find(m => m.id === todo.meetingId);
  const meetingDeleted = !meeting && todo.meetingId;
  let sourceLabel, sourceClick, sourceClass;
  if (todo.source === 'subtask') {
    const parent = state.todos.find(t => t.id === todo.parentId);
    sourceLabel = parent ? '<span style="font-weight:400;color:var(--text-muted)">Subtask of</span> <span style="font-weight:600;color:var(--accent-600)">' + escapeHtml(parent.text) + '</span>' : 'Subtask';
    sourceClick = '';
    sourceClass = 'todo-source';
  } else if (todo.source === 'recurring') {
    sourceLabel = 'Recurring';
    sourceClick = '';
    sourceClass = 'todo-source';
  } else if (todo.source === 'slack') {
    sourceLabel = todo.slackPermalink
      ? `<a href="${escapeHtml(todo.slackPermalink)}" target="_blank" style="color:inherit;text-decoration:underline">Slack ${escapeHtml(todo.sourceTitle || '')}</a>`
      : 'Slack' + (todo.sourceTitle ? ' ' + escapeHtml(todo.sourceTitle) : '');
    sourceClick = '';
    sourceClass = 'todo-source';
  } else if (isManual) {
    sourceLabel = 'Manually added';
    sourceClick = '';
    sourceClass = 'todo-source';
  } else {
    sourceLabel = meetingDeleted
      ? `${escapeHtml(todo.meetingTitle)} (deleted)`
      : escapeHtml(todo.meetingTitle || 'Unknown meeting');
    sourceClick = meeting ? `onclick="navigateToMeeting('${escapeHtml(todo.meetingId)}')"` : '';
    sourceClass = meeting ? 'todo-source clickable' : 'todo-source';
  }

  const isDismissed = todo.status === 'dismissed';

  // Reschedule/Schedule button — context-aware destinations per bucket
  const rescheduleBtn = (!isDone && !isDismissed)
    ? `<button class="todo-recurrence-btn" onclick="showRescheduleMenu('${todo.id}', this)">${todo.priority === 'inbox' ? 'Schedule' : 'Reschedule'}</button>`
    : '';

  const dueHtml = todoDueTag(todo.priority);

  const isAddedToPlan = !!(todo.addedToIntention || todo.addedToPlan);

  const recurrenceMeta = isDismissed ? '' : (todo.recurrence
    ? `<span class="todo-recurrence-badge" onclick="toggleTodoRecurrenceMenu('${todo.id}', this)" title="Change recurrence">🔄 ${recurrenceLabel(todo.recurrence)}</span>`
    : (!isDone ? `<button class="todo-recurrence-btn" onclick="toggleTodoRecurrenceMenu('${todo.id}', this)">Set recurring</button>` : ''));

  // Subtask buttons
  const subtasks = (state.todos || []).filter(t => t.parentId === todo.id && t.status !== 'dismissed');
  const isNotSubtask = todo.source !== 'subtask' && !todo.parentId;
  const canNest = !isDismissed && isNotSubtask && subtasks.length === 0;
  const nestBtn = canNest ? `<button class="todo-recurrence-btn" onclick="showNestPicker('${todo.id}', this)">↳ Nest</button>` : '';
  const addSubtaskBtn = (!isDone && !isDismissed && isNotSubtask) ? `<button class="todo-recurrence-btn" onclick="showInlineSubtaskInput('${todo.id}')">+ Subtask</button>` : '';

  // Subtask progress indicator (clickable to expand)
  const allSubtasks = (state.todos || []).filter(t => t.parentId === todo.id);
  const subtaskProgress = subtasks.length > 0
    ? (() => { const done = allSubtasks.filter(s => s.status === 'done').length; return `<span class="todo-subtask-progress" style="cursor:pointer" onclick="toggleParentSubtasks('${todo.id}')">${done}/${allSubtasks.length} subtasks ▸</span>`; })()
    : '';

  // Inline subtask list (hidden by default, toggled by clicking progress)
  const subtaskListHtml = allSubtasks.length > 0
    ? `<div class="todo-subtasks hidden" id="subtasks-${todo.id}">${[...allSubtasks].sort((a, b) => {
        const doneOrder = (b.status === 'done' ? 1 : 0) - (a.status === 'done' ? 1 : 0);
        if (doneOrder !== 0) return doneOrder;
        const pOrder = { today: 0, tomorrow: 1, 'this-week': 2, inbox: 3, backlog: 4, later: 5 };
        return (pOrder[a.priority] ?? 9) - (pOrder[b.priority] ?? 9);
      }).map(s => {
        const sDone = s.status === 'done';
        return `<div class="todo-subtask-inline${sDone ? ' done' : ''}">
          <input type="checkbox" ${sDone ? 'checked' : ''} onchange="toggleTodo('${s.id}')">
          <span class="${sDone ? 'strikethrough' : ''}">${escapeHtml(s.text)} ${todoDueTag(s.priority)}</span>
        </div>`;
      }).join('')}</div>`
    : '';

  const isParent = subtasks.length > 0;
  return `<div class="todo-item${isDone ? ' done' : ''}${todo.starred ? ' starred' : ''}${isAddedToPlan ? ' added-to-plan' : ''}${isParent ? ' todo-parent' : ''}" data-todo-id="${todo.id}">
    <div class="todo-item-main">
      ${isDismissed ? '' : `<input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleTodo('${todo.id}')">`}
      <div class="todo-item-content">
        <div class="todo-text" onclick="startEditTodo('${todo.id}')">${escapeHtml(todo.text)} ${dueHtml}</div>
        <div class="todo-meta">
          <span class="${sourceClass}" ${sourceClick}>${sourceLabel}</span>
          ${!isManual && todo.meetingDate ? `<span class="todo-date">${(todo.meetingDate || '').substring(0, 10)}</span>` : ''}
          <span class="todo-age">${todoAge(todo.createdAt)}</span>
          ${recurrenceMeta}
          ${isDismissed ? '' : `<button class="todo-recurrence-btn${todo.starred ? ' todo-starred-btn' : ''}" onclick="toggleTodoStar('${todo.id}')" title="${todo.starred ? 'Unstar' : 'Star'}">${todo.starred ? '★ Starred' : '☆ Star'}</button>`}
          ${rescheduleBtn}
          ${addSubtaskBtn}
          ${nestBtn}
          ${subtaskProgress}
          ${isDismissed ? `<button class="btn-secondary btn-accent" style="font-size:11px;padding:6px 14px;margin-left:auto;flex-shrink:0" onclick="restoreTodo('${todo.id}')">Restore</button>` : ''}
        </div>
      </div>
    </div>
    ${isDismissed ? '' : (isDone ? '' : `<button class="todo-dismiss-btn" onclick="confirmDismissTodo('${todo.id}', this)" title="Dismiss">&times;</button>`)}
  </div>${subtaskListHtml}`;
}

const priorityOrder = { today: 0, tomorrow: 1, 'this-week': 2, inbox: 3, backlog: 4, later: 5 };

function setTodoPriority(id, priority) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo) return;

  // Check if this is a parent with subtasks that have later deadlines
  const subtasks = (state.todos || []).filter(t => t.parentId === id && t.status === 'open');
  const newOrder = priorityOrder[priority] ?? 9;
  const laterSubtasks = subtasks.filter(t => (priorityOrder[t.priority] ?? 9) > newOrder);

  if (laterSubtasks.length > 0) {
    showDeadlinePullConfirm(todo, priority, laterSubtasks);
    return;
  }

  applyTodoPriority(todo, priority);
}

function applyTodoPriority(todo, priority, pullSubtasks) {
  if (todo.priority === 'today' && priority !== 'today' && todo.status === 'open') {
    todo.deferCount = (todo.deferCount || 0) + 1;
  }
  todo.priority = priority;
  todo.triagedAt = new Date().toISOString();
  if (pullSubtasks) {
    pullSubtasks.forEach(s => {
      s.priority = priority;
      s.triagedAt = new Date().toISOString();
    });
  }
  saveState();
  renderTodos();
}

function showDeadlinePullConfirm(parentTodo, newPriority, laterSubtasks) {
  // Remove any existing modal
  document.querySelector('.deadline-confirm-overlay')?.remove();

  const labels = { today: 'Today', tomorrow: 'Tomorrow', 'this-week': 'This Week', backlog: 'Backlog', later: 'Backlog' };
  const subtaskList = laterSubtasks.map(s =>
    `<div class="deadline-confirm-item"><span>${escapeHtml(s.text.length > 50 ? s.text.substring(0, 50) + '…' : s.text)}</span><span class="deadline-confirm-bucket">${labels[s.priority] || s.priority}</span></div>`
  ).join('');

  const overlay = document.createElement('div');
  overlay.className = 'deadline-confirm-overlay';
  overlay.innerHTML = `<div class="deadline-confirm-modal">
    <div class="deadline-confirm-title">Move subtasks to ${labels[newPriority]}?</div>
    <div class="deadline-confirm-desc">Rescheduling "<strong>${escapeHtml(parentTodo.text.length > 40 ? parentTodo.text.substring(0, 40) + '…' : parentTodo.text)}</strong>" to <strong>${labels[newPriority]}</strong>. These subtasks have later deadlines:</div>
    <div class="deadline-confirm-list">${subtaskList}</div>
    <div class="deadline-confirm-actions">
      <button class="btn-secondary btn-accent" id="deadlineConfirmPull">Move all to ${labels[newPriority]}</button>
      <button class="btn-secondary" id="deadlineConfirmSkip">Keep subtask deadlines</button>
      <button class="btn-ghost" id="deadlineConfirmCancel">Cancel</button>
    </div>
  </div>`;

  document.body.appendChild(overlay);

  overlay.querySelector('#deadlineConfirmPull').addEventListener('click', () => {
    overlay.remove();
    applyTodoPriority(parentTodo, newPriority, laterSubtasks);
  });
  overlay.querySelector('#deadlineConfirmSkip').addEventListener('click', () => {
    overlay.remove();
    applyTodoPriority(parentTodo, newPriority);
  });
  overlay.querySelector('#deadlineConfirmCancel').addEventListener('click', () => {
    overlay.remove();
  });
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });
}

function showRescheduleMenu(todoId, btn) {
  const existing = document.querySelector('.todo-reschedule-menu');
  if (existing) { existing.remove(); return; }

  const todo = state.todos.find(t => t.id === todoId);
  if (!todo) return;

  const allOptions = ['today', 'tomorrow', 'this-week', 'backlog'];
  const labels = { today: 'Today', tomorrow: 'Tomorrow', 'this-week': 'This Week', backlog: 'Backlog' };
  const options = allOptions.filter(p => p !== todo.priority);

  const menu = document.createElement('div');
  menu.className = 'todo-reschedule-menu';
  menu.innerHTML = options.map(p =>
    `<button onclick="setTodoPriority('${todoId}','${p}');document.querySelector('.todo-reschedule-menu')?.remove()">${labels[p]}</button>`
  ).join('');

  btn.style.position = 'relative';
  menu.style.position = 'absolute';
  menu.style.top = '100%';
  menu.style.left = '0';
  menu.style.marginTop = '4px';
  btn.appendChild(menu);

  // Clamp within viewport
  requestAnimationFrame(() => {
    const rect = menu.getBoundingClientRect();
    if (rect.right > window.innerWidth) {
      menu.style.left = 'auto';
      menu.style.right = '0';
    }
  });

  const dismiss = (e) => {
    if (!menu.contains(e.target) && e.target !== btn) {
      menu.remove();
      document.removeEventListener('click', dismiss);
    }
  };
  setTimeout(() => document.addEventListener('click', dismiss), 0);
}

function toggleTodo(id) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo) return;
  if (todo.status === 'done') {
    todo.status = 'open';
    todo.completedAt = null;
    saveState();
    renderTodos();
  } else {
    todo.status = 'done';
    todo.completedAt = new Date().toISOString();
    todo.deferCount = 0;
    const todayEntry = getEntryForDate(todayStr());
    if (todayEntry && todayEntry.workDone && !todayEntry.workDone.includes(todo.text)) {
      todayEntry.workDone += '\n✓ ' + todo.text;
    }
    // Spawn next recurring instance
    if (todo.recurrence) {
      const hasOpenChild = state.todos.some(t => t.parentId === todo.id && t.status === 'open');
      if (!hasOpenChild) {
        spawnRecurringInstance(todo);
        showToast('Next recurring to-do created');
      }
    }
    saveState();
    showFollowUpPrompt(id, 'todos');
  }
}

function toggleTodoStar(id) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo) return;
  todo.starred = !todo.starred;
  saveState();
  renderTodos();
}

function showFollowUpPrompt(todoId, context) {
  // Check chain depth
  const todo = state.todos.find(t => t.id === todoId);
  if (!todo) return;
  let depth = 0;
  let parent = todo;
  while (parent.parentId && depth < 5) {
    parent = state.todos.find(t => t.id === parent.parentId);
    if (!parent) break;
    depth++;
  }

  // Re-render first so the list reflects the completed state
  if (context === 'todos') renderTodos();
  else renderDashboard();

  // Remove any existing follow-up prompt
  const existing = document.getElementById('followUpPrompt');
  if (existing) existing.remove();

  // Try to find the completed todo's DOM element
  let container = document.querySelector(`[data-todo-id="${todoId}"]`);

  // If the todo is no longer visible (filtered out), prepend to the todo list
  let prependMode = false;
  if (!container) {
    const todoList = context === 'todos'
      ? document.querySelector('#panel-todos .todo-list') || document.getElementById('panel-todos')
      : document.querySelector('#panel-dashboard .focus-list') || document.getElementById('panel-dashboard');
    if (!todoList) return;
    container = todoList;
    prependMode = true;
  }

  const prompt = document.createElement('div');
  prompt.id = 'followUpPrompt';
  prompt.className = 'follow-up-prompt';
  prompt.innerHTML = `
    <div class="follow-up-header">${prependMode ? `<span style="font-size:12px;color:var(--text-muted)">✓ ${escapeHtml(todo.text.substring(0, 60))}</span><br>` : ''}+ Follow up?${depth >= 3 ? ' <span style="color:var(--text-muted);font-size:11px">(chain depth: ' + depth + ')</span>' : ''}</div>
    <input class="form-input follow-up-input" id="followUpText" placeholder="What's the next step?">
    <div class="follow-up-schedule">
      <button class="follow-up-when" data-days="0">Today</button>
      <button class="follow-up-when active" data-days="1">Tomorrow</button>
      <button class="follow-up-when" data-days="3">3 days</button>
      <button class="follow-up-when" data-days="7">1 week</button>
      <button class="btn-secondary follow-up-create" onclick="createFollowUp('${todoId}')">Create</button>
    </div>`;

  if (prependMode) {
    container.prepend(prompt);
  } else {
    container.after(prompt);
  }

  // Wire up schedule buttons
  prompt.querySelectorAll('.follow-up-when').forEach(btn => {
    btn.addEventListener('click', () => {
      prompt.querySelectorAll('.follow-up-when').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  const input = document.getElementById('followUpText');
  input.focus();
  input.addEventListener('keydown', e => { if (e.key === 'Enter') createFollowUp(todoId); if (e.key === 'Escape') { prompt.remove(); } });
  // Also listen for focus/input to reset the dismiss timer
  let dismissTimer = setTimeout(() => { prompt.remove(); }, 8000);
  const resetTimer = () => { clearTimeout(dismissTimer); dismissTimer = setTimeout(() => { prompt.remove(); }, 8000); };
  prompt.addEventListener('mouseenter', () => clearTimeout(dismissTimer));
  prompt.addEventListener('mouseleave', () => { dismissTimer = setTimeout(() => { prompt.remove(); }, 5000); });
  input.addEventListener('input', resetTimer);
  input.addEventListener('focus', resetTimer);
}

function createFollowUp(parentId) {
  const input = document.getElementById('followUpText');
  const text = input ? input.value.trim() : '';
  if (!text) return;

  const prompt = document.getElementById('followUpPrompt');
  const activeWhen = prompt?.querySelector('.follow-up-when.active');
  const days = parseInt(activeWhen?.dataset.days || '1');

  const scheduled = new Date();
  scheduled.setDate(scheduled.getDate() + days);
  const scheduledFor = days === 0 ? null : scheduled.toISOString().split('T')[0];

  const id = 'todo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  state.todos.push({
    id, text, status: 'open',
    priority: days === 0 ? 'today' : 'backlog',
    source: 'follow-up', parentId,
    scheduledFor,
    createdAt: new Date().toISOString(),
    completedAt: null, triagedAt: null,
    deferCount: 0
  });
  saveState();

  if (prompt) prompt.remove();
  renderTodos();
  showToast('Follow-up created' + (scheduledFor ? ' — scheduled for ' + scheduledFor : ''));
}

function confirmDismissTodo(id, btn) {

function dismissTodo(id) {

function restoreTodo(id) {

  showToast('To-do restored to ' + ({ today: 'Today', tomorrow: 'Tomorrow', 'this-week': 'This Week', backlog: 'Backlog', inbox: 'Inbox' }[todo.priority] || 'Inbox'));
}

/* ---- Recurring To-Dos ---- */
function recurrenceLabel(freq) {
  const map = { daily: 'Daily', weekdays: 'Weekdays', weekly: 'Weekly', biweekly: 'Biweekly', monthly: 'Monthly' };
  return map[freq] || 'Once';
}

function getNextRecurrenceDate(frequency, fromDate) {
  const d = fromDate ? new Date(fromDate + 'T00:00:00') : new Date();
  switch (frequency) {
    case 'daily': d.setDate(d.getDate() + 1); break;
    case 'weekdays':
      d.setDate(d.getDate() + 1);
      while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() + 1);
      break;
    case 'weekly': d.setDate(d.getDate() + 7); break;
    case 'biweekly': d.setDate(d.getDate() + 14); break;
    case 'monthly': d.setMonth(d.getMonth() + 1); break;
    default: return null;
  }
  return d.toISOString().split('T')[0];
}

function spawnRecurringInstance(todo) {
  const newTodo = {
    id: 'todo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    text: todo.text,
    meetingId: null, meetingTitle: null, meetingDate: null,
    status: 'open',
    priority: 'inbox',
    source: 'recurring',
    recurrence: todo.recurrence,
    scheduledFor: getNextRecurrenceDate(todo.recurrence, todayStr()),
    parentId: todo.id,
    createdAt: new Date().toISOString(),
    completedAt: null,
    triagedAt: null,
    starred: false,
    deferCount: 0
  };
  state.todos.push(newTodo);
  return newTodo;
}

function checkRecurringTodos() {
  const today = todayStr();
  let changed = false;
  for (const todo of (state.todos || [])) {
    if (todo.status !== 'open' || !todo.recurrence || !todo.scheduledFor) continue;
    if (todo.scheduledFor > today) continue;
    // Don't spawn if an open child already exists
    const hasOpenChild = state.todos.some(t => t.parentId === todo.id && t.status === 'open');
    if (hasOpenChild) continue;
    spawnRecurringInstance(todo);
    todo.scheduledFor = getNextRecurrenceDate(todo.recurrence, today);
    changed = true;
  }
  if (changed) saveState();
}

function setTodoRecurrence(id, frequency) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo) return;
  if (frequency) {
    todo.recurrence = frequency;
    todo.scheduledFor = getNextRecurrenceDate(frequency, todayStr());
  } else {
    todo.recurrence = null;
    todo.scheduledFor = null;
  }
  saveState();
  renderTodos();
}

/* ---- Nest Under Parent ---- */
function showNestPicker(todoId, btn) {
  // Remove any existing picker
  const existing = document.querySelector('.nest-picker');
  if (existing) { existing.remove(); return; }

  const todo = state.todos.find(t => t.id === todoId);
  if (!todo) return;

  // Eligible parents: open, top-level, not this todo, not already a subtask itself
  const eligible = (state.todos || []).filter(t =>
    t.id !== todoId && t.status === 'open' && t.source !== 'subtask' && !t.parentId
  ).sort((a, b) => {
    const pOrder = { today: 0, tomorrow: 1, 'this-week': 2, inbox: 3, backlog: 4, later: 5 };
    const pa = pOrder[a.priority] ?? 9, pb = pOrder[b.priority] ?? 9;
    return pa - pb || (b.createdAt || '').localeCompare(a.createdAt || '');
  });

  const picker = document.createElement('div');
  picker.className = 'nest-picker';
  picker.style.position = 'absolute';
  picker.style.top = '100%';
  picker.style.left = '0';
  picker.style.marginTop = '4px';

  const searchInput = document.createElement('input');
  searchInput.className = 'nest-picker-search';
  searchInput.placeholder = 'Search todos...';
  searchInput.addEventListener('keydown', (ev) => ev.stopPropagation());
  searchInput.addEventListener('keyup', (ev) => ev.stopPropagation());
  picker.appendChild(searchInput);

  const listDiv = document.createElement('div');
  listDiv.className = 'nest-picker-list';
  picker.appendChild(listDiv);

  function renderList(filter) {
    const filtered = filter
      ? eligible.filter(t => t.text.toLowerCase().includes(filter.toLowerCase()))
      : eligible;
    if (filtered.length === 0) {
      listDiv.innerHTML = '<div class="nest-picker-empty">No matching todos</div>';
    } else {
      listDiv.innerHTML = filtered.map(t => {
        const label = t.text.length > 40 ? t.text.substring(0, 40) + '…' : t.text;
        return `<button class="nest-picker-item" data-parent-id="${t.id}">${escapeHtml(label)}</button>`;
      }).join('');
      listDiv.querySelectorAll('.nest-picker-item').forEach(b => {
        b.addEventListener('click', () => {
          nestUnderParent(todoId, b.dataset.parentId);
          picker.remove();
          document.removeEventListener('click', dismiss);
        });
      });
    }
  }
  renderList('');

  searchInput.addEventListener('input', () => renderList(searchInput.value));

  // "+ Create new parent..." button
  const createBtn = document.createElement('button');
  createBtn.className = 'nest-picker-create';
  createBtn.textContent = '+ Create new parent...';
  createBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const createInput = document.createElement('input');
    createInput.className = 'nest-picker-create-input';
    createInput.placeholder = 'New parent name...';
    createBtn.replaceWith(createInput);
    createInput.focus();
    createInput.addEventListener('keyup', (ev) => ev.stopPropagation());
    createInput.addEventListener('keydown', (ev) => {
      ev.stopPropagation();
      if (ev.key === 'Enter') {
        const text = createInput.value.trim();
        if (text) {
          createParentAndNest(todoId, text);
          picker.remove();
          document.removeEventListener('click', dismiss);
        }
      } else if (ev.key === 'Escape') {
        picker.remove();
        document.removeEventListener('click', dismiss);
      }
    });
  });
  picker.appendChild(createBtn);

  // Position and append to body (outside button to avoid Space key re-triggering onclick)
  document.body.appendChild(picker);
  const btnRect = btn.getBoundingClientRect();
  picker.style.position = 'fixed';
  picker.style.top = (btnRect.bottom + 4) + 'px';
  picker.style.left = btnRect.left + 'px';
  // Clamp picker within viewport
  requestAnimationFrame(() => {
    const rect = picker.getBoundingClientRect();
    if (rect.right > window.innerWidth) {
      picker.style.left = Math.max(0, window.innerWidth - rect.width) + 'px';
    }
    if (rect.bottom > window.innerHeight) {
      picker.style.top = (btnRect.top - rect.height - 4) + 'px';
    }
  });
  searchInput.focus();

  // Click-outside dismiss
  const dismiss = (e) => {
    if (!picker.contains(e.target) && e.target !== btn) {
      picker.remove();
      document.removeEventListener('click', dismiss);
    }
  };
  setTimeout(() => document.addEventListener('click', dismiss), 0);
}

function nestUnderParent(todoId, parentId) {
  const todo = state.todos.find(t => t.id === todoId);
  const parent = state.todos.find(t => t.id === parentId);
  if (!todo || !parent) return;
  todo.source = 'subtask';
  todo.parentId = parentId;
  // Subtasks keep their own deadline — do not override todo.priority
  saveState();
  renderTodos();
  showToast('Nested under "' + parent.text.substring(0, 30) + '"');
}

function createParentAndNest(todoId, parentText) {
  const todo = state.todos.find(t => t.id === todoId);
  if (!todo) return;
  const newParent = {
    id: 'todo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    text: parentText,
    meetingId: null, meetingTitle: null, meetingDate: null,
    status: 'open',
    priority: todo.priority || 'inbox',
    source: 'manual',
    createdAt: new Date().toISOString(),
    completedAt: null,
    triagedAt: null,
    deferCount: 0
  };
  state.todos.push(newParent);
  nestUnderParent(todoId, newParent.id);
}

function showInlineSubtaskInput(parentId) {
  // If input already exists for this parent, focus it
  const existingInput = document.querySelector(`[data-subtask-input="${parentId}"]`);
  if (existingInput) { existingInput.focus(); return; }

  const parentEl = document.querySelector(`[data-todo-id="${parentId}"]`);
  if (!parentEl) return;

  // Find or create the subtasks container after the parent item
  let subtasksDiv = parentEl.nextElementSibling;
  if (!subtasksDiv || !subtasksDiv.classList.contains('todo-subtasks')) {
    subtasksDiv = document.createElement('div');
    subtasksDiv.className = 'todo-subtasks';
    parentEl.after(subtasksDiv);
  }

  const inputRow = document.createElement('div');
  inputRow.style.cssText = 'display:flex;gap:var(--space-sm);align-items:center;padding:var(--space-sm) var(--space-md)';
  inputRow.innerHTML = `<input data-subtask-input="${parentId}" class="form-input" style="flex:1;font-size:13px;padding:4px 8px" placeholder="Add subtask...">`;
  subtasksDiv.appendChild(inputRow);

  const input = inputRow.querySelector('input');
  input.focus();
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const text = input.value.trim();
      if (!text) return;
      addSubtask(parentId, text);
      input.value = '';
      input.focus();
    } else if (e.key === 'Escape') {
      inputRow.remove();
      if (!subtasksDiv.children.length) subtasksDiv.remove();
    }
  });
  input.addEventListener('blur', () => {
    if (!input.value.trim()) {
      setTimeout(() => { inputRow.remove(); if (!subtasksDiv.children.length) subtasksDiv.remove(); }, 150);
    }
  });
}

function addSubtask(parentId, text) {
  const parent = state.todos.find(t => t.id === parentId);
  if (!parent) return;
  state.todos.push({
    id: 'todo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    text,
    meetingId: null, meetingTitle: null, meetingDate: null,
    status: 'open',
    priority: parent.priority,
    source: 'subtask',
    parentId,
    createdAt: new Date().toISOString(),
    completedAt: null,
    triagedAt: null,
    deferCount: 0
  });
  saveState();
  renderTodos();
}

function toggleParentSubtasks(parentId) {
  const el = document.getElementById('subtasks-' + parentId);
  if (!el) return;
  el.classList.toggle('hidden');
  const parentItem = document.querySelector(`[data-todo-id="${parentId}"]`);
  if (parentItem) {
    const indicator = parentItem.querySelector('.todo-subtask-progress');
    if (indicator) {
      indicator.textContent = indicator.textContent.replace(/[▸▾]$/, el.classList.contains('hidden') ? '▸' : '▾');
    }
  }
}

/* ---- Inline Todo Editing ---- */
function startEditTodo(id) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo || todo.status === 'done') return;
  const item = document.querySelector(`[data-todo-id="${id}"]`);
  if (!item) return;
  const textEl = item.querySelector('.todo-text');
  if (!textEl || textEl.querySelector('.todo-text-editing')) return;
  const input = document.createElement('input');
  input.className = 'todo-text-editing';
  input.value = todo.text;
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); saveEditTodo(id, input.value); }
    if (e.key === 'Escape') { e.preventDefault(); renderTodos(); }
  });
  input.addEventListener('blur', () => saveEditTodo(id, input.value));
  textEl.textContent = '';
  textEl.appendChild(input);
  input.focus();
  input.select();
}

function saveEditTodo(id, newText) {
  const trimmed = (newText || '').trim();
  if (!trimmed) { renderTodos(); return; }
  const todo = state.todos.find(t => t.id === id);
  if (!todo || todo.text === trimmed) { renderTodos(); return; }
  todo.text = trimmed;
  saveState();
  renderTodos();
}

function addManualTodo() {
  const input = document.getElementById('todoUnifiedInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  if (!state.todos) state.todos = [];
  state.todos.push({
    id: 'todo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    text,
    meetingId: null,
    meetingTitle: null,
    meetingDate: null,
    status: 'open',
    priority: todosFilter === 'done' ? 'inbox' : todosFilter,
    createdAt: new Date().toISOString(),
    completedAt: null,
    addedToIntention: null,
    addedToPlan: null,
    recurrence: newTodoRecurrence || null,
    scheduledFor: newTodoRecurrence ? getNextRecurrenceDate(newTodoRecurrence) : null,
    deferCount: 0
  });
  newTodoRecurrence = null;
  saveState();
  input.value = '';
  renderTodos();
}

function navigateToMeeting(meetingId) {
  switchTab('meetings');
  requestAnimationFrame(() => {
    const card = document.querySelector(`.meeting-card[data-meeting-id="${meetingId}"]`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.style.outline = '2px solid var(--accent-interactive)';
      setTimeout(() => { card.style.outline = ''; }, 2000);
    }

}

/* ========================================
   Tab Nav (dynamic)
   ======================================== */
function renderTabNav() {
  const f = state.settings.features || {};
  const tabs = [
    { id: 'dashboard', label: 'Dashboard' },
    { id: 'chat', label: 'Chat' },
    { id: 'log', label: 'Log' },

  ].filter(Boolean);

  const active = document.querySelector('.tab-btn.active')?.dataset.tab || 'dashboard';

    `<button class="tab-btn${t.id === active ? ' active' : ''}" data-tab="${t.id}"${t.title ? ` title="${t.title}"` : ''}${t.style ? ` style="${t.style}"` : ''}>${t.label}</button>`
  ).join('');

function toggleFeature(feature) {
  state.settings.features[feature] = !state.settings.features[feature];
  saveState();
  renderTabNav();
  const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
  if (activeTab === feature && !state.settings.features[feature]) switchTab('log');
}

/* ========================================
   Tab Switching
   ======================================== */
function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabName);
  });
  document.querySelectorAll('.panel').forEach(panel => {
    panel.classList.toggle('active', panel.id === 'panel-' + tabName);

const BASE_SYSTEM_PROMPT = `You are a career coach embedded in a personal work journal. The user's name is Mo — a Senior Product Designer working toward promotion. When generating shareable drafts (weekly plans, Slack posts, briefs), write in first person ("I", "my") as Mo — never refer to Mo in the third person. For coaching notes, analysis, and reflections, address Mo as "you".

Formatting rules for all output:

Your role:

- Treat the user as a smart professional, not a student

Your rules:

- NEVER give generic career advice ("make sure to communicate with your manager")
- DO notice what's unsaid — gaps, avoidance, repeated friction

Your format — strict, no deviation:

Nothing else. No preamble, no sign-off.`;

function getSystemPrompt() {
  const allStakeholders = (state.meetingPreps || []).flatMap(p => p.stakeholders || []);
  if (allStakeholders.length === 0) {
    if (state.settings.insightsProfile) {
      return BASE_SYSTEM_PROMPT + `\n\nUser's personality profile (Insights Discovery):\n${state.settings.insightsProfile}`;
    }
    return BASE_SYSTEM_PROMPT;
  }
  const seen = new Set();
  const unique = allStakeholders.filter(s => {
    const key = s.name.trim().toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  const peopleContext = unique.map(s => `- ${s.name}: ${s.role}`).join('\n');
  let prompt = BASE_SYSTEM_PROMPT + `\n\nKey people in the user's work life:\n${peopleContext}`;
  if (state.settings.insightsProfile) {
    prompt += `\n\nUser's personality profile (Insights Discovery):\n${state.settings.insightsProfile}`;
  }
  return prompt;
}

const API_COST_PER_M = {
  'claude-sonnet-4-6': { input: 3, output: 15 },
  'claude-opus-4-6': { input: 15, output: 75 }
};

function logApiUsage(featureLabel, model, usage) {
  if (!featureLabel || !usage) return;
  try {
    const pricing = API_COST_PER_M[model] || API_COST_PER_M['claude-sonnet-4-6'];
    const inputTokens = usage.prompt_tokens || 0;
    const outputTokens = usage.completion_tokens || 0;
    const cost = (inputTokens * pricing.input + outputTokens * pricing.output) / 1_000_000;
    state.apiUsageLog.push({
      ts: Date.now(),
      feature: featureLabel,
      model: model || 'unknown',
      prompt_tokens: inputTokens,
      completion_tokens: outputTokens,
      total_tokens: inputTokens + outputTokens,
      cost
    });
    if (state.apiUsageLog.length > 500) {
      state.apiUsageLog = state.apiUsageLog.slice(-500);
    }
    try { saveState(); } catch (_) {}
  } catch (_) {}
}

function logApiError(featureLabel, model, errorType) {
  if (!featureLabel) return;
  try {
    state.apiUsageLog.push({
      ts: Date.now(),
      feature: featureLabel,
      model: model || 'unknown',
      error: true,
      errorType: errorType || 'unknown',
      prompt_tokens: 0,
      completion_tokens: 0,
      total_tokens: 0,
      cost: 0
    });
    if (state.apiUsageLog.length > 500) {
      state.apiUsageLog = state.apiUsageLog.slice(-500);
    }
    try { saveState(); } catch (_) {}
  } catch (_) {}
}

async function callClaude(systemPrompt, userPrompt, maxTokens, featureLabel) {
  if (!state.settings.baseUrl) throw new Error('no_key');

  const model = state.settings.model === 'opus' ? 'claude-opus-4-6' : 'claude-sonnet-4-6';
  const baseUrl = state.settings.baseUrl.replace(/\/+$/, '');

  const headers = { 'Content-Type': 'application/json' };
  if (state.settings.projectId) {
    headers['x-netflix-copilot-project-id'] = state.settings.projectId;
  }
  if (state.settings.apiKey) {
    headers['Authorization'] = 'Bearer ' + state.settings.apiKey;
  }

  const res = await fetch(baseUrl + '/v1/chat/completions', {
    method: 'POST',
    headers,
    body: JSON.stringify({
      model,
      max_tokens: maxTokens,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userPrompt }
      ]
    })
  });

  if (!res.ok) {
    const errType = (res.status === 401 || res.status === 403) ? 'invalid_key' : res.status === 429 ? 'rate_limited' : 'api_error';
    logApiError(featureLabel, model, errType);
    if (errType === 'invalid_key') throw new Error('invalid_key');
    if (errType === 'rate_limited') throw new Error('rate_limited');
    let detail = '';
    try { const errBody = await res.text(); detail = errBody.substring(0, 500); } catch (_) {}
    console.error('API error:', res.status, detail);
    throw new Error('api_error: ' + res.status + ' ' + detail);
  }

  const data = await res.json();
  logApiUsage(featureLabel, model, data.usage);
  return data.choices[0].message.content;
}

function buildChatSystemPrompt() {
  const name = state.settings.name || 'the user';
  const today = new Date().toISOString().split('T')[0];
  const promo = state.settings.promotionNotes || 'No promotion notes set.';

  // Vector scores with detail
  let vectorBlock = '';
  if (state.vectors && state.vectors.length > 0) {
    const lines = state.vectors.map(v => {
      const sc = state.vectorScoreCache[v.id] || {};
      const stale = sc.daysSinceLast >= 0 ? `last ${sc.daysSinceLast}d ago` : 'never';
      return `- ${v.name}: ${sc.tier || 'No evidence'} (score ${sc.score || 0}, ${sc.winCount || 0} wins, ${sc.meetingSignalCount || 0} meeting signals, ${sc.visibilityCount || 0} visibility posts) ${stale}`;
    }).join('\n');
    vectorBlock = `\n<vectors>\n${lines}\n</vectors>`;
  }

  // Active coaching observations
  let coachingBlock = '';
  const escalated = getEscalatedObservations();
  if (escalated.length > 0) {
    const lines = escalated.map(o => `- [L${o.escalationLevel}] "${o.topic}" (surfaced ${o.timesShown}x)`).join('\n');
    coachingBlock = `\n<coaching_observations>\n${lines}\n</coaching_observations>`;
  }

  // Open loops (top 8)
  let loopsBlock = '';
  const loops = getComputedOpenLoops();
  if (loops.length > 0) {
    const lines = loops.slice(0, 8).map(l => `- ${l.description} (${l.ageDays}d old, L${l.escalationLevel})`).join('\n');
    loopsBlock = `\n<open_loops>\n${lines}\n</open_loops>`;
  }

  // Insights profile
  const insightsBlock = state.settings.insightsProfile
    ? `\n<personality_profile>\n${state.settings.insightsProfile}\n</personality_profile>`
    : '';

  // Recent entries (last 5, compressed)
  const recentEntries = (state.entries || []).sort((a, b) => (b.date || '').localeCompare(a.date || '')).slice(0, 5);
  let entriesBlock = '';
  if (recentEntries.length > 0) {
    const lines = recentEntries.map(e => `[${e.date}] E:${e.energy || '?'}/10 ${e.mood || ''} — ${(e.workDone || '').substring(0, 100)}`).join('\n');
    entriesBlock = `\n<recent_entries>\n${lines}\n</recent_entries>`;
  }

  // Key people from meeting preps
  const allStakeholders = (state.meetingPreps || []).flatMap(p => p.stakeholders || []);
  const uniquePeople = [...new Map(allStakeholders.map(s => [s.name.toLowerCase(), s])).values()];
  let peopleBlock = '';
  if (uniquePeople.length > 0) {
    const lines = uniquePeople.slice(0, 15).map(s => `- ${s.name} (${s.role})`).join('\n');
    peopleBlock = `\n<key_people>\n${lines}\n</key_people>`;
  }

  return `You are ${name}'s career companion in WorkOS. Today is ${today}.

You are opinionated, direct, and evidence-backed. You push back when something doesn't add up. You cite specific dates, entries, and data points — never be generic. When drafting anything (visibility posts, narratives, meeting prep), always write in first person as ${name}.

You have full context about ${name}'s career trajectory:

<promotion_context>
${promo}
</promotion_context>

<snapshot>
${state.compressedSnapshot || 'No snapshot available.'}
</snapshot>
${vectorBlock}${coachingBlock}${loopsBlock}${insightsBlock}${entriesBlock}${peopleBlock}

Guidelines:
- Be concise and direct. No preamble or sign-offs.
- Cite specific evidence (dates, entries, scores) when making claims.
- Push back if the user is avoiding something the data shows.
- When generating artifacts (visibility posts, narratives), make them ready to use — not templates.
- Use markdown formatting: **bold** for emphasis, bullet lists for structure.
- If asked about a vector, reference its tier, score, and staleness.
- If asked about a person, reference past meetings and interactions.`;
}

async function buildChatTier2Context(userMessage) {
  const msg = userMessage.toLowerCase();
  let extra = [];

  // @memory trigger — query MemPalace for deep context
  if (msg.startsWith('@memory ') || msg.startsWith('@memory:')) {
    const query = userMessage.replace(/^@memory[:\s]+/i, '').trim();
    if (query) {
      const memResults = await queryMemPalace(query);
      if (memResults) extra.push(memResults);
    }
  }

  // Feedback / meeting feedback
  if (msg.includes('feedback')) {
    const meetings = (state.meetings || []).filter(m => m.feedback).sort((a, b) => (meetingDateStr(b)).localeCompare(meetingDateStr(a))).slice(0, 10);
    if (meetings.length > 0) {
      extra.push('<meeting_feedback>\n' + meetings.map(m => `[${meetingDateStr(m)}] ${m.title}: ${m.feedback}`).join('\n') + '\n</meeting_feedback>');
    }
  }

  // Person mentioned
  const person = findMentionedPerson(msg);
  if (person) {
    const meetings = (state.meetings || []).filter(m => {
      const prep = (state.meetingPreps || []).find(p => p.meetingId === m.id);
      if (!prep) return false;
      return (prep.stakeholders || []).some(s => s.name.toLowerCase().includes(person.toLowerCase()));
    }).sort((a, b) => (meetingDateStr(b)).localeCompare(meetingDateStr(a))).slice(0, 8);
    if (meetings.length > 0) {
      extra.push(`<meetings_with_${person.replace(/\s+/g, '_')}>\n` + meetings.map(m => `[${meetingDateStr(m)}] ${m.title}${m.notes ? ': ' + m.notes.substring(0, 150) : ''}`).join('\n') + `\n</meetings_with_${person.replace(/\s+/g, '_')}>`);
    }
  }

  // Vector / progress / promotion
  if (msg.includes('vector') || msg.includes('progress') || msg.includes('promotion')) {
    const evidenceLines = [];
    for (const v of (state.vectors || [])) {
      const wins = (state.wins || []).filter(w => w.status === 'confirmed' && (w.vectors || []).includes(v.id)).slice(0, 3);
      if (wins.length > 0) {
        evidenceLines.push(`${v.name}: ${wins.map(w => `"${w.description}" (${w.date})`).join('; ')}`);
      }
    }
    if (evidenceLines.length > 0) {
      extra.push('<vector_evidence>\n' + evidenceLines.join('\n') + '\n</vector_evidence>');
    }
  }

  // Win / achievement
  if (msg.includes('win') || msg.includes('achievement')) {
    const wins = (state.wins || []).filter(w => w.status === 'confirmed').sort((a, b) => (b.date || '').localeCompare(a.date || '')).slice(0, 15);
    if (wins.length > 0) {
      extra.push('<confirmed_wins>\n' + wins.map(w => `[${w.date}] ${w.description}`).join('\n') + '\n</confirmed_wins>');
    }
  }

  // Visibility / post / draft
  if (msg.includes('visibility') || msg.includes('post') || msg.includes('draft')) {
    const vis = (state.visibilityActivities || []).sort((a, b) => (b.date || '').localeCompare(a.date || '')).slice(0, 10);
    if (vis.length > 0) {
      extra.push('<visibility_history>\n' + vis.map(v => `[${v.date}] ${v.type}: ${(v.description || '').substring(0, 100)}`).join('\n') + '\n</visibility_history>');
    }
  }

  // Todo / focus / week
  if (msg.includes('todo') || msg.includes('focus') || msg.includes('week')) {
    const todos = (state.todos || []).filter(t => t.status !== 'done').sort((a, b) => (a.priority || 99) - (b.priority || 99)).slice(0, 15);
    if (todos.length > 0) {
      extra.push('<open_todos>\n' + todos.map(t => `- [P${t.priority || '?'}] ${t.description}${t.dueDate ? ' (due ' + t.dueDate + ')' : ''}`).join('\n') + '\n</open_todos>');
    }
  }

  // Meeting / 1:1
  if (msg.includes('meeting') || msg.includes('1:1') || msg.includes('one on one')) {
    const meetings = (state.meetings || []).sort((a, b) => (meetingDateStr(b)).localeCompare(meetingDateStr(a))).slice(0, 10);
    if (meetings.length > 0) {
      extra.push('<recent_meetings>\n' + meetings.map(m => `[${meetingDateStr(m)}] ${m.title}${m.notes ? ': ' + m.notes.substring(0, 100) : ''}`).join('\n') + '\n</recent_meetings>');
    }
  }

  // Narrative / promotion case
  if (msg.includes('narrative') || msg.includes('promotion case')) {
    const reflections = Object.entries(state.monthlyReflections || {}).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 6);
    if (reflections.length > 0) {
      extra.push('<monthly_reflections>\n' + reflections.map(([month, r]) => `[${month}] ${(r.summary || r.content || '').substring(0, 200)}`).join('\n') + '\n</monthly_reflections>');
    }
  }

  return extra.length > 0 ? '\n\n[Additional context for this message]\n' + extra.join('\n\n') : '';
}

async function queryMemPalace(query) {
  if (!state.settings.mempalaceServerUrl) return null;
  try {
    const url = state.settings.mempalaceServerUrl.replace(/\/$/, '');
    const resp = await fetch(url + '/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, limit: 5 }),
      signal: AbortSignal.timeout(2000)
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    if (!data.results || data.results.length === 0) return null;
    const lines = data.results.map(r => `[${r.source || 'unknown'}] (score: ${(r.score || 0).toFixed(2)})\n${(r.content || '').substring(0, 500)}`).join('\n\n');

const HUMANIZER_SYSTEM_PROMPT = `You are a writing editor. Your job is to rewrite AI-generated text so it reads as natural, human-written prose. Remove these 25 common AI writing patterns:

CONTENT: 1) Undue significance — remove "pivotal", "testament to", "crucial", "vital" unless truly warranted. 2) Notability emphasis — cut "renowned", "famous", "notable" filler. 3) Superficial analysis — replace vague claims with specifics. 4) Vague attributions — "many believe", "widely regarded" → name the source or cut it. 5) Promotional language — cut "vibrant", "bustling", "nestled", "tapestry". 6) Outdated references — remove "as of [date]", "in recent years".

LANGUAGE: 7) AI vocabulary — replace "delve", "leverage", "facilitate", "foster", "landscape", "realm", "embark", "navigate", "intricate", "nuanced", "multifaceted", "comprehensive", "robust", "synergy", "paradigm", "holistic", "pivotal", "commendable", "noteworthy", "invaluable" with plain words. 8) Copula overuse — vary sentence structure beyond "X is Y". 9) Negative parallelisms — cut "not only...but also", "not just...but". 10) Filler phrases — cut "it is important to note that", "it is worth mentioning that", "it should be noted that". 11) Weasel words — cut "some", "various", "several", "many" when vague.

STYLE: 12) Em dash overuse — replace most em dashes with commas, periods, or parentheses. 13) Rule of three — if three adjectives/items appear together in a pattern, vary it. 14) Semicolon overuse — break into separate sentences. 15) Colon overuse for elaboration — restructure. 16) Exclamation marks — remove unless truly warranted. 17) Sycophantic openers — never start with "Great question!" or "Absolutely!".

COMMUNICATION: 18) Hedging — cut "arguably", "perhaps it could be said". 19) Disclaimers — remove "I'm just an AI" or "I cannot provide personal advice". 20) Over-summarizing — don't restate what was just said. 21) Formulaic transitions — cut "furthermore", "moreover", "additionally". 22) Bolding key terms — remove bold from terms that don't need emphasis. 23) Repetitive structure — vary paragraph/bullet patterns. 24) Outline-like headers — only use headers if the original had them. 25) Generic conclusions — cut "in conclusion", "overall", "in summary" wrap-ups. 26) Causal labels without explanation — "structural", "systemic", "inherent", "fundamental", "organic", "intrinsic", "natural (as cause)" label a cause without stating the mechanism. Replace the label with the actual mechanism, or delete the sentence if it just restates "there is a gap." Test: substitute "because of how X works" — if still vague, the original did no work.

PROCESS:
1. Scan the text for the 25 patterns above
2. Rewrite affected sections using plain, direct language
3. Keep the same meaning, facts, and structure (markdown bold headers, bullets)
4. Add personality: vary sentence length, use first person where appropriate, be specific not generic
5. Return ONLY the rewritten text — no commentary, no before/after, no explanations`;

function parseWeeklyBrief(text) {
  const sections = { patterns: '', vectorCheckIn: '', winsRaw: '', oneOnOnePrep: '', vectorProgress: '', openLoopsSummary: '' };
  const parts = text.split(/^## /m).filter(Boolean);

  for (const part of parts) {
    const firstLine = part.split('\n')[0].trim().toUpperCase();
    const content = part.split('\n').slice(1).join('\n').trim();
    if (firstLine.includes('PATTERN')) sections.patterns = content;
    else if (firstLine === 'VECTORS' || firstLine === 'VECTOR CHECK-IN') sections.vectorCheckIn = content;
    else if (firstLine.includes('VECTOR PROGRESS')) sections.vectorProgress = content;
    else if (firstLine.includes('OPEN LOOP')) sections.openLoopsSummary = content;
    else if (firstLine.includes('WIN')) sections.winsRaw = content;
    else if (firstLine.includes('1:1') || firstLine.includes('PREP')) sections.oneOnOnePrep = content;
  }

  const wins = [];
  const winRegex = /WIN:\s*(.+?)(?:\n)IMPACT:\s*(.+?)(?:\n)VECTOR:\s*(.+?)(?=\n\s*\n|\n*WIN:|\s*$)/gs;
  let match;
  while ((match = winRegex.exec(sections.winsRaw)) !== null) {
    wins.push({ description: match[1].trim(), impact: match[2].trim(), vector: match[3].trim() });
  }

  return { ...sections, winsDetected: wins };
}

function meetingDateStr(m) {
  // Normalize meeting date (ISO string or YYYY-MM-DD) to YYYY-MM-DD in local timezone
  if (!m.date) return '';
  if (m.date.length <= 10) return m.date;
  const d = new Date(m.date);
  if (isNaN(d.getTime())) return m.date.substring(0, 10);
  // Use local date parts to avoid UTC offset issues (e.g., 2026-03-20T04:00Z = Mar 19 in Pacific)
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${mo}-${day}`;
}

function findMeetingsForPrep(record) {
  const since = record.lastConnected;
  if (!since) return [];
  const names = record.stakeholders.map(s => s.name.trim().toLowerCase());
  const titleMatch = record.recurringTitle ? record.recurringTitle.trim().toLowerCase() : '';
  return state.meetings.filter(m => {
    const mDate = meetingDateStr(m);
    if (!mDate || mDate < since) return false;
    const participantsLower = (m.participants || '').toLowerCase();
    const transcriptLower = (m.transcript || '').toLowerCase().substring(0, 2000);
    const titleLower = (m.title || '').toLowerCase();
    if (titleMatch && titleLower.includes(titleMatch)) return true;
    return names.some(n => participantsLower.includes(n) || transcriptLower.includes(n));
  }).sort((a, b) => meetingDateStr(b).localeCompare(meetingDateStr(a))).slice(0, 5);
}

function meetingTitleMatches(meetingTitle, recurringTitle) {
  const mt = (meetingTitle || '').toLowerCase();
  const rt = recurringTitle.toLowerCase();
  if (mt.includes(rt) || rt.includes(mt)) return true;
  // Also match by stakeholder names in the title (e.g., "Sharania / Mo" matches a prep with stakeholder "Sharania")
  return false;
}

function findUnprocessedMeetings(record) {
  const titleMatch = record.recurringTitle ? record.recurringTitle.trim().toLowerCase() : '';
  if (!titleMatch) return [];
  const syntheses = record.syntheses || [];
  const processedIds = new Set(syntheses.map(s => s.meetingId));
  const stakeholderNames = record.stakeholders.map(s => s.name.trim().toLowerCase());
  return state.meetings
    .filter(m => {
      if (!meetingDateStr(m)) return false;
      if (processedIds.has(m.id)) return false;
      const mt = (m.title || '').toLowerCase();
      // Match by title inclusion (bidirectional)
      if (mt.includes(titleMatch) || titleMatch.includes(mt)) return true;
      // Match by stakeholder name appearing in meeting title
      if (stakeholderNames.some(n => mt.includes(n))) return true;
      return false;
    })
    .sort((a, b) => meetingDateStr(b).localeCompare(meetingDateStr(a)));
}

function parseMeetingPrep(text) {
  const sections = {
    sinceLastTime: '', commitments: '', theirSignals: '',
    patternFlags: '', suggestedFraming: '', conversationArc: ''
  };
  const parts = text.split(/^## /m).filter(Boolean);
  for (const part of parts) {
    const firstLine = part.split('\n')[0].trim().toUpperCase();
    const content = part.split('\n').slice(1).join('\n').trim();
    if (firstLine.includes('SINCE')) sections.sinceLastTime = content;
    else if (firstLine.includes('COMMITMENT')) sections.commitments = content;
    else if (firstLine.includes('SIGNAL')) sections.theirSignals = content;
    else if (firstLine.includes('PATTERN')) sections.patternFlags = content;
    else if (firstLine.includes('FRAMING') || firstLine.includes('TALKING')) sections.suggestedFraming = content;
    else if (firstLine.includes('ARC')) sections.conversationArc = content;
  }
  return sections;
}

    const systemPrompt = getSystemPrompt() + '\n\nFor this meeting prep, produce a structured response in exactly the format specified. Be specific, reference actual meetings and entries. Never fabricate.';
    const text = await callClaude(systemPrompt, prompt, 2500, 'Meeting Prep');
    const parsed = parseMeetingPrep(text);

    const prep = {
      id: Date.now(),
      generatedAt: new Date().toISOString(),
      lastConnected: record.lastConnected,
      ...parsed,
      raw: text
    };
    record.preps.unshift(prep);
    record.lastConnected = todayStr();
    saveState();

    meetingPrepView = 'detail';
    renderBriefs();
    showToast('Meeting prep generated');
  } catch (e) {
    console.warn('Meeting prep generation failed:', e);
    meetingPrepView = 'detail';
    renderBriefs();
    const msg = e.message || '';
    const reason = msg === 'invalid_key' ? 'invalid API key' :
                   msg === 'rate_limited' ? 'rate limited — try again' :
                   msg === 'no_key' ? 'no API configured' :
                   msg.startsWith('api_error') ? msg :
                   'generation failed: ' + msg;
    showToast('Meeting prep failed: ' + reason);
  }
}

function buildSynthesisPrompt(record, meeting, reflection) {
  const stakeholderList = record.stakeholders.map(s => `${s.name} — ${s.role}`).join('\n');
  const syntheses = record.syntheses || [];

  let transcriptText = '';
  if (meeting.transcript) transcriptText = meeting.transcript.substring(0, 12000);

  let meetingContext = `[${meetingDateStr(meeting)}] ${meeting.title || 'Untitled'}`;
  if (meeting.summary) meetingContext += `\nSummary: ${meeting.summary}`;
  if (meeting.actionItems) meetingContext += `\nAction items from transcript: ${meeting.actionItems}`;
  if (meeting.insights) {
    const insightEntries = Object.entries(meeting.insights).filter(([k, v]) => v && typeof v === 'string' && v.trim());
    if (insightEntries.length > 0) meetingContext += '\nInsights: ' + insightEntries.map(([k, v]) => `${k}: ${v}`).join(' | ');
  }

  let pastSynthesesText = '';
  if (syntheses.length > 0) {
    pastSynthesesText = syntheses.map(s =>
      `[${s.meetingDate}] ${s.meetingTitle}\nReflection: ${s.reflection}\nSynthesis: ${s.synthesis}\nAction Items: ${s.actionItems}`
    ).join('\n---\n');
  }

  return `<stakeholders>
${stakeholderList}
</stakeholders>

<meeting_context>
Purpose: ${record.meetingPurpose || 'general check-in'}
Tone: ${formatTones(record.meetingTone)}
</meeting_context>

<meeting_details>
${meetingContext}
</meeting_details>

${transcriptText ? `<meeting_transcript>
${transcriptText}
</meeting_transcript>

` : ''}<post_meeting_reflection>
${reflection}
</post_meeting_reflection>

${pastSynthesesText ? `<previous_syntheses>
${pastSynthesesText}
</previous_syntheses>

` : ''}You are synthesizing a post-meeting reflection. The user just attended this meeting and wrote their reflection above. Combine the meeting transcript, any summary/action items, and the user's reflection into a concise synthesis.

Generate exactly these two sections:

## SYNTHESIS
Distilled takeaways from this meeting. What was discussed, what decisions were made, what shifted. Be specific and reference the transcript. Connect to themes from previous syntheses if relevant.

## ACTION ITEMS
Concrete next steps with owners where identifiable. Format each as: - [action] (owner if known)
Include items from the transcript, the user's reflection, and any that emerge from the synthesis.`;
}

function parseSynthesis(text) {
  const result = { synthesis: '', actionItems: '' };
  const parts = text.split(/^## /m).filter(Boolean);
  for (const part of parts) {
    const firstLine = part.split('\n')[0].trim().toUpperCase();
    const content = part.split('\n').slice(1).join('\n').trim();
    if (firstLine.includes('SYNTHESIS')) result.synthesis = content;
    else if (firstLine.includes('ACTION')) result.actionItems = content;
  }
  return result;
}

function openNudgeReflection(prepId, meetingId) {
  dismissedNudges.add(meetingId);
  currentMeetingPrepId = prepId;

function openReflectionModal(prepId) {

function closeReflectionModal() {

let synthesisLoadingForPrepId = null;
let lastGeneratedSynthesisId = null;

function submitReflection(prepId) {
  const textarea = document.getElementById('reflectionModalTextarea');
  const reflection = textarea ? textarea.value.trim() : '';
  if (!reflection) return;

  closeReflectionModal();

  // Show loading state and auto-generate
  synthesisLoadingForPrepId = prepId;
  renderBriefs();
  startGenerateSynthesis(prepId, reflection);
}

async function startGenerateSynthesis(prepId, reflection) {
  const record = state.meetingPreps.find(p => p.id === prepId);
  if (!record) { showToast('Prep record not found'); return; }
  if (!state.settings.baseUrl) { showToast('Set up AI in Settings first'); return; }

  const meeting = state.meetings.find(m => m.id === selectedSynthesisMeetingId);
  if (!meeting) { showToast('Selected meeting not found'); return; }

  try {
    const prompt = buildSynthesisPrompt(record, meeting, reflection);
    const systemPrompt = getSystemPrompt() + '\n\nSynthesize the post-meeting reflection with the transcript. Be specific, reference actual content. Never fabricate.';
    const text = await callClaude(systemPrompt, prompt, 1500, 'Meeting Synthesis');
    const parsed = parseSynthesis(text);

    const synthId = Date.now();
    if (!record.syntheses) record.syntheses = [];
    record.syntheses.unshift({
      id: synthId,
      meetingId: meeting.id,
      meetingDate: meetingDateStr(meeting),
      meetingTitle: meeting.title || 'Untitled',
      reflection,
      synthesis: parsed.synthesis,
      actionItems: parsed.actionItems,
      generatedAt: new Date().toISOString(),
      raw: text
    });
    // Add action items to todos inbox
    if (parsed.actionItems) {
      parseActionItemsToTodos({ id: meeting.id, actionItems: parsed.actionItems, title: meeting.title || 'Untitled', date: meeting.date });
    }
    selectedSynthesisMeetingId = null;
    synthesisLoadingForPrepId = null;
    lastGeneratedSynthesisId = synthId;
    saveState();
    renderBriefs();
    showToast('Synthesis generated');
  } catch (e) {
    console.warn('Synthesis generation failed:', e);
    synthesisLoadingForPrepId = null;
    // Save the reflection even on failure so it's not lost
    if (!record.syntheses) record.syntheses = [];
    record.syntheses.unshift({
      id: Date.now(),
      meetingId: meeting.id,
      meetingDate: meetingDateStr(meeting),
      meetingTitle: meeting.title || 'Untitled',
      reflection,
      synthesis: '',
      actionItems: '',
      generatedAt: new Date().toISOString(),
      raw: '',
      failed: true
    });
    selectedSynthesisMeetingId = null;
    saveState();
    renderBriefs();
    const reason = e.message === 'invalid_key' ? 'invalid API key' :
                   e.message === 'rate_limited' ? 'rate limited' :
                   e.message === 'no_key' ? 'no API configured' : 'generation failed';
    showToast('Synthesis failed: ' + reason);
  }
}

let dismissedNudges = new Set(); // in-memory only, resets on reload

function getMeetingNudges() {
  const today = todayStr();
  const twoDaysAgo = new Date();
  twoDaysAgo.setDate(twoDaysAgo.getDate() - 2);
  const cutoff = twoDaysAgo.toISOString().split('T')[0];
  const nudges = [];
  for (const record of (state.meetingPreps || [])) {
    const unprocessed = findUnprocessedMeetings(record);
    for (const m of unprocessed) {
      if (meetingDateStr(m) < cutoff) continue; // only nudge for meetings within last 2 days
      if (dismissedNudges.has(m.id)) continue;
      nudges.push({ meeting: m, record });
    }
  }
  return nudges.sort((a, b) => meetingDateStr(b.meeting).localeCompare(meetingDateStr(a.meeting))).slice(0, 3);
}

function renderMeetingNudgeBanners() {
  const nudges = getMeetingNudges();
  if (nudges.length === 0) return '';
  return nudges.map(n => {
    const d = new Date(meetingDateStr(n.meeting) + 'T00:00:00');
    const ds = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const stakeholderStr = n.record.stakeholders.map(s => s.name).join(', ');
    const meetingIdEsc = escapeHtml(JSON.stringify(n.meeting.id));
    return `<div class="meeting-nudge-banner" onclick='openNudgeReflection(${n.record.id}, ${meetingIdEsc})'>
      <button class="meeting-nudge-banner-dismiss" onclick='event.stopPropagation();dismissedNudges.add(${meetingIdEsc});document.getElementById("meetingNudges").innerHTML=renderMeetingNudgeBanners()'>×</button>
      <div class="meeting-nudge-banner-text">
        <div class="meeting-nudge-banner-title">${escapeHtml(n.meeting.title || 'Untitled')} · ${ds}</div>
        <div class="meeting-nudge-banner-meta">with ${escapeHtml(stakeholderStr)}</div>
      </div>
      <div class="meeting-nudge-banner-cta">Write reflection →</div>
    </div>`;
  }).join('');
}

async function retrySynthesis(prepId, synthIndex) {
  const record = state.meetingPreps.find(p => p.id === prepId);
  if (!record || !record.syntheses[synthIndex]) return;
  const failedSynth = record.syntheses[synthIndex];
  if (!state.settings.baseUrl) { showToast('Set up AI in Settings first'); return; }

  const meeting = state.meetings.find(m => m.id === failedSynth.meetingId);
  if (!meeting) { showToast('Original meeting not found'); return; }

  synthesisLoadingForPrepId = prepId;
  renderBriefs();

  try {
    const prompt = buildSynthesisPrompt(record, meeting, failedSynth.reflection);
    const systemPrompt = getSystemPrompt() + '\n\nSynthesize the post-meeting reflection with the transcript. Be specific, reference actual content. Never fabricate.';
    const text = await callClaude(systemPrompt, prompt, 1500, 'Meeting Synthesis');
    const parsed = parseSynthesis(text);

    failedSynth.synthesis = parsed.synthesis;
    failedSynth.actionItems = parsed.actionItems;
    failedSynth.raw = text;
    delete failedSynth.failed;
    failedSynth.generatedAt = new Date().toISOString();

    // Add action items to todos inbox
    if (parsed.actionItems) {
      parseActionItemsToTodos({ id: meeting.id, actionItems: parsed.actionItems, title: meeting.title || 'Untitled', date: meeting.date });
    }

    synthesisLoadingForPrepId = null;
    lastGeneratedSynthesisId = failedSynth.id;
    saveState();
    renderBriefs();
    showToast('Synthesis generated');
  } catch (e) {
    console.error('Retry synthesis failed:', e);
    synthesisLoadingForPrepId = null;
    renderBriefs();
    showToast('Retry failed: ' + e.message);
  }
}

function addTodoToIntention(todoId) {
