  const match = text.match(/^(@\S+)\s+(.+)$/);
  if (match) return `<strong>${escapeHtml(match[1])}</strong> — ${escapeHtml(match[2])}`;
  return escapeHtml(text);
}

    const summary = actionLines.length
      ? actionLines[0].replace(/^\s*[-•]\s*/, '').trim()

    const d = new Date(entry.date + 'T12:00:00');

        `Distill into a checklist:\n"${text}"`,

/* ========================================
   Dashboard Tab
   ======================================== */
let dashboardTimeRange = 'quarter'; // 'month' | 'quarter' | '6mo'

/* ========================================
   Monthly / Quarterly Reflections
   ======================================== */
let reflectionStep = 0; // 0=not active, 1=data, 2=reflect, 3=synthesis
let reflectionType = null; // 'monthly' | 'quarterly'
let reflectionPeriodKey = null;

function getLastMonthKey() {
  const d = new Date();
  d.setMonth(d.getMonth() - 1);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function getLastQuarterKey() {
  const d = new Date();
  const q = Math.floor(d.getMonth() / 3);
  const prevQ = q === 0 ? 3 : q - 1;
  const year = q === 0 ? d.getFullYear() - 1 : d.getFullYear();
  return year + '-Q' + (prevQ + 1);
}

function isReflectionNeeded() {
  const today = todayStr();
  const dom = new Date().getDate();

  // Quarterly: first 7 days of Jan/Apr/Jul/Oct
  const month = new Date().getMonth();
  if ([0, 3, 6, 9].includes(month) && dom <= 7) {
    const qKey = getLastQuarterKey();
    if (!state.quarterlyReflections[qKey]) {
      reflectionType = 'quarterly';
      reflectionPeriodKey = qKey;
      return true;
    }
  }

  // Monthly: first 5 days of each month
  if (dom <= 5) {
    const mKey = getLastMonthKey();
    if (!state.monthlyReflections[mKey]) {
      reflectionType = 'monthly';
      reflectionPeriodKey = mKey;
      return true;
    }
  }

  return false;
}

function getReflectionData(periodKey, type) {
  // Determine date range
  let startDate, endDate;
  if (type === 'monthly') {
    const [y, m] = periodKey.split('-');
    startDate = `${y}-${m}-01`;
    const end = new Date(parseInt(y), parseInt(m), 0);
    endDate = `${y}-${m}-${String(end.getDate()).padStart(2, '0')}`;
  } else {
    const [y, qStr] = periodKey.split('-Q');
    const q = parseInt(qStr) - 1;
    const startMonth = q * 3;
    startDate = `${y}-${String(startMonth + 1).padStart(2, '0')}-01`;
    const endMonth = startMonth + 2;
    const endDay = new Date(parseInt(y), endMonth + 1, 0).getDate();
    endDate = `${y}-${String(endMonth + 1).padStart(2, '0')}-${String(endDay).padStart(2, '0')}`;
  }

  // Gather data for period
  const entries = (state.entries || []).filter(e => e.date >= startDate && e.date <= endDate);
  const energyAvg = entries.length > 0 ? (entries.reduce((s, e) => s + (e.energy || 0), 0) / entries.length).toFixed(1) : '?';
  const moodCounts = {};
  entries.forEach(e => { if (e.mood) moodCounts[e.mood] = (moodCounts[e.mood] || 0) + 1; });
  const topMood = Object.entries(moodCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || '?';

  // Vector comparison
  const vectorData = (state.vectors || []).map(v => {
    const sc = state.vectorScoreCache[v.id] || { tier: 'No evidence', total: 0 };
    return { name: v.name, tier: sc.tier, total: sc.total };
  });

  // Loop performance
  const loopsOpened = (state.openLoops || []).filter(l => l.createdAt >= startDate && l.createdAt <= endDate + 'T23:59:59').length;
  const loopsClosed = (state.openLoops || []).filter(l => l.resolvedAt && l.resolvedAt >= startDate && l.resolvedAt <= endDate + 'T23:59:59' && l.status === 'resolved').length;
  const choseNotToAct = (state.openLoops || []).filter(l => l.status === 'chose_not_to_act' && l.resolvedAt >= startDate && l.resolvedAt <= endDate + 'T23:59:59');

  // Key evidence
  const wins = (state.wins || []).filter(w => w.status === 'confirmed' && w.date >= startDate && w.date <= endDate);

  return { startDate, endDate, entries, energyAvg, topMood, vectorData, loopsOpened, loopsClosed, choseNotToAct, wins };
}

function renderReflectionFlow(panel) {
  if (reflectionStep === 0) reflectionStep = 1;
  const data = getReflectionData(reflectionPeriodKey, reflectionType);
  const periodLabel = reflectionType === 'monthly'
    ? new Date(data.startDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
    : reflectionPeriodKey.replace('-', ' ');
  const totalSteps = reflectionType === 'quarterly' ? 3 : 3;

  if (reflectionStep === 1) {
    // Step 1: Data presentation
    const vectorRows = data.vectorData.map(v =>

      <div style="max-width:600px">

          <span style="font-size:12px;color:var(--text-muted)">Step 1/${totalSteps}</span>
        </div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:var(--space-xl)">Review your data before reflecting. This is required to continue using WorkOS.</div>

        <div class="dash-section-title">VECTOR PROGRESS</div>
        <div style="background:var(--surface-card);border-radius:var(--radius-md);padding:var(--space-lg);margin-bottom:var(--space-xl)">${vectorRows}</div>

        <div class="dash-section-title">ENERGY & MOOD</div>
        <div style="font-size:14px;margin-bottom:var(--space-xl)">Avg energy: ${data.energyAvg}/10 · ${data.entries.length} entries · Most common mood: ${topMood}</div>

  } else if (reflectionStep === 2) {

    const extraQuestions = reflectionType === 'quarterly' ? `
      <div class="form-group">
        <label class="form-label">Looking at items you chose not to act on — would you make the same choices today?</label>

    panel.innerHTML = `
      <div style="max-width:600px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--space-xl)">
          <div style="font-size:18px;font-weight:600">${reflectionType === 'quarterly' ? 'Quarterly' : 'Monthly'} Reflection: ${periodLabel}</div>
          <span style="font-size:12px;color:var(--text-muted)">Step 2/${totalSteps}</span>
        </div>

        <div class="form-group">
          <label class="form-label">What worked this period?</label>
          <textarea class="form-input" id="reflectWorked" rows="3" placeholder="What went well? What should you keep doing?"></textarea>

    // Step 3: AI synthesis (loading or display)
    const store = reflectionType === 'quarterly' ? state.quarterlyReflections : state.monthlyReflections;
    const saved = store[reflectionPeriodKey];
    if (saved && saved.synthesis) {
      panel.innerHTML = `
        <div style="max-width:600px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--space-xl)">

function submitReflectionResponses() {
  const worked = document.getElementById('reflectWorked')?.value.trim() || '';
  const didnt = document.getElementById('reflectDidnt')?.value.trim() || '';
  const surprise = document.getElementById('reflectSurprise')?.value.trim() || '';
  const priority = document.getElementById('reflectPriority')?.value.trim() || '';

  if (!worked && !didnt) { showToast('Write at least something for the first two questions'); return; }

  const responses = { worked, didnt, surprise, priority };
  if (reflectionType === 'quarterly') {
    responses.choices = document.getElementById('reflectChoices')?.value.trim() || '';
    responses.hole = document.getElementById('reflectHole')?.value.trim() || '';
  }

  const store = reflectionType === 'quarterly' ? state.quarterlyReflections : state.monthlyReflections;
  const data = getReflectionData(reflectionPeriodKey, reflectionType);
  store[reflectionPeriodKey] = {
    responses,
    dataSnapshot: {
      vectorData: data.vectorData,
      energyAvg: data.energyAvg,
      loopsOpened: data.loopsOpened,
      loopsClosed: data.loopsClosed,
      entryCount: data.entries.length,
      winCount: data.wins.length
    },
    completedAt: new Date().toISOString(),
    synthesis: null
  };
  saveState();

  reflectionStep = 3;
  renderDashboard();

  // Generate synthesis
  generateReflectionSynthesis(reflectionPeriodKey, reflectionType, responses, data);
}

async function generateReflectionSynthesis(periodKey, type, responses, data) {
  if (!state.settings.baseUrl) {
    const store = type === 'quarterly' ? state.quarterlyReflections : state.monthlyReflections;
    store[periodKey].synthesis = 'AI not configured — your reflection has been saved.';
    saveState();
    renderDashboard();
    return;
  }

  const periodLabel = type === 'monthly'
    ? new Date(data.startDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
    : periodKey;

  const vectorSummary = data.vectorData.map(v => `${v.name}: ${v.tier}`).join('\n');
  const winsList = data.wins.map(w => '- ' + w.description).join('\n') || 'None';

  let prompt = `This is a ${type} reflection for ${periodLabel}.

VECTOR STATUS:
${vectorSummary}

LOOP PERFORMANCE: Opened ${data.loopsOpened}, Closed ${data.loopsClosed}
ENERGY: ${data.energyAvg}/10 avg over ${data.entries.length} entries
WINS: ${winsList}

USER'S REFLECTION:
What worked: ${responses.worked}
What didn't: ${responses.didnt}
Surprises: ${responses.surprise}
Priority for next period: ${responses.priority}
${responses.choices ? 'On things they chose not to act on: ' + responses.choices : ''}
${responses.hole ? 'Biggest promotion gap: ' + responses.hole : ''}

Generate a ${type} synthesis (~300 words) with:
1. TRAJECTORY — how are things trending? What moved, what stalled?
2. WHAT CHANGED — the most significant shift this period
3. RECOMMENDATION — one specific, actionable focus for next ${type === 'quarterly' ? 'quarter' : 'month'}, grounded in the data`;

  try {
    const text = await callClaude(getSystemPrompt(), prompt, 1500);
    const store = type === 'quarterly' ? state.quarterlyReflections : state.monthlyReflections;
    store[periodKey].synthesis = text;
    saveState();
    renderDashboard();
    showToast('Synthesis generated');
  } catch (e) {
    const store = type === 'quarterly' ? state.quarterlyReflections : state.monthlyReflections;
    store[periodKey].synthesis = 'Synthesis generation failed. Your reflection has been saved.';
    saveState();
    renderDashboard();
  }
}

let weeklyTriageStep = 0; // 0 = not active, 1 = inbox, 2 = this-week, 3 = share

function isWeeklyTriageNeeded() {
  const today = todayStr();
  if (!isMonday(today)) return false;
  if (state.weeklyTriageCompletedAt && state.weeklyTriageCompletedAt.substring(0, 10) === today) return false;
  return true;
}

function renderWeeklyTriage(panel) {
  const inboxItems = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'inbox');
  const weekItems = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'this-week');

  if (weeklyTriageStep === 0 || weeklyTriageStep === 1) {
    // Step 1: Inbox review
    weeklyTriageStep = 1;
    const itemsHtml = inboxItems.map(t => {
      const age = Math.floor((Date.now() - new Date(t.createdAt || 0).getTime()) / 86400000);
      const sourceLabel = t.sourceTitle || (t.source === 'recurring' ? 'Recurring' : t.source || '');
      const recBadge = t.recurrence
        ? `<button class="btn-secondary" style="font-size:11px;padding:var(--space-xs) var(--space-md);color:var(--accent-interactive)" onclick="event.stopPropagation();toggleTodoRecurrenceMenu('${t.id}', this)">🔄 ${recurrenceLabel(t.recurrence)}</button>`
        : `<button class="btn-secondary" style="font-size:11px;padding:var(--space-xs) var(--space-md);color:var(--text-primary)" onclick="event.stopPropagation();toggleTodoRecurrenceMenu('${t.id}', this)">🔄 Set Recurring</button>`;
      return `<div class="triage-item" id="triage-${t.id}">
        <div class="triage-item-text">${escapeHtml(t.text)}</div>
        <div class="triage-item-meta">${sourceLabel ? 'from: ' + escapeHtml(sourceLabel) + ' · ' : ''}${age}d ago</div>
        <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-top:var(--space-sm)">
          <button class="btn-secondary" style="font-size:11px;padding:var(--space-xs) var(--space-md);color:#d4a017" onclick="event.stopPropagation();toggleTodoStar('${t.id}');renderDashboard()">${t.starred ? '★ Starred' : '☆ Star'}</button>
          ${recBadge}
          <button class="triage-btn" onclick="triageTodo('${t.id}','today')">Today</button>
          <button class="triage-btn" onclick="triageTodo('${t.id}','this-week')">This Week</button>
          <button class="triage-btn" onclick="triageTodo('${t.id}','backlog')">Backlog</button>
          <button class="triage-btn delete" onclick="triageTodo('${t.id}','delete')">Delete</button>
        </div>
      </div>`;
    }).join('') || '<div style="color:var(--text-muted);font-size:13px;padding:var(--space-md)">Inbox is empty. Nice.</div>';

    panel.innerHTML = `
      <div class="triage-overlay">
        <div class="triage-header">
          <div class="triage-title">Weekly Triage</div>
          <div style="font-size:12px;color:var(--text-muted)">Step 1/3</div>
        </div>
        <div class="dash-section-title">CLEAR YOUR INBOX <span style="text-transform:none;font-weight:400">${inboxItems.length} item${inboxItems.length !== 1 ? 's' : ''} to triage</span></div>
        <div class="triage-list">${itemsHtml}</div>
        ${inboxItems.length > 3 ? `<div class="triage-batch"><button class="btn-ghost" onclick="batchTriageAll('this-week')">All → This Week</button><button class="btn-ghost" onclick="batchTriageAll('backlog')">All → Backlog</button></div>` : ''}
        <div style="text-align:right;margin-top:var(--space-lg)"><button class="btn-secondary btn-accent" onclick="weeklyTriageStep=2;renderDashboard()">Next: Review Week</button></div>
      </div>`;
    return true;

  } else if (weeklyTriageStep === 2) {
    // Step 2: This week review
    const weekItemsHtml = weekItems.map((t, i) =>
      `<div class="triage-item">
        <span class="focus-drag">⠿</span>
        <span class="triage-item-text" style="flex:1">${escapeHtml(t.text)}</span>
        <button class="triage-btn" onclick="moveTodoPriority('${t.id}','today');renderDashboard()">→ Today</button>
      </div>`
    ).join('') || '<div style="color:var(--text-muted);font-size:13px;padding:var(--space-md)">No items for this week yet.</div>';

    panel.innerHTML = `
      <div class="triage-overlay">
        <div class="triage-header">
          <div class="triage-title">Weekly Triage</div>
          <div style="font-size:12px;color:var(--text-muted)">Step 2/3</div>
        </div>
        <div class="dash-section-title">THIS WEEK'S PRIORITIES <span style="text-transform:none;font-weight:400">${weekItems.length} item${weekItems.length !== 1 ? 's' : ''}</span></div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:var(--space-sm)">Reorder by importance. Promote to Today as needed.</div>
        <div class="triage-list">${weekItemsHtml}</div>
        <div style="text-align:right;margin-top:var(--space-lg)"><button class="btn-secondary btn-accent" onclick="weeklyTriageStep=3;renderDashboard()">Next: Share Weekly Plan</button></div>
      </div>`;
    return true;

  } else if (weeklyTriageStep === 3) {
    // Step 3: Generate shareable plan
    const todayItems = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'today');
    const allPlanItems = [...todayItems, ...weekItems];

    panel.innerHTML = `
      <div class="triage-overlay">
        <div class="triage-header">
          <div class="triage-title">Weekly Triage</div>
          <div style="font-size:12px;color:var(--text-muted)">Step 3/3</div>
        </div>
        <div class="dash-section-title">SHARE WEEKLY PLAN</div>
        <textarea class="form-input" id="weeklyPlanDraft" rows="8" placeholder="Generating plan..." style="font-size:13px;line-height:1.6"></textarea>
        <div style="display:flex;justify-content:space-between;margin-top:var(--space-md)">
          <div><button class="btn-ghost" onclick="generateWeeklyPlanDraft()">Regenerate</button></div>
          <div style="display:flex;gap:var(--space-sm)">

function triageTodo(todoId, action) {
  if (action === 'delete') {
    state.todos = state.todos.filter(t => t.id !== todoId);
  } else {
    moveTodoPriority(todoId, action);
  }
  const el = document.getElementById('triage-' + todoId);
  if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 150); }
  saveState();
}

function batchTriageAll(priority) {
  for (const t of (state.todos || [])) {
    if (t.status === 'open' && t.priority === 'inbox') {
      t.priority = priority;
      t.triagedAt = new Date().toISOString();
    }
  }
  saveState();
  renderDashboard();
}

async function generateWeeklyPlanDraft() {
  const textarea = document.getElementById('weeklyPlanDraft');
  if (!textarea) return;

  const todayItems = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'today');
  const weekItems = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'this-week');
  const rolledOver = (state.todos || []).filter(t => t.status === 'open' && t.triagedAt && t.createdAt && t.createdAt.substring(0, 10) < getWeekMonday(todayStr()));

  const itemsList = [...todayItems, ...weekItems].map(t => '- ' + t.text).join('\n');
  const rolledList = rolledOver.map(t => '- ' + t.text).join('\n');

  if (!state.settings.baseUrl) {
    textarea.value = 'This week I\'m focused on:\n' + itemsList;
    return;
  }

  textarea.value = 'Generating...';
  try {
    const prompt = `Write a concise Slack post (~150 words) sharing my weekly plan with my design team. Task-focused, no promotion/vector language.

My priorities this week:
${itemsList || '(none set)'}

${rolledList ? 'Carrying forward from last week:\n' + rolledList : ''}

Format:
This week I'm focused on:
• [3-4 top priorities framed as outcomes]

Key milestones:
• [any deadlines or meetings]

${rolledList ? 'Carrying forward:\n• [rolled items]' : ''}

Keep it casual, specific, and useful for teammates.`;

    const text = await callClaude(getSystemPrompt(), prompt, 500);
    textarea.value = text;
  } catch (e) {
    textarea.value = 'This week I\'m focused on:\n' + itemsList;
  }
}

function completeWeeklyTriage() {
  state.weeklyTriageCompletedAt = new Date().toISOString();
  weeklyTriageStep = 0;
  saveState();
  renderDashboard();
}

function promoteTomorrowItems() {
  const today = todayStr();
  if (state.lastDayPromoted === today) return;
  let changed = false;
  for (const t of (state.todos || [])) {
    if (t.status !== 'open') continue;
    if (t.priority === 'tomorrow') { t.priority = 'today'; changed = true; }
    if (t.scheduledFor && t.scheduledFor <= today && t.priority === 'backlog') { t.priority = 'today'; changed = true; }
  }
  state.lastDayPromoted = today;
  // Reset daily triage for new day
  const confirmedDate = state.todayFocusConfirmedAt ? state.todayFocusConfirmedAt.substring(0, 10) : null;
  if (confirmedDate !== today) state.todayFocusConfirmedAt = null;
  if (changed) saveState();
}

function getTodayFocusItems() {
  const today = todayStr();
  return (state.todos || []).filter(t => t.status === 'open' && t.priority === 'today')
    .sort((a, b) => (a.focusOrder || 0) - (b.focusOrder || 0));
}

function isTodayFocusConfirmed() {
  if (!state.todayFocusConfirmedAt) return false;
  return state.todayFocusConfirmedAt.substring(0, 10) === todayStr();
}

   Mobile Triage
   ======================================== */
let triageQueue = [];
let triageIndex = 0;
let triageLastAction = null;
let triageLastPriority = 'today';
let triageCounts = { today: 0, tomorrow: 0, 'this-week': 0, backlog: 0, deleted: 0 };
let mobileMode = 'inbox'; // 'inbox' | 'today' | 'this-week' | 'backlog'

function openMobileTriage(mode) {
  mobileMode = mode || 'inbox';

  if (mobileMode === 'inbox') {
    triageQueue = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'inbox');
    if (triageQueue.length === 0 && mode === 'inbox') { mobileMode = 'today'; } // auto-switch if inbox empty
  }
  triageIndex = 0;
  triageLastAction = null;
  triageCounts = { today: 0, tomorrow: 0, 'this-week': 0, backlog: 0, deleted: 0 };

  if (!document.getElementById('mobileTriage')) {
    const overlay = document.createElement('div');
    overlay.className = 'triage-mobile';
    overlay.id = 'mobileTriage';
    document.body.appendChild(overlay);
  }

  if (mobileMode === 'inbox') {
    renderTriageCard();
  } else {
    renderMobileBucket(mobileMode);
  }

  // Swipe gesture support
  let touchStartX = 0;
  overlay.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  overlay.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (dx > 80) triageMobileAction(triageLastPriority); // swipe right = repeat last
    else if (dx < -80) triageSkip(); // swipe left = skip
  });
}

function getMobileTabsHtml() {
  const count = (p) => (state.todos || []).filter(t => t.status === 'open' && t.priority === p).length;
  const inboxCount = count('inbox');
  const todayCount = count('today');
  const weekCount = count('this-week');
  const backlogCount = count('backlog') + count('later');
  const tab = (mode, label, c) =>
    `<button class="triage-mobile-tab${mobileMode === mode ? ' active' : ''}" onclick="openMobileTriage('${mode}')">${label}${c ? ' (' + c + ')' : ''}</button>`;
  return `<div class="triage-mobile-tabs">
    ${tab('inbox', 'Inbox', inboxCount)}
    ${tab('today', 'Today', todayCount)}
    ${tab('this-week', 'Week', weekCount)}
    ${tab('backlog', 'Later', backlogCount)}
    <button class="btn-secondary btn-accent" style="font-size:13px;margin-left:auto;padding:var(--space-md) var(--space-lg)" onclick="closeMobileTriage()">Done</button>
  </div>`;
}

function renderMobileBucket(bucket) {
  const overlay = document.getElementById('mobileTriage');
  if (!overlay) return;

  const emptyMsg = { today: 'No items for today.', 'this-week': 'No items this week.', backlog: 'No items in backlog.' };
  const matchPriority = bucket === 'backlog' ? (p => p === 'backlog' || p === 'later') : (p => p === bucket);
  const bucketItems = (state.todos || []).filter(t => matchPriority(t.priority));
  const openItems = bucketItems.filter(t => t.status === 'open');
  const doneItems = bucket === 'today' ? bucketItems.filter(t => t.status === 'done' && t.completedAt && t.completedAt.substring(0, 10) === todayStr()) : [];
  const allItems = [...openItems, ...doneItems];

  const itemsHtml = allItems.length > 0 ? allItems.map(t => {
    const isDone = t.status === 'done';
    const recBadge = t.recurrence
      ? `<button class="btn-secondary" style="font-size:12px;padding:var(--space-xs) var(--space-md);color:var(--accent-interactive)" onclick="event.stopPropagation();toggleTriageRecurrenceMenu('${t.id}', this)">🔄 ${recurrenceLabel(t.recurrence)}</button>`
      : (!isDone ? `<button class="btn-secondary" style="font-size:12px;padding:var(--space-xs) var(--space-md);color:var(--text-primary)" onclick="event.stopPropagation();toggleTriageRecurrenceMenu('${t.id}', this)">🔄 Set Recurring</button>` : '');
    return `<div class="mobile-today-item${isDone ? ' done' : ''}" style="display:flex;flex-direction:column;gap:var(--space-sm);padding:var(--space-sm) 0">
      <div style="display:flex;align-items:center;gap:var(--space-sm)">
        <span class="mobile-today-check" onclick="toggleMobileTodo('${t.id}')">${isDone ? '✓' : '○'}</span>

function renderTriageCard() {
  const overlay = document.getElementById('mobileTriage');
  if (!overlay) return;
  const total = triageQueue.length;
  const progress = triageIndex / total * 100;

  if (triageIndex >= total) {
    // Done state
    const totalTriaged = Object.values(triageCounts).reduce((a, b) => a + b, 0);
    const breakdown = [
      triageCounts.today ? `Today: ${triageCounts.today}` : '',
      triageCounts.tomorrow ? `Next workday: ${triageCounts.tomorrow}` : '',
      triageCounts['this-week'] ? `This Week: ${triageCounts['this-week']}` : '',
      triageCounts.backlog ? `Backlog: ${triageCounts.backlog}` : '',
      triageCounts.done ? `Done: ${triageCounts.done}` : '',
      triageCounts.deleted ? `Deleted: ${triageCounts.deleted}` : '',
    ].filter(Boolean).join('<br>');

    overlay.innerHTML = `
      ${getMobileTabsHtml()}
      <div class="triage-mobile-header" style="margin-top:var(--space-md)">
        <div class="triage-mobile-progress"><div class="triage-mobile-progress-fill" style="width:100%"></div></div>
        <span class="triage-mobile-count">${total}/${total}</span>
      </div>
      <div class="triage-mobile-done">
        <div class="triage-mobile-done-check">✓</div>
        <div class="triage-mobile-done-title">Inbox clear</div>
        <div class="triage-mobile-done-count">${totalTriaged} item${totalTriaged !== 1 ? 's' : ''} triaged</div>
        <div class="triage-mobile-done-breakdown">${breakdown}</div>
      </div>`;
    return;
  }

  const item = triageQueue[triageIndex];
  const age = Math.floor((Date.now() - new Date(item.createdAt || 0).getTime()) / 86400000);
  const meeting = item.meetingId ? state.meetings.find(m => m.id === item.meetingId) : null;
  const sourceLabel = meeting ? meeting.title : item.sourceTitle || (item.source === 'recurring' ? 'Recurring' : item.source === 'follow-up' ? 'Follow-up' : item.source === 'coaching' ? 'Coaching' : item.source === 'visibility' ? 'Visibility' : 'Manual');
  const recurrenceBtnHtml = item.recurrence
    ? `<button class="btn-secondary" style="color:var(--accent-interactive)" onclick="toggleTriageRecurrenceMenu('${item.id}', this)">🔄 ${recurrenceLabel(item.recurrence)}</button>`
    : `<button class="btn-secondary" style="color:var(--text-primary)" onclick="toggleTriageRecurrenceMenu('${item.id}', this)">🔄 Set Recurring</button>`;
  const undoHtml = triageLastAction
    ? `<button onclick="triageUndo()">↩ Undo: "${escapeHtml((triageLastAction.text || '').substring(0, 30))}" → ${triageLastAction.priority}</button>`
    : '';

  overlay.innerHTML = `
    ${getMobileTabsHtml()}
    <div class="triage-mobile-header" style="margin-top:var(--space-md)">
      <div class="triage-mobile-progress"><div class="triage-mobile-progress-fill" style="width:${progress}%"></div></div>
      <span class="triage-mobile-count">${triageIndex}/${total}</span>
    </div>
    <div class="triage-mobile-card triage-card-enter" id="triageCard">
      <div class="triage-mobile-card-text">${escapeHtml(item.text)}</div>
      <div class="triage-mobile-card-meta">
        <span>from: ${escapeHtml(sourceLabel)} · ${age}d ago</span>
      </div>
      <div style="display:flex;gap:var(--space-sm);justify-content:center;flex-wrap:wrap;margin-top:var(--space-md)">
        <button class="btn-secondary" style="color:#d4a017" onclick="toggleTodoStar('${item.id}');renderTriageCard()">${item.starred ? '★ Starred' : '☆ Star'}</button>
        ${recurrenceBtnHtml}
        <button class="btn-secondary" style="color:#2d8a4e" onclick="triageMobileAction('done')">✓ Done</button>
        <button class="btn-secondary" style="color:var(--accent-negative)" onclick="triageMobileAction('delete')">✕ Delete</button>
      </div>
    </div>
    <div class="triage-mobile-undo">${undoHtml}</div>
    <div class="triage-mobile-actions">
      <button class="triage-mobile-btn" id="triBtn-today" onclick="triageMobileAction('today')">Today</button>
      <button class="triage-mobile-btn" id="triBtn-tomorrow" onclick="triageMobileAction('tomorrow')">Next WeekDay</button>
      <button class="triage-mobile-btn" id="triBtn-this-week" onclick="triageMobileAction('this-week')">This Week</button>
      <button class="triage-mobile-btn" id="triBtn-backlog" onclick="triageMobileAction('backlog')">Backlog</button>
    </div>
    <div style="text-align:center;margin-top:var(--space-sm)"><button style="font:14px var(--font-family);color:var(--text-muted);background:none;border:none;cursor:pointer;padding:var(--space-sm) var(--space-lg)" onclick="triageSkip()">Skip — decide later</button></div>`;
}

function toggleTriageRecurrenceMenu(todoId, btn) {
  const existing = document.querySelector('.todo-recurrence-menu');
  if (existing) { existing.remove(); return; }
  const todo = state.todos.find(t => t.id === todoId);
  if (!todo) return;
  const options = [
    { value: null, label: 'Once (remove)' },
    { value: 'daily', label: 'Daily' },
    { value: 'weekdays', label: 'Weekdays' },
    { value: 'weekly', label: 'Weekly' },
    { value: 'biweekly', label: 'Biweekly' },
    { value: 'monthly', label: 'Monthly' }
  ];
  const menu = document.createElement('div');
  menu.className = 'todo-recurrence-menu';
  menu.style.bottom = '100%';
  menu.style.right = '0';
  menu.style.marginBottom = '4px';
  menu.innerHTML = options.map(o =>
    `<button class="${todo.recurrence === o.value ? 'selected' : ''}" data-freq="${o.value || ''}">${o.label}</button>`
  ).join('');
  menu.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      setTodoRecurrence(todoId, b.dataset.freq || null);
      // Update the triageQueue item reference too
      const qItem = triageQueue[triageIndex];
      if (qItem && qItem.id === todoId) {
        qItem.recurrence = b.dataset.freq || null;
      }
      menu.remove();
      renderTriageCard();
    });
  });
  btn.style.position = 'relative';
  btn.appendChild(menu);
  const dismiss = (e) => { if (!menu.contains(e.target) && e.target !== btn) { menu.remove(); document.removeEventListener('click', dismiss); } };
  setTimeout(() => document.addEventListener('click', dismiss), 0);
}

function triageMobileAction(priority) {
  const item = triageQueue[triageIndex];
  if (!item) return;

  // Flash button
  const flashMap = { today: 'flash-today', tomorrow: 'flash-tomorrow', 'this-week': 'flash-week', backlog: 'flash-backlog' };
  const btn = document.getElementById('triBtn-' + priority);
  if (btn && flashMap[priority]) {
    btn.classList.add(flashMap[priority]);
    setTimeout(() => btn.classList.remove(flashMap[priority]), 150);
  }

  // Animate card out
  const card = document.getElementById('triageCard');
  if (card) card.className = 'triage-mobile-card triage-card-exit';

  // Store for undo
  triageLastAction = { todoId: item.id, text: item.text, priority: priority === 'delete' ? 'deleted' : priority, previousPriority: item.priority };
  if (priority !== 'delete') triageLastPriority = priority;

  // Apply action
  if (priority === 'delete') {
    state.todos = state.todos.filter(t => t.id !== item.id);
    triageCounts.deleted++;
  } else if (priority === 'done') {
    const todo = state.todos.find(t => t.id === item.id);
    if (todo) {
      todo.status = 'done';
      todo.completedAt = new Date().toISOString();
      const todayEntry = getEntryForDate(todayStr());
      if (todayEntry && todayEntry.workDone && !todayEntry.workDone.includes(todo.text)) {
        todayEntry.workDone += '\n✓ ' + todo.text;
      }
      if (todo.recurrence) {
        const hasOpenChild = state.todos.some(t => t.parentId === todo.id && t.status === 'open');
        if (!hasOpenChild) spawnRecurringInstance(todo);
      }
    }
    triageCounts.done = (triageCounts.done || 0) + 1;
  } else {
    const todo = state.todos.find(t => t.id === item.id);
    if (todo) {
      todo.priority = priority;
      todo.triagedAt = new Date().toISOString();
    }
    triageCounts[priority] = (triageCounts[priority] || 0) + 1;
  }

  triageIndex++;
  saveState();
  setTimeout(renderTriageCard, 200);
}

function triageSkip() {
  // Move current item to end of queue
  const item = triageQueue.splice(triageIndex, 1)[0];
  if (item) triageQueue.push(item);
  const card = document.getElementById('triageCard');
  if (card) card.className = 'triage-mobile-card triage-card-exit';
  setTimeout(renderTriageCard, 200);
}

function triageUndo() {
  if (!triageLastAction) return;
  const { todoId, previousPriority } = triageLastAction;

  if (triageLastAction.priority === 'deleted') {
    // Can't undo delete if todo was removed — re-create it
    // Actually the todo was spliced from state.todos, we need to re-add
    // For simplicity, we stored the text — recreate
    state.todos.push({
      id: todoId,
      text: triageLastAction.text,
      status: 'open',
      priority: 'inbox',
      source: 'manual',
      createdAt: new Date().toISOString()
    });
    triageCounts.deleted--;
  } else {
    const todo = state.todos.find(t => t.id === todoId);
    if (todo) {
      todo.priority = 'inbox';
      todo.triagedAt = null;
    }
    triageCounts[triageLastAction.priority] = Math.max(0, (triageCounts[triageLastAction.priority] || 0) - 1);
  }

  triageIndex = Math.max(0, triageIndex - 1);
  // Re-insert item at current position in queue
  const existingIdx = triageQueue.findIndex(t => t.id === todoId);
  if (existingIdx === -1) {
    const restored = state.todos.find(t => t.id === todoId);
    if (restored) triageQueue.splice(triageIndex, 0, restored);
  }

  triageLastAction = null;
  saveState();
  renderTriageCard();
}

function renderDashboard() {
  promoteTomorrowItems();
  checkRecurringTodos();
  const panel = document.getElementById('panel-dashboard');

  // Monthly/quarterly reflection (blocking, takes priority)
  if (isReflectionNeeded() || reflectionStep > 0) {
    if (renderReflectionFlow(panel)) return;
  }

  // Monday weekly triage (blocking)
  if (isWeeklyTriageNeeded() || weeklyTriageStep > 0) {
    if (renderWeeklyTriage(panel)) return;
  }

  const vectors = state.vectors || [];

  // Vector setup needed
  if (vectors.length === 0) {
    const hasPromoNotes = (state.settings.promotionNotes || '').trim().length > 0;
    panel.innerHTML = `
      <div class="dash-section">
        <div class="dash-section-title">PROMOTION VECTORS</div>
        <div class="empty-state" style="margin-top:var(--space-lg)">
          ${hasPromoNotes ? `
            <div>Ready to set up your promotion vectors.</div>
            <div class="empty-state-secondary">We'll extract vectors from your promotion notes.</div>
            <button class="btn-secondary btn-accent" style="margin-top:var(--space-md)" onclick="startVectorSetup()">Set up vectors</button>
          ` : `
            <div>No vectors configured yet.</div>
            <div class="empty-state-secondary">Go to Settings → Profile → Promotion Notes and paste the vectors or criteria your manager has shared with you.</div>
            <button class="btn-secondary" style="margin-top:var(--space-md)" onclick="switchTab('settings')">Go to Settings</button>
          `}
        </div>
      </div>`;
    return;
  }

  console.log('Dashboard render — vectors:', JSON.stringify(state.vectors.map(v => v.name)), 'cache:', JSON.stringify(state.vectorScoreCache));

  // Time range filter
  const rangeMonths = dashboardTimeRange === 'month' ? 1 : dashboardTimeRange === 'quarter' ? 3 : 6;
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - rangeMonths);
  const cutoffStr = cutoff.toISOString().split('T')[0];

  // Render vector rows
  const vectorRowsHtml = vectors.map(vec => {
    const sc = state.vectorScoreCache[vec.id] || { tier: 'No evidence', total: 0, winCount: 0, meetingSignalCount: 0, visibilityCount: 0, daysSinceLast: -1, topItems: [] };
    const tierClass = sc.tier.toLowerCase().replace(/\s/g, '-');
    const staleClass = sc.daysSinceLast > 30 ? ' dash-vec-stale' : '';
    const trendArrow = sc.tier === 'No evidence' ? '' :
      sc.total > (sc.previousTotal || 0) ? '↗' :
      sc.total < (sc.previousTotal || 0) ? '↘' : '→';
    const staleness = sc.daysSinceLast >= 0 ? `last: ${sc.daysSinceLast}d ago` : 'never';
    const barWidth = Math.min(100, Math.round((sc.total / 15) * 100));

    return `<div class="dash-vec-row${staleClass}">
      <div class="dash-vec-content">
        <div class="dash-vec-header">
          <span class="dash-vec-name">${escapeHtml(vec.name)}</span>
          <span class="dash-vec-tier dash-tier-${tierClass}">${sc.tier}</span>
          <span class="dash-vec-trend">${trendArrow}</span>
        </div>
        <div class="dash-vec-bar"><div class="dash-vec-bar-fill dash-tier-${tierClass}" style="width:${barWidth}%"></div></div>
        <div class="dash-vec-meta">${[
          sc.winCount ? sc.winCount + ' win' + (sc.winCount !== 1 ? 's' : '') : '',
          sc.meetingSignalCount ? sc.meetingSignalCount + ' meeting' + (sc.meetingSignalCount !== 1 ? 's' : '') : '',
          sc.journalCount ? sc.journalCount + ' journal' + (sc.journalCount !== 1 ? 's' : '') : '',
          sc.todoCount ? sc.todoCount + ' todo' + (sc.todoCount !== 1 ? 's' : '') : '',
        ].filter(Boolean).join(' · ') || 'no evidence'} · ${staleness}</div>
        <div class="dash-vec-detail hidden" id="vecDetail-${vec.id}"></div>
      </div>
      <button class="dash-vec-toggle" onclick="toggleVectorDetail('${vec.id}', this)">▸</button>
    </div>`;
  }).join('');

  const hasMappedEvidence = (state.entries || []).some(e => e.vectorTags?.length > 0) ||
    (state.wins || []).some(w => w.vectorTags?.length > 0) ||
    (state.meetings || []).some(m => m.insightVectorTags && Object.keys(m.insightVectorTags).length > 0);
  const allNoEvidence = vectors.every(v => {
    const sc = state.vectorScoreCache[v.id];
    return !sc || sc.tier === 'No evidence';
  });

  // Uncomfortable truth
  const weakVectors = vectors.filter(v => {
    const sc = state.vectorScoreCache[v.id] || { tier: 'No evidence', daysSinceLast: -1 };
    return sc.tier === 'Thin' || sc.tier === 'No evidence';
  });
  const staleVectors = vectors.filter(v => {
    const sc = state.vectorScoreCache[v.id];
    return sc && sc.daysSinceLast > 30;
  });

  let truthHtml = '';
  if (weakVectors.length > 0 || staleVectors.length > 0) {
    const parts = [];
    if (weakVectors.length > 0) {
      parts.push(`Your ${weakVectors.map(v => `<strong>${escapeHtml(v.name)}</strong>`).join(' and ')} vector${weakVectors.length > 1 ? 's have' : ' has'} insufficient evidence.`);
    }
    if (staleVectors.length > 0) {
      parts.push(`${staleVectors.map(v => `<strong>${escapeHtml(v.name)}</strong>`).join(' and ')} — no new evidence in over 30 days.`);
    }
    truthHtml = `
      <div class="dash-section">
        <div class="dash-section-title">THE UNCOMFORTABLE TRUTH</div>
        <div class="dash-truth">${parts.join(' ')}</div>
      </div>`;
  }

  // This week section
  const nudges = getMeetingNudges();
  let weekHtml = '';
  const weekItems = [];
  if (nudges.length > 0) {
    weekItems.push(...nudges.map(n => {
      const ds = new Date(meetingDateStr(n.meeting) + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return `<div class="dash-week-item" onclick='openNudgeReflection(${n.record.id}, ${escapeHtml(JSON.stringify(n.meeting.id))})'>Post-meeting reflection: ${escapeHtml(n.meeting.title || 'Untitled')} · ${ds} →</div>`;
    }));
  }
  if (weekItems.length > 0) {
    weekHtml = `<div class="dash-section">
      <div class="dash-section-title">THIS WEEK</div>
      ${weekItems.join('')}
    </div>`;
  }

  // Today's Focus section
  const focusItems = getTodayFocusItems();
  const focusConfirmed = isTodayFocusConfirmed();
  const inboxCount = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'inbox').length;
  const completedToday = (state.todos || []).filter(t => t.status === 'done' && t.completedAt && t.completedAt.substring(0, 10) === todayStr());
  const focusDoneCount = focusItems.filter(t => t.status === 'done').length + completedToday.filter(t => t.priority === 'today').length;

  let focusHtml = '';
  if (!focusConfirmed) {
    // Triage state — blocking
    const focusItemsHtml = focusItems.map((t, i) =>
      `<div class="focus-item" data-todo-id="${t.id}">
        <span class="focus-drag">⠿</span>
        <span class="focus-text">${escapeHtml(t.text)}</span>
        <span class="focus-actions">
          <button class="focus-btn" title="Move to tomorrow" onclick="moveTodoPriority('${t.id}','tomorrow');renderDashboard()">━</button>
          <button class="focus-btn" title="Remove to backlog" onclick="moveTodoPriority('${t.id}','backlog');renderDashboard()">×</button>
        </span>
      </div>`
    ).join('');

    focusHtml = `<div class="dash-section dash-focus-blocking">
      <div class="dash-section-title">TODAY'S FOCUS</div>
      <div class="focus-list" id="focusList">${focusItemsHtml || '<div style="color:var(--text-muted);font-size:13px;padding:var(--space-sm) 0">No items for today yet. Add from inbox or create new ones.</div>'}</div>
      <div class="focus-footer">
        ${inboxCount > 0 ? `<button class="btn-ghost" style="font-size:12px" onclick="toggleFocusInbox()">Inbox (${inboxCount})</button><button class="btn-ghost" style="font-size:12px" onclick="openMobileTriage()">Triage all →</button>` : ''}
        <button class="btn-ghost" style="font-size:12px" onclick="addFocusItem()">+ Add item</button>
        <button class="btn-secondary btn-accent focus-confirm" onclick="confirmTodayFocus()">Confirm Today's Focus</button>
      </div>
      <div class="focus-inbox hidden" id="focusInbox"></div>
    </div>`;
  } else {
    // Confirmed state — active tracking
    const allTodayItems = (state.todos || []).filter(t => t.priority === 'today');
    const openItems = allTodayItems.filter(t => t.status === 'open');
    const doneItems = allTodayItems.filter(t => t.status === 'done');
    const total = openItems.length + doneItems.length;
    const focusActiveHtml = [...openItems, ...doneItems].map(t => {
      const isDone = t.status === 'done';
      return `<div class="focus-item${isDone ? ' done' : ''}">

function toggleVectorDetail(vecId, btn) {
  const el = document.getElementById('vecDetail-' + vecId);
  if (!el) return;
  if (!el.classList.contains('hidden')) {
    el.classList.add('hidden');
    if (btn) btn.textContent = '▸';
    return;
  }
  el.classList.remove('hidden');
  if (btn) btn.textContent = '▾';

  const vec = state.vectors.find(v => v.id === vecId);
  const sc = state.vectorScoreCache[vecId] || { tier: 'No evidence', topItems: [] };
  if (!vec) return;

  // Benchmarks
  const benchmarks = (vec.benchmarks || []).map(b =>
    `<div class="dash-benchmark"><span class="dash-benchmark-check">${b.count > 0 ? '●' : '○'}</span> ${escapeHtml(b.label)} <span class="dash-benchmark-count">${b.count || 0} this quarter</span></div>`
  ).join('') || `<div style="color:var(--text-muted);font-size:12px">No benchmarks set. <button class="btn-ghost" style="font-size:12px" onclick="editBenchmarks('${vecId}')">Add benchmarks</button></div>`;


  // Evidence with links + remove buttons — show first 3, expand to all
  const allItems = sc.topItems || [];
  const previewCount = 3;
  const renderEvidenceItem = (item, idx) => {
    const typeLabels = { meeting: 'Meeting', journal: 'Journal', synthesis: 'Reflection', brief: 'Weekly Brief', todo: 'Todo', win: 'Win', visibility: 'Visibility', contribution: 'Contribution' };
    const typeLabel = typeLabels[item.type] || item.type;
    const qualityTag = item.quality === 'external'
      ? `<span class="dash-evidence-tag external">${typeLabel}</span>`
      : `<span class="dash-evidence-tag self">${typeLabel}</span>`;
    const meetingLink = item.type === 'meeting' && item.meetingId
      ? ` <button class="btn-ghost" style="font-size:11px" onclick="viewMeetingFromDashboard('${escapeHtml(item.meetingId)}')">${escapeHtml(item.meeting || 'Meeting')} →</button>`
      : '';
    const removeBtn = `<button class="dash-evidence-remove" onclick="removeEvidence('${vecId}', ${idx})" title="Remove this evidence">×</button>`;
    const fullText = item.text || '';
    const reason = item.reason || '';
    const needsTooltip = fullText.length > 800;
    return `<div class="dash-evidence-item">
      <div class="dash-evidence-header">${removeBtn}${qualityTag}${meetingLink}</div>
      ${reason ? `<div class="dash-evidence-reason">${escapeHtml(reason)}</div>` : ''}
      <div class="dash-evidence-text">${formatBulletList(fullText.substring(0, 800))}${needsTooltip ? '...' : ''}</div>
      ${needsTooltip ? `<div class="dash-tooltip">${escapeHtml(fullText)}</div>` : ''}
    </div>`;
  };
  let evidenceHtml;
  if (allItems.length === 0) {
    evidenceHtml = '<div style="color:var(--text-muted);font-size:12px">No evidence items yet.</div>';
  } else if (allItems.length <= previewCount) {
    evidenceHtml = allItems.map(renderEvidenceItem).join('');
  } else {
    const previewHtml = allItems.slice(0, previewCount).map(renderEvidenceItem).join('');
    const restHtml = allItems.slice(previewCount).map(renderEvidenceItem).join('');
    evidenceHtml = `${previewHtml}
      <div class="hidden" id="vecEvAll-${vecId}">${restHtml}</div>
      <button class="dash-evidence-link" style="margin-top:var(--space-xs)" id="vecEvToggle-${vecId}" onclick="const el=document.getElementById('vecEvAll-${vecId}');el.classList.toggle('hidden');this.textContent=el.classList.contains('hidden')?'Show all ${allItems.length} items':'Show less'">Show all ${allItems.length} items</button>`;
  }

  el.innerHTML = `
    <div class="dash-detail-section">
      <div class="dash-detail-label" style="display:flex;justify-content:space-between;align-items:baseline">BENCHMARKS <button class="btn-ghost" style="font-size:11px" onclick="editBenchmarks('${vecId}')">Edit</button></div>
      ${benchmarks}
    </div>
    <div class="dash-detail-section">
      <div class="dash-detail-label">TOP EVIDENCE</div>
      ${evidenceHtml}
    </div>`;
}

let expandedVectorIds = new Set();

function viewMeetingFromDashboard(meetingId) {
  // Save which vectors are expanded
  expandedVectorIds = new Set();
  document.querySelectorAll('.dash-vec-detail').forEach(el => {
    if (!el.classList.contains('hidden')) {
      expandedVectorIds.add(el.id.replace('vecDetail-', ''));
    }
  });

  switchTab('meetings');
  setTimeout(() => {
    const card = document.querySelector(`[data-meeting-id="${meetingId}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);

  showToast('Viewing meeting source ·', 0, () => {
    switchTab('dashboard');
    // Restore expanded vectors after render
    setTimeout(() => {
      for (const vecId of expandedVectorIds) {
        const btn = document.querySelector(`#vecDetail-${vecId}`)?.closest('.dash-vec-row')?.querySelector('.dash-vec-toggle');
        if (btn && document.getElementById('vecDetail-' + vecId)?.classList.contains('hidden')) {
          toggleVectorDetail(vecId, btn);
        }
      }
      expandedVectorIds.clear();
    }, 50);
  }, 'Back to Dashboard');
}

function removeEvidence(vecId, itemIdx) {
  const sc = state.vectorScoreCache[vecId];
  if (!sc || !sc.topItems[itemIdx]) return;
  const item = sc.topItems[itemIdx];

  // Add to a deny list so the score engine skips it in future
  if (!state.vectorEvidenceDenied) state.vectorEvidenceDenied = [];
  state.vectorEvidenceDenied.push({
    vecId,
    type: item.type,
    text: (item.text || '').substring(0, 100),
    date: item.date,
    meeting: item.meeting
  });

  // Also remove AI tags if it's a meeting insight
  if (item.type === 'meeting' && item.meeting) {
    for (const m of (state.meetings || [])) {
      if (m.title !== item.meeting) continue;
      if (m.insightVectorTags) {
        const vecName = (state.vectors.find(v => v.id === vecId) || {}).name;
        for (const [k, tags] of Object.entries(m.insightVectorTags)) {
          if (Array.isArray(tags)) {
            m.insightVectorTags[k] = tags.filter(t => t !== vecName);
          }
        }
      }
    }
  }

  saveState();
  // Re-render the expanded detail
  const btn = document.querySelector(`#vecDetail-${vecId}`)?.closest('.dash-vec-row')?.querySelector('.dash-vec-toggle');
  toggleVectorDetail(vecId, btn);
  showToast('Evidence removed');
}

function saveBenchmarks(vecId) {
  const vec = state.vectors.find(v => v.id === vecId);
  if (!vec) return;
  const inputs = document.querySelectorAll('#benchmarkList input');
  vec.benchmarks = [...inputs].map(inp => ({
    label: inp.value.trim(),
    count: 0
  })).filter(b => b.label);
  closeBenchmarkModal();
  saveState();
  renderDashboard();
  showToast('Benchmarks saved');
}

async function startVectorSetup() {
  if (!state.settings.baseUrl) { showToast('Set up AI in Settings first'); return; }
  const promoNotes = state.settings.promotionNotes || '';
  if (!promoNotes.trim()) { showToast('Add promotion notes in Settings first'); return; }

  const panel = document.getElementById('panel-dashboard');
  panel.innerHTML = `<div class="dash-section"><div class="dash-section-title">SETTING UP VECTORS</div><div style="color:var(--text-muted);font-size:13px">Analyzing your promotion notes...</div></div>`;

  try {
    const prompt = `Extract 3-7 promotion vectors from these career notes. Each vector should be a short name (2-3 words) representing a dimension of performance being tracked.

Promotion notes:
${promoNotes}

Return ONLY a JSON array, no markdown fences, no extra text. Example format:
[{"name":"Craft","description":"Design quality and rigor"},{"name":"Strategy","description":"Big-picture thinking and roadmap alignment"}]

JSON array:`;
    console.log('Vector setup — calling API. baseUrl:', state.settings.baseUrl, 'model:', state.settings.model, 'prompt length:', prompt.length, 'system prompt length:', getSystemPrompt().length);
    const text = await callClaude(getSystemPrompt(), prompt, 800);
    console.log('Vector setup — API response:', text.substring(0, 300));

    // Parse JSON from response — strip markdown fences if present
    const cleaned = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    const jsonMatch = cleaned.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('No JSON found in: ' + text.substring(0, 200));
    const parsed = JSON.parse(jsonMatch[0]);
    if (!Array.isArray(parsed) || parsed.length === 0) throw new Error('Empty or invalid array');

    state.vectors = parsed.map(v => ({
      id: 'vec-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
      name: v.name,
      description: v.description || '',
      benchmarks: []
    }));
    state.dataVersion = Math.max(state.dataVersion, 2);
    saveState();
    renderDashboard();
    showToast('Vectors extracted — review and edit as needed');
  } catch (e) {
    console.warn('Vector extraction failed:', e);
    showToast('Extraction error: ' + e.message);
    // Fallback: manual entry
    panel.innerHTML = `
      <div class="dash-section">
        <div class="dash-section-title">VECTOR SETUP</div>
        <div style="color:var(--text-muted);font-size:13px;margin-bottom:var(--space-md)">Auto-extraction failed. Add your promotion vectors manually:</div>
        <div id="manualVectorList"></div>
        <button class="btn-ghost" style="font-size:13px;margin-top:var(--space-sm)" onclick="document.getElementById('manualVectorList').insertAdjacentHTML('beforeend','<div style=\\'display:flex;gap:var(--space-sm);margin-bottom:var(--space-sm)\\'><input class=\\'form-input\\' placeholder=\\'Vector name\\' style=\\'flex:1\\'><button class=\\'btn-ghost\\' style=\\'color:var(--accent-negative)\\' onclick=\\'this.parentElement.remove()\\'>×</button></div>')">+ Add vector</button>
        <div style="margin-top:var(--space-lg)"><button class="btn-secondary btn-accent" onclick="saveManualVectors()">Save vectors</button></div>
      </div>`;
    // Pre-populate one empty field
    document.getElementById('manualVectorList').innerHTML = '<div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-sm)"><input class="form-input" placeholder="Vector name" style="flex:1"><button class="btn-ghost" style="color:var(--accent-negative)" onclick="this.parentElement.remove()">×</button></div>';
  }
}

function saveManualVectors() {
  const inputs = document.querySelectorAll('#manualVectorList input');
  const names = [...inputs].map(i => i.value.trim()).filter(Boolean);
  if (names.length === 0) { showToast('Add at least one vector'); return; }

    id: 'vec-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
    name,
    description: '',
    benchmarks: []
  }));
  state.dataVersion = Math.max(state.dataVersion, 2);
  saveState();
  renderDashboard();
  showToast('Vectors saved');
}

async function handleSubmit(e) {
  e.preventDefault();

  // Level 7 gate: force acknowledgment of critical loops before submitting
  if (hasLevel7Loops() && !state._level7Acknowledged) {
    showLevel7Gate(() => { state._level7Acknowledged = true; handleSubmit(e); });
    return;
  }
  state._level7Acknowledged = false;

  const workDone = document.getElementById('workDone').value.trim();
  if (!workDone) {
    document.getElementById('workDoneError').classList.add('show');
    document.getElementById('workDone').focus();
    return;
  }

  const entryDate = logForDate || todayStr();
  const existingForDate = state.entries.find(e => e.date === entryDate);
  if (existingForDate) {
    showToast('Entry already exists for this date — use Edit instead');
    return;
  }

  const selectedMood = document.querySelector('.mood-btn.selected');
  const entry = {
    id: Date.now(),
    date: entryDate,
    dayOfWeek: getDayName(entryDate),
    workDone,
    reflection: document.getElementById('reflection')?.value.trim() || '',
    mood: selectedMood ? selectedMood.dataset.mood : '',
    energy: parseInt(document.getElementById('energySlider').value),
    planTomorrow: collectPlanTomorrow(),
    isMonday: isMonday(entryDate),
    isFriday: isFriday(entryDate),
    weeklyRetro: document.getElementById('weeklyRetro')?.value.trim() || '',
    aiReflection: null
  };

  // Update or create entry
  const existingIdx = state.entries.findIndex(e => e.date === entryDate);
  if (existingIdx >= 0) {
    entry.id = state.entries[existingIdx].id;
    state.entries[existingIdx] = entry;
  } else {
    state.entries.push(entry);
  }
  logForDate = null; // reset after save
  saveState();

  // Refine planTomorrow into a clean checklist
  if (entry.planTomorrow && state.settings.baseUrl) {
    try {
      const refined = await callClaude(
        'You distill a rough "plan for tomorrow" into a crisp checklist. Each item: a punchy verb phrase (3-8 words). Merge overlapping ideas. Drop filler. Rewrite freely. IMPORTANT: if a line starts with "@someone", preserve that prefix exactly (e.g. "- @jane Review PR"). Output each item on its own line prefixed with "- ". Nothing else — no preamble, no numbering.',
        `Distill into a checklist:\n"${entry.planTomorrow}"`,
        300
      );
      const clean = refined.trim().replace(/^["']|["']$/g, '').replace(/\.$/, '');
      if (clean) {
        entry.planTomorrow = clean;
        if (existingIdx >= 0) state.entries[existingIdx] = entry;
        saveState();
      }
    } catch (_) { /* keep the raw text */ }
  }

  clearDraft();
  logMode = 'submitted';
  const panel = document.getElementById('panel-log');
  renderPostSubmit(panel, entry);

  // Fetch AI reflection
  if (state.settings.baseUrl) {
    try {
      const reflection = await callClaude(getSystemPrompt(), buildDailyPrompt(entry), 600);
      entry.aiReflection = reflection;
      updateCoachingState(reflection, entry.date);
      saveState();
      const aiContainer = document.getElementById('aiReflectionContent');
      if (aiContainer) {
        aiContainer.innerHTML = `<span class="ai-icon">💬</span><div class="ai-text">${formatCoachingNote(reflection)}</div><button class="btn-ghost add-todo-btn" style="font-size:11px;margin-top:var(--space-sm)" onclick="addCoachingTodo(this, '${todayStr()}')">+ Add to todos</button>`;
        aiContainer.classList.add('fade-in');
      }
    } catch (err) {
      const aiContainer = document.getElementById('aiReflectionContent');
      if (aiContainer) {
        if (err.message === 'invalid_key') {
          aiContainer.innerHTML = `<span class="ai-icon">💬</span><div class="ai-text" style="color:var(--text-secondary)">Auth error — check your gateway settings.</div>`;
        } else {
          aiContainer.innerHTML = `<span class="ai-icon">💬</span><div class="ai-text" style="color:var(--text-secondary)">Couldn't reach the AI this time. Your entry is saved.</div><button class="btn-icon" style="float:right;margin-top:-24px" onclick="retryReflection()">↻</button>`;
        }
      }
    }
  }

  generateTldr(entry);
}

async function generateTldr(entry) {
  if (!state.settings.baseUrl) return;
  const sections = [];
  if (entry.workDone) sections.push(`Work done:\n"${entry.workDone}"`);
  if (entry.reflection) sections.push(`Reflection:\n"${entry.reflection}"`);
  if (entry.weeklyRetro) sections.push(`Weekly retro:\n"${entry.weeklyRetro}"`);
  if (!sections.length) return;
  try {
    const result = await callClaude(
      'You compress journal entries into bullet-point TLDRs. For each section, output the section header on its own line, then bullet points below it. Use this exact format:\n\nWork done:\n- bullet 1\n- bullet 2\n\nReflection:\n- bullet 1\n\nWeekly retro:\n- bullet 1\n\nEach bullet: concise verb phrase (3-8 words). Only include sections that were provided. No preamble.',
      sections.join('\n\n'),
      800
    );
    const tldr = {};
    let currentKey = null;
    for (const line of result.split('\n')) {
      const headerMatch = line.match(/^(Work done|Reflection|Weekly retro)\s*:/i);
      if (headerMatch) {
        currentKey = headerMatch[1].toLowerCase() === 'work done' ? 'workDone'
          : headerMatch[1].toLowerCase() === 'reflection' ? 'reflection' : 'weeklyRetro';
        tldr[currentKey] = '';
        continue;
      }
      if (currentKey && /^\s*[-•]/.test(line)) {
        tldr[currentKey] += (tldr[currentKey] ? '\n' : '') + line.trim();
      }
    }
    if (Object.keys(tldr).length) {
      entry.tldr = tldr;
      saveState();
      renderHistory();
    }
  } catch (_) { /* keep without tldr */ }
}

async function reanalyzeCoaching(entryId, btn) {
  const entry = state.entries.find(e => e.id === entryId);
  if (!entry) { showToast('Entry not found'); return; }
  if (!state.settings.baseUrl) { showToast('Set up AI in Settings first'); return; }

  try {
    const prompt = buildDailyPrompt(entry) + '\n\n[SYSTEM NOTE: This is a reanalysis of TODAY\'S entry only — the previous coaching note for this specific entry had errors or incomplete output. Treat this entry as if you are analyzing it for the first time. Do not mention or infer that this entry was previously analyzed. Previous entries and their coaching notes above are real historical context — use them normally.]';
    console.log('Reanalyze coaching prompt for', entry.date, ':', prompt.substring(0, 200));
    const reflection = await callClaude(getSystemPrompt(), prompt, 800);
    console.log('Reanalyze coaching response:', reflection);
    entry.aiReflection = reflection;
    saveState();
    showToast('Coaching note regenerated');
    // Re-render after toast so it stays visible
    const aiContainer = document.getElementById('aiReflectionContent');
    if (aiContainer) {
      aiContainer.innerHTML = `<span class="ai-icon">💬</span><div class="ai-text">${formatCoachingNote(reflection)}</div><button class="btn-reanalyze" style="margin-top:var(--space-sm)" onclick="reanalyzeCoaching(${entryId}, this)">Reanalyze</button>`;
    } else {
      renderHistory();
    }
  } catch (e) {
    console.warn('Reanalyze coaching failed:', entryId, e);
    btn.disabled = false;
    btn.textContent = origText;
    const reason = e.message === 'invalid_key' ? 'invalid API key' :
                   e.message === 'rate_limited' ? 'rate limited — try again' :
                   e.message === 'no_key' ? 'no API configured' :
                   e.message === 'api_error' ? 'API error' : 'failed — check console';
    showToast('Reanalysis failed: ' + reason);
  }
}

function renderHistoryCalendar() {
  const entryDates = new Set(state.entries.map(e => e.date));
  const today = new Date(todayStr() + 'T12:00:00');
  const todayISO = todayStr();

  // Go back ~52 weeks (26 on mobile), align to Monday
  const numWeeks = window.innerWidth <= 600 ? 26 : 52;
  const start = new Date(today);
  start.setDate(start.getDate() - numWeeks * 7);
  const dayOfWeek = start.getDay();
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  start.setDate(start.getDate() + mondayOffset);

  // Build weeks (columns) of 5 weekdays (Mon-Fri)
  const dayLetters = ['M','T','W','T','F'];
  const weeks = [];
  const cursor = new Date(start);
  while (cursor <= today) {
    const week = [];
    for (let d = 0; d < 5; d++) {
      const dateStr = `${cursor.getFullYear()}-${String(cursor.getMonth() + 1).padStart(2, '0')}-${String(cursor.getDate()).padStart(2, '0')}`;
      const isFuture = cursor > today;
      week.push({ dateStr, filled: entryDates.has(dateStr), isToday: dateStr === todayISO, isFuture, letter: dayLetters[d] });
      cursor.setDate(cursor.getDate() + 1);
    }
    // Skip Sat & Sun
    cursor.setDate(cursor.getDate() + 2);
    weeks.push(week);
  }

  // Year and month labels aligned above weeks
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let yearLabels = '<div class="history-cal-years">';
  let monthLabels = '<div class="history-cal-months">';
  let lastMonth = -1;
  let lastYear = -1;
  for (let w = 0; w < weeks.length; w++) {
    const d = new Date(weeks[w][0].dateStr + 'T12:00:00');
    const m = d.getMonth();
    const y = d.getFullYear();
    if (y !== lastYear) {
      yearLabels += `<span style="flex:1;min-width:0">${y}</span>`;
      lastYear = y;
    } else {
      yearLabels += `<span style="flex:1;min-width:0"></span>`;
    }
    if (m !== lastMonth) {
      monthLabels += `<span style="flex:1;min-width:0">${monthNames[m]}</span>`;
      lastMonth = m;
    } else {
      monthLabels += `<span style="flex:1;min-width:0"></span>`;
    }
  }
  yearLabels += '</div>';
  monthLabels += '</div>';

  // Grid cells
  const gridHtml = weeks.map(week =>
    `<div class="history-cal-week">${week.map(day =>
      day.isFuture ? `<div class="history-cal-day" style="visibility:hidden"></div>`
        : `<div class="history-cal-day${day.filled ? ' filled' : ''}${day.isToday ? ' today' : ''}" title="${day.dateStr}">${day.filled ? day.letter : ''}</div>`
    ).join('')}</div>`
  ).join('');

  return `<div class="history-calendar">
    ${yearLabels}
    ${monthLabels}
    <div class="history-cal-grid">${gridHtml}</div>
  </div>`;
}

function renderHistory() {
  const panel = document.getElementById('panel-history');
  const entries = [...state.entries].sort((a, b) => b.date.localeCompare(a.date));

  if (entries.length === 0) {
    panel.innerHTML = '<div class="empty-state">No entries yet.<div class="empty-state-secondary">Start logging to build your career history.</div></div>';
    return;
  }

  const calendarHtml = renderHistoryCalendar();
  panel.innerHTML = calendarHtml + entries.map((entry, i) => `
    <div class="history-entry">
      <div class="history-entry-header">
        <span><span class="history-entry-date">${formatDateDisplay(entry.date)}</span>${entry.mood ? ` <span class="history-entry-mood-emoji">${entry.mood}</span>` : ''} <span class="history-entry-mood">${entry.energy}/10</span></span>
        <span class="history-entry-edit" onclick="editEntryById(${entry.id})">Edit Entry</span>
      </div>
      <div class="history-section-label"><span class="section-emoji">✅</span> Work done</div>
      <div class="history-section-body">${formatBulletList(entry.tldr?.workDone || entry.workDone)}</div>
      ${entry.reflection ? `<div class="history-section-label"><span class="section-emoji">🪞</span> Reflection</div><div class="history-section-body">${formatBulletList(entry.tldr?.reflection || entry.reflection)}</div>` : ''}
      ${entry.planTomorrow ? `<div class="history-section-label" style="cursor:pointer" onclick="togglePlanSection(this)"><span class="section-emoji">📋</span> Plan for tomorrow <span class="reminder-cta"><span class="cta-icon">▸</span> Show</span></div><div class="history-section-body hidden">${formatBulletList(entry.planTomorrow)}</div>` : ''}
      ${entry.weeklyRetro ? `<div class="history-section-label"><span class="section-emoji">🔄</span> Weekly retro</div><div class="history-section-body">${formatBulletList(entry.tldr?.weeklyRetro || entry.weeklyRetro)}</div>` : ''}
      ${entry.aiReflection ? `
        <div class="history-section-label" style="cursor:pointer" onclick="toggleCoachingNote(this)"><span class="section-emoji">💬</span> Coaching note <span class="reminder-cta"><span class="cta-icon">▾</span> Hide</span></div>
        <div class="history-reflection" id="hist-reflection-${i}">
          <div class="ai-text">${formatCoachingNote(entry.aiReflection)}</div>
          <button class="btn-reanalyze" style="margin-top:var(--space-sm)" onclick="event.stopPropagation();reanalyzeCoaching(${entry.id}, this)">Reanalyze</button>
        </div>` : ''}
    </div>
    ${i < entries.length - 1 ? '<hr class="history-divider">' : ''}
  `).join('');
}

function togglePlanSection(label) {
  const body = label.nextElementSibling;
  const cta = label.querySelector('.reminder-cta');
  if (body) body.classList.toggle('hidden');
  if (cta) cta.innerHTML = body.classList.contains('hidden') ? '<span class="cta-icon">▸</span> Show' : '<span class="cta-icon">▾</span> Hide';
}

function toggleCoachingNote(label) {
  const body = label.nextElementSibling;
  const cta = label.querySelector('.reminder-cta');
  if (body) body.classList.toggle('hidden');
  if (cta) cta.innerHTML = body.classList.contains('hidden') ? '<span class="cta-icon">▸</span> Show' : '<span class="cta-icon">▾</span> Hide';
}

/* ========================================
   Briefs Tab
   ======================================== */
function renderBriefs() {
  const panel = document.getElementById('panel-briefs');
  // Migrate old sub-tab values
  if (briefsSubView === 'this-week' || briefsSubView === 'past-briefs') briefsSubView = 'weekly';

  // Loading states
  if (briefsView === 'loading') {
    const weekEntries = getCurrentWeekEntries();
    panel.innerHTML = `
      <div class="brief-header">
        <div class="brief-title">Weekly Brief</div>
        <div class="brief-date">${formatWeekRange(getWeekMonday(todayStr()))}</div>
      </div>
      <div class="brief-loading">
        <div class="brief-loading-text">Analyzing ${weekEntries.length} entries...</div>
        <div class="progress-bar"><div class="progress-bar-fill"></div></div>
      </div>`;
    return;
  }

  if (briefsSubView === 'meeting-prep' && meetingPrepView === 'loading') {
    const record = state.meetingPreps.find(p => p.id === currentMeetingPrepId);
    const names = record ? record.stakeholders.map(s => s.name).join(', ') : 'stakeholder';
    panel.innerHTML = `
      <div class="brief-header">
        <div class="brief-title">Recurring Meetings</div>
        <div class="brief-date">Preparing for ${escapeHtml(names)}</div>
      </div>
      <div class="brief-loading">
        <div class="brief-loading-text">Analyzing meetings and journal entries...</div>
        <div class="progress-bar"><div class="progress-bar-fill"></div></div>
      </div>`;
    return;
  }

  // Detail views
  if (briefsView === 'detail' && currentBriefId) {
    renderBriefDetail(panel);
    return;
  }

  if (briefsSubView === 'meeting-prep' && meetingPrepView === 'detail' && currentMeetingPrepId) {
    renderMeetingPrepDetail(panel);
    return;
  }

  if (briefsSubView === 'meeting-prep' && meetingPrepView === 'form') {
    renderMeetingPrepForm(panel);
    return;
  }

  // List view with sub-nav
  panel.innerHTML = `
    <div class="sub-nav">
      <button class="sub-nav-btn${briefsSubView === 'weekly' ? ' active' : ''}" onclick="switchBriefsSubView('weekly')">Weekly</button>
      <button class="sub-nav-btn${briefsSubView === 'meeting-prep' ? ' active' : ''}" onclick="switchBriefsSubView('meeting-prep')">Recurring</button>
      <button class="sub-nav-btn${briefsSubView === 'wins' ? ' active' : ''}" onclick="switchBriefsSubView('wins')">Wins</button>
    </div>
    <div id="briefsContent"></div>
  `;

  const content = document.getElementById('briefsContent');
  if (briefsSubView === 'weekly') renderWeeklyBriefs(content);
  else if (briefsSubView === 'meeting-prep') renderMeetingPrepList(content);
  else if (briefsSubView === 'wins') renderWinsArchive(content);
}

function switchBriefsSubView(view) {
  briefsSubView = view;
  briefsView = 'list';
  meetingPrepView = 'list';
  currentMeetingPrepId = null;
  renderBriefs();
}

function renderWeeklyBriefs(container) {
  const briefs = [...state.weeklyBriefs].sort((a, b) => b.weekOf.localeCompare(a.weekOf));
  const existingBrief = getCurrentWeekBrief();
  const weekEntries = getCurrentWeekEntries();

  const headerBtn = existingBrief
    ? `<button class="btn-secondary" onclick="confirmRegenerate()">Regenerate</button>`
    : `<button class="btn-secondary btn-accent" onclick="startGenerateBrief()">Generate Brief</button>`;

  let listHtml = '';
  if (briefs.length === 0) {
    listHtml = `<div class="empty-state">No briefs yet.
      <div class="empty-state-secondary">Log 3+ days this week, then generate your first brief. ${weekEntries.length > 0 ? `You have ${weekEntries.length} ${weekEntries.length === 1 ? 'entry' : 'entries'} so far.` : ''}</div>
    </div>`;
  } else {
    listHtml = briefs.map(b => {
      const winsKept = state.wins.filter(w => w.status === 'confirmed' && w.sourceWeek === b.weekOf).length;
      const genDate = new Date(b.id);
      const genStr = genDate.toLocaleDateString('en-US', { weekday: 'short' }) + ' ' + genDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      return `
        <div class="past-brief-row" onclick="viewBrief(${b.id})">
          <div class="past-brief-info">
            <div class="past-brief-week">${formatWeekRange(b.weekOf)}</div>
            <div class="past-brief-meta">Generated ${genStr}</div>
          </div>
          <div class="past-brief-wins">${winsKept} win${winsKept !== 1 ? 's' : ''} kept →</div>
        </div>`;
    }).join('');
  }

  container.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-lg)">
      <div style="font-weight:600">Weekly Briefs</div>
      ${headerBtn}
    </div>
    ${listHtml}`;
}

/* ---- Meeting Prep ---- */

function renderMeetingPrepList(container) {
  const preps = state.meetingPreps || [];
  let listHtml = '';
  if (preps.length === 0) {
    listHtml = `<div class="empty-state">No recurring meetings yet.
      <div class="empty-state-secondary">Create one to prepare for recurring meetings with key stakeholders.</div>
    </div>`;
  } else {
    listHtml = preps.map(mp => {
      const names = mp.stakeholders.map(s => `<span class="stakeholder-name-block"><span class="stakeholder-name">${escapeHtml(s.name)}</span><span class="stakeholder-role-meta">${escapeHtml(s.role)}</span></span>`).join('');
      const toneArr = Array.isArray(mp.meetingTone) ? mp.meetingTone : mp.meetingTone ? [mp.meetingTone] : [];
      const toneTags = toneArr.map(t => `<span class="tone-tag">${escapeHtml(t)}</span>`).join('');
      const lastPrep = mp.preps.length > 0 ? new Date(mp.preps[0].generatedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : 'No preps yet';
      return `
        <div class="prep-card" onclick="viewMeetingPrep(${mp.id})">
          <div class="prep-card-info">
            <div class="prep-card-stakeholders">${names}</div>
            <div style="display:flex;align-items:baseline;gap:var(--space-sm);margin-top:2px;flex-wrap:wrap">${toneTags}<span style="font-size:11px;color:var(--text-muted)">Last prep: ${lastPrep}</span></div>
          </div>
          <div class="prep-card-action">→</div>
