async function submitIntention() {
  const text = document.getElementById('intentionText')?.value.trim();
  if (!text) { logMode = 'form'; renderLogTab(); return; }

  // Save raw immediately, then refine
  saveIntention(text);
  logMode = 'form';
  renderLogTab();

  if (state.settings.baseUrl) {
    try {
      const refined = await callClaude(
        'You sharpen a rambling weekly intention into a tight checklist. Ruthlessly compress — each item should be a punchy verb phrase (3-8 words). Merge overlapping ideas. Drop filler. Rewrite freely; do not preserve the original wording. Output each item on its own line prefixed with "- [ ] ". Nothing else.',
        `Distill into a checklist:\n"${text}"`,
        300,
        'Intention Refinement'
      );
      const clean = refined.trim().replace(/^["']|["']$/g, '').replace(/\.$/, '');
      if (clean) saveIntention(clean);
      renderLogTab();
    } catch (_) { /* keep the raw text */ }
  }
}

function skipIntention() {
  logMode = 'form';
  renderLogTab();
}

function getIntentionLines(text) {
  return text.split('\n').filter(l => l.trim()).map(line => ({
    text: line.replace(/^-\s*\[[ x]\]\s*/, '').replace(/^-\s*/, ''),
    checked: /^-\s*\[x\]/i.test(line)
  }));
}

function formatIntentionChecklist(text) {
  const lines = getIntentionLines(text);
  // Count unchecked items to determine top-3 priority
  let uncheckedSeen = 0;
  return lines.map((item, i) => {
    const isPriority = !item.checked && uncheckedSeen < 3;
    if (!item.checked) uncheckedSeen++;
    const classes = ['intention-check-item', item.checked ? 'done' : '', isPriority ? 'priority' : ''].filter(Boolean).join(' ');
    return `<div class="${classes}" draggable="true" data-idx="${i}"><span class="drag-handle">⠿</span><input type="checkbox" ${item.checked ? 'checked' : ''} data-idx="${i}" onchange="toggleIntentionItem(this)"><span>${escapeHtml(item.text)}</span></div>`;
  }).join('');
}

function appendToWorkDone(text) {
  const textarea = document.getElementById('workDone');
  if (!textarea) return;
  const current = textarea.value.trim();
  const line = `- ${text}`;
  if (current.includes(line)) return;
  textarea.value = current ? `${current}\n${line}` : line;
  saveDraft();
}

function removeFromWorkDone(text) {
  const textarea = document.getElementById('workDone');
  if (!textarea) return;
  const line = `- ${text}`;
  textarea.value = textarea.value.split('\n').filter(l => l.trim() !== line).join('\n');
  saveDraft();
}

function toggleIntentionItem(checkbox) {
  const monday = getWeekMonday(todayStr());
  const intention = state.intentions[monday];
  if (!intention) return;
  const idx = parseInt(checkbox.dataset.idx);
  const lines = intention.split('\n').filter(l => l.trim());
  if (idx < 0 || idx >= lines.length) return;
  const clean = lines[idx].replace(/^-\s*\[[ x]\]\s*/, '').replace(/^-\s*/, '');
  lines[idx] = `- [${checkbox.checked ? 'x' : ' '}] ${clean}`;
  state.intentions[monday] = lines.join('\n');
  saveState();
  // Update visual state without full re-render
  const label = checkbox.closest('.intention-check-item');
  if (label) label.classList.toggle('done', checkbox.checked);
  // Auto-log to work done
  if (checkbox.checked) appendToWorkDone(clean);
  else removeFromWorkDone(clean);
}

function initIntentionDragDrop() {
  const container = document.querySelector('.intention-checklist');
  if (!container) return;
  let dragIdx = null;

  container.addEventListener('dragstart', (e) => {
    const item = e.target.closest('.intention-check-item');
    if (!item) return;
    dragIdx = parseInt(item.dataset.idx);
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });

  container.addEventListener('dragend', (e) => {
    const item = e.target.closest('.intention-check-item');
    if (item) item.classList.remove('dragging');
    container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragIdx = null;
  });

  container.addEventListener('dragover', (e) => {
    e.preventDefault();
    const item = e.target.closest('.intention-check-item');
    if (!item || parseInt(item.dataset.idx) === dragIdx) return;
    container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    item.classList.add('drag-over');
  });

  container.addEventListener('dragleave', (e) => {
    const item = e.target.closest('.intention-check-item');
    if (item) item.classList.remove('drag-over');
  });

  container.addEventListener('drop', (e) => {
    e.preventDefault();
    const target = e.target.closest('.intention-check-item');
    if (!target || dragIdx === null) return;
    const dropIdx = parseInt(target.dataset.idx);
    if (dropIdx === dragIdx) return;

    const monday = getWeekMonday(todayStr());
    const intention = state.intentions[monday];
    if (!intention) return;
    const lines = intention.split('\n').filter(l => l.trim());
    const moved = lines.splice(dragIdx, 1)[0];
    lines.splice(dropIdx, 0, moved);
    state.intentions[monday] = lines.join('\n');
    saveState();
    renderLogTab();
  });
}

function parsePlanRowData(planText) {
  if (!planText) return [];
  return planText.split('\n').filter(l => l.trim()).map(line => {
    const clean = line.replace(/^[-•]\s*/, '').replace(/^\d+[.)]\s*/, '').trim();
    const match = clean.match(/^@(\S+)\s+(.+)$/);
    if (match) return { who: match[1], action: match[2] };
    return { who: '', action: clean };
  });
}

function renderPlanRows(planText) {
  const rows = parsePlanRowData(planText);
  if (!rows.length) rows.push({ who: '', action: '' });
  return rows.map((r, i) => renderPlanRowHtml(i, r.who, r.action)).join('');
}

function renderPlanRowHtml(idx, who, action) {
  return `<div class="plan-row" data-row="${idx}">
    <input class="plan-row-who" type="text" placeholder="@who" value="${escapeHtml(who ? (who.startsWith('@') ? who : '@' + who) : '')}" />
    <input class="plan-row-action" type="text" placeholder="Action item..." value="${escapeHtml(action)}" />
    <span class="plan-row-remove" onclick="removePlanRow(this)" title="Remove">&times;</span>
  </div>`;
}

function addPlanRow(focus = true) {
  const container = document.getElementById('planTomorrowRows');
  if (!container) return;
  const idx = container.children.length;
  container.insertAdjacentHTML('beforeend', renderPlanRowHtml(idx, '', ''));
  if (focus) {
    container.lastElementChild.querySelector('.plan-row-who').focus();
  }
}

function autoGrowPlanRows() {
  const container = document.getElementById('planTomorrowRows');
  if (!container) return;
  const rows = container.querySelectorAll('.plan-row');
  if (!rows.length) return;
  const lastRow = rows[rows.length - 1];
  const action = lastRow.querySelector('.plan-row-action').value.trim();
  if (action) addPlanRow(false);
}

function removePlanRow(el) {
  const row = el.closest('.plan-row');
  const container = document.getElementById('planTomorrowRows');
  if (container && container.children.length > 1) {
    row.remove();
  } else {
    // Last row — just clear it
    row.querySelector('.plan-row-who').value = '';
    row.querySelector('.plan-row-action').value = '';
  }
}

function addTodoToPlan(todoId) {
  const todo = state.todos.find(t => t.id === todoId);
  if (!todo) return;
  // Add a new plan row with the todo text pre-filled
  const container = document.getElementById('planTomorrowRows');
  if (container) {
    const idx = container.children.length;
    container.insertAdjacentHTML('beforeend', renderPlanRowHtml(idx, '', todo.text));
  }
  todo.addedToPlan = todayStr();
  saveState();
  // Update the button to show "Added"
  const el = document.getElementById('plan-suggest-' + todoId);
  if (el) {
    const btn = el.querySelector('.todo-suggestion-add');
    if (btn) { btn.textContent = 'Added'; btn.classList.add('added'); }

function collectPlanTomorrow() {
  const container = document.getElementById('planTomorrowRows');
  if (!container) return '';
  return [...container.querySelectorAll('.plan-row')].map(row => {
    const who = row.querySelector('.plan-row-who').value.trim();
    const action = row.querySelector('.plan-row-action').value.trim();
    if (!action) return '';
    return who ? `- ${who} ${action}` : `- ${action}`;
  }).filter(Boolean).join('\n');
}

function getPlanItems(planText) {
  return planText.split('\n').filter(l => l.trim())
    .map(l => l.replace(/^[-•]\s*/, '').replace(/^\d+[.)]\s*/, '').replace(/^-\s*\[[ x]\]\s*/i, '').trim())
    .filter(Boolean);
}

function getDayOrder(itemCount) {
  const today = todayStr();
  const order = state.dayPriorities[today];
  // Validate: must be an array of correct length with all indices present
  if (Array.isArray(order) && order.length === itemCount && [...order].sort((a,b)=>a-b).every((v,i)=>v===i)) {
    return order;
  }
  return null; // no custom order yet
}

function saveDayOrder(order) {
  const today = todayStr();
  state.dayPriorities[today] = order;
  saveState();
}

function resetDayOrder() {
  const today = todayStr();
  delete state.dayPriorities[today];
  saveState();
  renderLogTab();
}

function togglePlanCheck(checkbox) {
  const today = todayStr();
  if (!state.dayPlanChecked[today]) state.dayPlanChecked[today] = [];
  const idx = parseInt(checkbox.dataset.idx);
  const arr = state.dayPlanChecked[today];
  const pos = arr.indexOf(idx);
  if (checkbox.checked && pos < 0) arr.push(idx);
  if (!checkbox.checked && pos >= 0) arr.splice(pos, 1);
  saveState();
  const item = checkbox.closest('.plan-check-item');
  if (item) item.classList.toggle('done', checkbox.checked);
  // Auto-log to work done
  const wrapper = document.getElementById('planReminderWrapper');
  if (wrapper) {
    const items = JSON.parse(wrapper.dataset.items || '[]');
    const text = items[idx] || '';
    if (checkbox.checked) appendToWorkDone(text);
    else removeFromWorkDone(text);
  }
}

function formatPlanItemText(text) {
  // Add " - " between @someone and the action
  const match = text.match(/^(@\S+)\s+(.+)$/);
  if (match) return `<strong>${escapeHtml(match[1])}</strong> — ${escapeHtml(match[2])}`;
  return escapeHtml(text);
}

function renderPlanChecklistInner(items) {
  const today = todayStr();
  const checked = state.dayPlanChecked[today] || [];
  const order = getDayOrder(items.length);
  const indices = order || items.map((_, i) => i);
  return indices.map((origIdx, rank) => {
    const text = items[origIdx];
    const isChecked = checked.includes(origIdx);
    const classes = ['plan-check-item', rank < 3 ? 'priority' : '', isChecked ? 'done' : ''].filter(Boolean).join(' ');
    return `<div class="${classes}" draggable="true" data-rank="${rank}">
      <span class="drag-handle">⠿</span>
      <input type="checkbox" ${isChecked ? 'checked' : ''} data-idx="${origIdx}" onchange="togglePlanCheck(this)">
      <span>${formatPlanItemText(text)}</span>
    </div>`;
  }).join('');
}

function initPlanDragDrop() {
  const container = document.querySelector('#planReminderWrapper .plan-checklist');
  if (!container) return;
  let dragIdx = null;

  container.addEventListener('dragstart', (e) => {
    const item = e.target.closest('.plan-check-item');
    if (!item) return;
    dragIdx = parseInt(item.dataset.rank);
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });

  container.addEventListener('dragend', (e) => {
    const item = e.target.closest('.plan-check-item');
    if (item) item.classList.remove('dragging');
    container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragIdx = null;
  });

  container.addEventListener('dragover', (e) => {
    e.preventDefault();
    const item = e.target.closest('.plan-check-item');
    if (!item || parseInt(item.dataset.rank) === dragIdx) return;
    container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    item.classList.add('drag-over');
  });

  container.addEventListener('dragleave', (e) => {
    const item = e.target.closest('.plan-check-item');
    if (item) item.classList.remove('drag-over');
  });

  container.addEventListener('drop', (e) => {
    e.preventDefault();
    const target = e.target.closest('.plan-check-item');
    if (!target || dragIdx === null) return;
    const dropIdx = parseInt(target.dataset.rank);
    if (dropIdx === dragIdx) return;

    const items = JSON.parse(document.getElementById('planReminderWrapper').dataset.items || '[]');
    const currentOrder = getDayOrder(items.length) || items.map((_, i) => i);
    const moved = currentOrder.splice(dragIdx, 1)[0];
    currentOrder.splice(dropIdx, 0, moved);
    saveDayOrder(currentOrder);

    container.innerHTML = renderPlanChecklistInner(items);
    // Re-init isn't needed since we're using event delegation on the container
  });
}

function renderPlanReminderInner(items, includeVisibTask = false) {

    const summary = actionLines.length
      ? actionLines[0].replace(/^\s*[-•]\s*/, '').trim()

    const d = new Date(entry.date + 'T12:00:00');
    const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short' }) + ' ' + (d.getMonth() + 1) + '/' + d.getDate();

/* ========================================
   Dashboard Tab
   ======================================== */
let dashboardTimeRange = 'quarter'; // 'month' | 'quarter' | '6mo'

/* ========================================
   Monthly / Quarterly Reflections
   ======================================== */
let reflectionStep = 0; // 0=not active, 1=data, 2=reflect, 3=synthesis
let reflectionType = null; // 'monthly' | 'quarterly'
let reflectionPeriodKey = null;

function getLastMonthKey() {
  const d = new Date();
  d.setMonth(d.getMonth() - 1);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function getLastQuarterKey() {
  const d = new Date();
  const q = Math.floor(d.getMonth() / 3);
  const prevQ = q === 0 ? 3 : q - 1;
  const year = q === 0 ? d.getFullYear() - 1 : d.getFullYear();
  return year + '-Q' + (prevQ + 1);
}

function isReflectionNeeded() {
  const today = todayStr();
  const dom = new Date().getDate();

  // Quarterly: first 7 days of Jan/Apr/Jul/Oct
  const month = new Date().getMonth();
  if ([0, 3, 6, 9].includes(month) && dom <= 7) {
    const qKey = getLastQuarterKey();
    if (!state.quarterlyReflections[qKey]) {
      reflectionType = 'quarterly';
      reflectionPeriodKey = qKey;
      return true;
    }
  }

  // Monthly: first 5 days of each month
  if (dom <= 5) {
    const mKey = getLastMonthKey();
    if (!state.monthlyReflections[mKey]) {
      reflectionType = 'monthly';
      reflectionPeriodKey = mKey;
      return true;
    }
  }

  return false;
}

function getReflectionData(periodKey, type) {
  // Determine date range
  let startDate, endDate;
  if (type === 'monthly') {
    const [y, m] = periodKey.split('-');
    startDate = `${y}-${m}-01`;
    const end = new Date(parseInt(y), parseInt(m), 0);
    endDate = `${y}-${m}-${String(end.getDate()).padStart(2, '0')}`;
  } else {
    const [y, qStr] = periodKey.split('-Q');
    const q = parseInt(qStr) - 1;
    const startMonth = q * 3;
    startDate = `${y}-${String(startMonth + 1).padStart(2, '0')}-01`;
    const endMonth = startMonth + 2;
    const endDay = new Date(parseInt(y), endMonth + 1, 0).getDate();
    endDate = `${y}-${String(endMonth + 1).padStart(2, '0')}-${String(endDay).padStart(2, '0')}`;
  }

  // Gather data for period
  const entries = (state.entries || []).filter(e => e.date >= startDate && e.date <= endDate);
  const energyAvg = entries.length > 0 ? (entries.reduce((s, e) => s + (e.energy || 0), 0) / entries.length).toFixed(1) : '?';
  const moodCounts = {};
  entries.forEach(e => { if (e.mood) moodCounts[e.mood] = (moodCounts[e.mood] || 0) + 1; });
  const topMood = Object.entries(moodCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || '?';

  // Vector comparison — current snapshot
  const vectorData = (state.vectors || []).map(v => {
    const sc = state.vectorScoreCache[v.id] || { tier: 'No evidence', total: 0 };
    return { id: v.id, name: v.name, tier: sc.tier, total: sc.total };
  });

  // Loop performance (computed from todos in the period)
  const allTodos = state.todos || [];
  const loopsOpened = allTodos.filter(t => t.createdAt && t.createdAt.substring(0, 10) >= startDate && t.createdAt.substring(0, 10) <= endDate).length;
  const loopsClosed = allTodos.filter(t => t.status === 'done' && t.completedAt && t.completedAt.substring(0, 10) >= startDate && t.completedAt.substring(0, 10) <= endDate).length;
  const choseNotToAct = allTodos.filter(t => t.status === 'dismissed' && t.dismissedViaGate && t.completedAt && t.completedAt.substring(0, 10) >= startDate && t.completedAt.substring(0, 10) <= endDate);

  // Escalation data
  const cs = state.coachingState || {};
  const activeObs = (cs.activeObservations || []).filter(o => o.status === 'active');
  const resolvedObs = cs.resolvedObservations || [];
  const escalatedActive = activeObs.map(o => ({ ...o, escalationLevel: getObservationEscalationLevel(o) })).filter(o => o.escalationLevel >= 3).sort((a, b) => b.escalationLevel - a.escalationLevel);
  const obsReachedL4 = activeObs.filter(o => getObservationEscalationLevel(o) >= 4).length + resolvedObs.filter(o => o.firstSurfaced >= startDate && o.firstSurfaced <= endDate).length;
  const obsResolved = resolvedObs.filter(o => o.resolvedAt && o.resolvedAt.substring(0, 10) >= startDate && o.resolvedAt.substring(0, 10) <= endDate).length;

  // Top coaching observations by escalation level
  const topCoachingObs = activeObs.map(o => ({ ...o, escalationLevel: getObservationEscalationLevel(o) })).sort((a, b) => b.escalationLevel - a.escalationLevel).slice(0, 3);

  // Previous period comparison
  let previousData = null;
  const prevStore = type === 'quarterly' ? state.quarterlyReflections : state.monthlyReflections;
  const prevKeys = Object.keys(prevStore).filter(k => k < periodKey).sort();
  if (prevKeys.length > 0) {
    const prevRef = prevStore[prevKeys[prevKeys.length - 1]];
    if (prevRef && prevRef.dataSnapshot) {
      previousData = prevRef.dataSnapshot;
    }
  }
  // Previous period synthesis and priority
  let previousSynthesis = null;
  let previousPriority = null;
  if (prevKeys.length > 0) {
    const prevRef = prevStore[prevKeys[prevKeys.length - 1]];
    if (prevRef) {
      previousSynthesis = prevRef.synthesis || null;
      previousPriority = prevRef.responses?.priority || null;
    }
  }

  // Weekly energy averages across the period
  const weeklyEnergy = [];
  if (entries.length > 0) {
    const weekMap = {};
    entries.forEach(e => {
      const wk = getWeekMonday(e.date);
      if (!weekMap[wk]) weekMap[wk] = [];
      weekMap[wk].push(e.energy || 0);
    });
    Object.keys(weekMap).sort().forEach(wk => {
      const vals = weekMap[wk];
      weeklyEnergy.push({ week: wk, avg: (vals.reduce((s, v) => s + v, 0) / vals.length).toFixed(1) });
    });
  }

  // Meeting count (meetings with insights in the period)
  const meetingCount = (state.meetings || []).filter(m => {
    const md = meetingDateStr(m);
    return md >= startDate && md <= endDate && (m.transcript || m.insights);
  }).length;

  // Brief count (weekly briefs generated in the period)
  const briefCount = (state.weeklyBriefs || []).filter(b => b.weekOf >= startDate && b.weekOf <= endDate).length;

  // Key evidence
  const wins = (state.wins || []).filter(w => w.status === 'confirmed' && w.date >= startDate && w.date <= endDate);

  return {
    startDate, endDate, entries, energyAvg, topMood, vectorData,
    loopsOpened, loopsClosed, choseNotToAct, wins,
    escalatedActive, obsReachedL4, obsResolved, topCoachingObs,
    previousData, previousSynthesis, previousPriority,
    weeklyEnergy, meetingCount, briefCount
  };
}

function renderReflectionFlow(panel) {
  if (reflectionStep === 0) reflectionStep = 1;
  const data = getReflectionData(reflectionPeriodKey, reflectionType);
  const periodLabel = reflectionType === 'monthly'
    ? new Date(data.startDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
    : reflectionPeriodKey.replace('-', ' ');
  const totalSteps = reflectionType === 'quarterly' ? 3 : 3;

  if (reflectionStep === 1) {
    // Step 1: Data presentation — enriched
    const vectorRows = data.vectorData.map(v => {
      let delta = '';
      if (data.previousData && data.previousData.vectorData) {
        const prev = data.previousData.vectorData.find(pv => pv.name === v.name);
        if (prev && prev.tier !== v.tier) {
          const tierOrder = ['No evidence', 'Thin', 'Developing', 'Solid', 'Strong'];
          const prevIdx = tierOrder.indexOf(prev.tier);
          const curIdx = tierOrder.indexOf(v.tier);
          const arrow = curIdx > prevIdx ? '↑' : '↓';
          const color = curIdx > prevIdx ? 'var(--accent-positive)' : 'var(--accent-negative)';
          delta = ` <span style="font-size:12px;color:${color}">${arrow} was ${prev.tier}</span>`;
        }
      }
      return `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:14px"><span>${escapeHtml(v.name)}</span><span><span class="dash-tier-${v.tier.toLowerCase().replace(/\s/g, '-')}" style="font-weight:500">${v.tier}</span>${delta}</span></div>`;
    }).join('');

    // Open loop performance card
    const loopNet = data.loopsClosed - data.loopsOpened;
    const loopNetColor = loopNet >= 0 ? 'var(--accent-positive)' : 'var(--accent-negative)';
    const loopNetLabel = loopNet >= 0 ? `+${loopNet}` : `${loopNet}`;
    let loopDelta = '';
    if (data.previousData && data.previousData.loopsOpened !== undefined) {
      const prevNet = (data.previousData.loopsClosed || 0) - (data.previousData.loopsOpened || 0);
      const diff = loopNet - prevNet;
      if (diff !== 0) loopDelta = ` <span style="font-size:12px;color:var(--text-muted)">(vs ${prevNet >= 0 ? '+' : ''}${prevNet} last period)</span>`;
    }

    // Escalation status
    let escalationHtml = '';
    if (data.escalatedActive.length > 0) {
      const obsRows = data.escalatedActive.map(o =>
        `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px"><span>${escapeHtml(o.pattern || o.text || 'Pattern')}</span><span style="font-weight:600;color:${o.escalationLevel >= 5 ? 'var(--accent-negative)' : 'var(--accent-warning)'}">L${o.escalationLevel}</span></div>`
      ).join('');
      escalationHtml = `
        <div class="dash-section-title">ESCALATION STATUS</div>
        <div style="background:var(--surface-card);border-radius:var(--radius-md);padding:var(--space-lg);margin-bottom:var(--space-xl)">
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:var(--space-sm)">${data.obsReachedL4} reached L4+ · ${data.obsResolved} resolved this period</div>
          ${obsRows}
        </div>`;
    }

    // Coaching highlights
    let coachingHtml = '';
    if (data.topCoachingObs.length > 0) {
      const obsRows = data.topCoachingObs.map(o => {
        const firstDate = o.firstSurfaced ? new Date(o.firstSurfaced).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '?';
        return `<div style="font-size:13px;padding:4px 0"><span style="font-weight:500">L${o.escalationLevel}</span> — ${escapeHtml(o.pattern || o.text || 'Pattern')} <span style="color:var(--text-muted);font-size:12px">(first surfaced ${firstDate})</span></div>`;
      }).join('');
      coachingHtml = `
        <div class="dash-section-title">COACHING HIGHLIGHTS</div>
        <div style="background:var(--surface-card);border-radius:var(--radius-md);padding:var(--space-lg);margin-bottom:var(--space-xl)">${obsRows}</div>`;
    }

    // Energy trend
    let energyTrendHtml = '';
    if (data.weeklyEnergy.length > 1) {
      const maxE = 10;
      const barWidth = Math.floor(100 / data.weeklyEnergy.length);
      const bars = data.weeklyEnergy.map(w => {
        const pct = (parseFloat(w.avg) / maxE * 100).toFixed(0);
        const weekLabel = new Date(w.week + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        return `<div style="flex:1;text-align:center"><div style="height:60px;display:flex;align-items:flex-end;justify-content:center"><div style="width:20px;height:${pct}%;background:var(--accent-interactive);border-radius:3px 3px 0 0;min-height:4px"></div></div><div style="font-size:10px;color:var(--text-muted);margin-top:2px">${w.avg}</div><div style="font-size:10px;color:var(--text-muted)">${weekLabel}</div></div>`;
      }).join('');
      energyTrendHtml = `
        <div class="dash-section-title">ENERGY TREND</div>
        <div style="display:flex;gap:4px;margin-bottom:var(--space-xl);background:var(--surface-card);border-radius:var(--radius-md);padding:var(--space-lg)">${bars}</div>`;
    }

    const winsHtml = data.wins.length > 0
      ? data.wins.map(w => `<div style="font-size:13px;padding:2px 0">· ${escapeHtml(w.description)}</div>`).join('')
      : '<div style="font-size:13px;color:var(--text-muted)">No confirmed wins this period.</div>';

    let choseNotHtml = '';
    if (reflectionType === 'quarterly' && data.choseNotToAct.length > 0) {
      choseNotHtml = `
        <div class="dash-section-title">THINGS YOU CHOSE NOT TO ACT ON</div>
        <div style="background:var(--surface-card);border-radius:var(--radius-md);padding:var(--space-lg);margin-bottom:var(--space-xl)">
          ${data.choseNotToAct.map(l => {
            const date = l.completedAt ? new Date(l.completedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
            return `<div style="font-size:13px;padding:4px 0;color:var(--accent-negative)">· ${escapeHtml(l.text || l.description || '')} ${date ? '<span style="color:var(--text-muted);font-size:12px">(' + date + ')</span>' : ''}</div>`;
          }).join('')}
        </div>`;
    }

    panel.innerHTML = `
      <div style="max-width:600px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--space-xl)">
          <div style="font-size:18px;font-weight:600">${reflectionType === 'quarterly' ? 'Quarterly' : 'Monthly'} Reflection: ${periodLabel}</div>
          <span style="font-size:12px;color:var(--text-muted)">Step 1/${totalSteps}</span>
        </div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:var(--space-xl)">Review your data before reflecting. This is required to continue using WorkOS.</div>

        <div class="dash-section-title">VECTOR PROGRESS</div>
        <div style="background:var(--surface-card);border-radius:var(--radius-md);padding:var(--space-lg);margin-bottom:var(--space-xl)">${vectorRows}</div>

        <div class="dash-section-title">LOOP PERFORMANCE</div>
        <div style="background:var(--surface-card);border-radius:var(--radius-md);padding:var(--space-lg);margin-bottom:var(--space-xl)">
          <div style="display:flex;gap:var(--space-xl);font-size:14px">
            <div><span style="color:var(--text-muted)">Opened</span> <span style="font-weight:600">${data.loopsOpened}</span></div>
            <div><span style="color:var(--text-muted)">Closed</span> <span style="font-weight:600">${data.loopsClosed}</span></div>
            <div><span style="color:var(--text-muted)">Dismissed</span> <span style="font-weight:600">${data.choseNotToAct.length}</span></div>
            <div><span style="color:var(--text-muted)">Net</span> <span style="font-weight:600;color:${loopNetColor}">${loopNetLabel}</span>${loopDelta}</div>
          </div>
        </div>

        ${escalationHtml}
        ${coachingHtml}
        ${energyTrendHtml}

        <div class="dash-section-title">ENERGY & MOOD</div>
        <div style="font-size:14px;margin-bottom:var(--space-xl)">Avg energy: ${data.energyAvg}/10 · ${data.entries.length} entries · ${data.meetingCount} meetings · ${data.briefCount} briefs · Most common mood: ${data.topMood}</div>

        <div class="dash-section-title">KEY EVIDENCE</div>
        <div style="margin-bottom:var(--space-xl)">${winsHtml}</div>

        ${choseNotHtml}

        <div style="text-align:right;margin-top:var(--space-xl)">
          <button class="btn-secondary btn-accent" onclick="reflectionStep=2;renderDashboard()">Continue to reflection</button>
        </div>
      </div>`;
    return true;

  } else if (reflectionStep === 2) {
    // Step 2: Structured reflection — data-informed
    // Hints for "what are you avoiding" question
    let avoidingHints = '';
    if (data.escalatedActive.length > 0) {
      const hintItems = data.escalatedActive.slice(0, 3).map(o => escapeHtml(o.pattern || o.text || '')).join(', ');
      avoidingHints = `<div style="font-size:12px;color:var(--text-muted);margin-top:var(--space-xs)">Escalated patterns: ${hintItems}</div>`;
    }

    // Hints for "priority" question
    let priorityHints = '';
    const weakestVec = data.vectorData.reduce((w, v) => {
      const tierOrder = ['No evidence', 'Thin', 'Developing', 'Solid', 'Strong'];
      return tierOrder.indexOf(v.tier) < tierOrder.indexOf(w.tier) ? v : w;
    }, data.vectorData[0] || { name: '?', tier: 'Strong' });
    const longestObs = data.topCoachingObs[0];
    let priorityHintParts = [];
    if (weakestVec && weakestVec.tier !== 'Strong') priorityHintParts.push(`Your weakest vector is ${escapeHtml(weakestVec.name)} (${weakestVec.tier})`);
    if (longestObs) priorityHintParts.push(`Your longest unresolved pattern is "${escapeHtml(longestObs.pattern || longestObs.text || '?')}" (L${longestObs.escalationLevel})`);
    if (priorityHintParts.length > 0) {
      priorityHints = `<div style="font-size:12px;color:var(--text-muted);margin-top:var(--space-xs)">${priorityHintParts.join('. ')}.</div>`;
    }

    // Chose not to act hint for quarterly
    let choseNotHint = '';
    if (reflectionType === 'quarterly' && data.choseNotToAct.length > 0) {
      const items = data.choseNotToAct.map(t => `<div style="font-size:12px;color:var(--text-muted);padding:1px 0">· ${escapeHtml(t.text || t.description || '')}</div>`).join('');
      choseNotHint = `<div style="margin-top:var(--space-xs)">${items}</div>`;
    }

    const extraQuestions = reflectionType === 'quarterly' ? `
      <div class="form-group">
        <label class="form-label">Looking at items you chose not to act on — would you make the same choices today?</label>
        ${choseNotHint}
        <textarea class="form-input" id="reflectChoices" rows="3" placeholder="Were those the right calls?"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">If your promotion case were presented tomorrow, what's the biggest hole?</label>
        <textarea class="form-input" id="reflectHole" rows="3" placeholder="What's missing?"></textarea>
      </div>` : '';

    panel.innerHTML = `
      <div style="max-width:600px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--space-xl)">
          <div style="font-size:18px;font-weight:600">${reflectionType === 'quarterly' ? 'Quarterly' : 'Monthly'} Reflection: ${periodLabel}</div>
          <span style="font-size:12px;color:var(--text-muted)">Step 2/${totalSteps}</span>
        </div>

        <div class="form-group">
          <label class="form-label">What worked this period?</label>
          <textarea class="form-input" id="reflectWorked" rows="3" placeholder="What went well? What should you keep doing?"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">What didn't work? What are you avoiding?</label>
          ${avoidingHints}
          <textarea class="form-input" id="reflectDidnt" rows="3" placeholder="Be honest about what's not working."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">What surprised you in the data?</label>
          <textarea class="form-input" id="reflectSurprise" rows="3" placeholder="Anything unexpected from the previous screen?"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">What's your one priority for next ${reflectionType === 'quarterly' ? 'quarter' : 'month'}?</label>
          ${priorityHints}
          <textarea class="form-input" id="reflectPriority" rows="2" placeholder="One thing to focus on."></textarea>
        </div>
        ${extraQuestions}

        <div style="text-align:right;margin-top:var(--space-xl)">
          <button class="btn-secondary btn-accent" onclick="submitReflectionResponses()">Submit reflection</button>
        </div>
      </div>`;
    return true;

  } else if (reflectionStep === 3) {
    // Step 3: AI synthesis (loading or display)
    const store = reflectionType === 'quarterly' ? state.quarterlyReflections : state.monthlyReflections;
    const saved = store[reflectionPeriodKey];
    if (saved && saved.synthesis) {
      panel.innerHTML = `
        <div style="max-width:600px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--space-xl)">
            <div style="font-size:18px;font-weight:600">${periodLabel} Synthesis</div>
            <span style="font-size:12px;color:var(--text-muted)">Step 3/${totalSteps}</span>
          </div>
          <div class="prep-section-body" style="font-size:14px;line-height:1.7">${formatBulletList(saved.synthesis)}</div>
          <div style="display:flex;justify-content:space-between;margin-top:var(--space-xl)">
            <button class="btn-ghost" onclick="navigator.clipboard.writeText(${JSON.stringify(saved.synthesis).replace(/'/g, "\\'")});showToast('Copied')">Copy</button>
            <button class="btn-secondary btn-accent" onclick="reflectionStep=0;reflectionType=null;renderDashboard()">Done</button>
          </div>
        </div>`;
    } else {
      panel.innerHTML = `
        <div style="max-width:600px;text-align:center;padding-top:var(--space-4xl)">
          <div style="font-size:15px;color:var(--text-muted)">Generating synthesis...</div>
          <div class="synthesis-loading-bar" style="margin:var(--space-lg) auto;width:60%"></div>
        </div>`;
    }
    return true;
  }
  return false;
}

function submitReflectionResponses() {
  const worked = document.getElementById('reflectWorked')?.value.trim() || '';
  const didnt = document.getElementById('reflectDidnt')?.value.trim() || '';
  const surprise = document.getElementById('reflectSurprise')?.value.trim() || '';
  const priority = document.getElementById('reflectPriority')?.value.trim() || '';

  if (!worked && !didnt) { showToast('Write at least something for the first two questions'); return; }

  const responses = { worked, didnt, surprise, priority };
  if (reflectionType === 'quarterly') {
    responses.choices = document.getElementById('reflectChoices')?.value.trim() || '';
    responses.hole = document.getElementById('reflectHole')?.value.trim() || '';
  }

  const store = reflectionType === 'quarterly' ? state.quarterlyReflections : state.monthlyReflections;
  const data = getReflectionData(reflectionPeriodKey, reflectionType);
  store[reflectionPeriodKey] = {
    responses,
    dataSnapshot: {
      vectorData: data.vectorData,
      energyAvg: data.energyAvg,
      loopsOpened: data.loopsOpened,
      loopsClosed: data.loopsClosed,
      choseNotToActCount: data.choseNotToAct.length,
      entryCount: data.entries.length,
      winCount: data.wins.length,
      escalatedActiveCount: data.escalatedActive.length,
      obsResolved: data.obsResolved,
      meetingCount: data.meetingCount,
      briefCount: data.briefCount
    },
    completedAt: new Date().toISOString(),
    synthesis: null
  };
  saveState();

  reflectionStep = 3;
  renderDashboard();

  // Generate synthesis
  generateReflectionSynthesis(reflectionPeriodKey, reflectionType, responses, data);
}

async function generateReflectionSynthesis(periodKey, type, responses, data) {
  if (!state.settings.baseUrl) {
    const store = type === 'quarterly' ? state.quarterlyReflections : state.monthlyReflections;
    store[periodKey].synthesis = 'AI not configured — your reflection has been saved.';
    saveState();
    renderDashboard();
    return;
  }

  const periodLabel = type === 'monthly'
    ? new Date(data.startDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
    : periodKey;

  const vectorSummary = data.vectorData.map(v => {
    let line = `${v.name}: ${v.tier} (score ${v.total})`;
    if (data.previousData && data.previousData.vectorData) {
      const prev = data.previousData.vectorData.find(pv => pv.name === v.name);
      if (prev) line += ` — was ${prev.tier} last period`;
    }
    return line;
  }).join('\n');
  const winsList = data.wins.map(w => '- ' + w.description).join('\n') || 'None';

  // Escalated observations
  const escalationSummary = data.escalatedActive.length > 0
    ? data.escalatedActive.map(o => `- L${o.escalationLevel}: ${o.pattern || o.text || 'Pattern'} (since ${o.firstSurfaced ? o.firstSurfaced.substring(0, 10) : '?'})`).join('\n')
    : 'None active above L3';

  // Coaching observations
  const coachingSummary = data.topCoachingObs.length > 0
    ? data.topCoachingObs.map(o => `- L${o.escalationLevel}: ${o.pattern || o.text || ''} (shown ${o.timesShown || 0} times)`).join('\n')
    : 'No active coaching observations';

  // Chose not to act
  const choseNotSummary = data.choseNotToAct.length > 0
    ? data.choseNotToAct.map(t => `- ${t.text || t.description || ''} (dismissed ${t.completedAt ? t.completedAt.substring(0, 10) : '?'})`).join('\n')
    : '';

  // Previous period context
  let prevContext = '';
  if (data.previousSynthesis) {
    prevContext += `\nPREVIOUS PERIOD SYNTHESIS:\n${data.previousSynthesis.substring(0, 800)}\n`;
  }
  if (data.previousPriority) {
    prevContext += `\nPREVIOUS PERIOD'S STATED PRIORITY: ${data.previousPriority}\n`;
  }

  let prompt = `This is a ${type} reflection for ${periodLabel}. Write in the first person as if you are this person's career coach speaking directly to them.

VECTOR STATUS (with previous period comparison):
${vectorSummary}

LOOP PERFORMANCE: Opened ${data.loopsOpened}, Closed ${data.loopsClosed}, Dismissed ${data.choseNotToAct.length}
Net: ${data.loopsClosed - data.loopsOpened >= 0 ? '+' : ''}${data.loopsClosed - data.loopsOpened}
ENERGY: ${data.energyAvg}/10 avg over ${data.entries.length} entries
MEETINGS WITH INSIGHTS: ${data.meetingCount}
WEEKLY BRIEFS: ${data.briefCount}
WINS: ${winsList}

ESCALATED OBSERVATIONS (patterns at L3+, i.e. things the user has been avoiding):
${escalationSummary}

COACHING OBSERVATIONS (top patterns by severity):
${coachingSummary}
${choseNotSummary ? '\nITEMS USER CHOSE NOT TO ACT ON (Level 7 gate dismissals):\n' + choseNotSummary : ''}
${prevContext}
USER'S REFLECTION:
What worked: ${responses.worked}
What didn't: ${responses.didnt}
Surprises: ${responses.surprise}
Priority for next period: ${responses.priority}
${responses.choices ? 'On things they chose not to act on: ' + responses.choices : ''}
${responses.hole ? 'Biggest promotion gap: ' + responses.hole : ''}

Generate a ${type} synthesis (~400 words) with these 5 sections. Be direct, specific, and honest — cite data:

## TRAJECTORY
For each vector, note whether it's trending up/down/flat with specific evidence. Don't sugarcoat stalled vectors.

## ACCOUNTABILITY
${data.previousPriority ? 'Did they follow through on their stated priority of "' + data.previousPriority + '"? Be honest about whether they delivered.' : 'No previous priority on record. Acknowledge this is a fresh start.'}

## ESCALATION STATUS
${data.escalatedActive.length > 0 ? 'Address the observations that have been festering. What is at stake if these remain unaddressed?' : 'No active escalations — acknowledge this positively.'}

## WHAT CHANGED
The most significant shift this period — positive or negative.

## RECOMMENDATION
One specific, actionable focus for next ${type === 'quarterly' ? 'quarter' : 'month'}, connected to the weakest vector or most urgent observation.`;

  try {
    const text = await callClaude(getSystemPrompt(), prompt, 2000, 'Periodic Reflection');
    const store = type === 'quarterly' ? state.quarterlyReflections : state.monthlyReflections;
    store[periodKey].synthesis = text;
    saveState();
    renderDashboard();
    showToast('Synthesis generated');
  } catch (e) {
    const store = type === 'quarterly' ? state.quarterlyReflections : state.monthlyReflections;
    store[periodKey].synthesis = 'Synthesis generation failed. Your reflection has been saved.';
    saveState();
    renderDashboard();
  }
}

let weeklyTriageStep = 0;
let weekTriageQueue = [];
let weekTriageIdx = 0;
let weekTriageCounts = { kept: 0, promoted: 0, deferred: 0, skipped: 0 };

function loadTriageProgress() {
  const tp = state.triageProgress;
  if (!tp) return;
  weeklyTriageStep = tp.weeklyTriageStep || 0;
  weekTriageCounts = tp.weekTriageCounts || { kept: 0, promoted: 0, deferred: 0, skipped: 0 };
  triageCounts = tp.mobileTriageCounts || { today: 0, tomorrow: 0, 'this-week': 0, backlog: 0, deleted: 0 };
}

function saveTriageProgress() {
  state.triageProgress = {
    weeklyTriageStep,
    weekTriageCounts,
    mobileTriageCounts: triageCounts
  };
  saveState();
}

function isWeeklyTriageNeeded() {
  const today = todayStr();
  const monday = getWeekMonday(today);
  // Allow triage any day, but only once per week
  if (state.weeklyTriageCompletedAt && state.weeklyTriageCompletedAt.substring(0, 10) >= monday) return false;
  return true;
}

function renderWeeklyTriage(panel) {
  const inboxItems = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'inbox');
  const weekItems = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'this-week');

  if (weeklyTriageStep === 0 || weeklyTriageStep === 1) {
    // Step 1: Inbox review
    weeklyTriageStep = 1;
    const itemsHtml = inboxItems.map(t => {
      const age = Math.floor((Date.now() - new Date(t.createdAt || 0).getTime()) / 86400000);
      const sourceLabel = t.source === 'slack' ? ('Slack ' + (t.sourceTitle || '')) : t.sourceTitle || (t.source === 'recurring' ? 'Recurring' : t.source || '');
      const recBadge = t.recurrence
        ? `<button class="btn-secondary" style="font-size:11px;padding:var(--space-xs) var(--space-md);color:var(--accent-interactive)" onclick="event.stopPropagation();toggleTodoRecurrenceMenu('${t.id}', this)">🔄 ${recurrenceLabel(t.recurrence)}</button>`
        : `<button class="btn-secondary" style="font-size:11px;padding:var(--space-xs) var(--space-md);color:var(--text-primary)" onclick="event.stopPropagation();toggleTodoRecurrenceMenu('${t.id}', this)">🔄 Set Recurring</button>`;
      return `<div class="triage-item" id="triage-${t.id}">
        <div class="triage-item-text">${escapeHtml(t.text)} ${todoDueTag(t.priority)}</div>
        <div class="triage-item-meta">${sourceLabel ? 'from: ' + escapeHtml(sourceLabel) + ' · ' : ''}${age}d ago</div>
        <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-top:var(--space-sm)">
          <button class="btn-secondary" style="font-size:11px;padding:var(--space-xs) var(--space-md);color:#d4a017" onclick="event.stopPropagation();toggleTodoStar('${t.id}');renderDashboard()">${t.starred ? '★ Starred' : '☆ Star'}</button>
          ${recBadge}
          <button class="triage-btn" onclick="triageTodo('${t.id}','today')">Today</button>
          <button class="triage-btn" onclick="triageTodo('${t.id}','this-week')">This Week</button>
          <button class="triage-btn" onclick="triageTodo('${t.id}','backlog')">Backlog</button>
          <button class="triage-btn delete" onclick="triageTodo('${t.id}','delete')">Delete</button>
        </div>
      </div>`;
    }).join('') || '<div style="color:var(--text-muted);font-size:13px;padding:var(--space-md)">Inbox is empty. Nice.</div>';

    panel.innerHTML = `
      <div class="triage-overlay">
        <div class="triage-header">
          <div class="triage-title">Weekly Triage</div>
          <div style="font-size:12px;color:var(--text-muted)">Step 1/3</div>
        </div>
        <div class="dash-section-title">CLEAR YOUR INBOX <span style="text-transform:none;font-weight:400">${inboxItems.length} item${inboxItems.length !== 1 ? 's' : ''} to triage</span></div>
        <div class="triage-list">${itemsHtml}</div>
        ${inboxItems.length > 3 ? `<div class="triage-batch"><button class="btn-ghost" onclick="batchTriageAll('this-week')">All → This Week</button><button class="btn-ghost" onclick="batchTriageAll('backlog')">All → Backlog</button></div>` : ''}
        <div style="text-align:right;margin-top:var(--space-lg)"><button class="btn-secondary btn-accent" onclick="weeklyTriageStep=2;renderDashboard()">Next: Review Week</button></div>
      </div>`;
    return true;

  } else if (weeklyTriageStep === 2) {
    // Step 2: Card-based this-week review
    if (weekTriageQueue.length === 0) {
      weekTriageQueue = weekItems.map(t => t.id);
      weekTriageIdx = 0;
      // Preserve counts if resuming, otherwise reset
      const hasProgress = Object.values(weekTriageCounts).some(v => v > 0);
      if (!hasProgress) weekTriageCounts = { kept: 0, promoted: 0, deferred: 0, skipped: 0 };
    }

    if (weekTriageIdx >= weekTriageQueue.length) {
      // Summary screen
      panel.innerHTML = `
        <div class="triage-overlay">
          <div class="triage-header">
            <div class="triage-title">Weekly Triage</div>
            <div style="font-size:12px;color:var(--text-muted)">Step 2/3</div>
          </div>
          <div class="dash-section-title">THIS WEEK — DONE</div>
          <div class="week-triage-summary">
            <div class="week-triage-summary-row"><span class="week-triage-summary-count">${weekTriageCounts.kept}</span> kept this week</div>
            <div class="week-triage-summary-row"><span class="week-triage-summary-count">${weekTriageCounts.promoted}</span> promoted to today</div>
            <div class="week-triage-summary-row"><span class="week-triage-summary-count">${weekTriageCounts.deferred}</span> deferred to backlog</div>
            ${weekTriageCounts.skipped > 0 ? `<div class="week-triage-summary-row"><span class="week-triage-summary-count">${weekTriageCounts.skipped}</span> skipped (still in this week)</div>` : ''}
          </div>
          <div style="text-align:right;margin-top:var(--space-lg)"><button class="btn-secondary btn-accent" onclick="weekTriageQueue=[];weeklyTriageStep=3;renderDashboard()">Next: Share Weekly Plan</button></div>
        </div>`;
      return true;
    }

    const currentId = weekTriageQueue[weekTriageIdx];
    const current = state.todos.find(t => t.id === currentId);
    if (!current) { weekTriageIdx++; renderDashboard(); return true; }

    const sourceLabel = current.meetingId ? '' : current.source === 'slack' ? ('Slack ' + (current.sourceTitle || '')) : current.sourceTitle || (current.source === 'recurring' ? 'Recurring' : current.source === 'follow-up' ? 'Follow-up' : current.source === 'subtask' ? 'Subtask' : current.source === 'coaching' ? 'Coaching' : current.source === 'visibility' ? 'Visibility' : current.source === 'manual' ? 'Manually added' : current.source || '');
    const meetingObj = current.meetingId ? state.meetings.find(m => m.id === current.meetingId) : null;
    const meetingTitle = current.meetingTitle || (meetingObj ? meetingObj.title : '') || '';
    const meetingDateRaw = current.meetingDate || (meetingObj ? meetingObj.date : '') || '';
    const meetingDateFmt = meetingDateRaw ? (() => { const d = new Date(meetingDateRaw.length <= 10 ? meetingDateRaw + 'T00:00:00' : meetingDateRaw); return isNaN(d.getTime()) ? '' : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); })() : '';

    panel.innerHTML = `
      <div class="triage-overlay">
        <div class="triage-header">
          <div class="triage-title">Weekly Triage</div>
          <div style="font-size:12px;color:var(--text-muted)">Step 2/3 · ${weekTriageIdx + 1} of ${weekTriageQueue.length}</div>
        </div>
        <div class="week-triage-card">
          ${current.parentId ? (() => { const p = state.todos.find(t => t.id === current.parentId); return p ? `<div class="week-triage-card-parent">${escapeHtml(p.text)}</div>` : ''; })() : ''}
          <div class="week-triage-card-text">${escapeHtml(current.text)}</div>
          <div class="week-triage-card-meta">
            ${meetingTitle ? escapeHtml(meetingTitle) + ' · ' : ''}${meetingDateFmt ? meetingDateFmt : ''}${sourceLabel ? (meetingDateFmt ? ' · ' : '') + escapeHtml(sourceLabel) : ''}
            ${current.starred ? ' · ★ Starred' : ''}
            ${todoDueTag(current.priority)}
          </div>
          <div class="week-triage-card-actions">
            <button class="week-triage-action keep" onclick="weekTriageAction('keep')">Keep this week</button>
            <button class="week-triage-action promote" onclick="weekTriageAction('today')">→ Today</button>
            <button class="week-triage-action defer" onclick="weekTriageAction('backlog')">Defer</button>
            <button class="week-triage-action skip" onclick="weekTriageAction('skip')">Skip</button>
          </div>
          <div class="week-triage-card-star">
            <button class="btn-ghost" style="font-size:13px" onclick="toggleTodoStar('${current.id}');renderDashboard()">${current.starred ? '★ Unstar' : '☆ Star as high-impact'}</button>
          </div>
        </div>
        <div class="week-triage-progress">
          <div class="week-triage-progress-bar" style="width:${Math.round((weekTriageIdx / weekTriageQueue.length) * 100)}%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:var(--space-md)">
          <button class="btn-ghost" style="font-size:12px" onclick="weekTriageUndo()">← Undo</button>
          <button class="btn-ghost" style="font-size:12px" onclick="weekTriageQueue=[];weeklyTriageStep=3;renderDashboard()">Skip remaining →</button>
        </div>
      </div>`;
    // Dynamically shrink title font if it exceeds 33vh
    requestAnimationFrame(() => {
      const el = panel.querySelector('.week-triage-card-text');
      if (!el) return;
      const maxH = window.innerHeight * 0.33;
      let size = 16;
      while (el.scrollHeight > maxH && size > 11) {
        size--;
        el.style.fontSize = size + 'px';
      }
    });
    return true;

  } else if (weeklyTriageStep === 3) {
    // Step 3: Generate shareable plan
    const todayItems = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'today');
    const allPlanItems = [...todayItems, ...weekItems];

    panel.innerHTML = `
      <div class="triage-overlay">
        <div class="triage-header">
          <div class="triage-title">Weekly Triage</div>
          <div style="font-size:12px;color:var(--text-muted)">Step 3/3</div>
        </div>
        <div class="dash-section-title">SHARE WEEKLY PLAN</div>
        <div class="weekly-plan-display card" id="weeklyPlanDisplay" style="font-size:13px;line-height:1.6;min-height:80px"></div>
        <textarea id="weeklyPlanRaw" style="display:none"></textarea>
        <div style="display:flex;justify-content:space-between;margin-top:var(--space-md)">
          <div><button class="btn-secondary btn-accent" onclick="generateWeeklyPlanDraft()">Regenerate</button></div>
          <div style="display:flex;gap:var(--space-sm)">
            <button class="btn-secondary" onclick="const t=document.getElementById('weeklyPlanRaw');navigator.clipboard.writeText(t.value);showToast('Copied — paste into Slack')">Copy to clipboard</button>
            <button class="btn-secondary btn-accent" onclick="completeWeeklyTriage()">Done — Start my day</button>
          </div>
        </div>
      </div>`;

    // Auto-generate plan on render
    generateWeeklyPlanDraft();
    return true;
  }
  return false;
}

function triageTodo(todoId, action) {
  if (action === 'delete') {
    state.todos = state.todos.filter(t => t.id !== todoId);
  } else {
    moveTodoPriority(todoId, action);
  }
  const el = document.getElementById('triage-' + todoId);
  if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 150); }
  saveState();
}

function batchTriageAll(priority) {
  for (const t of (state.todos || [])) {
    if (t.status === 'open' && t.priority === 'inbox') {
      t.priority = priority;
      t.triagedAt = new Date().toISOString();
    }
  }
  saveState();
  renderDashboard();
}

function setWeeklyPlanContent(text) {
  const display = document.getElementById('weeklyPlanDisplay');
  const raw = document.getElementById('weeklyPlanRaw');
  if (display) display.innerHTML = formatBulletList(text);
  if (raw) raw.value = text;
}

async function generateWeeklyPlanDraft() {
  const display = document.getElementById('weeklyPlanDisplay');
  if (!display) return;

  const todayItems = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'today');
  const weekItems = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'this-week');
  const rolledOver = (state.todos || []).filter(t => t.status === 'open' && t.triagedAt && t.createdAt && t.createdAt.substring(0, 10) < getWeekMonday(todayStr()));

  const itemsList = [...todayItems, ...weekItems].map(t => '- ' + t.text).join('\n');
  const rolledList = rolledOver.map(t => '- ' + t.text).join('\n');

  if (!state.settings.baseUrl) {
    setWeeklyPlanContent('This week I\'m focused on:\n' + itemsList);
    return;
  }

  display.innerHTML = '<span style="color:var(--text-muted)">Generating...</span>';
  try {
    const prompt = `Write a concise Slack post (~150 words) sharing my weekly plan with my design team. Task-focused, no promotion/vector language.

My priorities this week:
${itemsList || '(none set)'}

${rolledList ? 'Carrying forward from last week:\n' + rolledList : ''}

Format:
This week I'm focused on:
• [3-4 top priorities framed as outcomes]

Key milestones:
• [any deadlines or meetings]

${rolledList ? 'Carrying forward:\n• [rolled items]' : ''}

Keep it casual, specific, and useful for teammates. Output ONLY the post itself — no preamble, no "Here's a draft:", no commentary before or after.`;

    const text = await callClaude(getSystemPrompt(), prompt, 500, 'Weekly Plan');
    setWeeklyPlanContent(text);
  } catch (e) {
    setWeeklyPlanContent('This week I\'m focused on:\n' + itemsList);
  }
}

let weekTriageLastAction = null; // { todoId, previousPriority, action }

function weekTriageAction(action) {
  const todoId = weekTriageQueue[weekTriageIdx];
  const todo = state.todos.find(t => t.id === todoId);
  if (!todo) { weekTriageIdx++; renderDashboard(); return; }

  weekTriageLastAction = { todoId, previousPriority: todo.priority, action };

  if (action === 'keep') {
    weekTriageCounts.kept++;
    // No change to priority — stays in this-week
  } else if (action === 'today') {
    weekTriageCounts.promoted++;
    todo.priority = 'today';
    todo.triagedAt = new Date().toISOString();
  } else if (action === 'backlog') {
    weekTriageCounts.deferred++;
    todo.priority = 'backlog';
    todo.triagedAt = new Date().toISOString();
    todo.deferCount = (todo.deferCount || 0) + 1;
  } else if (action === 'skip') {
    weekTriageCounts.skipped++;
    // No change — stays in this-week, untouched
  }
  saveState();
  saveTriageProgress();
  weekTriageIdx++;
  renderDashboard();
}

function weekTriageUndo() {
  if (!weekTriageLastAction || weekTriageIdx <= 0) return;
  const { todoId, previousPriority, action } = weekTriageLastAction;
  const todo = state.todos.find(t => t.id === todoId);
  if (todo) {
    todo.priority = previousPriority;
    if (action === 'backlog') todo.deferCount = Math.max(0, (todo.deferCount || 0) - 1);
  }
  if (action === 'keep') weekTriageCounts.kept--;
  else if (action === 'today') weekTriageCounts.promoted--;
  else if (action === 'backlog') weekTriageCounts.deferred--;
  else if (action === 'skip') weekTriageCounts.skipped--;
  weekTriageIdx--;
  weekTriageLastAction = null;
  saveState();
  saveTriageProgress();
  renderDashboard();
}

function completeWeeklyTriage() {
  state.weeklyTriageCompletedAt = new Date().toISOString();
  // Save weekly plan text for later reference
  const rawEl = document.getElementById('weeklyPlanRaw');
  const planText = rawEl ? rawEl.value.trim() : '';
  if (planText) {
    const weekMonday = getWeekMonday(todayStr());
    // Replace if same week, otherwise push new
    const existing = state.weeklyPlanHistory.findIndex(p => p.week === weekMonday);
    const entry = { week: weekMonday, text: planText, createdAt: new Date().toISOString() };
    if (existing >= 0) state.weeklyPlanHistory[existing] = entry;
    else state.weeklyPlanHistory.push(entry);
  }
  weeklyTriageStep = 0;
  weekTriageCounts = { kept: 0, promoted: 0, deferred: 0, skipped: 0 };
  saveTriageProgress();
  saveState();
  renderDashboard();
}

function promoteTomorrowItems() {
  const today = todayStr();
  if (state.lastDayPromoted === today) return;
  let changed = false;
  for (const t of (state.todos || [])) {
    if (t.status !== 'open') continue;
    if (t.priority === 'tomorrow') { t.priority = 'today'; changed = true; }
    if (t.scheduledFor && t.scheduledFor <= today && t.priority === 'backlog') { t.priority = 'today'; changed = true; }
  }
  state.lastDayPromoted = today;
  // Reset daily triage for new day
  const confirmedDate = state.todayFocusConfirmedAt ? state.todayFocusConfirmedAt.substring(0, 10) : null;
  if (confirmedDate !== today) state.todayFocusConfirmedAt = null;
  if (changed) saveState();
}

function getTodayFocusItems() {
  const today = todayStr();
  return (state.todos || []).filter(t => t.status === 'open' && t.priority === 'today')
    .sort((a, b) => (a.focusOrder || 0) - (b.focusOrder || 0));
}

function isTodayFocusConfirmed() {
  if (!state.todayFocusConfirmedAt) return false;
  return state.todayFocusConfirmedAt.substring(0, 10) === todayStr();
}

   Mobile Triage
   ======================================== */
let triageQueue = [];
let triageIndex = 0;
let triageUndoStack = [];
let triageLastPriority = 'today';
let triageCounts = { today: 0, tomorrow: 0, 'this-week': 0, backlog: 0, deleted: 0 };
let mobileMode = 'inbox'; // 'inbox' | 'today' | 'this-week' | 'backlog'

function openMobileTriage(mode) {
  mobileMode = mode || 'inbox';

  if (mobileMode === 'inbox') {
    triageQueue = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'inbox');
    if (triageQueue.length === 0 && mode === 'inbox') { mobileMode = 'today'; } // auto-switch if inbox empty
  }
  triageIndex = 0;
  triageUndoStack = [];
  triageCounts = { today: 0, tomorrow: 0, 'this-week': 0, backlog: 0, deleted: 0 };
  saveTriageProgress();

  document.removeEventListener('keydown', handleTriageKeydown);
  document.addEventListener('keydown', handleTriageKeydown);

  if (!document.getElementById('mobileTriage')) {
    const overlay = document.createElement('div');
    overlay.className = 'triage-mobile';
    overlay.id = 'mobileTriage';
    document.body.appendChild(overlay);
  }

  if (mobileMode === 'inbox') {
    renderTriageCard();
  } else {
    renderMobileBucket(mobileMode);
  }

  // Swipe gesture support
  let touchStartX = 0;
  overlay.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  overlay.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (dx > 80) triageMobileAction(triageLastPriority); // swipe right = repeat last
    else if (dx < -80) triageSkip(); // swipe left = skip
  });
}

function getMobileTabsHtml() {
  const count = (p) => (state.todos || []).filter(t => t.status === 'open' && t.priority === p).length;
  const inboxCount = count('inbox');
  const todayCount = count('today');
  const weekCount = count('this-week');
  const backlogCount = count('backlog') + count('later');
  const tab = (mode, label, c) =>
    `<button class="triage-mobile-tab${mobileMode === mode ? ' active' : ''}" onclick="openMobileTriage('${mode}')">${label}${c ? ' (' + c + ')' : ''}</button>`;
  return `<div class="triage-mobile-tabs">
    ${tab('inbox', 'Inbox', inboxCount)}
    ${tab('today', 'Today', todayCount)}
    ${tab('this-week', 'Week', weekCount)}
    ${tab('backlog', 'Later', backlogCount)}
    <button class="btn-secondary btn-accent" style="font-size:13px;margin-left:auto;padding:var(--space-md) var(--space-lg)" onclick="closeMobileTriage()">Done</button>
  </div>`;
}

function renderMobileBucket(bucket) {
  const overlay = document.getElementById('mobileTriage');
  if (!overlay) return;

  const emptyMsg = { today: 'No items for today.', 'this-week': 'No items this week.', backlog: 'No items in backlog.' };
  const matchPriority = bucket === 'backlog' ? (p => p === 'backlog' || p === 'later') : (p => p === bucket);
  const bucketItems = (state.todos || []).filter(t => matchPriority(t.priority));
  const openItems = bucketItems.filter(t => t.status === 'open');
  const doneItems = bucket === 'today' ? bucketItems.filter(t => t.status === 'done' && t.completedAt && t.completedAt.substring(0, 10) === todayStr()) : [];
  const allItems = [...openItems, ...doneItems];

  const itemsHtml = allItems.length > 0 ? allItems.map(t => {
    const isDone = t.status === 'done';
    const recBadge = t.recurrence
      ? `<button class="btn-secondary" style="font-size:12px;padding:var(--space-xs) var(--space-md);color:var(--accent-interactive)" onclick="event.stopPropagation();toggleTriageRecurrenceMenu('${t.id}', this)">🔄 ${recurrenceLabel(t.recurrence)}</button>`
      : (!isDone ? `<button class="btn-secondary" style="font-size:12px;padding:var(--space-xs) var(--space-md);color:var(--text-primary)" onclick="event.stopPropagation();toggleTriageRecurrenceMenu('${t.id}', this)">🔄 Set Recurring</button>` : '');
    return `<div class="mobile-today-item${isDone ? ' done' : ''}" style="display:flex;flex-direction:column;gap:var(--space-sm);padding:var(--space-sm) 0">
      <div style="display:flex;align-items:center;gap:var(--space-sm)">
        <span class="mobile-today-check" onclick="toggleMobileTodo('${t.id}')">${isDone ? '✓' : '○'}</span>
        <span class="mobile-today-text${isDone ? ' strikethrough' : ''}" onclick="toggleMobileTodo('${t.id}')" style="flex:1">${escapeHtml(t.text)}</span>
      </div>
      ${!isDone ? `<div style="display:flex;gap:var(--space-sm);padding-left:28px;flex-wrap:wrap">
        <button class="btn-secondary" style="font-size:12px;padding:var(--space-xs) var(--space-md);color:#d4a017" onclick="event.stopPropagation();toggleTodoStar('${t.id}');renderMobileBucket('${bucket}')">${t.starred ? '★ Starred' : '☆ Star'}</button>
        ${recBadge}
      </div>` : ''}
    </div>`;
  }).join('') : `<div style="text-align:center;color:var(--text-muted);font-size:15px;padding:var(--space-xl)">${emptyMsg[bucket] || 'No items.'}</div>`;

  overlay.innerHTML = `
    ${getMobileTabsHtml()}
    <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;margin-top:var(--space-md)">
      ${itemsHtml}
    </div>`;
}

function toggleMobileTodo(todoId) {
  const t = state.todos.find(t => t.id === todoId);
  if (!t) return;
  if (t.status === 'done') {
    t.status = 'open';
    t.completedAt = null;
  } else {
    t.status = 'done';
    t.completedAt = new Date().toISOString();
    const todayEntry = getEntryForDate(todayStr());
    if (todayEntry && todayEntry.workDone && !todayEntry.workDone.includes(t.text)) {
      todayEntry.workDone += '\n✓ ' + t.text;
    }
  }
  saveState();
  renderMobileBucket(mobileMode);
}

  const total = triageQueue.length;

    // Done state
    const totalTriaged = Object.values(triageCounts).reduce((a, b) => a + b, 0);
    const breakdown = [
      triageCounts.today ? `Today: ${triageCounts.today}` : '',
      triageCounts.tomorrow ? `Next workday: ${triageCounts.tomorrow}` : '',
      triageCounts['this-week'] ? `This Week: ${triageCounts['this-week']}` : '',
      triageCounts.backlog ? `Backlog: ${triageCounts.backlog}` : '',
      triageCounts.done ? `Done: ${triageCounts.done}` : '',
      triageCounts.deleted ? `Deleted: ${triageCounts.deleted}` : '',

    overlay.innerHTML = `
      ${getMobileTabsHtml()}
      <div class="triage-mobile-header">
        <div class="triage-mobile-progress"><div class="triage-mobile-progress-fill" style="width:100%"></div></div>
        <span class="triage-mobile-count">${total}/${total}</span>

        </div>

  // Dynamically shrink title font if it exceeds 33vh

    if (!el) return;
    const maxH = window.innerHeight * 0.33;
    let size = parseInt(getComputedStyle(el).fontSize);
    while (el.scrollHeight > maxH && size > 11) {
      size--;
      el.style.fontSize = size + 'px';
    }
  });
}

function toggleTriageRecurrenceMenu(todoId, btn) {
  const existing = document.querySelector('.todo-recurrence-menu');
  if (existing) { existing.remove(); return; }
  const todo = state.todos.find(t => t.id === todoId);
  if (!todo) return;
  const options = [
    { value: null, label: 'Once (remove)' },
    { value: 'daily', label: 'Daily' },
    { value: 'weekdays', label: 'Weekdays' },
    { value: 'weekly', label: 'Weekly' },
    { value: 'biweekly', label: 'Biweekly' },
    { value: 'monthly', label: 'Monthly' }
  ];
  const menu = document.createElement('div');
  menu.className = 'todo-recurrence-menu';
  menu.style.bottom = '100%';
  menu.style.right = '0';
  menu.style.marginBottom = '4px';
  menu.innerHTML = options.map(o =>
    `<button class="${todo.recurrence === o.value ? 'selected' : ''}" data-freq="${o.value || ''}">${o.label}</button>`
  ).join('');
  menu.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      setTodoRecurrence(todoId, b.dataset.freq || null);
      // Update the triageQueue item reference too
      const qItem = triageQueue[triageIndex];
      if (qItem && qItem.id === todoId) {
        qItem.recurrence = b.dataset.freq || null;
      }
      menu.remove();
      renderTriageCard();
    });
  });
  btn.style.position = 'relative';
  btn.appendChild(menu);
  const dismiss = (e) => { if (!menu.contains(e.target) && e.target !== btn) { menu.remove(); document.removeEventListener('click', dismiss); } };
  setTimeout(() => document.addEventListener('click', dismiss), 0);
}

function triageMobileAction(priority) {
  const item = triageQueue[triageIndex];
  if (!item) return;

  // Flash button
  const flashMap = { today: 'flash-today', tomorrow: 'flash-tomorrow', 'this-week': 'flash-week', backlog: 'flash-backlog' };
  const btn = document.getElementById('triBtn-' + priority);
  if (btn && flashMap[priority]) {
    btn.classList.add(flashMap[priority]);
    setTimeout(() => btn.classList.remove(flashMap[priority]), 150);
  }

  // Animate card out
  const card = document.getElementById('triageCard');
  if (card) card.className = 'triage-mobile-card triage-card-exit';

  // Store for undo
  triageUndoStack.push({ todoId: item.id, text: item.text, priority: priority === 'delete' ? 'deleted' : priority, previousPriority: item.priority });
  if (priority !== 'delete') triageLastPriority = priority;

  // Apply action
  if (priority === 'delete') {
    state.todos = state.todos.filter(t => t.id !== item.id);
    triageCounts.deleted++;
  } else if (priority === 'done') {
    const todo = state.todos.find(t => t.id === item.id);
    if (todo) {
      todo.status = 'done';
      todo.completedAt = new Date().toISOString();
      const todayEntry = getEntryForDate(todayStr());
      if (todayEntry && todayEntry.workDone && !todayEntry.workDone.includes(todo.text)) {
        todayEntry.workDone += '\n✓ ' + todo.text;
      }
      if (todo.recurrence) {
        const hasOpenChild = state.todos.some(t => t.parentId === todo.id && t.status === 'open');
        if (!hasOpenChild) spawnRecurringInstance(todo);
      }
    }
    triageCounts.done = (triageCounts.done || 0) + 1;
  } else {
    const todo = state.todos.find(t => t.id === item.id);
    if (todo) {
      todo.priority = priority;
      todo.triagedAt = new Date().toISOString();
    }
    triageCounts[priority] = (triageCounts[priority] || 0) + 1;
  }

  triageIndex++;
  saveState();
  saveTriageProgress();
  setTimeout(renderTriageCard, 200);
}

function startTriageEdit(todoId) {
  const el = document.getElementById('triageCardText');
  if (!el || el.querySelector('textarea')) return;
  const todo = state.todos.find(t => t.id === todoId);
  if (!todo) return;
  const textarea = document.createElement('textarea');
  textarea.className = 'triage-edit-input';
  textarea.value = todo.text;
  textarea.addEventListener('keydown', (e) => {
    e.stopPropagation();
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveTriageEdit(todoId, textarea.value); }
    if (e.key === 'Escape') { e.preventDefault(); renderTriageCard(); }
  });
  textarea.addEventListener('blur', () => saveTriageEdit(todoId, textarea.value));
  el.textContent = '';
  el.appendChild(textarea);
  textarea.focus();
  textarea.select();
}

function saveTriageEdit(todoId, newText) {
  const trimmed = (newText || '').trim();
  if (!trimmed) { renderTriageCard(); return; }
  const todo = state.todos.find(t => t.id === todoId);
  if (todo && todo.text !== trimmed) {
    todo.text = trimmed;
    saveState();
  }
  renderTriageCard();
}

function triageSkip() {
  // Move current item to end of queue
  const item = triageQueue.splice(triageIndex, 1)[0];
  if (item) triageQueue.push(item);
  const card = document.getElementById('triageCard');
  if (card) card.className = 'triage-mobile-card triage-card-exit';
  setTimeout(renderTriageCard, 200);
}

function triageUndo() {
  if (triageUndoStack.length === 0) return;
  const action = triageUndoStack.pop();
  const { todoId } = action;

  if (action.priority === 'deleted') {
    state.todos.push({
      id: todoId,
      text: action.text,
      status: 'open',
      priority: 'inbox',
      source: 'manual',
      createdAt: new Date().toISOString(),
      deferCount: 0
    });
    triageCounts.deleted--;
  } else if (action.priority === 'done') {
    const todo = state.todos.find(t => t.id === todoId);
    if (todo) {
      todo.status = 'open';
      todo.completedAt = null;
      todo.priority = 'inbox';
      todo.triagedAt = null;
    }
    triageCounts.done = Math.max(0, (triageCounts.done || 0) - 1);
  } else {
    const todo = state.todos.find(t => t.id === todoId);
    if (todo) {
      todo.priority = 'inbox';
      todo.triagedAt = null;
    }
    triageCounts[action.priority] = Math.max(0, (triageCounts[action.priority] || 0) - 1);
  }

  triageIndex = Math.max(0, triageIndex - 1);
  const existingIdx = triageQueue.findIndex(t => t.id === todoId);
  if (existingIdx === -1) {
    const restored = state.todos.find(t => t.id === todoId);
    if (restored) triageQueue.splice(triageIndex, 0, restored);
  }

  saveState();
  saveTriageProgress();
  renderTriageCard();
}

function handleTriageKeydown(e) {
  // Skip if user is editing text
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  const overlay = document.getElementById('mobileTriage');
  if (!overlay) return;
  const item = triageQueue[triageIndex];
  if (!item || triageIndex >= triageQueue.length) return;
  switch (e.key.toLowerCase()) {
    case '1': triageMobileAction('today'); break;
    case '2': triageMobileAction('tomorrow'); break;
    case '3': triageMobileAction('this-week'); break;
    case '4': triageMobileAction('backlog'); break;
    case '5': triageSkip(); break;
    case 's': toggleTodoStar(item.id); renderTriageCard(); break;
    case 'r': toggleTriageRecurrenceMenu(item.id, overlay.querySelector('.btn-secondary[onclick*="toggleTriageRecurrenceMenu"]')); break;
    case 'd': triageMobileAction('done'); break;
    case 'x': triageMobileAction('delete'); break;
    case 'z': if (e.metaKey || e.ctrlKey) { triageUndo(); e.preventDefault(); } break;
    default: return;
  }
  e.preventDefault();
}

function closeMobileTriage() {
  document.removeEventListener('keydown', handleTriageKeydown);
  const overlay = document.getElementById('mobileTriage');
  if (overlay) overlay.remove();
  saveState();
  syncPush(); // Force immediate push so remote state is up-to-date
  renderTabNav();
  renderTodos();
  renderDashboard();
}

function renderDashboard() {
  promoteTomorrowItems();
  checkRecurringTodos();
  const panel = document.getElementById('panel-dashboard');

  // Monthly/quarterly reflection (blocking, takes priority)
  if (isReflectionNeeded() || reflectionStep > 0) {
    if (renderReflectionFlow(panel)) return;
  }

  // Monday weekly triage (blocking)
  if (isWeeklyTriageNeeded() || weeklyTriageStep > 0) {
    if (renderWeeklyTriage(panel)) return;
  }

  const vectors = state.vectors || [];

  // Vector setup needed
  if (vectors.length === 0) {
    const hasPromoNotes = (state.settings.promotionNotes || '').trim().length > 0;
    panel.innerHTML = `
      <div class="dash-section">
        <div class="dash-section-title">PROMOTION VECTORS</div>
        <div class="empty-state" style="margin-top:var(--space-lg)">
          ${hasPromoNotes ? `
            <div>Ready to set up your promotion vectors.</div>
            <div class="empty-state-secondary">We'll extract vectors from your promotion notes.</div>
            <button class="btn-secondary btn-accent" style="margin-top:var(--space-md)" onclick="startVectorSetup()">Set up vectors</button>
          ` : `
            <div>No vectors configured yet.</div>
            <div class="empty-state-secondary">Go to Settings → Profile → Promotion Notes and paste the vectors or criteria your manager has shared with you.</div>
            <button class="btn-secondary" style="margin-top:var(--space-md)" onclick="switchTab('settings')">Go to Settings</button>
          `}
        </div>
      </div>`;
    return;
  }

  console.log('Dashboard render — vectors:', JSON.stringify(state.vectors.map(v => v.name)), 'cache:', JSON.stringify(state.vectorScoreCache));

  // Time range filter
  const rangeMonths = dashboardTimeRange === 'month' ? 1 : dashboardTimeRange === 'quarter' ? 3 : 6;
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - rangeMonths);
  const cutoffStr = cutoff.toISOString().split('T')[0];

  // Render vector rows
  const vectorRowsHtml = vectors.map(vec => {
    const sc = state.vectorScoreCache[vec.id] || { tier: 'No evidence', total: 0, winCount: 0, meetingSignalCount: 0, visibilityCount: 0, daysSinceLast: -1, topItems: [] };
    const tierClass = sc.tier.toLowerCase().replace(/\s/g, '-');
    const staleClass = sc.daysSinceLast > 30 ? ' dash-vec-stale' : '';
    const trendArrow = sc.tier === 'No evidence' ? '' :
      sc.total > (sc.previousTotal || 0) ? '↗' :
      sc.total < (sc.previousTotal || 0) ? '↘' : '→';
    const staleness = sc.daysSinceLast >= 0 ? `last: ${sc.daysSinceLast}d ago` : 'never';
    const barWidth = Math.min(100, Math.round((sc.total / 15) * 100));

    return `<div class="dash-vec-row${staleClass}">
      <div class="dash-vec-content">
        <div class="dash-vec-header">
          <span class="dash-vec-name">${escapeHtml(vec.name)}</span>
          <span class="dash-vec-tier dash-tier-${tierClass}">${sc.tier}</span>
          <span class="dash-vec-trend">${trendArrow}</span>
        </div>
        <div class="dash-vec-bar"><div class="dash-vec-bar-fill dash-tier-${tierClass}" style="width:${barWidth}%"></div></div>
        <div class="dash-vec-meta">${[
          sc.winCount ? sc.winCount + ' win' + (sc.winCount !== 1 ? 's' : '') : '',
          sc.meetingSignalCount ? sc.meetingSignalCount + ' meeting' + (sc.meetingSignalCount !== 1 ? 's' : '') : '',
          sc.journalCount ? sc.journalCount + ' journal' + (sc.journalCount !== 1 ? 's' : '') : '',
          sc.todoCount ? sc.todoCount + ' todo' + (sc.todoCount !== 1 ? 's' : '') : '',
        ].filter(Boolean).join(' · ') || 'no evidence'} · ${staleness}${sc.penaltyCount ? ` · <span style="color:var(--accent-negative)">⚠ ${sc.penaltyCount} escalation penalt${sc.penaltyCount !== 1 ? 'ies' : 'y'}</span>` : ''}</div>
        <div class="dash-vec-detail hidden" id="vecDetail-${vec.id}"></div>
      </div>
      <button class="dash-vec-toggle" onclick="toggleVectorDetail('${vec.id}', this)">▸</button>
    </div>`;
  }).join('');

  const hasMappedEvidence = (state.entries || []).some(e => e.vectorTags?.length > 0) ||
    (state.wins || []).some(w => w.vectorTags?.length > 0) ||
    (state.meetings || []).some(m => m.insightVectorTags && Object.keys(m.insightVectorTags).length > 0);
  const allNoEvidence = vectors.every(v => {
    const sc = state.vectorScoreCache[v.id];
    return !sc || sc.tier === 'No evidence';
  });

  // Uncomfortable truth
  const weakVectors = vectors.filter(v => {
    const sc = state.vectorScoreCache[v.id] || { tier: 'No evidence', daysSinceLast: -1 };
    return sc.tier === 'Thin' || sc.tier === 'No evidence';
  });
  const staleVectors = vectors.filter(v => {
    const sc = state.vectorScoreCache[v.id];
    return sc && sc.daysSinceLast > 30;
  });

  let truthHtml = '';
  if (weakVectors.length > 0 || staleVectors.length > 0) {
    const parts = [];
    if (weakVectors.length > 0) {
      parts.push(`Your ${weakVectors.map(v => `<strong>${escapeHtml(v.name)}</strong>`).join(' and ')} vector${weakVectors.length > 1 ? 's have' : ' has'} insufficient evidence.`);
    }
    if (staleVectors.length > 0) {
      parts.push(`${staleVectors.map(v => `<strong>${escapeHtml(v.name)}</strong>`).join(' and ')} — no new evidence in over 30 days.`);
    }
    truthHtml = `
      <div class="dash-section">
        <div class="dash-section-title">THE UNCOMFORTABLE TRUTH</div>
        <div class="dash-truth">${parts.join(' ')}</div>
      </div>`;
  }

  // This week section
  const nudges = getMeetingNudges();
  let weekHtml = '';
  const weekItems = [];
  if (nudges.length > 0) {
    weekItems.push(...nudges.map(n => {
      const ds = new Date(meetingDateStr(n.meeting) + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return `<div class="dash-week-item" onclick='openNudgeReflection(${n.record.id}, ${escapeHtml(JSON.stringify(n.meeting.id))})'>Post-meeting reflection: ${escapeHtml(n.meeting.title || 'Untitled')} · ${ds} →</div>`;
    }));
  }
  if (weekItems.length > 0) {
    weekHtml = `<div class="dash-section">
      <div class="dash-section-title">THIS WEEK</div>
      ${weekItems.join('')}
    </div>`;
  }

  // Today's Focus section
  const focusItems = getTodayFocusItems();
  const focusConfirmed = isTodayFocusConfirmed();
  const inboxCount = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'inbox').length;
  const completedToday = (state.todos || []).filter(t => t.status === 'done' && t.completedAt && t.completedAt.substring(0, 10) === todayStr());
  const focusDoneCount = focusItems.filter(t => t.status === 'done').length + completedToday.filter(t => t.priority === 'today').length;

  let focusHtml = '';
  if (!focusConfirmed) {
    // Triage state — blocking
    const focusItemsHtml = focusItems.map((t, i) =>
      `<div class="focus-item" data-todo-id="${t.id}">
        <span class="focus-drag">⠿</span>
        <span class="focus-text">${escapeHtml(t.text)} ${todoDueTag(t.priority)}</span>
