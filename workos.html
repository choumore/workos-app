          <button class="focus-btn" title="Move to tomorrow" onclick="moveTodoPriority('${t.id}','tomorrow');renderDashboard()">━</button>
          <button class="focus-btn" title="Remove to backlog" onclick="moveTodoPriority('${t.id}','backlog');renderDashboard()">×</button>
        </span>
      </div>`
    ).join('');

    // Pull-forward: items from Tomorrow and This Week
    const tomorrowItems = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'tomorrow');
    const thisWeekItems = (state.todos || []).filter(t => t.status === 'open' && t.priority === 'this-week');
    const pullForwardHtml = (tomorrowItems.length > 0 || thisWeekItems.length > 0)
      ? `<div class="focus-pull-forward" id="focusPullForward">
          <button class="focus-pull-toggle" onclick="togglePullForward()">
            Pull forward from upcoming (${tomorrowItems.length + thisWeekItems.length}) <span id="pullForwardArrow">▸</span>
          </button>
          <div class="focus-pull-list hidden" id="focusPullList">
            ${tomorrowItems.length > 0 ? `<div class="focus-pull-group-label">Tomorrow</div>` +
              tomorrowItems.map(t => `<div class="focus-pull-item">
                <span class="focus-pull-text">${escapeHtml(t.text)}</span>
                <button class="focus-pull-btn" onclick="moveTodoPriority('${t.id}','today');renderDashboard()">→ Today</button>
              </div>`).join('') : ''}
            ${thisWeekItems.length > 0 ? `<div class="focus-pull-group-label">This Week</div>` +
              thisWeekItems.map(t => `<div class="focus-pull-item">
                <span class="focus-pull-text">${escapeHtml(t.text)}</span>
                <button class="focus-pull-btn" onclick="moveTodoPriority('${t.id}','today');renderDashboard()">→ Today</button>
              </div>`).join('') : ''}
          </div>
        </div>`
      : '';

    focusHtml = `<div class="dash-section dash-focus-blocking">
      <div class="dash-section-title">TODAY'S FOCUS</div>
      <div class="focus-list" id="focusList">${focusItemsHtml || '<div style="color:var(--text-muted);font-size:13px;padding:var(--space-sm) 0">No items for today yet. Add from inbox or create new ones.</div>'}</div>

        <button class="btn-secondary btn-accent focus-confirm" onclick="confirmTodayFocus()">Confirm Today's Focus</button>
      </div>
      <div class="focus-inbox hidden" id="focusInbox"></div>
      ${pullForwardHtml}
    </div>`;
  } else {
    // Confirmed state — active tracking
    const allTodayItems = (state.todos || []).filter(t => t.priority === 'today');
    const openItems = allTodayItems.filter(t => t.status === 'open');
    const doneItems = allTodayItems.filter(t => t.status === 'done');
    const total = openItems.length + doneItems.length;
    const focusActiveHtml = [...openItems, ...doneItems].map(t => {
      const isDone = t.status === 'done';
      return `<div class="focus-item${isDone ? ' done' : ''}">
        <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleFocusTodo('${t.id}')">
        <span class="focus-text${isDone ? ' strikethrough' : ''}">${escapeHtml(t.text)} ${todoDueTag(t.priority)}</span>
      </div>`;
    }).join('');

    focusHtml = `<div class="dash-section">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div class="dash-section-title" style="margin-bottom:0">TODAY'S FOCUS</div>
        <span style="font-size:11px;color:var(--text-muted)">${doneItems.length}/${total} done</span>
      </div>
      <div class="focus-list">${focusActiveHtml || '<div style="color:var(--text-muted);font-size:13px">No focus items today.</div>'}</div>
      <button class="btn-ghost" style="font-size:12px;margin-top:var(--space-xs)" onclick="addFocusItem()">+ Add item</button>
    </div>`;
  }

  // Dim sections below focus if not confirmed
  const dimClass = !focusConfirmed ? ' style="opacity:0.4;pointer-events:none"' : '';

  // Open loops section (computed from todos)
  const openLoops = getComputedOpenLoops();
  let loopsHtml = '';
  if (openLoops.length > 0) {
    const loopItemsHtml = openLoops.map(l => {
      const levelClass = l.isRepeatDefer ? 'repeat-defer' : l.escalationLevel >= 5 ? 'critical' : l.escalationLevel >= 3 ? 'warning' : '';
      const levelBadge = `L${l.escalationLevel}`;
      const deferBadge = l.isRepeatDefer ? `<span class="loop-defer-badge">deferred ${l.deferCount}x</span>` : '';

function toggleVectorDetail(vecId, btn) {
  const el = document.getElementById('vecDetail-' + vecId);
  if (!el) return;
  if (!el.classList.contains('hidden')) {
    el.classList.add('hidden');
    if (btn) btn.textContent = '▸';
    return;
  }
  el.classList.remove('hidden');
  if (btn) btn.textContent = '▾';

  const vec = state.vectors.find(v => v.id === vecId);
  const sc = state.vectorScoreCache[vecId] || { tier: 'No evidence', topItems: [] };
  if (!vec) return;

  // Benchmarks
  const benchmarks = (vec.benchmarks || []).map(b =>
    `<div class="dash-benchmark"><span class="dash-benchmark-check">${b.count > 0 ? '●' : '○'}</span> ${escapeHtml(b.label)} <span class="dash-benchmark-count">${b.count || 0} this quarter</span></div>`
  ).join('') || `<div style="color:var(--text-muted);font-size:12px">No benchmarks set. <button class="btn-ghost" style="font-size:12px" onclick="editBenchmarks('${vecId}')">Add benchmarks</button></div>`;


  // Evidence with links + remove buttons — show first 3, expand to all
  const allItems = sc.topItems || [];
  const previewCount = 3;
  const renderEvidenceItem = (item, idx) => {
    const typeLabels = { meeting: 'Meeting', journal: 'Journal', synthesis: 'Reflection', brief: 'Weekly Brief', todo: 'Todo', win: 'Win', visibility: 'Visibility', contribution: 'Contribution' };
    const typeLabel = typeLabels[item.type] || item.type;
    const qualityTag = item.quality === 'external'
      ? `<span class="dash-evidence-tag external">${typeLabel}</span>`
      : `<span class="dash-evidence-tag self">${typeLabel}</span>`;
    const meetingLink = item.type === 'meeting' && item.meetingId
      ? ` <button class="btn-ghost" style="font-size:11px" onclick="viewMeetingFromDashboard('${escapeHtml(item.meetingId)}')">${escapeHtml(item.meeting || 'Meeting')} →</button>`
      : '';
    const removeBtn = `<button class="dash-evidence-remove" onclick="removeEvidence('${vecId}', ${idx})" title="Remove this evidence">×</button>`;
    const fullText = item.text || '';
    const reason = item.reason || '';
    const needsTooltip = fullText.length > 800;
    return `<div class="dash-evidence-item">
      <div class="dash-evidence-header">${removeBtn}${qualityTag}${meetingLink}</div>
      ${reason ? `<div class="dash-evidence-reason">${escapeHtml(reason)}</div>` : ''}
      <div class="dash-evidence-text">${formatBulletList(fullText.substring(0, 800))}${needsTooltip ? '...' : ''}</div>
      ${needsTooltip ? `<div class="dash-tooltip">${escapeHtml(fullText)}</div>` : ''}
    </div>`;
  };
  let evidenceHtml;
  if (allItems.length === 0) {
    evidenceHtml = '<div style="color:var(--text-muted);font-size:12px">No evidence items yet.</div>';
  } else if (allItems.length <= previewCount) {
    evidenceHtml = allItems.map(renderEvidenceItem).join('');
  } else {
    const previewHtml = allItems.slice(0, previewCount).map(renderEvidenceItem).join('');
    const restHtml = allItems.slice(previewCount).map(renderEvidenceItem).join('');
    evidenceHtml = `${previewHtml}
      <div class="hidden" id="vecEvAll-${vecId}">${restHtml}</div>
      <button class="dash-evidence-link" style="margin-top:var(--space-xs)" id="vecEvToggle-${vecId}" onclick="const el=document.getElementById('vecEvAll-${vecId}');el.classList.toggle('hidden');this.textContent=el.classList.contains('hidden')?'Show all ${allItems.length} items':'Show less'">Show all ${allItems.length} items</button>`;
  }

  el.innerHTML = `
    <div class="dash-detail-section">
      <div class="dash-detail-label" style="display:flex;justify-content:space-between;align-items:baseline">BENCHMARKS <button class="btn-ghost" style="font-size:11px" onclick="editBenchmarks('${vecId}')">Edit</button></div>
      ${benchmarks}
    </div>
    <div class="dash-detail-section">
      <div class="dash-detail-label">TOP EVIDENCE</div>
      ${evidenceHtml}
    </div>`;
}

let expandedVectorIds = new Set();

function viewMeetingFromDashboard(meetingId) {
  // Save which vectors are expanded
  expandedVectorIds = new Set();
  document.querySelectorAll('.dash-vec-detail').forEach(el => {
    if (!el.classList.contains('hidden')) {
      expandedVectorIds.add(el.id.replace('vecDetail-', ''));
    }
  });

  switchTab('meetings');
  setTimeout(() => {
    const card = document.querySelector(`[data-meeting-id="${meetingId}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);

  showToast('Viewing meeting source ·', 0, () => {
    switchTab('dashboard');
    // Restore expanded vectors after render
    setTimeout(() => {
      for (const vecId of expandedVectorIds) {
        const btn = document.querySelector(`#vecDetail-${vecId}`)?.closest('.dash-vec-row')?.querySelector('.dash-vec-toggle');
        if (btn && document.getElementById('vecDetail-' + vecId)?.classList.contains('hidden')) {
          toggleVectorDetail(vecId, btn);
        }
      }
      expandedVectorIds.clear();
    }, 50);

function removeEvidence(vecId, itemIdx) {
  const sc = state.vectorScoreCache[vecId];
  if (!sc || !sc.topItems[itemIdx]) return;
  const item = sc.topItems[itemIdx];

  // Add to a deny list so the score engine skips it in future
  if (!state.vectorEvidenceDenied) state.vectorEvidenceDenied = [];
  state.vectorEvidenceDenied.push({
    vecId,
    type: item.type,
    text: (item.text || '').substring(0, 100),
    date: item.date,
    meeting: item.meeting
  });

  // Also remove AI tags if it's a meeting insight
  if (item.type === 'meeting' && item.meeting) {
    for (const m of (state.meetings || [])) {
      if (m.title !== item.meeting) continue;
      if (m.insightVectorTags) {
        const vecName = (state.vectors.find(v => v.id === vecId) || {}).name;
        for (const [k, tags] of Object.entries(m.insightVectorTags)) {
          if (Array.isArray(tags)) {
            m.insightVectorTags[k] = tags.filter(t => t !== vecName);
          }
        }
      }
    }
  }

  saveState();
  // Re-render the expanded detail
  const btn = document.querySelector(`#vecDetail-${vecId}`)?.closest('.dash-vec-row')?.querySelector('.dash-vec-toggle');
  toggleVectorDetail(vecId, btn);
  showToast('Evidence removed');
}

async function startVectorSetup() {
  if (!state.settings.baseUrl) { showToast('Set up AI in Settings first'); return; }
  const promoNotes = state.settings.promotionNotes || '';
  if (!promoNotes.trim()) { showToast('Add promotion notes in Settings first'); return; }

  const panel = document.getElementById('panel-dashboard');
  panel.innerHTML = `<div class="dash-section"><div class="dash-section-title">SETTING UP VECTORS</div><div style="color:var(--text-muted);font-size:13px">Analyzing your promotion notes...</div></div>`;

  try {
    const prompt = `Extract 3-7 promotion vectors from these career notes. Each vector should be a short name (2-3 words) representing a dimension of performance being tracked.

Promotion notes:
${promoNotes}

Return ONLY a JSON array, no markdown fences, no extra text. Example format:
[{"name":"Craft","description":"Design quality and rigor"},{"name":"Strategy","description":"Big-picture thinking and roadmap alignment"}]

JSON array:`;
    console.log('Vector setup — calling API. baseUrl:', state.settings.baseUrl, 'model:', state.settings.model, 'prompt length:', prompt.length, 'system prompt length:', getSystemPrompt().length);
    const text = await callClaude(getSystemPrompt(), prompt, 800, 'Vector Setup');
    console.log('Vector setup — API response:', text.substring(0, 300));

    // Parse JSON from response — strip markdown fences if present
    const cleaned = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    const jsonMatch = cleaned.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('No JSON found in: ' + text.substring(0, 200));
    const parsed = JSON.parse(jsonMatch[0]);
    if (!Array.isArray(parsed) || parsed.length === 0) throw new Error('Empty or invalid array');

    state.vectors = parsed.map(v => ({
      id: 'vec-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5),
      name: v.name,
      description: v.description || '',
      benchmarks: []
    }));
    state.dataVersion = Math.max(state.dataVersion, 2);
    saveState();
    renderDashboard();
    showToast('Vectors extracted — review and edit as needed');
  } catch (e) {
    console.warn('Vector extraction failed:', e);
    showToast('Extraction error: ' + e.message);
    // Fallback: manual entry
    panel.innerHTML = `
      <div class="dash-section">
        <div class="dash-section-title">VECTOR SETUP</div>
        <div style="color:var(--text-muted);font-size:13px;margin-bottom:var(--space-md)">Auto-extraction failed. Add your promotion vectors manually:</div>
        <div id="manualVectorList"></div>
        <button class="btn-ghost" style="font-size:13px;margin-top:var(--space-sm)" onclick="document.getElementById('manualVectorList').insertAdjacentHTML('beforeend','<div style=\\'display:flex;gap:var(--space-sm);margin-bottom:var(--space-sm)\\'><input class=\\'form-input\\' placeholder=\\'Vector name\\' style=\\'flex:1\\'><button class=\\'btn-ghost\\' style=\\'color:var(--accent-negative)\\' onclick=\\'this.parentElement.remove()\\'>×</button></div>')">+ Add vector</button>
        <div style="margin-top:var(--space-lg)"><button class="btn-secondary btn-accent" onclick="saveManualVectors()">Save vectors</button></div>
      </div>`;
    // Pre-populate one empty field
    document.getElementById('manualVectorList').innerHTML = '<div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-sm)"><input class="form-input" placeholder="Vector name" style="flex:1"><button class="btn-ghost" style="color:var(--accent-negative)" onclick="this.parentElement.remove()">×</button></div>';
  }
}

function saveManualVectors() {

    description: '',
    benchmarks: []
  }));
  state.dataVersion = Math.max(state.dataVersion, 2);
  saveState();
  renderDashboard();
  showToast('Vectors saved');
}

async function handleSubmit(e) {
  e.preventDefault();

  // Level 7 gate: force acknowledgment of critical loops before submitting
  if (hasLevel7Loops() && !state._level7Acknowledged) {
    showLevel7Gate(() => { state._level7Acknowledged = true; handleSubmit(e); });
    return;
  }
  state._level7Acknowledged = false;

  const workDone = document.getElementById('workDone').value.trim();
  if (!workDone) {
    document.getElementById('workDoneError').classList.add('show');
    document.getElementById('workDone').focus();
    return;
  }

  const entryDate = logForDate || todayStr();
  const existingForDate = state.entries.find(e => e.date === entryDate);
  if (existingForDate) {
    showToast('Entry already exists for this date — use Edit instead');
    return;
  }

  const selectedMood = document.querySelector('.mood-btn.selected');
  const entry = {
    id: Date.now(),
    date: entryDate,
    dayOfWeek: getDayName(entryDate),
    workDone,
    reflection: document.getElementById('reflection')?.value.trim() || '',
    mood: selectedMood ? selectedMood.dataset.mood : '',
    energy: parseInt(document.getElementById('energySlider').value),
    planTomorrow: collectPlanTomorrow(),
    isMonday: isMonday(entryDate),
    isFriday: isFriday(entryDate),
    weeklyRetro: document.getElementById('weeklyRetro')?.value.trim() || '',
    aiReflection: null
  };

  entry.updatedAt = new Date().toISOString();
  // Update or create entry
  const existingIdx = state.entries.findIndex(e => e.date === entryDate);
  if (existingIdx >= 0) {
    entry.id = state.entries[existingIdx].id;
    state.entries[existingIdx] = entry;
  } else {
    state.entries.push(entry);
  }
  logForDate = null; // reset after save
  saveState();

  // Refine planTomorrow into a clean checklist
  if (entry.planTomorrow && state.settings.baseUrl) {
    try {
      const refined = await callClaude(
        'You distill a rough "plan for tomorrow" into a crisp checklist. Each item: a punchy verb phrase (3-8 words). Merge overlapping ideas. Drop filler. Rewrite freely. IMPORTANT: if a line starts with "@someone", preserve that prefix exactly (e.g. "- @jane Review PR"). Output each item on its own line prefixed with "- ". Nothing else — no preamble, no numbering.',
        `Distill into a checklist:\n"${entry.planTomorrow}"`,
        300,
        'Plan Refinement'
      );
      const clean = refined.trim().replace(/^["']|["']$/g, '').replace(/\.$/, '');
      if (clean) {
        entry.planTomorrow = clean;
        if (existingIdx >= 0) state.entries[existingIdx] = entry;
        saveState();
      }
    } catch (_) { /* keep the raw text */ }
  }

  clearDraft();
  logMode = 'submitted';
  const panel = document.getElementById('panel-log');
  renderPostSubmit(panel, entry);

  // Fetch AI reflection
  if (state.settings.baseUrl) {
    try {
      const reflection = await callClaude(getSystemPrompt(), buildDailyPrompt(entry), 600, 'Daily Coaching');
      entry.aiReflection = reflection;
      updateCoachingState(reflection, entry.date);
      processObservationEscalations();
      saveState();
      const aiContainer = document.getElementById('aiReflectionContent');
      if (aiContainer) {
        aiContainer.innerHTML = `<span class="ai-icon">💬</span><div class="ai-text">${formatCoachingNote(reflection)}</div><button class="btn-ghost add-todo-btn" style="font-size:11px;margin-top:var(--space-sm)" onclick="addCoachingTodo(this, '${todayStr()}')">+ Add to todos</button>`;
        aiContainer.classList.add('fade-in');
      }
    } catch (err) {
      const aiContainer = document.getElementById('aiReflectionContent');
      if (aiContainer) {
        if (err.message === 'invalid_key') {
          aiContainer.innerHTML = `<span class="ai-icon">💬</span><div class="ai-text" style="color:var(--text-secondary)">Auth error — check your gateway settings.</div>`;
        } else {
          aiContainer.innerHTML = `<span class="ai-icon">💬</span><div class="ai-text" style="color:var(--text-secondary)">Couldn't reach the AI this time. Your entry is saved.</div><button class="btn-icon" style="float:right;margin-top:-24px" onclick="retryReflection()">↻</button>`;
        }
      }
    }
  }

  generateTldr(entry);
}

async function generateTldr(entry) {
  if (!state.settings.baseUrl) return;
  const sections = [];
  if (entry.workDone) sections.push(`Work done:\n"${entry.workDone}"`);
  if (entry.reflection) sections.push(`Reflection:\n"${entry.reflection}"`);
  if (entry.weeklyRetro) sections.push(`Weekly retro:\n"${entry.weeklyRetro}"`);
  if (!sections.length) return;
  try {
    const result = await callClaude(
      'You compress journal entries into bullet-point TLDRs. For each section, output the section header on its own line, then bullet points below it. Use this exact format:\n\nWork done:\n- bullet 1\n- bullet 2\n\nReflection:\n- bullet 1\n\nWeekly retro:\n- bullet 1\n\nEach bullet: concise verb phrase (3-8 words). Only include sections that were provided. No preamble.',
      sections.join('\n\n'),
      800,
      'Entry TLDR'
    );
    const tldr = {};
    let currentKey = null;
    for (const line of result.split('\n')) {
      const headerMatch = line.match(/^(Work done|Reflection|Weekly retro)\s*:/i);
      if (headerMatch) {
        currentKey = headerMatch[1].toLowerCase() === 'work done' ? 'workDone'
          : headerMatch[1].toLowerCase() === 'reflection' ? 'reflection' : 'weeklyRetro';
        tldr[currentKey] = '';
        continue;
      }
      if (currentKey && /^\s*[-•]/.test(line)) {
        tldr[currentKey] += (tldr[currentKey] ? '\n' : '') + line.trim();
      }
    }
    if (Object.keys(tldr).length) {
      entry.tldr = tldr;
      saveState();
      renderHistory();
    }
  } catch (_) { /* keep without tldr */ }
}

  const entry = state.entries.find(e => e.id === entryId);

  if (!state.settings.baseUrl) { showToast('Set up AI in Settings first'); return; }

  try {
    const prompt = buildDailyPrompt(entry) + '\n\n[SYSTEM NOTE: This is a reanalysis of TODAY\'S entry only — the previous coaching note for this specific entry had errors or incomplete output. Treat this entry as if you are analyzing it for the first time. Do not mention or infer that this entry was previously analyzed. Previous entries and their coaching notes above are real historical context — use them normally.]';

    const reflection = await callClaude(getSystemPrompt(), prompt, 800, 'Daily Coaching');
    console.log('Reanalyze coaching response:', reflection);
    entry.aiReflection = reflection;

    saveState();

    } else {
      renderHistory();

  } catch (e) {
    console.warn('Reanalyze coaching failed:', entryId, e);
    btn.disabled = false;
    btn.textContent = origText;
    const reason = e.message === 'invalid_key' ? 'invalid API key' :

function getDraftKey() { return 'workos_draft_' + todayStr(); }

    workDone: document.getElementById('workDone')?.value || '',
    reflection: document.getElementById('reflection')?.value || '',

    mood: document.querySelector('.mood-btn.selected')?.dataset.mood || '',

    const raw = localStorage.getItem(getDraftKey());
    return raw ? JSON.parse(raw) : null;

}

function clearDraft() {
  try { localStorage.removeItem(getDraftKey()); } catch (_) {}
}

  const numWeeks = window.innerWidth <= 600 ? 26 : 52;
  const start = new Date(today);
  start.setDate(start.getDate() - numWeeks * 7);
  const dayOfWeek = start.getDay();
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  start.setDate(start.getDate() + mondayOffset);

  // Build weeks (columns) of 5 weekdays (Mon-Fri)
  const dayLetters = ['M','T','W','T','F'];
  const weeks = [];
  const cursor = new Date(start);
  while (cursor <= today) {
    const week = [];
    for (let d = 0; d < 5; d++) {
      const dateStr = `${cursor.getFullYear()}-${String(cursor.getMonth() + 1).padStart(2, '0')}-${String(cursor.getDate()).padStart(2, '0')}`;
      const isFuture = cursor > today;
      week.push({ dateStr, filled: entryDates.has(dateStr), isToday: dateStr === todayISO, isFuture, letter: dayLetters[d] });
      cursor.setDate(cursor.getDate() + 1);
    }
    // Skip Sat & Sun
    cursor.setDate(cursor.getDate() + 2);
    weeks.push(week);
  }

  // Year and month labels aligned above weeks
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let yearLabels = '<div class="history-cal-years">';
  let monthLabels = '<div class="history-cal-months">';
  let lastMonth = -1;
  let lastYear = -1;
  for (let w = 0; w < weeks.length; w++) {
    const d = new Date(weeks[w][0].dateStr + 'T12:00:00');
    const m = d.getMonth();
    const y = d.getFullYear();
    if (y !== lastYear) {
      yearLabels += `<span style="flex:1;min-width:0">${y}</span>`;
      lastYear = y;
    } else {
      yearLabels += `<span style="flex:1;min-width:0"></span>`;
    }
    if (m !== lastMonth) {
      monthLabels += `<span style="flex:1;min-width:0">${monthNames[m]}</span>`;
      lastMonth = m;
    } else {
      monthLabels += `<span style="flex:1;min-width:0"></span>`;
    }
  }
  yearLabels += '</div>';
  monthLabels += '</div>';

  // Grid cells
  const gridHtml = weeks.map(week =>
    `<div class="history-cal-week">${week.map(day =>
      day.isFuture ? `<div class="history-cal-day" style="visibility:hidden"></div>`
        : `<div class="history-cal-day${day.filled ? ' filled' : ''}${day.isToday ? ' today' : ''}" title="${day.dateStr}">${day.filled ? day.letter : ''}</div>`
    ).join('')}</div>`
  ).join('');

  return `<div class="history-calendar">
    ${yearLabels}
    ${monthLabels}
    <div class="history-cal-grid">${gridHtml}</div>
  </div>`;
}

}

function toggleCoachingNote(label) {
  const body = label.nextElementSibling;

function renderBriefs() {
  const panel = document.getElementById('panel-briefs');
  // Migrate old sub-tab values
  if (briefsSubView === 'this-week' || briefsSubView === 'past-briefs') briefsSubView = 'weekly';

  // Loading states
  if (briefsView === 'loading') {
    const weekEntries = getCurrentWeekEntries();
    panel.innerHTML = `
      <div class="brief-header">
        <div class="brief-title">Weekly Brief</div>
        <div class="brief-date">${formatWeekRange(getWeekMonday(todayStr()))}</div>
      </div>
      <div class="brief-loading">
        <div class="brief-loading-text">Analyzing ${weekEntries.length} entries...</div>
        <div class="progress-bar"><div class="progress-bar-fill"></div></div>
      </div>`;
    return;
  }

  if (briefsSubView === 'meeting-prep' && meetingPrepView === 'loading') {
    const record = state.meetingPreps.find(p => p.id === currentMeetingPrepId);
    const names = record ? record.stakeholders.map(s => s.name).join(', ') : 'stakeholder';
    panel.innerHTML = `
      <div class="brief-header">
        <div class="brief-title">Recurring Meetings</div>
        <div class="brief-date">Preparing for ${escapeHtml(names)}</div>
      </div>
      <div class="brief-loading">
        <div class="brief-loading-text">Analyzing meetings and journal entries...</div>
        <div class="progress-bar"><div class="progress-bar-fill"></div></div>
      </div>`;
    return;
  }

  // Detail views
  if (briefsView === 'detail' && currentBriefId) {
    renderBriefDetail(panel);
    return;
  }

  if (briefsSubView === 'meeting-prep' && meetingPrepView === 'detail' && currentMeetingPrepId) {
    renderMeetingPrepDetail(panel);
    return;
  }

  if (briefsSubView === 'meeting-prep' && meetingPrepView === 'form') {
    renderMeetingPrepForm(panel);
    return;
  }

  // List view with sub-nav
  panel.innerHTML = `
    <div class="sub-nav">
      <button class="sub-nav-btn${briefsSubView === 'weekly' ? ' active' : ''}" onclick="switchBriefsSubView('weekly')">Weekly</button>
      <button class="sub-nav-btn${briefsSubView === 'meeting-prep' ? ' active' : ''}" onclick="switchBriefsSubView('meeting-prep')">Recurring</button>
      <button class="sub-nav-btn${briefsSubView === 'wins' ? ' active' : ''}" onclick="switchBriefsSubView('wins')">Wins</button>

    </div>
    <div id="briefsContent"></div>
  `;

  const content = document.getElementById('briefsContent');
  if (briefsSubView === 'weekly') renderWeeklyBriefs(content);
  else if (briefsSubView === 'meeting-prep') renderMeetingPrepList(content);
  else if (briefsSubView === 'wins') renderWinsArchive(content);
  else if (briefsSubView === 'reflections') renderReflectionHistory(content);
}

}

function addPrepStakeholder() {
  const nameEl = document.getElementById('prepStakeholderName');
  const roleEl = document.getElementById('prepStakeholderRole');
  const name = nameEl.value.trim();
  const role = roleEl.value.trim();
  if (!name) { showToast('Enter a stakeholder name'); return; }
  meetingPrepFormStakeholders.push({ name, role: role || 'Unknown' });
  nameEl.value = '';
  roleEl.value = '';
  renderBriefs();
}

function saveMeetingPrepRecord() {
  if (meetingPrepFormStakeholders.length === 0) { showToast('Add at least one stakeholder'); return; }
  const purpose = document.getElementById('prepPurpose').value.trim();
  const lastConnected = document.getElementById('prepLastConnected').value;
  const recurringTitle = document.getElementById('prepRecurringTitle').value.trim();
  if (!recurringTitle) { showToast('Enter a recurring meeting title'); return; }
  if (!lastConnected) { showToast('Set a last connected date'); return; }

  if (currentMeetingPrepId) {
    const existing = state.meetingPreps.find(p => p.id === currentMeetingPrepId);
    if (existing) {
      existing.stakeholders = [...meetingPrepFormStakeholders];
      existing.meetingPurpose = purpose;
      existing.meetingTone = [...meetingPrepFormTones];
      existing.lastConnected = lastConnected;
      existing.recurringTitle = recurringTitle;
    }
  } else {
    const record = {
      id: Date.now(),
      stakeholders: [...meetingPrepFormStakeholders],
      meetingPurpose: purpose,
      meetingTone: [...meetingPrepFormTones],
      lastConnected,
      recurringTitle,
      preps: []
    };
    state.meetingPreps.push(record);
    currentMeetingPrepId = record.id;
  }
  saveState();
  meetingPrepView = 'detail';
  renderBriefs();
}

function deleteMeetingPrep(id) {
  if (!confirm('Delete this recurring meeting and all its history?')) return;
  state.meetingPreps = state.meetingPreps.filter(p => p.id !== id);
  saveState();
  meetingPrepView = 'list';
  currentMeetingPrepId = null;
  renderBriefs();
  showToast('Recurring meeting deleted');
}

function renderMeetingPrepDetail(panel) {
  const record = state.meetingPreps.find(p => p.id === currentMeetingPrepId);
  if (!record) { meetingPrepView = 'list'; renderBriefs(); return; }

  const names = record.stakeholders.map(s => `<span class="stakeholder-name-block"><span class="stakeholder-name">${escapeHtml(s.name)}</span><span class="stakeholder-role-meta">${escapeHtml(s.role)}</span></span>`).join('');
  const toneArr = Array.isArray(record.meetingTone) ? record.meetingTone : record.meetingTone ? [record.meetingTone] : [];
  const toneTags = toneArr.map(t => `<span class="tone-tag">${escapeHtml(t)}</span>`).join('');
  const latestPrep = record.preps.length > 0 ? record.preps[0] : null;
  const pastPreps = record.preps.slice(1);

  function renderPrepSections(prep) {
    const sections = [
      { key: 'sinceLastTime', label: 'Since Last Time' },
      { key: 'commitments', label: 'Commitment Tracker' },
      { key: 'theirSignals', label: 'Their Signals' },
      { key: 'patternFlags', label: 'Pattern Flags' },
      { key: 'suggestedFraming', label: 'Suggested Framing' },
      { key: 'conversationArc', label: 'Conversation Arc' }
    ];
    return sections.map(s => {
      const content = prep[s.key];
      if (!content) return '';
      const copyBtn = s.key === 'suggestedFraming' ? ` <button class="btn-reanalyze" onclick="event.stopPropagation();navigator.clipboard.writeText(${JSON.stringify(content).replace(/'/g, "\\'")});showToast('Copied')">Copy</button>` : '';
      return `<div class="prep-section">
        <div class="prep-section-label">${s.label}${copyBtn}</div>
        <div class="prep-section-body">${formatBulletList(content)}</div>
      </div>`;
    }).join('');
  }

  let latestHtml = '';
  if (latestPrep) {
    const genDate = new Date(latestPrep.generatedAt);
    const genStr = genDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' at ' + genDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    latestHtml = `
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:var(--space-xl)">Generated ${genStr} · Since ${latestPrep.lastConnected}</div>
      ${renderPrepSections(latestPrep)}`;
  } else {
    latestHtml = `<div class="empty-state">No preps generated yet.
      <div class="empty-state-secondary">Click "Generate Prep" to create your first prep for this stakeholder.</div>
    </div>`;
  }

  // Post-Meeting section
  const unprocessedMeetings = findUnprocessedMeetings(record);
  const syntheses = record.syntheses || [];
  const isLoading = synthesisLoadingForPrepId === record.id;

  // Auto-select if only one match, or validate current selection
  if (unprocessedMeetings.length === 1) {
    selectedSynthesisMeetingId = unprocessedMeetings[0].id;
  } else if (selectedSynthesisMeetingId && !unprocessedMeetings.find(m => m.id === selectedSynthesisMeetingId)) {
    selectedSynthesisMeetingId = null;
  }

  let postMeetingInputHtml = '';
  if (isLoading) {
    postMeetingInputHtml = `
      <div class="synthesis-loading">
        <div class="synthesis-loading-bar"></div>
        <div style="font-size:12px;color:var(--text-muted)">Generating synthesis...</div>
      </div>`;
  } else if (unprocessedMeetings.length > 0) {
    const meetingOptionsHtml = unprocessedMeetings.map(m => {
      const d = new Date(meetingDateStr(m) + 'T00:00:00');
      const ds = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const isSelected = selectedSynthesisMeetingId === m.id;
      const midEsc = escapeHtml(JSON.stringify(m.id));
      return `<button class="synthesis-meeting-option${isSelected ? ' selected' : ''}" onclick='selectedSynthesisMeetingId=${midEsc};renderBriefs()'>
        <span class="synthesis-meeting-title">${escapeHtml(m.title || 'Untitled')}</span>
        <span class="synthesis-meeting-date">${ds}</span>
      </button>`;
    }).join('');

    const hasSelection = !!selectedSynthesisMeetingId;

    postMeetingInputHtml = `
      <div style="margin-bottom:var(--space-md)">
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:var(--space-sm)">${unprocessedMeetings.length === 1 ? 'Matched meeting:' : 'Select the meeting to reflect on:'}</div>
        <div class="synthesis-meeting-list">${meetingOptionsHtml}</div>
      </div>
      <button class="btn-secondary btn-accent" ${hasSelection ? '' : 'disabled'} onclick="openReflectionModal(${record.id})" style="margin-top:var(--space-sm)">Write Reflection</button>`;
  } else {
    // Check if there are recent unmatched meetings — title may have drifted
    const processedIds = new Set(syntheses.map(s => s.meetingId));
    const recentUnmatched = state.meetings
      .filter(m => meetingDateStr(m) && meetingDateStr(m) >= (record.lastConnected || '') && !processedIds.has(m.id))
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
      .slice(0, 5);

    if (recentUnmatched.length > 0) {
      const unmatchedList = recentUnmatched.map(m => {
        const d = new Date(meetingDateStr(m) + 'T00:00:00');
        const ds = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        return `<div class="unmatched-meeting-item">${escapeHtml(m.title || 'Untitled')} · ${ds}</div>`;
      }).join('');
      postMeetingInputHtml = `
        <div class="synthesis-mismatch-warning">
          <div class="synthesis-mismatch-icon">!</div>
          <div>
            <div style="font-weight:500;margin-bottom:4px">No meetings matched "${escapeHtml(record.recurringTitle)}"</div>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:var(--space-sm)">Recent meetings found since ${record.lastConnected}:</div>
            ${unmatchedList}
            <div style="margin-top:var(--space-md)">
              <label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px">Update recurring title to match:</label>

                <input class="form-input" id="fixRecurringTitle" value="${escapeHtml(record.recurringTitle)}" style="flex:1;font-size:13px">
                <button class="btn-secondary" onclick="const v=document.getElementById('fixRecurringTitle').value.trim();if(!v){showToast('Enter a title');return;}const r=state.meetingPreps.find(p=>p.id===${record.id});if(r){r.recurringTitle=v;saveState();renderBriefs();showToast('Title updated')}">Update</button>
              </div>
            </div>
          </div>
        </div>`;
    } else {
      postMeetingInputHtml = '<div style="color:var(--text-muted);font-size:13px">No new meetings to process</div>';
    }
  }

  let synthesesHistoryHtml = '';
  if (syntheses.length > 0) {
    synthesesHistoryHtml = `<div style="margin-top:var(--space-xl)">
      <div class="prep-section-label">Past Syntheses</div>
      ${syntheses.map((s, i) => {
        const sDate = new Date(s.meetingDate + 'T00:00:00');
        const sDateStr = sDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const label = `${sDateStr} — ${escapeHtml(s.meetingTitle)}`;
        const isJustGenerated = lastGeneratedSynthesisId === s.id;
        const isHidden = isJustGenerated ? '' : 'hidden';
        const arrow = isJustGenerated ? '▾' : '▸';
        const failedBadge = s.failed ? ' <span style="color:var(--accent-negative);font-size:11px">· synthesis failed</span>' : '';
        const retryMidEsc = escapeHtml(JSON.stringify(s.meetingId));
        const retryBtn = s.failed ? ` <button class="btn-secondary" style="font-size:11px;padding:2px 8px" onclick='selectedSynthesisMeetingId=${retryMidEsc};retrySynthesis(${record.id},${i})'>Retry</button>` : '';
        return `
          <button class="prep-history-toggle" onclick="const b=document.getElementById('pastSynth${i}');b.classList.toggle('hidden');this.textContent=b.classList.contains('hidden')?'▸ ${label}':'▾ ${label}'">${arrow} ${label}${failedBadge}</button>
          <div id="pastSynth${i}" class="${isHidden}" style="margin-top:var(--space-sm);margin-bottom:var(--space-md);background:var(--surface-card);border-radius:var(--radius-md);padding:var(--space-4xl) var(--space-4xl) var(--space-lg) var(--space-4xl)">
            <div class="prep-section">
              <div class="prep-section-label">Reflection</div>
              <div class="prep-section-body">${formatBulletList(s.reflection)}</div>
            </div>
            ${s.synthesis ? `<div class="prep-section">
              <div class="prep-section-label">Synthesis</div>
              <div class="prep-section-body">${formatBulletList(s.synthesis)}</div>
            </div>` : ''}
            ${s.actionItems ? `<div class="prep-section">
              <div class="prep-section-label">Action Items</div>
              <div class="prep-section-body">${formatBulletList(s.actionItems)}</div>
            </div>` : ''}
            ${retryBtn}
          </div>`;
      }).join('')}
    </div>`;
  }

  const postMeetingHtml = `<div class="synthesis-section">
    <div class="prep-section-label" style="border-top:1px solid var(--border-default);padding-top:var(--space-xl);margin-top:var(--space-xl)">Post-Meeting</div>
    ${postMeetingInputHtml}
    ${synthesesHistoryHtml}
  </div>`;

  let pastHtml = '';
  if (pastPreps.length > 0) {
    pastHtml = `<div style="margin-top:var(--space-3xl)">
      <div class="prep-section-label">Past Preps</div>
      ${pastPreps.map((p, i) => {
        const genDate = new Date(p.generatedAt);
        const genStr = genDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        return `
          <button class="prep-history-toggle" onclick="const b=document.getElementById('pastPrep${i}');b.classList.toggle('hidden');this.textContent=b.classList.contains('hidden')?'▸ ${genStr} — since ${p.lastConnected}':'▾ ${genStr} — since ${p.lastConnected}'">▸ ${genStr} — since ${p.lastConnected}</button>
          <div id="pastPrep${i}" class="hidden" style="padding-left:var(--space-md);border-left:2px solid var(--border-default);margin-bottom:var(--space-xl)">${renderPrepSections(p)}</div>`;
      }).join('')}
    </div>`;
  }

  // Escalation red flag banner
  let redFlagHtml = '';
  const escalatedForPrep = getEscalatedObservations().filter(o => o.escalationLevel >= 6);
  if (escalatedForPrep.length > 0) {
    const stakeholderNames = record.stakeholders.map(s => s.name.toLowerCase());
    const matched = escalatedForPrep.filter(o => {
      if (o.escalationLevel >= 7) return true;
      return stakeholderNames.some(sn => o.topic.toLowerCase().includes(sn));
    });
    if (matched.length > 0) {
      const ageDays = obs => Math.floor((Date.now() - new Date(obs.firstSurfaced).getTime()) / 86400000);
      const flagItems = matched.map(o =>
        `<div style="margin-bottom:6px"><strong style="color:var(--accent-negative)">L${o.escalationLevel}</strong> ${escapeHtml(o.topic)} <span style="color:var(--text-muted);font-size:11px">${ageDays(o)}d old · surfaced ${o.timesShown}x</span></div>`
      ).join('');
      redFlagHtml = `<div style="background:color-mix(in srgb, var(--accent-negative) 8%, transparent);border:1px solid var(--accent-negative);border-radius:var(--radius-md);padding:var(--space-md) var(--space-lg);margin-bottom:var(--space-xl)">
        <div style="font-weight:600;color:var(--accent-negative);margin-bottom:var(--space-sm);font-size:13px">Escalated Observations</div>
        <div style="font-size:13px">${flagItems}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:var(--space-sm)">These unresolved coaching patterns are relevant to this meeting's stakeholders.</div>
      </div>`;
    }
  }

  panel.innerHTML = `
    <div style="margin-bottom:var(--space-xl)">
      <button class="btn-ghost" onclick="meetingPrepView='list';currentMeetingPrepId=null;renderBriefs()">← Back to Recurring Meetings</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--space-xl)">
      <div>
        <div style="display:flex;gap:var(--space-md);flex-wrap:wrap;align-items:baseline">${names}</div>
        <div style="display:flex;align-items:baseline;gap:var(--space-sm);margin-top:4px;flex-wrap:wrap">${toneTags}<span style="font-size:11px;color:var(--text-muted)">Last connected: ${record.lastConnected}</span></div>
      </div>
      <div style="display:flex;gap:var(--space-sm)">
        <button class="btn-secondary" onclick="meetingPrepView='form';meetingPrepFormStakeholders=[];meetingPrepFormTones=[];renderBriefs()">Edit</button>
        <button class="btn-secondary btn-accent" onclick="startGenerateMeetingPrep(${record.id})">Generate Prep</button>
      </div>
    </div>
    ${redFlagHtml}
    ${latestHtml}
    ${postMeetingHtml}
    ${pastHtml}`;
}

let winsFilter = { vector: '', search: '' };

function renderWinsArchive(container) {
  const allWins = getConfirmedWins();

  if (allWins.length === 0) {
    container.innerHTML = '<div class="empty-state">No wins yet.<div class="empty-state-secondary">Wins are surfaced in your Weekly Brief — keep logging.</div></div>';
    return;
  }

  // Get unique vectors for filter dropdown
  const allVectors = [...new Set(allWins.flatMap(w => w.vectors))].sort();

  // Apply filters
  let wins = allWins;
  if (winsFilter.vector) {
    wins = wins.filter(w => w.vectors.includes(winsFilter.vector));
  }
  if (winsFilter.search) {
    const q = winsFilter.search.toLowerCase();
    wins = wins.filter(w =>
      w.description.toLowerCase().includes(q) ||
      w.impact.toLowerCase().includes(q)
    );
  }

  container.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="wins-header">Wins Archive · ${allWins.length} win${allWins.length !== 1 ? 's' : ''}</div>
      <button class="todo-recurrence-btn" onclick="addManualWin()">+ Add Win</button>
    </div>

    <div class="wins-toolbar">
      <select class="wins-filter" id="winsVectorFilter" onchange="filterWins()">
        <option value="">All vectors</option>
        ${allVectors.map(v => `<option value="${escapeHtml(v)}" ${winsFilter.vector === v ? 'selected' : ''}>${escapeHtml(v)}</option>`).join('')}
      </select>
      <input class="wins-search" id="winsSearch" placeholder="Search wins..." value="${escapeHtml(winsFilter.search)}" oninput="filterWins()">
      <div class="wins-actions-bar">
        <button class="btn-secondary" onclick="exportWins()" title="Copy all wins as text">Export</button>
        <button class="btn-secondary" onclick="generatePromoBrief()" title="Generate a promotion narrative from your wins">Promo Brief</button>
      </div>
    </div>

    ${wins.length === 0 ? '<div style="color:var(--text-muted);padding:var(--space-xl) 0;text-align:center">No wins match your filter.</div>' : ''}

    <div id="winsCards">
    ${wins.map(w => `
      <div class="wins-archive-card" id="win-archive-${w.id}">
        <div class="wins-archive-date" style="display:flex;align-items:center;justify-content:space-between">
          <div>${formatDateShort(w.date)} ${(w.vectors || (w.vector ? [w.vector] : [])).map(v => `<span class="vector-tag">${escapeHtml(v)}</span>`).join(' ')}</div>
          <div style="display:flex;gap:var(--space-md)">
            <button class="btn-ghost" onclick="editWin('${w.id}')">Edit</button>
            <button class="btn-ghost" style="color:var(--text-muted)" onclick="deleteWin('${w.id}')">Remove</button>
          </div>
        </div>
        <div class="win-description" id="win-desc-${w.id}">${escapeHtml(w.description)}</div>
        <div class="win-meta-value" id="win-impact-${w.id}">${escapeHtml(w.impact)}</div>
      </div>
    `).join('')}
    </div>

    <div id="promoBriefContainer"></div>
  `;
}

function filterWins() {
  winsFilter.vector = document.getElementById('winsVectorFilter')?.value || '';
  winsFilter.search = document.getElementById('winsSearch')?.value || '';
  const content = document.getElementById('briefsContent');
  if (content) renderWinsArchive(content);
}

function editWin(winId) {
  const win = state.wins.find(w => String(w.id) === String(winId));
  if (!win) return;
  const card = document.getElementById('win-archive-' + winId);
  if (!card) return;

  const currentVecs = win.vectors || (win.vector ? [win.vector] : []);
  const allVecs = (state.vectors || []).map(v => v.name);
  const vecCheckboxes = allVecs.map(v =>
    `<label style="display:inline-flex;align-items:center;gap:4px;font-size:12px;margin-right:var(--space-md)"><input type="checkbox" class="win-vec-check" value="${escapeHtml(v)}" ${currentVecs.includes(v) ? 'checked' : ''}> ${escapeHtml(v)}</label>`
  ).join('');

  card.innerHTML = `
    <div class="wins-edit-form" id="win-edit-${winId}">
      <label class="form-label">Description</label>
      <textarea id="edit-desc-${winId}">${escapeHtml(win.description)}</textarea>
      <label class="form-label">Impact</label>
      <textarea id="edit-impact-${winId}">${escapeHtml(win.impact)}</textarea>
      <label class="form-label">Vectors</label>
      <div id="edit-vecs-${winId}" style="margin-bottom:var(--space-md)">${vecCheckboxes || '<span style="color:var(--text-muted);font-size:12px">Set up vectors in Dashboard first</span>'}</div>
      <div style="display:flex;gap:var(--space-sm)">
        <button class="btn-positive" onclick="saveWinEdit('${winId}')">Save</button>
        <button class="btn-dismiss" onclick="cancelWinEdit()">Cancel</button>
      </div>
    </div>
  `;
}

function saveWinEdit(winId) {
  const win = state.wins.find(w => String(w.id) === String(winId));
  if (!win) return;
  const desc = document.getElementById('edit-desc-' + winId)?.value.trim();
  const impact = document.getElementById('edit-impact-' + winId)?.value.trim();
  if (desc) win.description = desc;
  if (impact) win.impact = impact;
  const vecContainer = document.getElementById('edit-vecs-' + winId);
  if (vecContainer) {
    const checked = [...vecContainer.querySelectorAll('.win-vec-check:checked')].map(cb => cb.value);
    win.vectors = checked;
    win.vectorTags = checked; // sync with AI mapping tags
    win.vector = checked.join(', '); // legacy field
  }
  saveState();
  showToast('Win updated');
  const content = document.getElementById('briefsContent');
  if (content) renderWinsArchive(content);
}

function cancelWinEdit() {
  const content = document.getElementById('briefsContent');
  if (content) renderWinsArchive(content);
}

function deleteWin(winId) {
  const win = state.wins.find(w => String(w.id) === String(winId));
  if (!win) return;
  if (!confirm('Remove this win from your archive?')) return;
  win.status = 'dismissed';
  saveState();
  showToast('Win removed');
  const content = document.getElementById('briefsContent');
  if (content) renderWinsArchive(content);
}

function exportWins() {
  const wins = getConfirmedWins();
  if (wins.length === 0) { showToast('No wins to export.'); return; }

  // Apply current filters
  let filtered = wins;
  if (winsFilter.vector) filtered = filtered.filter(w => w.vectors.includes(winsFilter.vector));
  if (winsFilter.search) {
    const q = winsFilter.search.toLowerCase();
    filtered = filtered.filter(w => w.description.toLowerCase().includes(q) || w.impact.toLowerCase().includes(q));
  }

  const text = filtered.map((w, i) =>
    `${i + 1}. ${w.description}\n   Impact: ${w.impact}\n   Vector: ${w.vectors.join(', ')}\n   Date: ${w.date}`
  ).join('\n\n');

  navigator.clipboard.writeText(text).then(() => {
    showToast(`${filtered.length} win${filtered.length !== 1 ? 's' : ''} copied to clipboard`);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(`${filtered.length} win${filtered.length !== 1 ? 's' : ''} copied to clipboard`);
  });
}

async function generatePromoBrief() {
  const wins = getConfirmedWins();
  if (wins.length < 2) { showToast('Need at least 2 confirmed wins to generate a brief.'); return; }

  const briefContainer = document.getElementById('promoBriefContainer');
  if (!briefContainer) return;

  if (!state.settings.baseUrl) {
    showToast('Set up your AI gateway in Settings first.');
    return;
  }

  briefContainer.innerHTML = `
    <div class="brief-section" style="margin-top:var(--space-3xl)">
      <div class="section-header">Promotion Brief</div>
      <div class="brief-loading">
        <div class="brief-loading-text">Generating narrative from ${wins.length} wins...</div>
        <div class="progress-bar"><div class="progress-bar-fill"></div></div>
      </div>
    </div>
  `;

  const promo = state.settings.promotionNotes || 'No promotion notes provided.';
  const winsText = wins.map((w, i) =>
    `${i + 1}. ${w.description}\n   Impact: ${w.impact}\n   Vector: ${w.vectors.join(', ')}\n   Date: ${w.date}`
  ).join('\n\n');

  const prompt = `Here is context about this person's promotion goals:
<promotion_context>
${promo}
</promotion_context>

Here are their confirmed wins, most recent first:
<wins>
${winsText}
</wins>

Write a promotion brief — a 3-5 paragraph narrative that a manager could use to advocate for this person's promotion. Requirements:

1. Open with a thesis statement: what level this person is operating at and why
2. Group wins thematically by promotion vector, not chronologically
3. For each theme, lead with the pattern, then cite 2-3 specific wins as evidence
4. Frame everything as impact and behavioral change, not task completion
5. Close with a forward-looking statement about readiness

Write in third person ("Mo has demonstrated..."). Be specific — use the actual wins and their impacts. This should read like a compelling case, not a list.

Do not inflate or add wins that aren't listed. If the evidence is thin in an area, acknowledge it rather than stretching.`;

  try {
    const text = await callClaude(getSystemPrompt(), prompt, 2000, 'Promotion Brief');
    briefContainer.innerHTML = `
      <div class="brief-section" style="margin-top:var(--space-3xl)">
        <div class="section-header-row">
          <span class="section-header" style="margin-bottom:0">Promotion Brief</span>
          <button class="btn-icon" onclick="copyPromoBrief()" title="Copy to clipboard">⧉</button>
        </div>
        <div class="promo-brief" id="promoBriefText">${formatBriefText(text)}</div>
      </div>
    `;
  } catch (err) {
    briefContainer.innerHTML = `
      <div class="brief-section" style="margin-top:var(--space-3xl)">
        <div class="section-header">Promotion Brief</div>
        <div class="card" style="color:var(--accent-negative)">Failed to generate. Check your gateway settings and try again.</div>
      </div>
    `;
  }
}

function copyPromoBrief() {
  const el = document.getElementById('promoBriefText');
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    showToast('Promotion brief copied to clipboard');
  });
}

  renderBriefs();
}

        <span class="section-header" style="margin-bottom:0">Open Loops</span>
        ${brief.humanizedSections?.openLoopsSummary ? `<span class="humanize-link" style="color:var(--accent-interactive);cursor:default">✓ Humanized</span>` : `<a href="#" class="humanize-link" onclick="event.preventDefault();humanizeBriefSection(${brief.id},'openLoopsSummary',this)">Humanize</a>`}
      </div>
      <div class="card">${formatBriefText(brief.openLoopsSummary)}</div>
    </div>` : ''}

    <div class="brief-section" style="text-align:center;padding-top:var(--space-md)">
      <button class="btn-secondary" onclick="regenerateBrief('${brief.weekOf}')">Regenerate Brief</button>
    </div>
  `;
}

function renderReflectionHistory(container) {

  const reflections = [];
  for (const [key, val] of Object.entries(state.monthlyReflections || {})) {
    if (val && val.completedAt) {
      reflections.push({ periodKey: key, type: 'monthly', ...val });
    }
  }
  for (const [key, val] of Object.entries(state.quarterlyReflections || {})) {
    if (val && val.completedAt) {
      reflections.push({ periodKey: key, type: 'quarterly', ...val });
    }
  }
  reflections.sort((a, b) => (b.completedAt || '').localeCompare(a.completedAt || ''));

  if (reflections.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:var(--space-4xl) var(--space-lg);color:var(--text-muted)">
      <div style="font-size:15px;margin-bottom:var(--space-sm)">No reflections yet</div>
      <div style="font-size:13px">Monthly reflections appear in the first 5 days of each month. Quarterly reflections appear in the first 7 days of Jan/Apr/Jul/Oct.</div>
    </div>`;

  }

  const items = reflections.map((r, i) => {
    const typeLabel = r.type === 'quarterly' ? 'Quarterly' : 'Monthly';

      : r.periodKey.replace('-', ' ');

    const synthExcerpt = r.synthesis ? r.synthesis.substring(0, 150).replace(/\n/g, ' ') + (r.synthesis.length > 150 ? '...' : '') : 'No synthesis generated.';
    const snap = r.dataSnapshot || {};

    return `<div class="card" style="margin-bottom:var(--space-md);cursor:pointer" onclick="toggleReflectionDetail(${i})">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div style="font-weight:600;font-size:14px">${typeLabel}: ${periodLabel}</div>
        <div style="font-size:12px;color:var(--text-muted)">${completedDate}</div>
      </div>
      <div style="font-size:13px;color:var(--text-secondary);margin-top:var(--space-xs)">${escapeHtml(synthExcerpt)}</div>
      ${snap.energyAvg ? `<div style="font-size:12px;color:var(--text-muted);margin-top:var(--space-xs)">Energy: ${snap.energyAvg}/10 · ${snap.entryCount || 0} entries · Loops: +${snap.loopsOpened || 0}/-${snap.loopsClosed || 0}</div>` : ''}
      <div id="reflection-detail-${i}" style="display:none;margin-top:var(--space-lg);border-top:1px solid var(--border);padding-top:var(--space-lg)">
        ${r.synthesis ? `<div class="dash-section-title">SYNTHESIS</div><div style="font-size:13px;line-height:1.7;margin-bottom:var(--space-lg)">${formatBulletList(r.synthesis)}</div>` : ''}
        ${r.responses ? `
          <div class="dash-section-title">YOUR RESPONSES</div>
          ${r.responses.worked ? `<div style="font-size:13px;margin-bottom:var(--space-sm)"><strong>What worked:</strong> ${escapeHtml(r.responses.worked)}</div>` : ''}
          ${r.responses.didnt ? `<div style="font-size:13px;margin-bottom:var(--space-sm)"><strong>What didn't work:</strong> ${escapeHtml(r.responses.didnt)}</div>` : ''}
          ${r.responses.surprise ? `<div style="font-size:13px;margin-bottom:var(--space-sm)"><strong>Surprises:</strong> ${escapeHtml(r.responses.surprise)}</div>` : ''}
          ${r.responses.priority ? `<div style="font-size:13px;margin-bottom:var(--space-sm)"><strong>Priority:</strong> ${escapeHtml(r.responses.priority)}</div>` : ''}
          ${r.responses.choices ? `<div style="font-size:13px;margin-bottom:var(--space-sm)"><strong>On choices:</strong> ${escapeHtml(r.responses.choices)}</div>` : ''}

        ` : ''}
        ${snap.vectorData ? `
          <div class="dash-section-title" style="margin-top:var(--space-lg)">DATA SNAPSHOT</div>
          ${snap.vectorData.map(v => `<div style="display:flex;justify-content:space-between;font-size:13px;padding:2px 0"><span>${escapeHtml(v.name)}</span><span class="dash-tier-${v.tier.toLowerCase().replace(/\\s/g, '-')}">${v.tier}</span></div>`).join('')}

async function regenerateBrief(weekOf) {
  const weekDates = getWeekDates(weekOf);
  const weekEntries = state.entries.filter(e => weekDates.includes(e.date)).sort((a, b) => a.date.localeCompare(b.date));
  if (weekEntries.length === 0) {
    showToast('No entries found for this week.');
    return;
  }

  // Show spinner in the regenerate button area
  const panel = document.getElementById('panel-briefs');
  if (panel) {
    const lastSection = panel.querySelectorAll('.brief-section');
    const regenSection = lastSection[lastSection.length - 1];
    if (regenSection) regenSection.innerHTML = '<div style="text-align:center;padding:var(--space-md);display:flex;align-items:center;justify-content:center;gap:var(--space-sm);color:var(--text-muted);font-size:13px"><span class="spinner dark"></span> Regenerating Brief...</div>';
  }

  try {
    const systemPrompt = getSystemPrompt() + '\n\nFor this weekly brief, produce a structured response in exactly the format specified below. Do not deviate from the section structure.';
    const text = await callClaude(systemPrompt, buildWeeklyPrompt(weekEntries), 2000, 'Weekly Brief');
    const parsed = parseWeeklyBrief(text);

    // Remove existing brief for this week
    state.weeklyBriefs = state.weeklyBriefs.filter(b => b.weekOf !== weekOf);
    // Remove suggested wins from this week's previous brief
    state.wins = state.wins.filter(w => !(w.sourceWeek === weekOf && w.status === 'suggested'));

    const brief = {
      id: Date.now(),
      weekOf,
      generatedAt: new Date().toISOString(),
      patterns: parsed.patterns,
      vectorCheckIn: parsed.vectorCheckIn,
      winsDetected: parsed.winsDetected,
      winsRaw: parsed.winsRaw,
      oneOnOnePrep: parsed.oneOnOnePrep,
      vectorProgress: parsed.vectorProgress,
      openLoopsSummary: parsed.openLoopsSummary,
      raw: text
    };
    state.weeklyBriefs.push(brief);

    parsed.winsDetected.forEach(w => {
      state.wins.push({
        id: Date.now() + Math.random(),
        date: todayStr(),
        sourceWeek: weekOf,
        sourceBriefId: brief.id,
        description: w.description,
        impact: w.impact,
        vector: w.vector,
        status: 'suggested'
      });
    });

    saveState();
    currentBriefId = brief.id;
    briefsView = 'detail';
    renderBriefs();
    showToast('Brief regenerated');
  } catch (err) {
    console.error('Regenerate brief error:', err);
    showToast('Failed to regenerate brief');
    renderBriefs();
  }
}

async function humanizeBriefSection(briefId, sectionKey, linkEl) {
  const brief = state.weeklyBriefs.find(b => b.id === briefId);
  if (!brief || !brief[sectionKey]) return;
  if (linkEl) { linkEl.textContent = 'Humanizing…'; linkEl.style.pointerEvents = 'none'; }
  try {
    brief[sectionKey] = await humanizeText(brief[sectionKey]);
    if (!brief.humanizedSections) brief.humanizedSections = {};
    brief.humanizedSections[sectionKey] = true;
    saveState();
    showToast('Section humanized');
  } catch (e) {
    showToast('Failed to humanize. Check API settings.');
  }
  renderBriefs();
}

async function startGenerateBrief() {
  let weekEntries = getCurrentWeekEntries();
  let monday = getWeekMonday(todayStr());

  // If no entries this week, try last week
  if (weekEntries.length === 0) {
    const lastMonday = new Date(monday + 'T00:00:00');
    lastMonday.setDate(lastMonday.getDate() - 7);
    const lastMondayStr = lastMonday.toISOString().slice(0, 10);
    const lastWeekDates = getWeekDates(lastMondayStr);
    const lastWeekEntries = state.entries.filter(e => lastWeekDates.includes(e.date)).sort((a, b) => a.date.localeCompare(b.date));
    if (lastWeekEntries.length === 0) {
      showToast('No entries this week or last week to analyze.');
      return;
    }
    weekEntries = lastWeekEntries;
    monday = lastMondayStr;
  }

  if (weekEntries.length < 3 && !confirm(`Briefs work best with 3+ entries. You have ${weekEntries.length} so far. Generate anyway?`)) {
    return;
  }

  switchTab('briefs');
  briefsView = 'loading';
  renderBriefs();

  try {
    const systemPrompt = getSystemPrompt() + '\n\nFor this weekly brief, produce a structured response in exactly the format specified below. Do not deviate from the section structure.';
    const text = await callClaude(systemPrompt, buildWeeklyPrompt(weekEntries), 2000, 'Weekly Brief');
    const parsed = parseWeeklyBrief(text);

    // Remove existing brief for this week
    state.weeklyBriefs = state.weeklyBriefs.filter(b => b.weekOf !== monday);
    // Remove suggested wins from this week's previous brief
    state.wins = state.wins.filter(w => !(w.sourceWeek === monday && w.status === 'suggested'));

    const brief = {
      id: Date.now(),
      weekOf: monday,
      generatedAt: new Date().toISOString(),
      patterns: parsed.patterns,
      vectorCheckIn: parsed.vectorCheckIn,
      winsDetected: parsed.winsDetected,
      winsRaw: parsed.winsRaw,
      oneOnOnePrep: parsed.oneOnOnePrep,
      vectorProgress: parsed.vectorProgress,
      openLoopsSummary: parsed.openLoopsSummary,
      raw: text
    };
    state.weeklyBriefs.push(brief);

    // Create win entries
    parsed.winsDetected.forEach(w => {
      state.wins.push({
        id: Date.now() + Math.random(),
        date: todayStr(),
        sourceWeek: monday,
        sourceBriefId: brief.id,
        description: w.description,
        impact: w.impact,
        vectors: [w.vector],
        status: 'suggested'
      });
    });

    saveState();
    syncPush(); // Immediate push so remote has the brief before potential refresh
    briefsView = 'detail';
    currentBriefId = brief.id;
    renderBriefs();

  } catch (err) {
    briefsView = 'list';
    renderBriefs();
    if (err.message === 'no_key') {
      showToast('Set up your AI gateway in Settings first.');
    } else {
      showToast('Failed to generate brief. Check your gateway settings and try again.');
    }
  }
}

function addManualWin(briefId) {
  const description = prompt('What did you accomplish?');
  if (!description || !description.trim()) return;
  const impact = prompt('What was the impact?') || '';
  const vectorNames = (state.vectors || []).map(v => v.name);
  let vector = '';
  if (vectorNames.length > 0) {
    const choice = prompt('Which vector? (' + vectorNames.join(', ') + ')');
    if (choice && vectorNames.some(v => v.toLowerCase() === choice.trim().toLowerCase())) {
      vector = vectorNames.find(v => v.toLowerCase() === choice.trim().toLowerCase());
    }
  }
  const brief = briefId ? state.weeklyBriefs.find(b => b.id === briefId) : null;
  const win = {
    id: Date.now() + Math.random(),
    date: todayStr(),
    sourceWeek: brief ? brief.weekOf : getWeekMonday(todayStr()),
    sourceBriefId: briefId || null,
    description: description.trim(),
    impact: impact.trim(),
    vector,
    vectors: vector ? [vector] : [],
    status: 'confirmed'
  };
  state.wins.push(win);
  // Also add to brief's winsDetected so it shows inline
  if (brief) {
    if (!brief.winsDetected) brief.winsDetected = [];
    brief.winsDetected.push({ description: win.description, impact: win.impact, vector: win.vector });
  }
  saveState();
  renderBriefs();
  showToast('Win added');
}

function keepWin(briefId, winIdx) {
  const brief = state.weeklyBriefs.find(b => b.id === briefId);
  if (!brief) return;
  const winData = brief.winsDetected[winIdx];
  const stateWin = state.wins.find(w => w.sourceBriefId === briefId && w.description === winData.description);
  if (stateWin) {
    stateWin.status = 'confirmed';
    saveState();
  }
  const card = document.getElementById('win-' + winIdx);
  if (card) {
    card.classList.add('kept');
    const actions = card.querySelector('.win-actions');
    if (actions) actions.outerHTML = '<div class="win-kept-badge">✓ Kept</div>';
  }
}

function dismissWin(briefId, winIdx) {
  const brief = state.weeklyBriefs.find(b => b.id === briefId);
  if (!brief) return;
  const winData = brief.winsDetected[winIdx];
  const stateWin = state.wins.find(w => w.sourceBriefId === briefId && w.description === winData.description);
  if (stateWin) {
    stateWin.status = 'dismissed';
    saveState();
  }
  const card = document.getElementById('win-' + winIdx);
  if (card) {
    card.classList.add('dismissing');
    setTimeout(() => { card.style.display = 'none'; }, 300);
  }
  showToast('Win dismissed ·', 5000, () => {
    if (stateWin) {
      stateWin.status = 'suggested';
      saveState();
      renderBriefDetail(document.getElementById('panel-briefs'));
    }
  });
}

function copyPrep() {
  const prepEl = document.getElementById('prepContent');
  if (!prepEl) return;
  const text = prepEl.innerText;
  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard');
  });
}
