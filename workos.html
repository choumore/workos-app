      <div style="font-weight:600">Recurring Meetings</div>
      <button class="btn-secondary btn-accent" onclick="meetingPrepView='form';currentMeetingPrepId=null;meetingPrepFormStakeholders=[];meetingPrepFormTones=[];renderBriefs()">+ New Recurring Meeting</button>
    </div>
    ${listHtml}`;
}

function viewMeetingPrep(id) {
  currentMeetingPrepId = id;
  meetingPrepView = 'detail';
  renderBriefs();
}

function renderMeetingPrepForm(panel) {
  const editing = currentMeetingPrepId ? state.meetingPreps.find(p => p.id === currentMeetingPrepId) : null;
  if (editing && meetingPrepFormStakeholders.length === 0) {
    meetingPrepFormStakeholders = [...editing.stakeholders];
    const saved = editing.meetingTone || 'strategic';
    meetingPrepFormTones = Array.isArray(saved) ? [...saved] : [saved];
  }

  const pillsHtml = meetingPrepFormStakeholders.map((s, i) =>
    `<span class="stakeholder-pill">${escapeHtml(s.name)} (${escapeHtml(s.role)}) <span class="stakeholder-pill-remove" onclick="meetingPrepFormStakeholders.splice(${i},1);renderBriefs()">×</span></span>`
  ).join('');

  const toneDescriptions = {
    strategic: 'Big picture positioning, org-level impact, long-term trajectory.',
    tactical: 'Specific deliverables, timelines, execution details, blockers.',
    coaching: 'Growth, feedback, what you learned, where you need guidance.',
    visibility: 'Showcasing impact, who you influenced, what changed because of your work.'
  };
  const tones = ['strategic', 'tactical', 'coaching', 'visibility'];
  const toneHtml = tones.map(t =>
    `<button type="button" class="tone-btn${meetingPrepFormTones.includes(t) ? ' selected' : ''}" onclick="const i=meetingPrepFormTones.indexOf('${t}');if(i>=0){meetingPrepFormTones.splice(i,1)}else{meetingPrepFormTones.push('${t}')};renderBriefs()">${t.charAt(0).toUpperCase() + t.slice(1)}</button>`
  ).join('');
  const selectedDescs = meetingPrepFormTones.map(t => `<div><strong>${t.charAt(0).toUpperCase() + t.slice(1)}</strong>: ${toneDescriptions[t]}</div>`).join('');

  panel.innerHTML = `
    <div style="margin-bottom:var(--space-xl)">
      <button class="btn-ghost" onclick="meetingPrepView='list';renderBriefs()">← Back to Recurring Meetings</button>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">${editing ? 'Edit' : 'New'} Recurring Meeting</div>

      <div class="form-group">
        <label class="form-label">Stakeholders</label>
        <div class="stakeholder-input-row">
          <div class="form-group"><input class="form-input" id="prepStakeholderName" placeholder="Name"></div>
          <div class="form-group"><input class="form-input" id="prepStakeholderRole" placeholder="Role (e.g., VP Product)"></div>
          <button class="btn-secondary" type="button" onclick="addPrepStakeholder()">Add</button>
        </div>
        <div class="stakeholder-pills" id="prepStakeholderPills">${pillsHtml || '<span style="color:var(--text-muted);font-size:12px">No stakeholders added yet</span>'}</div>
      </div>

      <div class="form-group">
        <label class="form-label">Meeting Purpose</label>
        <textarea class="form-input" id="prepPurpose" rows="3" placeholder="e.g., skip-level check-in, cross-org alignment">${escapeHtml(editing?.meetingPurpose || '')}</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Tone <span style="color:var(--text-muted);font-size:11px;text-transform:none;letter-spacing:0">(select one or more)</span></label>
        <div class="tone-selector">${toneHtml}</div>
        <div class="form-hint">${selectedDescs}</div>
      </div>

      <div class="form-group">
        <label class="form-label">Last Connected</label>
        <input class="form-input" type="date" id="prepLastConnected" value="${editing?.lastConnected || ''}">
      </div>

      <div class="form-group">
        <label class="form-label">Recurring Meeting Title</label>
        ${(() => {
          const currentVal = editing?.recurringTitle || '';
          const seen = new Set();
          const titles = state.meetings
            .map(m => (m.title || '').trim())
            .filter(t => { if (!t || seen.has(t.toLowerCase())) return false; seen.add(t.toLowerCase()); return true; })
            .sort((a, b) => a.localeCompare(b));
          if (!seen.has(currentVal.toLowerCase()) && currentVal) titles.unshift(currentVal);
          const opts = titles.map(t =>
            `<option value="${escapeHtml(t)}"${t === currentVal ? ' selected' : ''}>${escapeHtml(t)}</option>`
          ).join('');
          return `<select class="form-input" id="prepRecurringTitle"><option value="">Select a meeting...</option>${opts}</select>`;
        })()}
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:var(--space-lg)">
        <div style="display:flex;gap:var(--space-sm)">
          <button class="btn-secondary btn-accent" onclick="saveMeetingPrepRecord()">Save</button>
          <button class="btn-secondary" onclick="meetingPrepView='list';renderBriefs()">Cancel</button>
        </div>
        ${editing ? `<button class="btn-secondary" style="color:var(--accent-negative)" onclick="deleteMeetingPrep(${editing.id})">Delete</button>` : ''}
      </div>
    </div>`;
}

function addPrepStakeholder() {
  const nameEl = document.getElementById('prepStakeholderName');
  const roleEl = document.getElementById('prepStakeholderRole');
  const name = nameEl.value.trim();
  const role = roleEl.value.trim();
  if (!name) { showToast('Enter a stakeholder name'); return; }
  meetingPrepFormStakeholders.push({ name, role: role || 'Unknown' });
  nameEl.value = '';
  roleEl.value = '';
  renderBriefs();
}

function saveMeetingPrepRecord() {
  if (meetingPrepFormStakeholders.length === 0) { showToast('Add at least one stakeholder'); return; }
  const purpose = document.getElementById('prepPurpose').value.trim();
  const lastConnected = document.getElementById('prepLastConnected').value;
  const recurringTitle = document.getElementById('prepRecurringTitle').value.trim();
  if (!recurringTitle) { showToast('Enter a recurring meeting title'); return; }
  if (!lastConnected) { showToast('Set a last connected date'); return; }

  if (currentMeetingPrepId) {
    const existing = state.meetingPreps.find(p => p.id === currentMeetingPrepId);
    if (existing) {
      existing.stakeholders = [...meetingPrepFormStakeholders];
      existing.meetingPurpose = purpose;
      existing.meetingTone = [...meetingPrepFormTones];
      existing.lastConnected = lastConnected;
      existing.recurringTitle = recurringTitle;
    }
  } else {
    const record = {
      id: Date.now(),
      stakeholders: [...meetingPrepFormStakeholders],
      meetingPurpose: purpose,
      meetingTone: [...meetingPrepFormTones],
      lastConnected,
      recurringTitle,
      preps: []
    };
    state.meetingPreps.push(record);
    currentMeetingPrepId = record.id;
  }
  saveState();
  meetingPrepView = 'detail';
  renderBriefs();
}

function deleteMeetingPrep(id) {
  if (!confirm('Delete this recurring meeting and all its history?')) return;
  state.meetingPreps = state.meetingPreps.filter(p => p.id !== id);
  saveState();
  meetingPrepView = 'list';
  currentMeetingPrepId = null;
  renderBriefs();
  showToast('Recurring meeting deleted');
}

function renderMeetingPrepDetail(panel) {
  const record = state.meetingPreps.find(p => p.id === currentMeetingPrepId);
  if (!record) { meetingPrepView = 'list'; renderBriefs(); return; }

  const names = record.stakeholders.map(s => `<span class="stakeholder-name-block"><span class="stakeholder-name">${escapeHtml(s.name)}</span><span class="stakeholder-role-meta">${escapeHtml(s.role)}</span></span>`).join('');
  const toneArr = Array.isArray(record.meetingTone) ? record.meetingTone : record.meetingTone ? [record.meetingTone] : [];
  const toneTags = toneArr.map(t => `<span class="tone-tag">${escapeHtml(t)}</span>`).join('');
  const latestPrep = record.preps.length > 0 ? record.preps[0] : null;
  const pastPreps = record.preps.slice(1);

  function renderPrepSections(prep) {
    const sections = [
      { key: 'sinceLastTime', label: 'Since Last Time' },
      { key: 'commitments', label: 'Commitment Tracker' },
      { key: 'theirSignals', label: 'Their Signals' },
      { key: 'patternFlags', label: 'Pattern Flags' },
      { key: 'suggestedFraming', label: 'Suggested Framing' },
      { key: 'conversationArc', label: 'Conversation Arc' }
    ];
    return sections.map(s => {
      const content = prep[s.key];
      if (!content) return '';
      const copyBtn = s.key === 'suggestedFraming' ? ` <button class="btn-reanalyze" onclick="event.stopPropagation();navigator.clipboard.writeText(${JSON.stringify(content).replace(/'/g, "\\'")});showToast('Copied')">Copy</button>` : '';
      return `<div class="prep-section">
        <div class="prep-section-label">${s.label}${copyBtn}</div>
        <div class="prep-section-body">${formatBulletList(content)}</div>
      </div>`;
    }).join('');
  }

  let latestHtml = '';
  if (latestPrep) {
    const genDate = new Date(latestPrep.generatedAt);
    const genStr = genDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' at ' + genDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    latestHtml = `
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:var(--space-xl)">Generated ${genStr} · Since ${latestPrep.lastConnected}</div>
      ${renderPrepSections(latestPrep)}`;
  } else {
    latestHtml = `<div class="empty-state">No preps generated yet.
      <div class="empty-state-secondary">Click "Generate Prep" to create your first prep for this stakeholder.</div>
    </div>`;
  }

  // Post-Meeting section
  const unprocessedMeetings = findUnprocessedMeetings(record);
  const syntheses = record.syntheses || [];
  const isLoading = synthesisLoadingForPrepId === record.id;

  // Auto-select if only one match, or validate current selection
  if (unprocessedMeetings.length === 1) {
    selectedSynthesisMeetingId = unprocessedMeetings[0].id;
  } else if (selectedSynthesisMeetingId && !unprocessedMeetings.find(m => m.id === selectedSynthesisMeetingId)) {
    selectedSynthesisMeetingId = null;
  }

  let postMeetingInputHtml = '';
  if (isLoading) {
    postMeetingInputHtml = `
      <div class="synthesis-loading">
        <div class="synthesis-loading-bar"></div>
        <div style="font-size:12px;color:var(--text-muted)">Generating synthesis...</div>
      </div>`;
  } else if (unprocessedMeetings.length > 0) {
    const meetingOptionsHtml = unprocessedMeetings.map(m => {
      const d = new Date(meetingDateStr(m) + 'T00:00:00');
      const ds = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const isSelected = selectedSynthesisMeetingId === m.id;
      const midEsc = escapeHtml(JSON.stringify(m.id));
      return `<button class="synthesis-meeting-option${isSelected ? ' selected' : ''}" onclick='selectedSynthesisMeetingId=${midEsc};renderBriefs()'>
        <span class="synthesis-meeting-title">${escapeHtml(m.title || 'Untitled')}</span>
        <span class="synthesis-meeting-date">${ds}</span>
      </button>`;
    }).join('');

    const hasSelection = !!selectedSynthesisMeetingId;

    postMeetingInputHtml = `
      <div style="margin-bottom:var(--space-md)">
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:var(--space-sm)">${unprocessedMeetings.length === 1 ? 'Matched meeting:' : 'Select the meeting to reflect on:'}</div>
        <div class="synthesis-meeting-list">${meetingOptionsHtml}</div>
      </div>
      <button class="btn-secondary btn-accent" ${hasSelection ? '' : 'disabled'} onclick="openReflectionModal(${record.id})" style="margin-top:var(--space-sm)">Write Reflection</button>`;
  } else {
    // Check if there are recent unmatched meetings — title may have drifted
    const processedIds = new Set(syntheses.map(s => s.meetingId));
    const recentUnmatched = state.meetings
      .filter(m => meetingDateStr(m) && meetingDateStr(m) >= (record.lastConnected || '') && !processedIds.has(m.id))
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
      .slice(0, 5);

    if (recentUnmatched.length > 0) {
      const unmatchedList = recentUnmatched.map(m => {
        const d = new Date(meetingDateStr(m) + 'T00:00:00');
        const ds = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        return `<div class="unmatched-meeting-item">${escapeHtml(m.title || 'Untitled')} · ${ds}</div>`;
      }).join('');
      postMeetingInputHtml = `
        <div class="synthesis-mismatch-warning">
          <div class="synthesis-mismatch-icon">!</div>
          <div>
            <div style="font-weight:500;margin-bottom:4px">No meetings matched "${escapeHtml(record.recurringTitle)}"</div>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:var(--space-sm)">Recent meetings found since ${record.lastConnected}:</div>
            ${unmatchedList}
            <div style="margin-top:var(--space-md)">
              <label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px">Update recurring title to match:</label>
              <div style="display:flex;gap:var(--space-sm);align-items:center">
                <input class="form-input" id="fixRecurringTitle" value="${escapeHtml(record.recurringTitle)}" style="flex:1;font-size:13px">

let winsFilter = { vector: '', search: '' };

function renderWinsArchive(container) {
  const allWins = getConfirmedWins();

  if (allWins.length === 0) {
    container.innerHTML = '<div class="empty-state">No wins yet.<div class="empty-state-secondary">Wins are surfaced in your Weekly Brief — keep logging.</div></div>';
    return;
  }

  // Get unique vectors for filter dropdown
  const allVectors = [...new Set(allWins.flatMap(w => w.vectors))].sort();

  // Apply filters
  let wins = allWins;
  if (winsFilter.vector) {
    wins = wins.filter(w => w.vectors.includes(winsFilter.vector));
  }
  if (winsFilter.search) {
    const q = winsFilter.search.toLowerCase();
    wins = wins.filter(w =>
      w.description.toLowerCase().includes(q) ||
      w.impact.toLowerCase().includes(q)
    );
  }

  container.innerHTML = `
    <div class="wins-header">Wins Archive · ${allWins.length} win${allWins.length !== 1 ? 's' : ''}</div>

    <div class="wins-toolbar">
      <select class="wins-filter" id="winsVectorFilter" onchange="filterWins()">
        <option value="">All vectors</option>
        ${allVectors.map(v => `<option value="${escapeHtml(v)}" ${winsFilter.vector === v ? 'selected' : ''}>${escapeHtml(v)}</option>`).join('')}
      </select>
      <input class="wins-search" id="winsSearch" placeholder="Search wins..." value="${escapeHtml(winsFilter.search)}" oninput="filterWins()">
      <div class="wins-actions-bar">
        <button class="btn-secondary" onclick="exportWins()" title="Copy all wins as text">Export</button>
        <button class="btn-secondary" onclick="generatePromoBrief()" title="Generate a promotion narrative from your wins">Promo Brief</button>
      </div>
    </div>

    ${wins.length === 0 ? '<div style="color:var(--text-muted);padding:var(--space-xl) 0;text-align:center">No wins match your filter.</div>' : ''}

    <div id="winsCards">
    ${wins.map(w => `
      <div class="wins-archive-card" id="win-archive-${w.id}">
        <div class="wins-archive-date">${formatDateShort(w.date)} ${(w.vectors || (w.vector ? [w.vector] : [])).map(v => `<span class="vector-tag">${escapeHtml(v)}</span>`).join(' ')}</div>
        <div class="win-description" id="win-desc-${w.id}">${escapeHtml(w.description)}</div>
        <div class="win-meta-label">Impact</div>
        <div class="win-meta-value" id="win-impact-${w.id}">${escapeHtml(w.impact)}</div>

          <button class="btn-ghost" onclick="editWin('${w.id}')">Edit</button>

function filterWins() {
  winsFilter.vector = document.getElementById('winsVectorFilter')?.value || '';
  winsFilter.search = document.getElementById('winsSearch')?.value || '';
  const content = document.getElementById('briefsContent');
  if (content) renderWinsArchive(content);
}

function editWin(winId) {
  const win = state.wins.find(w => String(w.id) === String(winId));
  if (!win) return;
  const card = document.getElementById('win-archive-' + winId);
  if (!card) return;

  // Replace card content with edit form
  const actionsEl = card.querySelector('.wins-archive-card-actions');
  if (!actionsEl) return;
  const currentVecs = win.vectors || (win.vector ? [win.vector] : []);
  const allVecs = (state.vectors || []).map(v => v.name);
  const vecCheckboxes = allVecs.map(v =>
    `<label style="display:inline-flex;align-items:center;gap:4px;font-size:12px;margin-right:var(--space-md)"><input type="checkbox" class="win-vec-check" value="${escapeHtml(v)}" ${currentVecs.includes(v) ? 'checked' : ''}> ${escapeHtml(v)}</label>`
  ).join('');

  actionsEl.outerHTML = `
    <div class="wins-edit-form" id="win-edit-${winId}">
      <label class="form-label">Description</label>
      <textarea id="edit-desc-${winId}">${escapeHtml(win.description)}</textarea>
      <label class="form-label">Impact</label>
      <textarea id="edit-impact-${winId}">${escapeHtml(win.impact)}</textarea>
      <label class="form-label">Vectors</label>
      <div id="edit-vecs-${winId}" style="margin-bottom:var(--space-md)">${vecCheckboxes || '<span style="color:var(--text-muted);font-size:12px">Set up vectors in Dashboard first</span>'}</div>
      <div style="display:flex;gap:var(--space-sm)">
        <button class="btn-positive" onclick="saveWinEdit('${winId}')">Save</button>
        <button class="btn-dismiss" onclick="cancelWinEdit()">Cancel</button>
      </div>
    </div>
  `;
}

function saveWinEdit(winId) {
  const win = state.wins.find(w => String(w.id) === String(winId));
  if (!win) return;
  const desc = document.getElementById('edit-desc-' + winId)?.value.trim();
  const impact = document.getElementById('edit-impact-' + winId)?.value.trim();
  if (desc) win.description = desc;
  if (impact) win.impact = impact;
  const vecContainer = document.getElementById('edit-vecs-' + winId);
  if (vecContainer) {
    const checked = [...vecContainer.querySelectorAll('.win-vec-check:checked')].map(cb => cb.value);
    win.vectors = checked;
    win.vectorTags = checked; // sync with AI mapping tags
    win.vector = checked.join(', '); // legacy field
  }
  saveState();
  showToast('Win updated');
  const content = document.getElementById('briefsContent');
  if (content) renderWinsArchive(content);
}

function cancelWinEdit() {
  const content = document.getElementById('briefsContent');
  if (content) renderWinsArchive(content);
}

function deleteWin(winId) {
  const win = state.wins.find(w => String(w.id) === String(winId));
  if (!win) return;
  if (!confirm('Remove this win from your archive?')) return;
  win.status = 'dismissed';
  saveState();
  showToast('Win removed');
  const content = document.getElementById('briefsContent');
  if (content) renderWinsArchive(content);
}

function exportWins() {
  const wins = getConfirmedWins();
  if (wins.length === 0) { showToast('No wins to export.'); return; }

  // Apply current filters
  let filtered = wins;
  if (winsFilter.vector) filtered = filtered.filter(w => w.vectors.includes(winsFilter.vector));
  if (winsFilter.search) {
    const q = winsFilter.search.toLowerCase();
    filtered = filtered.filter(w => w.description.toLowerCase().includes(q) || w.impact.toLowerCase().includes(q));
  }

  const text = filtered.map((w, i) =>
    `${i + 1}. ${w.description}\n   Impact: ${w.impact}\n   Vector: ${w.vectors.join(', ')}\n   Date: ${w.date}`
  ).join('\n\n');

  navigator.clipboard.writeText(text).then(() => {
    showToast(`${filtered.length} win${filtered.length !== 1 ? 's' : ''} copied to clipboard`);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(`${filtered.length} win${filtered.length !== 1 ? 's' : ''} copied to clipboard`);
  });
}

async function generatePromoBrief() {
  const wins = getConfirmedWins();
  if (wins.length < 2) { showToast('Need at least 2 confirmed wins to generate a brief.'); return; }

  const briefContainer = document.getElementById('promoBriefContainer');
  if (!briefContainer) return;

  if (!state.settings.baseUrl) {
    showToast('Set up your AI gateway in Settings first.');
    return;
  }

  briefContainer.innerHTML = `
    <div class="brief-section" style="margin-top:var(--space-3xl)">
      <div class="section-header">Promotion Brief</div>
      <div class="brief-loading">
        <div class="brief-loading-text">Generating narrative from ${wins.length} wins...</div>
        <div class="progress-bar"><div class="progress-bar-fill"></div></div>
      </div>
    </div>
  `;

  const promo = state.settings.promotionNotes || 'No promotion notes provided.';
  const winsText = wins.map((w, i) =>
    `${i + 1}. ${w.description}\n   Impact: ${w.impact}\n   Vector: ${w.vectors.join(', ')}\n   Date: ${w.date}`
  ).join('\n\n');

  const prompt = `Here is context about this person's promotion goals:
<promotion_context>
${promo}
</promotion_context>

Here are their confirmed wins, most recent first:
<wins>
${winsText}
</wins>

Write a promotion brief — a 3-5 paragraph narrative that a manager could use to advocate for this person's promotion. Requirements:

1. Open with a thesis statement: what level this person is operating at and why
2. Group wins thematically by promotion vector, not chronologically
3. For each theme, lead with the pattern, then cite 2-3 specific wins as evidence
4. Frame everything as impact and behavioral change, not task completion
5. Close with a forward-looking statement about readiness

Write in third person ("Mo has demonstrated..."). Be specific — use the actual wins and their impacts. This should read like a compelling case, not a list.

Do not inflate or add wins that aren't listed. If the evidence is thin in an area, acknowledge it rather than stretching.`;

  try {
    const text = await callClaude(getSystemPrompt(), prompt, 2000);
    briefContainer.innerHTML = `
      <div class="brief-section" style="margin-top:var(--space-3xl)">
        <div class="section-header-row">
          <span class="section-header" style="margin-bottom:0">Promotion Brief</span>
          <button class="btn-icon" onclick="copyPromoBrief()" title="Copy to clipboard">⧉</button>

        <div class="promo-brief" id="promoBriefText">${formatBriefText(text)}</div>

  const isCurrentWeek = brief.weekOf === getWeekMonday(todayStr());
  const briefWins = brief.winsDetected || [];
  // Get win statuses from state.wins
  const winStatuses = briefWins.map((w, i) => {
    const stateWin = state.wins.find(sw => sw.sourceBriefId === brief.id && sw.description === w.description);
    return stateWin || { status: 'suggested', id: null };
  });

  panel.innerHTML = `
    <div class="brief-back">
      <button class="btn-ghost" onclick="backToBriefsList()">← Back to briefs</button>
    </div>
    <div class="brief-header">

    </div>

    <div class="brief-section">
      <div class="section-header">Patterns</div>
      <div class="card">${formatBriefText(brief.patterns)}</div>

      <div class="card">${formatBriefText(brief.vectorCheckIn)}</div>
    </div>

      <div class="section-header">Wins Detected</div>
      ${briefWins.length === 0
        ? `<div class="card" style="color:var(--text-secondary)">${formatBriefText(brief.winsRaw || 'No wins detected this week.')}</div>`

                : isDismissed ? ''

async function startGenerateBrief() {
  const weekEntries = getCurrentWeekEntries();
  if (weekEntries.length === 0) {
    showToast('No entries this week to analyze.');
    return;
  }
  if (weekEntries.length < 3 && !confirm(`Briefs work best with 3+ entries. You have ${weekEntries.length} so far. Generate anyway?`)) {
    return;
  }

  switchTab('briefs');
  briefsView = 'loading';
  renderBriefs();

  try {
    const systemPrompt = getSystemPrompt() + '\n\nFor this weekly brief, produce a structured response in exactly the format specified below. Do not deviate from the section structure.';
    const text = await callClaude(systemPrompt, buildWeeklyPrompt(weekEntries), 2000);
    const parsed = parseWeeklyBrief(text);
    const monday = getWeekMonday(todayStr());

    // Remove existing brief for this week
    state.weeklyBriefs = state.weeklyBriefs.filter(b => b.weekOf !== monday);
    // Remove suggested wins from this week's previous brief
    state.wins = state.wins.filter(w => !(w.sourceWeek === monday && w.status === 'suggested'));

    const brief = {
      id: Date.now(),
      weekOf: monday,
      patterns: parsed.patterns,
      vectorCheckIn: parsed.vectorCheckIn,
      winsDetected: parsed.winsDetected,
      winsRaw: parsed.winsRaw,
      oneOnOnePrep: parsed.oneOnOnePrep,
      raw: text
    };
    state.weeklyBriefs.push(brief);

    // Create win entries
    parsed.winsDetected.forEach(w => {
      state.wins.push({
        id: Date.now() + Math.random(),
        date: todayStr(),
        sourceWeek: monday,
        sourceBriefId: brief.id,
        description: w.description,
        impact: w.impact,
        vectors: [w.vector],
        status: 'suggested'
      });
    });

    saveState();
    briefsView = 'detail';
    currentBriefId = brief.id;
    renderBriefs();

  } catch (err) {
    briefsView = 'list';
    renderBriefs();
    if (err.message === 'no_key') {
      showToast('Set up your AI gateway in Settings first.');
    } else {
      showToast('Failed to generate brief. Check your gateway settings and try again.');
    }
  }
}

function keepWin(briefId, winIdx) {
  const brief = state.weeklyBriefs.find(b => b.id === briefId);
  if (!brief) return;
  const winData = brief.winsDetected[winIdx];
  const stateWin = state.wins.find(w => w.sourceBriefId === briefId && w.description === winData.description);
  if (stateWin) {
    stateWin.status = 'confirmed';
    saveState();
  }
  const card = document.getElementById('win-' + winIdx);
  if (card) {
    card.classList.add('kept');
    const actions = card.querySelector('.win-actions');
    if (actions) actions.outerHTML = '<div class="win-kept-badge">✓ Kept</div>';
  }
}

function dismissWin(briefId, winIdx) {
  const brief = state.weeklyBriefs.find(b => b.id === briefId);
  if (!brief) return;
  const winData = brief.winsDetected[winIdx];
  const stateWin = state.wins.find(w => w.sourceBriefId === briefId && w.description === winData.description);
  if (stateWin) {
    stateWin.status = 'dismissed';
    saveState();
  }
  const card = document.getElementById('win-' + winIdx);
  if (card) {
    card.classList.add('dismissing');
    setTimeout(() => { card.style.display = 'none'; }, 300);
  }
  showToast('Win dismissed ·', 5000, () => {
    if (stateWin) {
      stateWin.status = 'suggested';
      saveState();
      renderBriefDetail(document.getElementById('panel-briefs'));
    }
  });
}

function copyPrep() {
  const prepEl = document.getElementById('prepContent');
  if (!prepEl) return;
  const text = prepEl.innerText;
  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard');
  });
}

  panel.innerHTML = subNav + content;

  if (meetingsSubTab === 'insights') attachMeetingsInsightsListeners();
}

/* ---- Meetings Insights ---- */

function getPeriodRange(period) {
  const now = new Date();
  const todayStr = now.toISOString().slice(0, 10);
  if (period === 'today') {
    return { start: new Date(todayStr + 'T00:00:00'), end: new Date(todayStr + 'T23:59:59') };
  }
  if (period === 'week') {
    const d = new Date(now);
    d.setDate(d.getDate() - ((d.getDay() + 6) % 7)); // Monday
    return { start: new Date(d.toISOString().slice(0, 10) + 'T00:00:00'), end: now };
  }
  if (period === 'month') {
    return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: now };
  }
  if (period === 'quarter') {
    const qMonth = Math.floor(now.getMonth() / 3) * 3;
    return { start: new Date(now.getFullYear(), qMonth, 1), end: now };
  }
  if (period === 'year') {
    return { start: new Date(now.getFullYear(), 0, 1), end: now };
  }
  return null; // 'all'
}

function getPreviousPeriodRange(period) {
  const cur = getPeriodRange(period);
  if (!cur) return null;
  const len = cur.end.getTime() - cur.start.getTime();
  return { start: new Date(cur.start.getTime() - len), end: new Date(cur.start.getTime() - 1) };
}

function filterMeetingsByRange(range) {
  if (!range) return state.meetings;
  return state.meetings.filter(m => {
    if (!m.date) return false;
    const d = new Date(m.date);
    return d >= range.start && d <= range.end;
  });
}

function getFilteredMeetings() {
  return filterMeetingsByRange(getPeriodRange(meetingsInsightsPeriod));
}

function getMeetingDateBuckets(meetings) {
  const granularity = (meetingsInsightsPeriod === 'today' || meetingsInsightsPeriod === 'week' || meetingsInsightsPeriod === 'month') ? 'day'
    : meetingsInsightsPeriod === 'quarter' ? 'week' : 'month';
  const buckets = {};
  meetings.forEach(m => {
    if (!m.date) return;
    const d = new Date(m.date);
    let key;
    if (granularity === 'day') key = m.date.substring(0, 10);
    else if (granularity === 'week') {
      const mon = new Date(d);
      mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
      key = mon.toISOString().slice(0, 10);
    } else {
      key = d.toISOString().slice(0, 7);
    }
    if (!buckets[key]) buckets[key] = { count: 0, totalDuration: 0 };
    buckets[key].count++;
    buckets[key].totalDuration += meetingDuration(m);
  });
  return { granularity, buckets };
}

function buildInsightsPeriodFilter(hidden) {
  const periods = [
    { id: 'today', label: 'Today' },
    { id: 'week', label: 'This Week' },
    { id: 'month', label: 'This Month' },
    { id: 'quarter', label: 'This Quarter' },
    { id: 'year', label: 'This Year' },
    { id: 'all', label: 'All' }
  ];
  return `<div class="mi-period-filter" style="margin-bottom:0${hidden ? ';visibility:hidden' : ''}">${periods.map(p =>
    `<button class="mi-period-btn${meetingsInsightsPeriod === p.id ? ' active' : ''}" onclick="meetingsInsightsPeriod='${p.id}';renderMeetings()">${p.label}</button>`
  ).join('')}</div>`;
}

function meetingDuration(m) { return parseInt(m.duration, 10) || 0; }

function computeParticipation(m) {
  if (!m.transcript || !state.settings.name) return null;
  const userName = state.settings.name.trim().toLowerCase();
  if (!userName) return null;
  // Match lines like: "[00:02:15] Speaker Name: text" or "00:02:15 Speaker Name: text" or "Speaker Name 00:02:15: text"
  const lineRegex = /^(?:\[?(\d{1,2}:\d{2}(?::\d{2})?)\]?\s+(.+?):\s|^(.+?)\s+\[?(\d{1,2}:\d{2}(?::\d{2})?)\]?:\s)/;
  const lines = m.transcript.split('\n');
  const segments = [];
  for (const line of lines) {
    const match = line.match(lineRegex);
    if (!match) continue;
    const timeStr = match[1] || match[4];
    const speaker = (match[2] || match[3] || '').trim();
    const parts = timeStr.split(':').map(Number);
    const secs = parts.length === 3 ? parts[0] * 3600 + parts[1] * 60 + parts[2] : parts[0] * 60 + parts[1];
    segments.push({ secs, speaker: speaker.toLowerCase() });
  }
  if (segments.length < 2) return null;
  // Merge consecutive segments by same speaker, accumulate time by speaker
  const speakerTime = {};
  const meetDur = meetingDuration(m);
  const lastStart = segments[segments.length - 1].secs;
  const avgGap = (lastStart - segments[0].secs) / (segments.length - 1);
  const lastDur = meetDur > lastStart ? meetDur - lastStart : Math.round(avgGap);

  // Count lines per speaker for zero-duration fallback
  const speakerLines = {};
  let totalTime = 0;
  for (let i = 0; i < segments.length; i++) {
    const sp = segments[i].speaker;
    speakerLines[sp] = (speakerLines[sp] || 0) + 1;
    const dur = (i < segments.length - 1) ? segments[i + 1].secs - segments[i].secs : lastDur;
    if (dur > 0) {
      speakerTime[sp] = (speakerTime[sp] || 0) + dur;
      totalTime += dur;
    }
  }
  // If a speaker has lines but 0 time (all zero-gap), give them a proportional share based on line count
  const allSpeakers = Object.keys(speakerLines);
  const zeroTimeSpeakers = allSpeakers.filter(sp => !speakerTime[sp] || speakerTime[sp] === 0);
  if (zeroTimeSpeakers.length > 0 && totalTime > 0) {
    const totalLines = Object.values(speakerLines).reduce((a, b) => a + b, 0);
    for (const sp of zeroTimeSpeakers) {
      const share = (speakerLines[sp] / totalLines) * totalTime * 0.1; // small share
      speakerTime[sp] = share;
      totalTime += share;
    }
  }

  if (totalTime <= 0) return null;
  // Find user's time — match first name, full name, or partial
  const userParts = userName.split(/\s+/);
  let userTime = 0;
  for (const [sp, time] of Object.entries(speakerTime)) {
    if (sp === userName || userParts.some(p => p.length > 1 && sp === p) || sp.includes(userName) || userName.includes(sp)) {
      userTime += time;
    }
  }
  console.log('Participation debug:', m.title, { speakerTime, speakerLines, totalTime, userTime, userName, pct: Math.round(userTime / totalTime * 100) });
  return { pct: Math.round(userTime / totalTime * 100), speakingTime: Math.round(userTime) };
}

function computePeriodStats(meetings) {
  const total = meetings.length;
  const totalSec = meetings.reduce((s, m) => s + meetingDuration(m), 0);
  const totalHours = totalSec / 3600;
  const avgMin = total > 0 ? Math.round(totalSec / total / 60) : 0;
  let pctSum = 0, pctCount = 0, speakingTotal = 0;
  meetings.forEach(m => {
    const p = computeParticipation(m);
    if (p) { pctSum += p.pct; pctCount++; speakingTotal += p.speakingTime; }
  });
  const avgParticipation = pctCount > 0 ? Math.round(pctSum / pctCount) : null;
  const speakingHours = speakingTotal / 3600;
  return { total, totalHours, avgMin, avgParticipation, speakingHours };
}

function formatDelta(current, previous, unit) {
  if (previous === null || previous === undefined) return '';
  const diff = current - previous;
  if (diff === 0) return `<span class="mi-delta mi-delta-flat">—</span>`;
  const sign = diff > 0 ? '+' : '';
  const cls = diff > 0 ? 'mi-delta-up' : 'mi-delta-down';
  const val = unit === 'h' ? (diff > 0 ? '+' : '') + diff.toFixed(1) : sign + Math.round(diff);
  return `<span class="mi-delta ${cls}">${val}</span>`;
}

function buildInsightsSummaryStats(meetings) {
  const cur = computePeriodStats(meetings);
  const prevRange = getPreviousPeriodRange(meetingsInsightsPeriod);
  const prev = prevRange ? computePeriodStats(filterMeetingsByRange(prevRange)) : null;

  const deltaTotal = prev ? formatDelta(cur.total, prev.total, '') : '';
  const deltaHours = prev ? formatDelta(cur.totalHours, prev.totalHours, 'h') : '';
  const deltaAvg = prev ? formatDelta(cur.avgMin, prev.avgMin, '') : '';

  const prevLabel = meetingsInsightsPeriod === 'today' ? 'vs yesterday' :
                    meetingsInsightsPeriod === 'week' ? 'vs last week' :
                    meetingsInsightsPeriod === 'month' ? 'vs last month' :
                    meetingsInsightsPeriod === 'quarter' ? 'vs last quarter' :
                    meetingsInsightsPeriod === 'year' ? 'vs last year' : '';

  const deltaParticipation = prev && cur.avgParticipation !== null && prev.avgParticipation !== null ? formatDelta(cur.avgParticipation, prev.avgParticipation, '') : '';
  const deltaSpeaking = prev ? formatDelta(cur.speakingHours, prev.speakingHours, 'h') : '';

  return `<div class="mi-stats-row">
    <div class="mi-stat"><strong>${cur.total}</strong>meetings ${deltaTotal}</div>
    <div class="mi-stat"><strong>${cur.totalHours.toFixed(1)}</strong>hours ${deltaHours}</div>
    <div class="mi-stat"><strong>${cur.avgMin}</strong>avg min ${deltaAvg}</div>
    ${cur.avgParticipation !== null ? `<div class="mi-stat"><strong>${cur.avgParticipation}%</strong>avg participation ${deltaParticipation}</div>` : ''}
    ${cur.speakingHours > 0 ? `<div class="mi-stat"><strong>${cur.speakingHours.toFixed(1)}</strong>h speaking ${deltaSpeaking}</div>` : ''}
  </div>
  ${prevLabel ? `<div class="mi-comparison-label">${prevLabel}</div>` : ''}`;
}

function buildMeetingTypeBreakdown(meetings) {
  const counts = {};
  meetings.forEach(m => { const t = m.type || 'other'; counts[t] = (counts[t] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const max = sorted.length > 0 ? sorted[0][1] : 1;
  return `<div class="mi-section">
    <div class="mi-section-label">Type Breakdown</div>
    ${sorted.map(([typeId, count]) => {
      const info = MEETING_TYPES[typeId] || MEETING_TYPES['other'];
      const pct = (count / max * 100).toFixed(1);
      return `<div class="mi-type-row">
        <div class="mi-type-label">${escapeHtml(info.label)}</div>
        <div class="mi-type-track"><div class="mi-type-fill" style="width:${pct}%;background:${info.color.text}"></div></div>
        <div class="mi-type-count">${count}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function buildParticipationInsights(meetings) {
  const contextLabels = {
    '1:1':             ['Mostly listening', 'Balanced dialogue', 'Driving the conversation'],
    'design-review':   ['Observing', 'Contributing', 'Presenting / leading'],
    'team-standup':    ['Minimal updates', 'Normal share', 'Dominating standup'],
    'cross-functional':['Listening in', 'Active contributor', 'Driving alignment'],
    'strategic':       ['Absorbing context', 'Engaged participant', 'Key voice'],
    'brainstorm':      ['Quiet observer', 'Active ideator', 'Leading ideation'],
    'user-research':   ['Good listening ratio', 'Balanced facilitation', 'Over-talking (flag)'],
    'hawkins':         ['Listening', 'Contributing', 'Leading discussion'],
    'other':           ['Low participation', 'Moderate', 'High participation']
  };

  // Group participation data by type
  const byType = {};
  meetings.forEach(m => {
    const p = computeParticipation(m);
    if (!p) return;
    const t = m.type || 'other';
    if (!byType[t]) byType[t] = [];
    byType[t].push(p.pct);
  });

  const types = Object.entries(byType).sort((a, b) => {
    const avgA = a[1].reduce((s, v) => s + v, 0) / a[1].length;
    const avgB = b[1].reduce((s, v) => s + v, 0) / b[1].length;
    return avgB - avgA;
  });

  if (types.length === 0) return '';

  const rows = types.map(([typeId, pcts]) => {
    const avg = Math.round(pcts.reduce((s, v) => s + v, 0) / pcts.length);
    const info = MEETING_TYPES[typeId] || MEETING_TYPES['other'];
    const labels = contextLabels[typeId] || contextLabels['other'];
    const tier = avg < 25 ? 0 : avg <= 50 ? 1 : 2;
    const label = labels[tier];
    const isWarning = typeId === 'user-research' && tier === 2;
    return `<div class="mi-participation-row">
      <div class="mi-participation-label" style="color:${info.color.text}">${escapeHtml(info.label)}</div>
      <div class="mi-participation-track"><div class="mi-participation-fill" style="width:${avg}%;background:${isWarning ? '#c53030' : info.color.text}"></div></div>
      <div class="mi-participation-pct">${avg}%</div>
      <div class="mi-participation-context${isWarning ? ' warning' : ''}">${escapeHtml(label)}</div>
    </div>`;
  }).join('');

  return `<div class="mi-section">
    <div class="mi-section-label">Participation by Meeting Type</div>
    ${rows}
  </div>`;
}

function buildMeetingsBarChart(bucketData, yLabel, chartId) {
  const entries = Object.entries(bucketData).sort((a, b) => a[0].localeCompare(b[0]));
  if (entries.length < 1) return `<div style="color:var(--text-muted);font-size:13px;padding:var(--space-md) 0">Not enough data for chart</div>`;

  const values = entries.map(e => e[1]);
  const maxVal = Math.max(...values) || 1;
  const padTop = 24, padBottom = 32, padLeft = 32, padRight = 16;
  const h = 160, w = 800;
  const chartW = w - padLeft - padRight;
  const chartH = h - padTop - padBottom;
  const barGap = Math.max(2, Math.min(6, chartW / entries.length * 0.15));
  const barW = (chartW - barGap * (entries.length - 1)) / entries.length;

  const yLabels = [Math.ceil(maxVal / 2), Math.ceil(maxVal)].map(v => {
    const y = padTop + chartH - (v / maxVal) * chartH;
    return `<text x="${padLeft - 8}" y="${y + 4}" text-anchor="end" fill="var(--text-muted)" font-size="12" font-weight="500" font-family="var(--font-family)">${v}</text>
      <line x1="${padLeft}" y1="${y}" x2="${w - padRight}" y2="${y}" stroke="var(--text-muted)" stroke-width="0.75" stroke-dasharray="4 2"/>`;
  }).join('');

  const xStep = Math.max(1, Math.floor(entries.length / 8));
  const bars = entries.map(([label, val], i) => {
    const x = padLeft + i * (barW + barGap);
    const barH = (val / maxVal) * chartH;
    const y = padTop + chartH - barH;
    const r = Math.min(3, barW / 2);
    return `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="${r}" ry="${r}" fill="var(--accent-600)" opacity="0.8" class="mi-bar" data-label="${label}" data-val="${val}"/>
     <rect x="${x}" y="${padTop}" width="${barW}" height="${chartH}" fill="transparent" class="mi-bar-hit" data-label="${label}" data-val="${val}"/>`;
  }).join('');

  const xLabels = entries.filter((_, i) => i % xStep === 0 || i === entries.length - 1).map(([label], i) => {
    const idx = entries.findIndex(e => e[0] === label);
    const x = padLeft + idx * (barW + barGap) + barW / 2;
    let display = label;
    if (label.length >= 10) {
      const d = new Date(label.substring(0, 10) + 'T12:00:00');
      display = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    } else if (label.length === 7) {
      const d = new Date(label + '-01T12:00:00');
      display = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
    }
    return `<text x="${x}" y="${h - 8}" text-anchor="middle" fill="var(--text-muted)" font-size="12" font-weight="500" font-family="var(--font-family)">${display}</text>`;
  }).join('');

  return `<div class="line-chart-wrap" id="${chartId}">
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" width="100%">
      ${yLabels}
      <line x1="${padLeft}" y1="${padTop + chartH}" x2="${w - padRight}" y2="${padTop + chartH}" stroke="var(--text-muted)" stroke-width="0.75"/>
      ${bars}
      ${xLabels}
    </svg>
    <div class="line-chart-tooltip"></div>
  </div>`;
}

function buildMeetingLoadChart(bucketInfo) {
  const data = {};
  Object.entries(bucketInfo.buckets).forEach(([k, v]) => { data[k] = v.count; });
  return `<div class="mi-section">

function buildMeetingDurationChart(bucketInfo) {
  const data = {};
  Object.entries(bucketInfo.buckets).forEach(([k, v]) => { data[k] = +(v.totalDuration / 3600).toFixed(1); });
  return `<div class="mi-section">
    <div class="mi-section-label">Meeting Hours Over Time</div>
    ${buildMeetingsBarChart(data, 'Hours', 'miDurationChart')}

}

function computeMoodEnergyCorrelation(meetings) {
  const moodScores = { '😊': 5, '🔥': 4, '😐': 3, '😤': 2, '😰': 1, '😴': 1 };
  // Count meetings per date
  const meetingsByDate = {};
  meetings.forEach(m => { if (m.date) meetingsByDate[m.date] = (meetingsByDate[m.date] || 0) + 1; });
  // Group journal entries by light (0-1 meetings) vs heavy (2+)
  const groups = { light: { energy: [], mood: [] }, heavy: { energy: [], mood: [] } };
  state.entries.forEach(entry => {
    if (!entry.date) return;
    const mc = meetingsByDate[entry.date] || 0;
    const group = mc <= 1 ? 'light' : 'heavy';
    if (entry.energy) groups[group].energy.push(entry.energy);
    if (entry.mood && moodScores[entry.mood] !== undefined) groups[group].mood.push(moodScores[entry.mood]);
  });
  const avg = arr => arr.length > 0 ? arr.reduce((a, b) => a + b, 0) / arr.length : null;
  return {
    light: { avgEnergy: avg(groups.light.energy), avgMood: avg(groups.light.mood), days: groups.light.energy.length },
    heavy: { avgEnergy: avg(groups.heavy.energy), avgMood: avg(groups.heavy.mood), days: groups.heavy.energy.length }
  };
}

function buildMoodEnergyCorrelation(meetings) {
  const data = computeMoodEnergyCorrelation(meetings);
  if (data.light.days === 0 && data.heavy.days === 0) {
    return `<div class="mi-section">
      <div class="mi-section-label">Mood &amp; Energy Correlation</div>
      <div style="color:var(--text-muted);font-size:13px">No journal entries with matching meeting dates to correlate.</div>
    </div>`;
  }

  function renderCard(title, d, color) {
    const energyPct = d.avgEnergy !== null ? (d.avgEnergy / 10 * 100).toFixed(0) : 0;
    const moodPct = d.avgMood !== null ? (d.avgMood / 5 * 100).toFixed(0) : 0;
    return `<div class="mi-correlation-card">
      <h4>${title}</h4>
      <div class="mi-corr-metric">
        <div class="mi-corr-label">Energy</div>
        <div class="mi-corr-track"><div class="mi-corr-fill" style="width:${energyPct}%;background:${color}"></div></div>
        <div class="mi-corr-value">${d.avgEnergy !== null ? d.avgEnergy.toFixed(1) : '—'}</div>
      </div>
      <div class="mi-corr-metric">
        <div class="mi-corr-label">Mood</div>
        <div class="mi-corr-track"><div class="mi-corr-fill" style="width:${moodPct}%;background:${color}"></div></div>
        <div class="mi-corr-value">${d.avgMood !== null ? d.avgMood.toFixed(1) : '—'}</div>
      </div>
      <div class="mi-corr-sample">(n=${d.days} days)</div>
    </div>`;
  }

  return `<div class="mi-section">
    <div class="mi-section-label">Mood &amp; Energy Correlation</div>
    <div class="mi-correlation-row">
      ${renderCard('Light Days (0–1 meetings)', data.light, '#3aa85c')}
      ${renderCard('Heavy Days (2+ meetings)', data.heavy, '#c53030')}
    </div>
  </div>`;
}

function meetingsInsightsHtml() {
  const meetings = getFilteredMeetings();
  if (state.meetings.length === 0) {
    return `<div style="color:var(--text-muted);text-align:center;padding:var(--space-xl) 0">
      No meetings yet. Sync meetings from the Entries tab or configure in Settings.

  }

  return `<div class="settings-section">
    ${buildInsightsSummaryStats(meetings)}

function attachMeetingsInsightsListeners() {
  document.querySelectorAll('#panel-meetings .line-chart-wrap').forEach(wrap => {
    const tooltip = wrap.querySelector('.line-chart-tooltip');
    if (!tooltip) return;
    wrap.addEventListener('mouseover', (e) => {
      const hit = e.target.closest('.mi-bar-hit') || e.target.closest('.mi-bar');
      if (!hit) return;
      let label = hit.dataset.label;
      if (label && label.length >= 10) {
        const d = new Date(label.substring(0, 10) + 'T12:00:00');
        label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } else if (label && label.length === 7) {
        const d = new Date(label + '-01T12:00:00');
        label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      }
      tooltip.textContent = label + ': ' + hit.dataset.val;
      tooltip.style.opacity = '1';
    });
    wrap.addEventListener('mouseout', () => { tooltip.style.opacity = '0'; });
    wrap.addEventListener('mousemove', (e) => {
      const rect = wrap.getBoundingClientRect();
      tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (e.clientY - rect.top - 28) + 'px';
    });
  });
}

function attachMeetingsListeners() {
  const meetingsGistIdEl = document.getElementById('settingMeetingsGistId');
  if (meetingsGistIdEl) meetingsGistIdEl.addEventListener('blur', (e) => { state.settings.meetingsGistId = e.target.value.trim(); saveState(); });

  const createMeetingsBtn = document.getElementById('createMeetingsGistBtn');
  if (createMeetingsBtn) createMeetingsBtn.addEventListener('click', () => createMeetingsGist());

  const fetchMeetingsBtn = document.getElementById('fetchMeetingsBtn');
  if (fetchMeetingsBtn) fetchMeetingsBtn.addEventListener('click', () => fetchMeetings());

  const fetchMeetingsBtnEntries = document.getElementById('fetchMeetingsBtnEntries');
  if (fetchMeetingsBtnEntries) fetchMeetingsBtnEntries.addEventListener('click', () => fetchMeetings());

  const importMeetingsBtn = document.getElementById('importMeetingsBtn');
  if (importMeetingsBtn) importMeetingsBtn.addEventListener('click', () => showMeetingImport());

  const saveMeetingTypeBtn = document.getElementById('saveMeetingTypeSettingsBtn');
  if (saveMeetingTypeBtn) saveMeetingTypeBtn.addEventListener('click', () => {
    const sysPromptEl = document.getElementById('settingMeetingSystemPrompt');
    if (sysPromptEl) {
      const val = sysPromptEl.value.trim();
      state.settings.meetingSystemPrompt = val || '';
    }
    if (!state.settings.meetingTypeSignals) state.settings.meetingTypeSignals = {};
    if (!state.settings.meetingTypePrompts) state.settings.meetingTypePrompts = {};
    document.querySelectorAll('.meeting-type-signals-input').forEach(el => {
      const typeId = el.dataset.typeId;
      const val = el.value.trim();
      if (val) {
        state.settings.meetingTypeSignals[typeId] = val.split(',').map(s => s.trim()).filter(Boolean);
      } else {
        delete state.settings.meetingTypeSignals[typeId];
      }
    });
    document.querySelectorAll('.meeting-type-prompt-input').forEach(el => {
      const typeId = el.dataset.typeId;
      const val = el.value.trim();
      if (val) {
        state.settings.meetingTypePrompts[typeId] = val;
      } else {
        delete state.settings.meetingTypePrompts[typeId];
      }
    });
    saveState();
    showToast('Meeting type settings saved');
  });

  // Mobile swipe between meeting entries
  if (window.innerWidth <= 600) {
    const cards = document.querySelectorAll('.meeting-card');
    let currentCardIdx = 0;
    const panel = document.getElementById('panel-meetings');
    let touchStartX = 0;
    panel.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    panel.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) < 60) return;
      // Find current visible card
      const scrollTop = window.scrollY;
      const headerHeight = 60;
      cards.forEach((card, i) => {
        if (card.getBoundingClientRect().top < 150) currentCardIdx = i;
      });
      const headerOffset = 56;
      if (dx < -60 && currentCardIdx < cards.length - 1) {
        const y = cards[currentCardIdx + 1].getBoundingClientRect().top + window.scrollY - headerOffset;
        window.scrollTo({ top: y, behavior: 'smooth' });
      } else if (dx > 60 && currentCardIdx > 0) {
        const y = cards[currentCardIdx - 1].getBoundingClientRect().top + window.scrollY - headerOffset;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }
    });
  }
}

}

function connectGoogleCalendar() {
  if (!state.settings.googleClientId) {
    showToast('Enter your OAuth Client ID first');
    return;
  }
  if (typeof google === 'undefined' || !google.accounts) {
    showToast('Google Identity Services library not loaded. Check your network connection.');
    return;
  }
  const statusEl = document.getElementById('gcalStatus');
  if (statusEl) { statusEl.className = 'api-status'; statusEl.textContent = 'Opening consent screen...'; }
  const tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: state.settings.googleClientId,
    scope: 'https://www.googleapis.com/auth/calendar.readonly',
    callback: async (response) => {
      if (response.error) {
        if (statusEl) { statusEl.className = 'api-status invalid'; statusEl.textContent = 'Auth failed: ' + response.error; }
        return;
      }
      googleToken = { access_token: response.access_token };
      // Fetch user email to display
      try {
        const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { 'Authorization': 'Bearer ' + response.access_token }
        });
        if (info.ok) {
          const data = await info.json();
          googleToken.email = data.email;
        }
      } catch (e) { /* email display is optional */ }
      showToast('Google Calendar connected');
      renderSettings();
    }
  });
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function disconnectGoogleCalendar() {
  if (googleToken && googleToken.access_token) {
    google.accounts.oauth2.revoke(googleToken.access_token, () => {});
  }
  googleToken = null;
  showToast('Google Calendar disconnected');
  renderSettings();
}

async function testGoogleCalendar() {
  const resultEl = document.getElementById('gcalTestResult');
  if (!resultEl) return;
  if (!googleToken || !googleToken.access_token) {
    resultEl.innerHTML = '<div class="api-status invalid">Not connected</div>';
    return;
  }
  resultEl.innerHTML = '<div class="api-status">Fetching today\'s events...</div>';
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
  const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).toISOString();
  const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(start)}&timeMax=${encodeURIComponent(end)}&singleEvents=true&orderBy=startTime`;
  try {
    const res = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + googleToken.access_token }
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 403 || res.status === 401) {
        resultEl.innerHTML = `<div class="api-status invalid">Access denied (${res.status}). Your Google Workspace admin may be blocking this app. This means the Calendar pipeline won't work without admin approval.</div>`;
      } else {
        resultEl.innerHTML = `<div class="api-status invalid">Error ${res.status}: ${err.error?.message || 'Unknown error'}</div>`;
      }
      return;
    }
    const data = await res.json();
    const events = data.items || [];
    if (events.length === 0) {
      resultEl.innerHTML = '<div class="api-status valid">Success! No events on your calendar today.</div>';
    } else {
      const list = events.map(e => `<li>${escapeHtml(e.summary || '(no title)')} — ${formatEventTime(e)}</li>`).join('');
      resultEl.innerHTML = `<div class="api-status valid">Success! ${events.length} event${events.length === 1 ? '' : 's'} today:</div><ul style="margin:var(--space-xs) 0 0 var(--space-lg);color:var(--text-secondary);font-size:0.92rem">${list}</ul>`;
    }
  } catch (e) {
    resultEl.innerHTML = `<div class="api-status invalid">Network error: ${e.message}</div>`;
  }
}

function formatEventTime(event) {
  if (event.start?.dateTime) {
    const t = new Date(event.start.dateTime);
    return t.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }
  return 'all day';
}

function attachSettingsListeners() {
  const saveField = (id, key) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('blur', (e) => { state.settings[key] = e.target.value.trim(); saveState(); });
  };

  if (settingsSubTab === 'profile') {
    saveField('settingName', 'name');
    saveField('settingRole', 'role');
    saveField('settingPromotion', 'promotionNotes');
  }

  if (settingsSubTab === 'integrations') {
    saveField('settingBaseUrl', 'baseUrl');
    saveField('settingProjectId', 'projectId');
    saveField('settingSlack', 'slackWebhook');

    const apiKeyEl = document.getElementById('settingApiKey');
    if (apiKeyEl) apiKeyEl.addEventListener('blur', (e) => { state.settings.apiKey = e.target.value.trim(); saveState(); });

    document.querySelectorAll('input[name="model"]').forEach(radio => {
      radio.addEventListener('change', (e) => { state.settings.model = e.target.value; saveState(); });
    });

    const ghTokenEl = document.getElementById('settingGhToken');
    if (ghTokenEl) ghTokenEl.addEventListener('blur', (e) => { state.settings.ghToken = e.target.value.trim(); saveState(); });
    const gistIdEl = document.getElementById('settingGistId');
    if (gistIdEl) gistIdEl.addEventListener('blur', (e) => { state.settings.ghGistId = e.target.value.trim(); saveState(); });

    saveField('settingGoogleClientId', 'googleClientId');

    const gcalBtn = document.getElementById('connectGcalBtn');
    if (gcalBtn) gcalBtn.addEventListener('click', () => connectGoogleCalendar());
  }

  if (settingsSubTab === 'meetings') {

function restoreBackup() {
  const backup = localStorage.getItem('workos_state_backup');
  if (!backup) { showToast('No backup available'); return; }
  try {
    const parsed = JSON.parse(backup);
    const entryCount = (parsed.entries || []).length;
    const latestDate = (parsed.entries || []).map(e => e.date).sort().reverse()[0] || 'unknown';
    if (!confirm('Restore from backup? (' + entryCount + ' entries, latest: ' + latestDate + ')\n\nThis will replace your current data.')) return;
    localStorage.setItem('workos_state', backup);
    location.reload();
  } catch (e) {
    showToast('Backup is corrupted');
  }
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    file.text().then(text => {
      try {
        const imported = JSON.parse(text);
        if (!imported.entries && !imported.settings) {
          showToast('Invalid WorkOS export file');
          return;
        }
        if (!confirm('This will replace all your current data. Continue?')) return;
        localStorage.setItem('workos_state', text);
        location.reload();
      } catch (err) {
        showToast('Failed to parse import file');
      }
    });
  };
  input.click();
}

function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `workos-export-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported');
}

async function testConnection() {
  const status = document.getElementById('apiStatus');
  if (!state.settings.baseUrl) {
    status.className = 'api-status invalid';
    status.textContent = 'Set a Gateway Base URL first.';
    return;
  }
  status.className = 'api-status checking';
  status.textContent = 'Checking...';
  try {
    await callClaude('You are helpful.', 'Say hi.', 5);
    status.className = 'api-status valid';
    status.textContent = '✓ Connected';
  } catch (err) {
    if (err.message === 'invalid_key') {
      status.className = 'api-status invalid';
      status.textContent = '✕ Auth failed — check credentials';
    } else {
      status.className = 'api-status invalid';
      status.textContent = '✕ Connection failed — check URL and try again';
    }
  }
}

/* ========================================
   Utilities
   ======================================== */
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatBulletList(text) {
  if (!text) return '';
  const lines = text.split('\n').filter(l => l.trim());
  const hasBullets = lines.some(l => /^\s*[-•*]\s/.test(l) || /^\s*\d+\.\s/.test(l));
  if (!hasBullets) {
    // No bullets — render as paragraphs with inline markdown
    return lines.map(l => {
      const stripped = l.trim().replace(/^#{1,4}\s+/, '');
      return `<p>${formatInlineMarkdown(stripped)}</p>`;
    }).join('');
  }
  let html = '';
  let inList = false;
  for (const line of lines) {
    const trimmed = line.trim();
    if (/^[-•*]\s/.test(trimmed) || /^\d+\.\s/.test(trimmed)) {
      if (!inList) { html += '<ul class="history-bullets">'; inList = true; }
      const content = trimmed.replace(/^[-•*]\s+/, '').replace(/^\d+\.\s+/, '');
      html += `<li>${formatInlineMarkdown(content)}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      const stripped = trimmed.replace(/^#{1,4}\s+/, '');
      html += `<p>${formatInlineMarkdown(stripped)}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function formatCoachingNote(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  let inList = false;
  for (const line of lines) {
    const trimmed = line.trim();
    if (/^[-•*]\s/.test(trimmed)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${formatInlineMarkdown(trimmed.replace(/^[-•*]\s+/, ''))}</li>`;
    } else if (/^\d+\.\s/.test(trimmed)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${formatInlineMarkdown(trimmed.replace(/^\d+\.\s+/, ''))}</li>`;
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (!trimmed) continue;
      // Strip markdown headers
      const stripped = trimmed.replace(/^#{1,4}\s+/, '');
      html += `<p>${formatInlineMarkdown(stripped)}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function formatInlineMarkdown(text) {
  return escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/__(.+?)__/g, '<strong>$1</strong>')
    .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:var(--bg-primary);padding:1px 4px;border-radius:2px;font-size:0.9em">$1</code>')
    .replace(/&gt;\s?(.+)/g, '<span style="border-left:2px solid var(--border-default);padding-left:var(--space-sm);color:var(--text-muted)">$1</span>');
}

function formatBriefText(text) {
  if (!text) return '<span style="color:var(--text-muted)">No content</span>';
  return formatBulletList(text);
}

const PIE_COLORS = [
  'var(--accent-600)', 'var(--accent-400)', 'var(--accent-800)',
  'var(--accent-300)', 'var(--accent-700)', 'var(--accent-500)',
  'var(--accent-200)', 'var(--accent-900)', 'var(--accent-100)', 'var(--accent-50)'
];

function buildComponentPieChart(componentCounts) {
  const entries = Object.entries(componentCounts).sort((a, b) => b[1] - a[1]);
  const total = entries.reduce((s, e) => s + e[1], 0);
  const r = 175;
  const cx = 200, cy = 200;
  let cumAngle = -Math.PI / 2;
  const slices = entries.map(([name, count], i) => {
    const angle = (count / total) * 2 * Math.PI;
    const startX = cx + r * Math.cos(cumAngle);
    const startY = cy + r * Math.sin(cumAngle);
    cumAngle += angle;
    const endX = cx + r * Math.cos(cumAngle);
    const endY = cy + r * Math.sin(cumAngle);
    const largeArc = angle > Math.PI ? 1 : 0;
    const color = PIE_COLORS[i % PIE_COLORS.length];
    // For a single item, draw a full circle
    if (entries.length === 1) {
      return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" class="pie-slice" data-name="${escapeHtml(name)}" data-count="${count}"/>`;
    }
    return `<path d="M${cx},${cy} L${startX},${startY} A${r},${r} 0 ${largeArc} 1 ${endX},${endY} Z" fill="${color}" class="pie-slice" data-name="${escapeHtml(name)}" data-count="${count}"/>`;
  });

  const legend = entries.slice(0, 10).map(([name, count]) =>
    `<div class="pie-legend-item" onclick="filterContribsByComponent('${escapeHtml(name).replace(/'/g, "\\'")}')">
      <span class="pie-legend-name">${escapeHtml(name)}</span>
      <span class="pie-legend-count">${count}</span>
    </div>`
  ).join('');

  return `<div class="pie-chart-row">
    <div class="pie-chart-wrap">
      <svg viewBox="0 0 400 400" width="400" height="400">${slices.join('')}</svg>
      <div class="pie-tooltip" id="pieTooltip"></div>
    </div>
    <div class="pie-legend">
      <div class="pie-legend-header">Top 10</div>
      ${legend}
    </div>
  </div>`;
}

function buildMonthLineChart(monthCounts) {
  const entries = Object.entries(monthCounts)
    .filter(([m]) => m !== 'unknown')
    .sort((a, b) => a[0].localeCompare(b[0]));
  if (entries.length < 2) return '';

  const maxCount = Math.max(...entries.map(e => e[1]));
  const padTop = 24, padBottom = 32, padLeft = 32, padRight = 16;
  const h = 160;
  const w = 800; // will scale via viewBox
  const chartW = w - padLeft - padRight;
  const chartH = h - padTop - padBottom;

  const points = entries.map(([month, count], i) => {
    const x = padLeft + (i / (entries.length - 1)) * chartW;
    const y = padTop + chartH - (count / maxCount) * chartH;
    return { x, y, month, count };
  });

  const polyline = points.map(p => `${p.x},${p.y}`).join(' ');

  // Fill area
  const areaPoints = `${padLeft},${padTop + chartH} ${polyline} ${points[points.length - 1].x},${padTop + chartH}`;

  // Y-axis labels
  const yLabels = [Math.ceil(maxCount / 2), maxCount].map(v => {
    const y = padTop + chartH - (v / maxCount) * chartH;
    return `<text x="${padLeft - 8}" y="${y + 4}" text-anchor="end" fill="var(--text-muted)" font-size="12" font-weight="500" font-family="var(--font-family)">${v}</text>
      <line x1="${padLeft}" y1="${y}" x2="${w - padRight}" y2="${y}" stroke="var(--text-muted)" stroke-width="0.75" stroke-dasharray="4 2"/>`;
  }).join('');

  // X-axis labels
  const xLabels = points.map(p => {
    const d = new Date(p.month + '-01T12:00:00');
    const label = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
    return `<text x="${p.x}" y="${h - 8}" text-anchor="middle" fill="var(--text-muted)" font-size="12" font-weight="500" font-family="var(--font-family)">${label}</text>`;
  }).join('');

  // Dots and hover targets
  const dots = points.map(p =>
    `<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--accent-600)" class="line-chart-dot" data-month="${p.month}" data-count="${p.count}"/>
     <circle cx="${p.x}" cy="${p.y}" r="16" fill="transparent" class="line-chart-hit" data-month="${p.month}" data-count="${p.count}"/>`
  ).join('');

  return `<div class="line-chart-wrap">
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" width="100%">
      ${yLabels}
      <line x1="${padLeft}" y1="${padTop + chartH}" x2="${w - padRight}" y2="${padTop + chartH}" stroke="var(--text-muted)" stroke-width="0.75"/>
      <polygon points="${areaPoints}" fill="var(--accent-100)" opacity="0.5"/>
      <polyline points="${polyline}" fill="none" stroke="var(--accent-600)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      ${xLabels}
    </svg>
    <div class="line-chart-tooltip" id="lineChartTooltip"></div>
  </div>`;
}

function initLineChartTooltip() {
  const wrap = document.querySelector('.line-chart-wrap');
  if (!wrap) return;
  const tooltip = document.getElementById('lineChartTooltip');
  wrap.addEventListener('mouseover', (e) => {
    const hit = e.target.closest('.line-chart-hit') || e.target.closest('.line-chart-dot');
    if (!hit || !tooltip) return;
    const d = new Date(hit.dataset.month + '-01T12:00:00');
    const label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    tooltip.textContent = label + ': ' + hit.dataset.count;
    tooltip.style.opacity = '1';
  });
  wrap.addEventListener('mouseout', () => {
    if (tooltip) tooltip.style.opacity = '0';
  });
  wrap.addEventListener('mousemove', (e) => {
    if (!tooltip) return;
    const rect = wrap.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 28) + 'px';
  });
}

function initPieTooltip() {
  const wrap = document.querySelector('.pie-chart-wrap');
  if (!wrap) return;
  const tooltip = document.getElementById('pieTooltip');
  wrap.addEventListener('mouseover', (e) => {
    const slice = e.target.closest('.pie-slice');
    if (!slice || !tooltip) return;
    const name = slice.dataset.name;
    const count = slice.dataset.count;
    tooltip.innerHTML = `<strong>${escapeHtml(name)}</strong> · ${count}`;
    tooltip.style.opacity = '1';
    tooltip.style.pointerEvents = 'auto';
    slice.style.opacity = '0.75';
  });
  wrap.addEventListener('mouseout', (e) => {
    const slice = e.target.closest('.pie-slice');
    if (slice) slice.style.opacity = '1';
    if (tooltip) { tooltip.style.opacity = '0'; tooltip.style.pointerEvents = 'none'; }
  });
  wrap.addEventListener('mousemove', (e) => {
    if (!tooltip) return;
    const rect = wrap.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 8) + 'px';
  });
  wrap.addEventListener('click', (e) => {
    const slice = e.target.closest('.pie-slice');
    if (!slice) return;
    filterContribsByComponent(slice.dataset.name);
  });
}

function filterContribsByComponent(name) {
  contribFilterComponent = contribFilterComponent === name ? '' : name;
  contribFilterCat = '';
  renderContributions();
}

function getDateFilteredContribs() {
  let contribs = state.contributions;
  if (contribDateFrom) {
    contribs = contribs.filter(c => c.date && c.date !== 'unknown' && c.date >= contribDateFrom);
  }
  if (contribDateTo) {
    contribs = contribs.filter(c => c.date && c.date !== 'unknown' && c.date <= contribDateTo);
  }
  return contribs;
}

function renderContribDashboard(panel) {
  if (state.contributions.length === 0) {
    panel.innerHTML = `
      <div class="empty-state">
        No contributions tracked yet.
        <div class="empty-state-secondary">Import your Slack messages from Hawkins design system channels to track your contributions.</div>
        <div style="margin-top:var(--space-xl)">
          <button class="btn-secondary btn-accent" onclick="openContribImport()">Import from Slack</button>
        </div>
      </div>`;
    return;
  }

  const contribs = getDateFilteredContribs();

  // Stats
  const catCounts = {};
  const componentCounts = {};
  const monthCounts = {};
  for (const c of contribs) {
    catCounts[c.category] = (catCounts[c.category] || 0) + 1;
    if (c.component) componentCounts[c.component] = (componentCounts[c.component] || 0) + 1;
    const month = c.date && c.date !== 'unknown' ? c.date.substring(0, 7) : 'unknown';
    monthCounts[month] = (monthCounts[month] || 0) + 1;
  }

  // Filtered items for the entry list
  let filtered = [];
  let filterLabel = '';
  if (contribFilterComponent) {
    filtered = contribs.filter(c => c.component === contribFilterComponent);
    filterLabel = contribFilterComponent + ' · ' + filtered.length + ' contribution' + (filtered.length !== 1 ? 's' : '');
  } else if (contribFilterCat) {
    filtered = contribs.filter(c => c.category === contribFilterCat);
    filterLabel = getCategoryLabel(contribFilterCat) + ' · ' + filtered.length + ' contribution' + (filtered.length !== 1 ? 's' : '');
  }

  // Compute filtered stats for pie chart and line chart when a category is selected
  const chartSource = filtered.length > 0 ? filtered : contribs;
  const filteredComponentCounts = {};
  const filteredMonthCounts = {};
  for (const c of chartSource) {
    if (c.component) filteredComponentCounts[c.component] = (filteredComponentCounts[c.component] || 0) + 1;
    const month = c.date && c.date !== 'unknown' ? c.date.substring(0, 7) : 'unknown';
    filteredMonthCounts[month] = (filteredMonthCounts[month] || 0) + 1;
  }

  // Default date range
  const allDates = state.contributions.filter(c => c.date && c.date !== 'unknown').map(c => c.date).sort();
  const defaultFromDate = allDates.length ? allDates[0] : todayStr();
  const defaultToDate = todayStr();

  // Group by category for the entry list
  const grouped = {};
  for (const c of filtered) {
    if (!grouped[c.category]) grouped[c.category] = [];
    grouped[c.category].push(c);
  }

  const hasDateFilter = contribDateFrom || contribDateTo;

  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-xl);gap:var(--space-md)">
      <div style="display:flex;align-items:center;gap:var(--space-md);min-width:0">
        <span class="contrib-total-badge">${contribs.length}</span>
        <div>
          <div style="font-size:15px;font-weight:500">Contributions for Hawkins Design System</div>
          ${hasDateFilter ? '<div style="font-size:11px;color:var(--text-muted)">filtered</div>' : ''}
        </div>
      </div>
      <button class="btn-secondary btn-accent" onclick="openContribImport()"><span class="hide-mobile">Import from Slack</span><span class="show-mobile">Import</span></button>
    </div>

    <div class="contrib-stats">
      <div class="contrib-date-filter">
        <label>From</label>
        <input type="date" id="contribDateFrom" value="${contribDateFrom || defaultFromDate}" onchange="updateContribDateFilter()">
        <label>To</label>
        <input type="date" id="contribDateTo" value="${contribDateTo || defaultToDate}" onchange="updateContribDateFilter()">
        ${hasDateFilter ? '<button class="btn-ghost" onclick="clearContribDateFilter()" style="font-size:12px">Clear</button>' : ''}
      </div>
    </div>

    <div class="contrib-cat-grid">
      ${CONTRIB_CATEGORIES.filter(c => catCounts[c.id]).map(c =>
        `<div class="contrib-cat-card${contribFilterCat === c.id ? ' active' : ''}" data-cat="${c.id}" onclick="filterContribs('${c.id}')">
          <div class="contrib-cat-card-label">${c.label}</div>
          <div class="contrib-cat-card-count">${catCounts[c.id]}</div>
        </div>`
      ).join('')}
    </div>

    ${Object.keys(filteredComponentCounts).length > 0 ? `
    <div class="contrib-section">
      <div class="contrib-section-label" onclick="toggleContribSection(this)">
        <span class="cta-icon">▾</span>
        Components mentioned${contribFilterCat ? ' — ' + getCategoryLabel(contribFilterCat) : ''}
      </div>
      <div class="contrib-section-body" id="contribPieChart">${buildComponentPieChart(filteredComponentCounts)}</div>
    </div>` : ''}

    ${Object.entries(filteredMonthCounts).filter(([m]) => m !== 'unknown').length >= 2 ? `
    <div class="contrib-section">
      <div class="contrib-section-label" onclick="toggleContribSection(this)">
        <span class="cta-icon">▾</span>
        Activity over time${contribFilterCat ? ' — ' + getCategoryLabel(contribFilterCat) : ''}
      </div>
      <div class="contrib-section-body">${buildMonthLineChart(filteredMonthCounts)}</div>
    </div>` : ''}

    ${filtered.length > 0 ? `
      <div class="contrib-section-label" style="justify-content:space-between">
        <span>Contributions${contribFilterCat ? ' — ' + getCategoryLabel(contribFilterCat) : (contribFilterComponent ? ' — ' + contribFilterComponent : '')}</span>
        <button class="btn-ghost" onclick="clearContribFilters()" style="font-size:12px">Clear filter</button>
      </div>
      ${Object.entries(grouped).sort((a, b) => b[1].length - a[1].length).map(([cat, items]) => `
        <div class="contrib-section">
          ${items.sort((a, b) => (b.date || '').localeCompare(a.date || '')).map(c => `
            <div class="contrib-card" onclick="openContribDetail('${c.id}')">
              <div class="contrib-card-header">
                <span class="contrib-card-date">${c.date && c.date !== 'unknown' ? formatDateWithYear(c.date) : 'Unknown date'}</span>
                ${c.component ? `<span class="contrib-card-component">${escapeHtml(c.component)}</span>` : ''}
              </div>
              <div class="contrib-card-text">${escapeHtml(c.text)}</div>
              ${c.channel ? `<div class="contrib-card-footer"><span style="font-size:11px;color:var(--text-muted)">${escapeHtml(c.channel)}</span></div>` : ''}
            </div>
          `).join('')}
        </div>
      `).join('')}
    ` : ''}
  `;

  setTimeout(() => { initPieTooltip(); initLineChartTooltip(); }, 0);
}

function clearContribFilters() {

      </div>
