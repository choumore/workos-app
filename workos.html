    // Merge: use remote data but keep local-only settings (tokens, local server config)
    const localOnly = {
      ghToken: state.settings.ghToken,
      ghGistId: state.settings.ghGistId,
      meetingsGistId: state.settings.meetingsGistId,
      apiKey: state.settings.apiKey,
      slackToken: state.settings.slackToken,
      googleClientId: state.settings.googleClientId,
      mempalaceServerUrl: state.settings.mempalaceServerUrl,
      obsidianVaultPath: state.settings.obsidianVaultPath,
      obsidianExportEnabled: state.settings.obsidianExportEnabled,
    };
    const localFeatures = { ...state.settings.features };
    state.settings = { ...state.settings, ...remote.settings };
    Object.assign(state.settings, localOnly);
    // Restore features with defaults (remote may have subset without newer feature flags)
    state.settings.features = { contributions: true, visibility: true, meetings: true, todos: true, ...localFeatures, ...(remote.settings?.features || {}) };
    // Merge entries by date (latest-modified wins, keep local-only)
    const premergeEntryCount = (state.entries || []).length;
    const premergeEntryDates = new Set((state.entries || []).map(e => e.date));
    if (remote.entries) {
      const localByDate = new Map((state.entries || []).map(e => [e.date, e]));
      for (const re of remote.entries) {
        const local = localByDate.get(re.date);
        if (!local) {
          localByDate.set(re.date, re);
        } else {
          const localTs = local.updatedAt || local.date || '';
          const remoteTs = re.updatedAt || re.date || '';
          if (remoteTs > localTs) localByDate.set(re.date, re);
        }
      }
      state.entries = [...localByDate.values()];
    }
    // Safety: detect entry loss after merge
    const postmergeEntryDates = new Set((state.entries || []).map(e => e.date));
    const lostDates = [...premergeEntryDates].filter(d => !postmergeEntryDates.has(d));
    if (lostDates.length > 0) {
      console.error('[SYNC SAFETY] Entries lost during merge for dates:', lostDates);
      showToast('⚠ Sync warning: ' + lostDates.length + ' entries may have been lost. Check Settings → Data → Restore Backup.');
    }
    // Merge wins by description+sourceBriefId (keep local-only)
    if (remote.wins) {
      const winKey = w => (w.sourceBriefId || '') + '::' + (w.description || '');
      const localByKey = new Map((state.wins || []).map(w => [winKey(w), w]));
      for (const rw of remote.wins) {
        const k = winKey(rw);
        if (!localByKey.has(k)) localByKey.set(k, rw);
        // If both exist, keep the one with a confirmed/dismissed status over suggested
        else {
          const local = localByKey.get(k);
          if (rw.status !== 'suggested' && local.status === 'suggested') localByKey.set(k, rw);
        }
      }
      state.wins = [...localByKey.values()];
    }
    // Merge weeklyBriefs by weekOf (keep local-only, latest wins by generatedAt)
    if (remote.weeklyBriefs) {
      const localByWeek = new Map((state.weeklyBriefs || []).map(b => [b.weekOf, b]));
      for (const rb of remote.weeklyBriefs) {
        const local = localByWeek.get(rb.weekOf);
        if (!local) {
          localByWeek.set(rb.weekOf, rb);
        } else {
          if ((rb.generatedAt || '') > (local.generatedAt || '')) localByWeek.set(rb.weekOf, rb);
        }
      }
      state.weeklyBriefs = [...localByWeek.values()];
    }
    state.intentions = { ...state.intentions, ...(remote.intentions || {}) };
    state.dayPriorities = { ...state.dayPriorities, ...(remote.dayPriorities || {}) };
    state.dayPlanChecked = { ...state.dayPlanChecked, ...(remote.dayPlanChecked || {}) };
    // Merge contributions by id (keep local-only)
    if (remote.contributions) {
      const localById = new Map((state.contributions || []).map(c => [c.id, c]));
      for (const rc of remote.contributions) { localById.set(rc.id, rc); }
      state.contributions = [...localById.values()];
    }
    // Merge visibilityActivities by id (keep local-only)
    if (remote.visibilityActivities) {
      const localById = new Map((state.visibilityActivities || []).map(a => [String(a.id), a]));
      for (const ra of remote.visibilityActivities) { localById.set(String(ra.id), ra); }
      state.visibilityActivities = [...localById.values()];
    }
    // Merge meeting preps by ID: remote wins, but keep local-only records
    if (remote.meetingPreps) {
      const localPrepsById = new Map((state.meetingPreps || []).map(mp => [mp.id, mp]));
      for (const rmp of remote.meetingPreps) {
        localPrepsById.set(rmp.id, rmp);
      }
      state.meetingPreps = [...localPrepsById.values()];
    }
    // Merge todos: latest-wins by ID (compare timestamps to avoid overwriting local triage)
    if (remote.todos) {
      const localTodosById = new Map((state.todos || []).map(t => [t.id, t]));
      for (const rt of remote.todos) {
        const local = localTodosById.get(rt.id);
        if (!local) {
          localTodosById.set(rt.id, rt);
        } else {
          // Keep whichever was modified more recently
          const localTs = local.triagedAt || local.completedAt || local.createdAt || '';
          const remoteTs = rt.triagedAt || rt.completedAt || rt.createdAt || '';
          if (remoteTs >= localTs) {
            localTodosById.set(rt.id, rt);
          }
        }
      }
      state.todos = [...localTodosById.values()];
    }
    // Vectors: remote wins (user edits on one device should propagate)
    if (remote.vectors) {
      state.vectors = remote.vectors;
    }
    state.dataVersion = Math.max(state.dataVersion || 1, remote.dataVersion || 1);
    // Coaching state: latest wins
    if (remote.coachingState && remote.coachingState.lastUpdated > (state.coachingState?.lastUpdated || '')) {
      state.coachingState = remote.coachingState;
    }
    // Reflections: merge by key, remote wins
    if (remote.monthlyReflections) state.monthlyReflections = { ...state.monthlyReflections, ...remote.monthlyReflections };
    if (remote.quarterlyReflections) state.quarterlyReflections = { ...state.quarterlyReflections, ...remote.quarterlyReflections };
    // Merge pendingVisibility by ID
    if (remote.pendingVisibility) {
      const localPendingById = new Map((state.pendingVisibility || []).map(p => [p.id, p]));
      for (const rp of remote.pendingVisibility) {
        localPendingById.set(rp.id, rp);
      }
      state.pendingVisibility = [...localPendingById.values()];
    }
    // Merge dismissedVisibilityKeys: union
    state.dismissedVisibilityKeys = [...new Set([
      ...(state.dismissedVisibilityKeys || []),
      ...(remote.dismissedVisibilityKeys || [])
    ])];
    // Merge Slack synced timestamps: union
    state.slackSyncedTs = [...new Set([
      ...(state.slackSyncedTs || []),
      ...(remote.slackSyncedTs || [])
    ])];
    // Merge deleted meeting IDs from both local and remote
    const remoteDeleted = remote.deletedMeetingIds || [];
    const localDeleted = state.deletedMeetingIds || [];
    state.deletedMeetingIds = [...new Set([...localDeleted, ...remoteDeleted])];
    // Merge meetings: remote has metadata (no transcripts), local may have transcripts
    if (remote.meetings) {
      const localById = new Map((state.meetings || []).map(m => [m.id, m]));
      for (const rm of remote.meetings) {
        const local = localById.get(rm.id);
        if (local) {
          // Merge: keep local transcript, keep user-edited title, keep local insights/tags
          const localTitle = local.title;
          const localInsights = local.insights;
          const localInsightVectorTags = local.insightVectorTags;
          const localInsightExcerpts = local.insightExcerpts;
          const localInsightReasons = local.insightReasons;
          Object.assign(local, { ...rm, transcript: local.transcript || '' });
          // Preserve user-edited title (if local was changed from default)
          if (localTitle && localTitle !== 'Meeting Transcription' && rm.title === 'Meeting Transcription') {
            local.title = localTitle;
          }
          // Preserve local insights and AI tags if remote doesn't have them
          if (localInsights && !rm.insights) local.insights = localInsights;
          if (localInsightVectorTags) local.insightVectorTags = localInsightVectorTags;
          if (localInsightExcerpts) local.insightExcerpts = localInsightExcerpts;
          if (localInsightReasons) local.insightReasons = localInsightReasons;
        } else {
          state.meetings.push(rm);
        }
      }
      state.meetings.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    }
    // Remove meetings that were previously deleted
    const deletedSet = new Set(state.deletedMeetingIds);
    state.meetings = state.meetings.filter(m => !deletedSet.has(m.id));
    saveState();
    // Force immediate push so remote matches local after merge
    syncPush();
    return 'ok';
  } catch (e) {
    console.error('Sync pull failed:', e);
    // Restore pre-sync snapshot if merge failed
    try {
      const preSyncData = localStorage.getItem('workos_state_pre_sync');
      if (preSyncData) {
        localStorage.setItem('workos_state', preSyncData);
        const restored = JSON.parse(preSyncData);
        Object.assign(state, restored);
      }
    } catch (_) {}
    return 'error';
  }
}

function updateSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (status === 'synced') {
    el.className = 'api-status valid';
    el.textContent = '✓ Synced — ' + new Date().toLocaleTimeString();
  } else if (status === 'syncing') {
    el.className = 'api-status checking';
    el.textContent = 'Syncing...';
  } else if (status === 'error') {
    el.className = 'api-status invalid';
    el.textContent = '✕ Sync failed — check token';
  }
}

async function manualSync() {
  // Force-read inputs in case blur didn't fire (iOS Safari)
  const tokenEl = document.getElementById('settingGhToken');
  const gistEl = document.getElementById('settingGistId');
  if (tokenEl) { state.settings.ghToken = tokenEl.value.trim(); }
  if (gistEl) { state.settings.ghGistId = gistEl.value.trim(); }
  localStorage.setItem('workos_state', JSON.stringify(state));

  if (!state.settings.ghToken) {
    updateSyncStatus('error');
    showToast('Enter a GitHub token first');
    return;
  }

  updateSyncStatus('syncing');
  const result = await syncPull();
  if (result === 'ok') {
    updateSyncStatus('synced');
    renderLogTab();
    renderSettings();
    showToast('Data synced from cloud');
  } else if (result === 'auth_error') {
    updateSyncStatus('error');
    showToast('Auth failed — token may be revoked or missing gist scope');
  } else if (result === 'not_found' || result === 'no_config' || result === 'empty') {
    await syncPush();
    showToast('Data pushed to cloud');
  } else {
    await syncPush();
    showToast('Data pushed to cloud');
  }
}

const DEFAULT_MEETING_SYSTEM_PROMPT = `You are a career intelligence analyst embedded in a personal work journal. The user is a Senior Product Designer working toward promotion.

Your job: analyze meeting transcripts to extract career-relevant intelligence. Be specific, quote the transcript when possible, never fabricate.

Rules:
- Classify based on title, participants, and transcript content
- Focus extraction on what matters for the user's career progression
- Be specific — "You pushed back on the timeline" not "You participated"
- Quote the transcript when it strengthens a point
- Never fabricate quotes or attribute statements without evidence
- If the transcript is thin, say so — don't pad with generic observations

Return ONLY valid JSON, no markdown fences.`;

function getMeetingSystemPrompt() {
  let prompt = state.settings.meetingSystemPrompt || DEFAULT_MEETING_SYSTEM_PROMPT;
  const allStakeholders = (state.meetingPreps || []).flatMap(p => p.stakeholders || []);
  if (allStakeholders.length > 0) {
    const seen = new Set();
    const unique = allStakeholders.filter(s => {
      const key = s.name.trim().toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
    prompt += '\n\nKey people:\n' + unique.map(s => `- ${s.name}: ${s.role}`).join('\n');
  }
  return prompt;
}

function getMeetingTypeSignals(typeId) {
  const overrides = state.settings.meetingTypeSignals || {};
  if (overrides[typeId] !== undefined) return overrides[typeId];
  return MEETING_TYPES[typeId]?.signals || [];
}

function getMeetingTypePrompt(typeId) {
  const overrides = state.settings.meetingTypePrompts || {};
  if (overrides[typeId] !== undefined) return overrides[typeId];
  return MEETING_TYPES[typeId]?.extractionPrompt || '';
}

function parseMeetingJson(raw) {
  const cleaned = raw.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  // Try complete JSON first
  const fullMatch = cleaned.match(/\{[\s\S]*\}/);
  if (fullMatch) {
    try { return JSON.parse(fullMatch[0]); } catch (_) {}
  }
  // Truncated: find opening { and attempt repair
  const start = cleaned.indexOf('{');
  if (start === -1) throw new Error('no_json');
  let truncated = cleaned.slice(start);
  // Close any open strings, arrays, objects
  let opens = 0, inStr = false, escape = false;
  for (let i = 0; i < truncated.length; i++) {
    const c = truncated[i];
    if (escape) { escape = false; continue; }
    if (c === '\\') { escape = true; continue; }
    if (c === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (c === '{' || c === '[') opens++;
    if (c === '}' || c === ']') opens--;
  }
  if (inStr) truncated += '"';
  // Strip trailing partial key/value
  truncated = truncated.replace(/,\s*"[^"]*"?\s*:?\s*"?[^"{}[\]]*$/, '');
  truncated = truncated.replace(/,\s*$/, '');
  // Close open brackets
  const stack = [];
  inStr = false; escape = false;
  for (let i = 0; i < truncated.length; i++) {
    const c = truncated[i];
    if (escape) { escape = false; continue; }
    if (c === '\\') { escape = true; continue; }
    if (c === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (c === '{') stack.push('}');
    else if (c === '[') stack.push(']');
    else if (c === '}' || c === ']') stack.pop();
  }
  truncated += stack.reverse().join('');
  return JSON.parse(truncated);
}

function buildMeetingSystemPrompt() {

   ======================================== */
async function createMeetingsGist() {
  if (!state.settings.ghToken) {
    showToast('Set up a GitHub token in Cloud Sync first');
    return;
  }
  const statusEl = document.getElementById('meetingSyncStatus');
  if (statusEl) { statusEl.className = 'api-status checking'; statusEl.textContent = 'Creating gist...'; }
  try {
    const res = await fetch('https://api.github.com/gists', {
      method: 'POST',
      headers: {
        'Authorization': 'token ' + state.settings.ghToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        description: 'WorkOS Meeting Transcripts (Tactiq → Zapier)',
        public: false,
        files: { 'README.md': { content: 'This gist stores meeting transcripts synced from Tactiq via Zapier. Each meeting is a separate file (meeting-*.json).' } }
      })
    });
    if (!res.ok) throw new Error('Failed to create gist: ' + res.status);
    const data = await res.json();
    state.settings.meetingsGistId = data.id;
    saveState();
    if (statusEl) { statusEl.className = 'api-status valid'; statusEl.textContent = 'Gist created'; }
    showToast('Meetings Gist created');
    renderSettings();
  } catch (e) {
    console.error('Create meetings gist failed:', e);
    if (statusEl) { statusEl.className = 'api-status invalid'; statusEl.textContent = 'Failed — check token'; }
    showToast('Failed to create meetings gist');
  }
}

async function fetchMeetings() {
  if (!state.settings.ghToken || !state.settings.meetingsGistId) {
    showToast('Set up meetings gist first');
    return;
  }
  const statusEl = document.getElementById('meetingSyncStatus');
  if (statusEl) { statusEl.className = 'api-status checking'; statusEl.textContent = 'Fetching meetings...'; }
  try {
    const res = await fetch('https://api.github.com/gists/' + state.settings.meetingsGistId, {
      headers: { 'Authorization': 'token ' + state.settings.ghToken }
    });
    if (!res.ok) throw new Error('Fetch failed: ' + res.status);
    const data = await res.json();
    const existingIds = new Set(state.meetings.map(m => m.id));
    const newMeetings = [];
    for (const [filename, file] of Object.entries(data.files)) {
      if (!filename.startsWith('meeting-') || !filename.endsWith('.json')) continue;
      try {
        const meeting = JSON.parse(file.content);
        if (!meeting.id) continue;
        if ((state.deletedMeetingIds || []).includes(meeting.id)) continue;
        // Dedup: skip if we already have a meeting with the same title + date (Zapier can fire twice with different IDs)
        const meetingDateStr = (meeting.date || '').substring(0, 10);
        const meetingTitleNorm = (meeting.title || '').trim().toLowerCase();
        const isDupeByContent = meetingDateStr && meetingTitleNorm && state.meetings.some(m =>
          m.id !== meeting.id &&
          (m.date || '').substring(0, 10) === meetingDateStr &&
          (m.title || '').trim().toLowerCase() === meetingTitleNorm
        );
        if (isDupeByContent) {
          // Still restore transcript/link on the existing copy if needed
          const existing = state.meetings.find(m =>
            (m.date || '').substring(0, 10) === meetingDateStr &&
            (m.title || '').trim().toLowerCase() === meetingTitleNorm
          );
          if (existing && !existing.transcript && meeting.transcript) existing.transcript = meeting.transcript;
          if (existing && !existing.link && meeting.link) existing.link = meeting.link;
          continue;
        }
        if (!existingIds.has(meeting.id)) {
          state.meetings.push(meeting);
          existingIds.add(meeting.id);
          newMeetings.push(meeting);
        } else {
          // Restore transcript if local copy lost it (stripped from localStorage)
          const local = state.meetings.find(m => m.id === meeting.id);
          if (local && !local.transcript && meeting.transcript) {
            local.transcript = meeting.transcript;
          }
          if (local && !local.link && meeting.link) {
            local.link = meeting.link;
          }
        }
      } catch (e) { console.warn('Skipping malformed meeting file:', filename); }
    }
    state.meetings.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    saveState();
    renderSettings();
    // Apply remembered type overrides for recurring meetings
    const overrides = state.settings.meetingTypeOverrides || {};
    const preTyped = [];
    newMeetings.forEach(m => {
      if (!m.type && m.title) {
        const normTitle = m.title.trim().toLowerCase();
        if (overrides[normTitle]) {
          m.type = overrides[normTitle];
          m.typeConfidence = 1.0;
          if (m.transcript && !m.summary) preTyped.push(m);
        }
      }
    });
    // Meeting Intelligence: classify + extract career-relevant data
    const toAnalyze = newMeetings.filter(m => m.transcript && !m.type);
    if (toAnalyze.length > 0 && state.settings.baseUrl) {
      if (statusEl) { statusEl.className = 'api-status checking'; statusEl.textContent = `Analyzing ${toAnalyze.length} meeting${toAnalyze.length === 1 ? '' : 's'}...`; }
      for (let i = 0; i < toAnalyze.length; i++) {
        const meeting = toAnalyze[i];
        if (statusEl && toAnalyze.length > 1) { statusEl.textContent = `Analyzing meeting ${i + 1}/${toAnalyze.length}...`; }
        try {
          const result = await callClaude(
            buildMeetingSystemPrompt(),
            buildMeetingIntelligencePrompt(meeting),
            2000,
            'Meeting Intelligence'
          );
          const parsed = parseMeetingJson(result);
          meeting.type = parsed.type && MEETING_TYPES[parsed.type] ? parsed.type : 'other';
          meeting.typeConfidence = parsed.confidence || 0;
          meeting.summary = parsed.summary || '';
          meeting.actionItems = parsed.actionItems || '';
          meeting.insights = parsed.insights || {};
          parseActionItemsToTodos(meeting);
          detectVisibilityFromMeeting(meeting);
        } catch (e) {
          console.warn('Intelligence extraction failed for meeting:', meeting.id, e);
          // Fallback: try simple summary
          try {
            const fallback = await callClaude(
              'You summarize meeting transcripts. Return a JSON object with "summary" (2-3 sentences) and "actionItems" (bullet list or empty string). Return ONLY valid JSON.',
              `Meeting: ${meeting.title || 'Untitled'}\nParticipants: ${meeting.participants || 'Unknown'}\n\nTranscript:\n${(meeting.transcript || '').substring(0, 200000)}`,
              500,
              'Meeting Intelligence'
            );
            const parsed = parseMeetingJson(fallback);
            meeting.type = 'other';
            meeting.typeConfidence = 0;
            meeting.summary = parsed.summary || '';
            meeting.actionItems = parsed.actionItems || '';
            meeting.insights = {};
            parseActionItemsToTodos(meeting);
          } catch (e2) {
            console.warn('Fallback summary also failed:', meeting.id, e2);
            meeting.type = 'other';
            meeting.typeConfidence = 0;
            meeting.insights = {};
          }
        }
      }
      saveState();
      renderSettings();
    }
    // Extract insights for pre-typed recurring meetings (type remembered, but need extraction)
    if (preTyped.length > 0 && state.settings.baseUrl) {
      if (statusEl) { statusEl.className = 'api-status checking'; statusEl.textContent = `Extracting ${preTyped.length} recurring meeting${preTyped.length === 1 ? '' : 's'}...`; }
      for (const meeting of preTyped) {
        try {
          const typeLabel = MEETING_TYPES[meeting.type]?.label || meeting.type;
          const prompt = buildMeetingIntelligencePrompt(meeting) +
            `\n\nIMPORTANT: This meeting has been pre-classified as "${meeting.type}" (${typeLabel}). Use this type for extraction — do not reclassify. Set confidence to 1.0.`;
          const result = await callClaude(buildMeetingSystemPrompt(), prompt, 2000, 'Meeting Intelligence');
          const parsed = parseMeetingJson(result);
          meeting.summary = parsed.summary || '';
          meeting.actionItems = parsed.actionItems || '';
          meeting.insights = parsed.insights || {};
          parseActionItemsToTodos(meeting);
          detectVisibilityFromMeeting(meeting);
        } catch (e) {
          console.warn('Extraction failed for pre-typed meeting:', meeting.id, e);
        }
      }
      saveState();
      renderSettings();
    }
    if (statusEl) { statusEl.className = 'api-status valid'; statusEl.textContent = `Synced — ${state.meetings.length} meeting${state.meetings.length === 1 ? '' : 's'}`; }
    showToast(newMeetings.length > 0 ? `${newMeetings.length} new meeting${newMeetings.length === 1 ? '' : 's'} fetched` : 'Meetings up to date');
  } catch (e) {
    console.error('Fetch meetings failed:', e);
    if (statusEl) { statusEl.className = 'api-status invalid'; statusEl.textContent = 'Fetch failed'; }
    showToast('Failed to fetch meetings');
  }
}

async function reprocessMeeting(meetingId, overrideType) {
  const meeting = state.meetings.find(m => m.id === meetingId);
  if (!meeting || !meeting.transcript) return;

  // Save the type override immediately
  meeting.type = overrideType;
  // Remember this title→type mapping for future recurring meetings
  if (meeting.title) {
    if (!state.settings.meetingTypeOverrides) state.settings.meetingTypeOverrides = {};
    const normTitle = meeting.title.trim().toLowerCase();
    state.settings.meetingTypeOverrides[normTitle] = overrideType;
  }
  saveState();
  renderSettings();

  if (!state.settings.baseUrl) return;

  const statusEl = document.getElementById('meetingSyncStatus');
  if (statusEl) { statusEl.className = 'api-status checking'; statusEl.textContent = 'Re-analyzing meeting...'; }

  try {
    const typeLabel = MEETING_TYPES[overrideType]?.label || overrideType;
    const prompt = buildMeetingIntelligencePrompt(meeting) +
      `\n\nIMPORTANT: The user has manually classified this meeting as "${overrideType}" (${typeLabel}). Use this type for extraction — do not reclassify. Set confidence to 1.0.`;

    const result = await callClaude(buildMeetingSystemPrompt(), prompt, 2000, 'Meeting Intelligence');
    const parsed = parseMeetingJson(result);
    meeting.type = overrideType; // preserve override
    meeting.typeConfidence = 1.0;
    meeting.summary = parsed.summary || meeting.summary || '';
    meeting.actionItems = parsed.actionItems || meeting.actionItems || '';
    meeting.insights = parsed.insights || {};
    parseActionItemsToTodos(meeting);
    detectVisibilityFromMeeting(meeting);

    if (statusEl) { statusEl.className = 'api-status valid'; statusEl.textContent = 'Re-analysis complete'; }
    showToast('Meeting re-analyzed as ' + typeLabel);
  } catch (e) {
    console.warn('Reprocess failed:', meetingId, e);
    if (statusEl) { statusEl.className = 'api-status invalid'; statusEl.textContent = 'Re-analysis failed'; }
    showToast('Re-analysis failed — type saved');
  }

  saveState();
  renderSettings();
}

/* ========================================
   To-Do Parsing
   ======================================== */
function normTodoText(t) {
  return t.substring(0, 50).toLowerCase().replace(/\s+/g, ' ').replace(/[^a-z0-9 ]/g, '');
}
function parseActionItemsToTodos(meeting) {
  if (!meeting || !meeting.actionItems) return;
  const lines = meeting.actionItems.split('\n')
    .map(l => l.replace(/^[\s\-•*·▸▹►]+/, '').trim())
    .filter(l => l.length >= 5);
  if (!lines.length) return;

  // Check against ALL open todos from the same meeting date (not just same meetingId)
  // This catches duplicates when AI phrases the same action item differently
  const meetingDate = (meeting.date || '').substring(0, 10);
  const existing = (state.todos || []).filter(t =>
    t.meetingId === meeting.id ||
    (meetingDate && t.meetingDate && t.meetingDate.substring(0, 10) === meetingDate && t.meetingTitle === (meeting.title || 'Untitled'))
  );
  const existingNorms = new Set(existing.map(t => normTodoText(t.text)));

  for (const line of lines) {
    const norm = normTodoText(line);
    if (existingNorms.has(norm)) continue;
    existingNorms.add(norm);
    const id = 'todo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    state.todos.push({
      id,
      text: line,
      meetingId: meeting.id,
      meetingTitle: meeting.title || 'Untitled',
      meetingDate: meeting.date || '',
      status: 'open',
      priority: 'inbox',
      createdAt: new Date().toISOString(),
      completedAt: null,
      addedToIntention: null,
      addedToPlan: null,
      deferCount: 0
    });
  }
}

function deleteMeeting(meetingId) {
  const idx = state.meetings.findIndex(m => m.id === meetingId);
  if (idx === -1) return;
  const removed = state.meetings.splice(idx, 1)[0];
  if (!state.deletedMeetingIds) state.deletedMeetingIds = [];
  state.deletedMeetingIds.push(meetingId);
  saveState();
  renderMeetings();
  showToast('Meeting deleted', 5000, () => {
    // Undo: restore meeting and remove from deleted list
    state.meetings.push(removed);
    state.meetings.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    state.deletedMeetingIds = state.deletedMeetingIds.filter(id => id !== meetingId);
    saveState();
    renderMeetings();
  });
}

/* ---- Meeting Import ---- */

function parseTactiqTranscript(text) {
  const lines = text.split('\n');
  let title = '', date = '', participants = '', link = '', transcript = '', duration = 0;

  // Line 2: extract Tactiq link
  for (let i = 0; i < Math.min(5, lines.length); i++) {
    const urlMatch = lines[i].match(/https?:\/\/[^\s)]+tactiq[^\s)]+/i) || lines[i].match(/https?:\/\/[^\s)]+/);
    if (urlMatch && lines[i].toLowerCase().includes('transcript')) { link = urlMatch[0]; break; }
  }

  // Find date | title line
  for (let i = 0; i < Math.min(10, lines.length); i++) {
    const dateTitle = lines[i].match(/^(\d{1,2}\s+\w+\s+\d{4})\s*\|\s*(.+)$/);
    if (dateTitle) {
      const d = new Date(dateTitle[1]);
      if (!isNaN(d)) date = d.toISOString().slice(0, 10);
      title = dateTitle[2].trim();
      break;
    }
  }

  // Attendees line
  for (let i = 0; i < Math.min(10, lines.length); i++) {
    const att = lines[i].match(/^Attendees:\s*(.+)$/i);
    if (att) { participants = att[1].trim(); break; }
  }

  // Find "Transcript" delimiter — everything after is the real transcript
  let transcriptStart = -1;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].trim() === 'Transcript') { transcriptStart = i + 1; break; }
  }
  if (transcriptStart > 0) {
    transcript = lines.slice(transcriptStart).join('\n').trim();
  } else {
    // Fallback: use everything after "Highlights" section ends (after first blank line gap)
    transcript = lines.slice(7).join('\n').trim();
  }

  // Estimate duration from last timestamp in transcript
  const timestamps = transcript.match(/^(\d{1,2}:\d{2}(?::\d{2})?)\s/gm);
  if (timestamps && timestamps.length > 0) {
    const last = timestamps[timestamps.length - 1].trim();
    const parts = last.split(':').map(Number);
    duration = parts.length === 3 ? parts[0] * 3600 + parts[1] * 60 + parts[2] : parts[0] * 60 + parts[1];
  }

  return { title, date, participants, link, transcript, duration: String(duration) };
}

function previewMeetingImport() {
  const raw = document.getElementById('importMeetingText').value;
  if (!raw.trim()) { showToast('Paste a transcript first'); return; }

  // Split on Tactiq header to support multiple transcripts
  const chunks = raw.split(/(?=Transcript delivered by Tactiq)/i).filter(c => c.trim());
  const parsed = chunks.map(c => parseTactiqTranscript(c));

  const preview = document.getElementById('importPreview');
  if (parsed.length === 0) { preview.innerHTML = '<div style="color:var(--text-muted)">Could not parse any transcripts.</div>'; return; }

  const existingIds = new Set(state.meetings.map(m => m.title + '|' + m.date));

  preview.innerHTML = `
    <div style="font-weight:600;margin-bottom:var(--space-md)">${parsed.length} transcript${parsed.length === 1 ? '' : 's'} found</div>
    ${parsed.map((p, i) => {
      const isDupe = existingIds.has(p.title + '|' + p.date);
      return `<div class="meeting-card" style="margin-bottom:var(--space-md);${isDupe ? 'opacity:0.5' : ''}">
        <div class="meeting-card-header">
          <span class="meeting-card-date">${p.date || 'No date'}</span>
          ${isDupe ? '<span style="font-size:11px;color:var(--accent-negative)">Already imported</span>' : `<label style="font-size:12px;cursor:pointer"><input type="checkbox" class="import-check" data-idx="${i}" checked> Import</label>`}
        </div>
        <div class="meeting-card-title" style="margin-top:var(--space-xs)">${escapeHtml(p.title || 'Untitled')}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">
          ${escapeHtml(p.participants || 'No participants')} · ${meetingDuration({duration: p.duration}) ? Math.round(meetingDuration({duration: p.duration}) / 60) + ' min' : 'unknown duration'}
          ${p.link ? ` · <a href="${escapeHtml(p.link)}" target="_blank" style="color:var(--accent)">Tactiq link</a>` : ''}
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:var(--space-xs)">${p.transcript ? p.transcript.substring(0, 150).replace(/\n/g, ' ') + '...' : 'No transcript'}</div>
      </div>`;
    }).join('')}
    <button class="btn-secondary btn-accent" style="margin-top:var(--space-md)" onclick="executeImport()">Import Selected</button>`;

  // Store parsed data for import
  window._importParsed = parsed;
}

function executeImport() {
  const parsed = window._importParsed;
  if (!parsed) { showToast('No parsed data'); return; }

  const checks = document.querySelectorAll('.import-check');
  const selectedIdx = new Set();
  checks.forEach(cb => { if (cb.checked) selectedIdx.add(parseInt(cb.dataset.idx)); });

  if (selectedIdx.size === 0) { showToast('No meetings selected'); return; }

  const existingIds = new Set(state.meetings.map(m => m.title + '|' + m.date));
  let imported = 0;

  selectedIdx.forEach(i => {
    const p = parsed[i];
    if (existingIds.has(p.title + '|' + p.date)) return;
    const meeting = {
      id: 'import-' + Date.now() + '-' + i,
      title: p.title || 'Untitled',
      date: p.date ? p.date + 'T12:00:00.000Z' : new Date().toISOString(),
      participants: p.participants || '',
      duration: p.duration || '',
      transcript: p.transcript || '',
      link: p.link || '',
      summary: '',
      actionItems: ''
    };
    state.meetings.push(meeting);
    imported++;
  });

  state.meetings.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  saveState();
  showToast(`${imported} meeting${imported === 1 ? '' : 's'} imported`);
  renderMeetings();
}

function toggleMeetingExpand(meetingId) {
  const expanded = document.getElementById('meeting-expanded-' + meetingId);
  const compact = document.getElementById('meeting-compact-' + meetingId);

  if (expanded) {
    // Collapse: remove expanded, show compact
    expanded.remove();
    if (compact) compact.style.display = '';
  } else {
    // Expand: hide compact, insert expanded card after it
    if (compact) compact.style.display = 'none';
    const m = state.meetings.find(mt => mt.id === meetingId);
    if (!m) return;
    const wrapper = document.createElement('div');
    wrapper.id = 'meeting-expanded-' + meetingId;
    wrapper.innerHTML = renderMeetingCard(m, true);
    if (compact) compact.after(wrapper);
  }
}

function collapseMeetingCard(meetingId) {
  const expanded = document.getElementById('meeting-expanded-' + meetingId);
  const compact = document.getElementById('meeting-compact-' + meetingId);
  if (expanded) expanded.remove();
  if (compact) compact.style.display = '';
}

function renderMeetingCard(m, collapsible) {
  const typeInfo = MEETING_TYPES[m.type] || MEETING_TYPES['other'];
  const typeOptions = Object.entries(MEETING_TYPES).map(([k, v]) =>
    `<option value="${k}" ${k === (m.type || 'other') ? 'selected' : ''}>${escapeHtml(v.label)}</option>`
  ).join('');

  const dateStr = m.date ? new Date(m.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) : '';

  // Separate career relevance from other insights
  let careerRelevance = '';
  let expandedSections = '';
  if (m.insights && Object.keys(m.insights).length > 0) {
    Object.entries(m.insights)
      .filter(([k, v]) => v && v.trim && v.trim() !== '')
      .forEach(([k, v]) => {
        const label = k.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
        if (k === 'careerRelevance') {
          careerRelevance = `<div class="meeting-card-section">
            <div class="meeting-card-section-label">${escapeHtml(label)}</div>
            <div class="meeting-card-section-body">${formatBulletList(v)}</div>
          </div>`;
        } else {
          expandedSections += `<div class="meeting-card-section">
            <div class="meeting-card-section-label">${escapeHtml(label)}</div>
            <div class="meeting-card-section-body">${formatBulletList(v)}</div>
          </div>`;
        }
      });
  }

  const actionItemsHtml = m.actionItems ? formatBulletList(m.actionItems) : '';

  const participation = computeParticipation(m);
  const metaParts = [];
  if (meetingDuration(m)) metaParts.push(Math.round(meetingDuration(m) / 60) + ' min');
  if (participation !== null) {

      <span class="meeting-card-title${(m.title || '') === 'Meeting Transcription' ? ' meeting-title-placeholder' : ''}" style="cursor:pointer" title="Click to edit title" onclick="editMeetingTitle('${escapeHtml(m.id)}', this)">${escapeHtml(m.title || 'Untitled')}${(m.title || '') === 'Meeting Transcription' ? ' <span style="font-size:11px;font-weight:400;color:var(--text-muted)">— click to rename</span>' : ''}</span>
      <span class="meeting-card-actions">

    <div class="meeting-card-section">
      <div class="meeting-card-section-label">Summary</div>

function copyMeetingSetup(elementId) {
  const el = document.getElementById(elementId);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    showToast('Copied to clipboard');
  }).catch(() => {
    // Fallback: select the text
    const range = document.createRange();
    range.selectNodeContents(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    showToast('Text selected — press Ctrl+C to copy');
  });
}

/* ========================================
   Date Utilities
   ======================================== */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function getDayName(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long' });
}

function getDayShort(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 3);
}

function formatDateDisplay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDateWithYear(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function isMonday(dateStr) { return new Date(dateStr + 'T12:00:00').getDay() === 1; }
function isFriday(dateStr) { return new Date(dateStr + 'T12:00:00').getDay() === 5; }

function getWeekMonday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d);
  mon.setDate(mon.getDate() + diff);
  return mon.toISOString().split('T')[0];
}

function getWeekDates(mondayStr) {
  const dates = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(mondayStr + 'T12:00:00');
    d.setDate(d.getDate() + i);
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates;
}

function getWeekFriday(mondayStr) {
  const d = new Date(mondayStr + 'T12:00:00');
  d.setDate(d.getDate() + 4);
  return d.toISOString().split('T')[0];
}

function getNextWeekday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + 1);
  if (d.getDay() === 6) d.setDate(d.getDate() + 2);
  if (d.getDay() === 0) d.setDate(d.getDate() + 1);
  return d.toISOString().split('T')[0];
}

function formatWeekRange(mondayStr) {
  return formatDateShort(mondayStr) + ' – ' + formatDateShort(getWeekFriday(mondayStr));
}

function getCurrentWeekEntries() {
  const monday = getWeekMonday(todayStr());
  const weekDates = getWeekDates(monday);
  return state.entries.filter(e => weekDates.includes(e.date)).sort((a, b) => a.date.localeCompare(b.date));
}

function getEntryForDate(dateStr) {
  return state.entries.find(e => e.date === dateStr);
}

function getRecentEntries(count = 3) {
  const today = todayStr();
  return state.entries
    .filter(e => e.date < today)
    .sort((a, b) => b.date.localeCompare(a.date))
    .slice(0, count);
}

function getAccumulatedPlanItems() {
  const today = todayStr();
  const monday = getWeekMonday(today);

  // All entries this week before today with planTomorrow, sorted desc
  const priorEntries = state.entries
    .filter(e => e.date >= monday && e.date < today && e.planTomorrow)
    .sort((a, b) => b.date.localeCompare(a.date));

  const yesterdayPlan = priorEntries[0]?.planTomorrow || null;

  // Collect unchecked items from earlier entries (skip most recent = yesterday's)
  const carriedOver = [];
  for (let i = 1; i < priorEntries.length; i++) {
    const entry = priorEntries[i];
    const items = getPlanItems(entry.planTomorrow);
    const nextDay = getNextWeekday(entry.date);
    const checked = state.dayPlanChecked[nextDay] || [];

    items.forEach((text, idx) => {
      const key = `${entry.date}:${idx}`;
      if (!checked.includes(idx) && !state.carriedOverChecked[key]) {
        carriedOver.push({ text, fromDate: entry.date, key });
      }
    });
  }

  // Collect uncompleted visibility tasks from earlier this week
  const weekDates = getWeekDates(monday);
  for (let i = 0; i < weekDates.length; i++) {
    const dateStr = weekDates[i];
    if (dateStr >= today) break;
    const weeklyRhythm = getWeeklyRhythm();
    const rhythm = weeklyRhythm[i] || null;
    if (!rhythm) continue;
    const hasActivity = state.visibilityActivities.some(a => a.date === dateStr);
    if (!hasActivity) {
      const key = `visib:${dateStr}`;
      if (!state.carriedOverChecked[key]) {
        carriedOver.push({ text: rhythm.label, fromDate: dateStr, key, isVisibility: true });
      }
    }
  }

  return { yesterdayPlan, carriedOver };
}

function toggleCarriedOverCheck(checkbox) {
  const key = checkbox.dataset.key;
  if (checkbox.checked) {
    state.carriedOverChecked[key] = true;
  } else {
    delete state.carriedOverChecked[key];
  }
  saveState();
  const item = checkbox.closest('.plan-check-item');
  if (item) item.classList.toggle('done', checkbox.checked);
  const text = checkbox.dataset.text;
  if (text) {
    if (checkbox.checked) appendToWorkDone(text);
    else removeFromWorkDone(text);
  }
}

function renderCarriedOverItems(carriedOver) {
  if (!carriedOver.length) return '';
  return `<div class="carried-over-section">
    <div class="carried-over-label">Carried over</div>
    ${carriedOver.map(item => {
      const d = new Date(item.fromDate + 'T12:00:00');
      const dayLabel = d.toLocaleDateString('en-US', { weekday: 'short' });
      if (item.isVisibility) {
        return `<div class="plan-check-item carried-over">
          <input type="checkbox" data-key="${item.key}" data-text="${escapeHtml(item.text)}" onchange="toggleCarriedOverCheck(this)">
          <span><a href="#" onclick="event.preventDefault();visibView='log';visibLogType='';visibLogSubtype='';switchTab('visibility')" style="color:var(--accent-coaching);text-decoration:none;font-weight:500">${escapeHtml(item.text)}</a></span>
          <span class="carried-over-date">${dayLabel}</span>
        </div>`;
      }
      return `<div class="plan-check-item carried-over">
        <input type="checkbox" data-key="${item.key}" data-text="${escapeHtml(item.text)}" onchange="toggleCarriedOverCheck(this)">
        <span>${formatPlanItemText(item.text)}</span>
        <span class="carried-over-date">${dayLabel}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function openDayPlanAdd() {
  const block = document.getElementById('planAddItemBlock');
  if (!block) return;
  block.style.display = 'block';
  const input = block.querySelector('input');
  if (input) input.focus();
}

function addDayPlanItem() {
  const input = document.getElementById('addPlanItemInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const today = todayStr();
  if (!state.dayPlanAdded[today]) state.dayPlanAdded[today] = [];
  state.dayPlanAdded[today].push(text);
  saveState();
  input.value = '';
  renderLogTab();
}

function getStreak() {
  let streak = 0;
  const d = new Date();
  while (true) {
    const dateStr = d.toISOString().split('T')[0];
    const dayOfWeek = d.getDay();
    if (dayOfWeek === 0 || dayOfWeek === 6) {
      d.setDate(d.getDate() - 1);
      continue;
    }
    if (getEntryForDate(dateStr)) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else if (dateStr === todayStr()) {
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function getPreviousWeekBrief() {
  const currentMonday = getWeekMonday(todayStr());
  return state.weeklyBriefs
    .filter(b => b.weekOf < currentMonday)
    .sort((a, b) => b.weekOf.localeCompare(a.weekOf))[0] || null;
}

function getCurrentWeekBrief() {
  const monday = getWeekMonday(todayStr());
  return state.weeklyBriefs.find(b => b.weekOf === monday) || null;
}

function getConfirmedWins() {
  return state.wins.filter(w => w.status === 'confirmed').sort((a, b) => b.date.localeCompare(a.date));
}

/* ========================================
   Toast
   ======================================== */
let toastTimeout = null;

function showToast(message, duration = 3000, undoCallback = null, actionLabel = 'Undo') {
  const container = document.getElementById('toast-container');
  container.innerHTML = '';
  if (toastTimeout) clearTimeout(toastTimeout);

  const isError = /fail|error|warning|nearly full/i.test(message);
  const toast = document.createElement('div');
  toast.className = 'toast' + (isError ? ' toast-error' : '');

  const dismiss = isError ? ' <span class="toast-dismiss">&times;</span>' : '';
  toast.innerHTML = message + (undoCallback ? ` <span class="toast-undo">${actionLabel}</span>` : '') + dismiss;
  container.appendChild(toast);

  if (undoCallback) {
    toast.querySelector('.toast-undo').onclick = () => {
      undoCallback();
      container.innerHTML = '';
      if (toastTimeout) clearTimeout(toastTimeout);
    };
  }

  if (isError) {
    toast.querySelector('.toast-dismiss').onclick = () => {
      toast.classList.add('exiting');
      setTimeout(() => { container.innerHTML = ''; }, 300);
    };
  } else if (duration > 0) {
    toastTimeout = setTimeout(() => {
      toast.classList.add('exiting');
      setTimeout(() => { container.innerHTML = ''; }, 300);
    }, duration);
  }
}

   To-Dos Tab
   ======================================== */
function todoDueTag(priority) {
  const labels = { today: 'Due Today', tomorrow: 'Due Tomorrow', 'this-week': 'Due This Week', backlog: 'Due Backlog' };
  return labels[priority] ? `<span class="todo-due-label todo-due-${priority}">${labels[priority]}</span>` : '';
}

function todoAge(createdAt) {
  const ms = Date.now() - new Date(createdAt).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return 'just now';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + 'd ago';
  const weeks = Math.floor(days / 7);
  if (weeks < 5) return weeks + 'w ago';
  const months = Math.floor(days / 30);
  return months + 'mo ago';
}

function getTodoCounts() {
  const todos = state.todos || [];
  const open = todos.filter(t => t.status === 'open');
  return {
    inbox: open.filter(t => t.priority === 'inbox').length,
    today: open.filter(t => t.priority === 'today').length,
    tomorrow: open.filter(t => t.priority === 'tomorrow').length,
    'this-week': open.filter(t => t.priority === 'this-week').length,
    backlog: open.filter(t => t.priority === 'backlog' || t.priority === 'later').length,
    done: todos.filter(t => t.status === 'done').length,
    deleted: todos.filter(t => t.status === 'dismissed').length
  };
}

function getChatMessages() {

}

function getDisplayedMessages() {
  if (chatSubView === 'view') {

  return getChatMessages();
}

function renderChat() {

  const sessionCount = state.chatSessions.length;

    </div>
    ${chatSubView === 'chat' && messages.length > 0 ? '<button class="btn-secondary" style="font-size:12px" onclick="archiveAndNewChat()">New Chat</button>' : ''}
  </div>`;

  if (chatSubView === 'history') {
    panel.innerHTML = subNav + renderChatHistory();
    return;
  }
  if (chatSubView === 'view') {
    panel.innerHTML = subNav + renderChatSessionView();
    return;
  }

  const quickPrompts = [
    'What should I focus on this week?',
    'Draft a visibility post about my recent work',
    'What patterns do you see in my journal?',
    'Generate my promotion narrative',
    'What feedback have I received recently?',
    'What vectors need the most attention?'
  ];

  if (messages.length === 0 && !chatLoading) {
    panel.innerHTML = subNav + `<div class="chat-container" style="height:calc(100vh - 160px)">
      <div class="chat-quick-prompts">
        <h2>Career Chat</h2>
        <p>Ask anything about your work, vectors, feedback, or career trajectory.</p>
        ${state.settings.mempalaceServerUrl && !state.settings.obsidianVaultPath ? `<p style="font-size:12px;color:var(--text-muted);margin-top:var(--space-sm)">Tip: Set your Obsidian Vault Path in Settings → Integrations → MemPalace to enable deep memory search with <code>@memory</code>.</p>` : ''}
        ${state.settings.mempalaceServerUrl && state.settings.obsidianVaultPath ? `<p style="font-size:12px;color:var(--text-muted);margin-top:var(--space-sm)">Use <code>@memory</code> to search your full work history — e.g. <code>@memory what did Sarah say about the component API?</code></p>` : ''}
        <div class="chat-prompt-grid">
          ${quickPrompts.map(p => `<button class="chat-prompt-chip" onclick="sendChatFromPrompt(this.textContent)">${escapeHtml(p)}</button>`).join('')}
        </div>
      </div>
      <div class="chat-input-bar">
        <textarea placeholder="Ask about your career, vectors, wins, meetings... Use @memory for deep search" rows="1" onkeydown="handleChatKeydown(event)" oninput="autoResizeChatInput(this)" id="chatInput"></textarea>
        ${state.settings.mempalaceServerUrl ? '<span class="mempalace-dot" id="mempalaceDot" title="MemPalace"></span>' : ''}
        <button onclick="sendChatMessage()" id="chatSendBtn">Send</button>
      </div>
    </div>`;
    return;
  }

  const messagesHtml = messages.map((m, idx) => {
    if (m.role === 'user') {
      return `<div class="chat-msg chat-msg-user">
        <div class="chat-bubble">${escapeHtml(m.content)}</div>
      </div>`;
    } else {
      return `<div class="chat-msg chat-msg-assistant">
        <div>
          <div class="chat-bubble">${formatBulletList(m.content)}</div>
          <div class="chat-actions">
            <button onclick="saveChatInsight(${idx})">Save Insight</button>
            <button onclick="copyChatMessage(${idx})">Copy</button>
          </div>
        </div>
      </div>`;
    }
  }).join('');

  const typingHtml = chatLoading ? `<div class="chat-msg chat-msg-assistant">
    <div class="chat-typing"><div class="loading-dots"><span>.</span><span>.</span><span>.</span></div></div>
  </div>` : '';

  panel.innerHTML = subNav + `<div class="chat-container" style="height:calc(100vh - 160px)">
    <div class="chat-messages" id="chatMessagesScroll">
      ${messagesHtml}
      ${typingHtml}
    </div>
    <div class="chat-input-bar">
      <textarea placeholder="Follow up... Use @memory for deep search" rows="1" onkeydown="handleChatKeydown(event)" oninput="autoResizeChatInput(this)" id="chatInput"${chatLoading ? ' disabled' : ''}></textarea>
      ${state.settings.mempalaceServerUrl ? '<span class="mempalace-dot" id="mempalaceDot" title="MemPalace"></span>' : ''}
      <button onclick="sendChatMessage()" id="chatSendBtn"${chatLoading ? ' disabled' : ''}>Send</button>
    </div>
  </div>`;

  const dot = document.getElementById('mempalaceDot');

    fetch(state.settings.mempalaceServerUrl.replace(/\/$/, '') + '/status', { signal: AbortSignal.timeout(1500) })
