async function createMeetingsGist() {
  if (!state.settings.ghToken) {
    showToast('Set up a GitHub token in Cloud Sync first');
    return;
  }
  const statusEl = document.getElementById('meetingSyncStatus');
  if (statusEl) { statusEl.className = 'api-status checking'; statusEl.textContent = 'Creating gist...'; }
  try {
    const res = await fetch('https://api.github.com/gists', {
      method: 'POST',
      headers: {
        'Authorization': 'token ' + state.settings.ghToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        description: 'WorkOS Meeting Transcripts (Tactiq → Zapier)',
        public: false,
        files: { 'README.md': { content: 'This gist stores meeting transcripts synced from Tactiq via Zapier. Each meeting is a separate file (meeting-*.json).' } }
      })
    });
    if (!res.ok) throw new Error('Failed to create gist: ' + res.status);
    const data = await res.json();
    state.settings.meetingsGistId = data.id;
    saveState();
    if (statusEl) { statusEl.className = 'api-status valid'; statusEl.textContent = 'Gist created'; }
    showToast('Meetings Gist created');
    renderSettings();
  } catch (e) {
    console.error('Create meetings gist failed:', e);
    if (statusEl) { statusEl.className = 'api-status invalid'; statusEl.textContent = 'Failed — check token'; }
    showToast('Failed to create meetings gist');
  }
}

async function fetchMeetings() {
  if (!state.settings.ghToken || !state.settings.meetingsGistId) {
    showToast('Set up meetings gist first');
    return;
  }
  const statusEl = document.getElementById('meetingSyncStatus');
  if (statusEl) { statusEl.className = 'api-status checking'; statusEl.textContent = 'Fetching meetings...'; }
  try {
    const res = await fetch('https://api.github.com/gists/' + state.settings.meetingsGistId, {
      headers: { 'Authorization': 'token ' + state.settings.ghToken }
    });
    if (!res.ok) throw new Error('Fetch failed: ' + res.status);
    const data = await res.json();
    const existingIds = new Set(state.meetings.map(m => m.id));
    const newMeetings = [];
    for (const [filename, file] of Object.entries(data.files)) {
      if (!filename.startsWith('meeting-') || !filename.endsWith('.json')) continue;
      try {
        const meeting = JSON.parse(file.content);
        if (!meeting.id) continue;
        if ((state.deletedMeetingIds || []).includes(meeting.id)) continue;
        if (!existingIds.has(meeting.id)) {
          state.meetings.push(meeting);
          existingIds.add(meeting.id);
          newMeetings.push(meeting);
        } else {
          // Restore transcript if local copy lost it (stripped from localStorage)
          const local = state.meetings.find(m => m.id === meeting.id);
          if (local && !local.transcript && meeting.transcript) {
            local.transcript = meeting.transcript;
          }
          if (local && !local.link && meeting.link) {
            local.link = meeting.link;
          }
        }
      } catch (e) { console.warn('Skipping malformed meeting file:', filename); }
    }
    state.meetings.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    saveState();
    renderSettings();
    // Apply remembered type overrides for recurring meetings
    const overrides = state.settings.meetingTypeOverrides || {};
    const preTyped = [];
    newMeetings.forEach(m => {
      if (!m.type && m.title) {
        const normTitle = m.title.trim().toLowerCase();
        if (overrides[normTitle]) {
          m.type = overrides[normTitle];
          m.typeConfidence = 1.0;
          if (m.transcript && !m.summary) preTyped.push(m);
        }
      }
    });
    // Meeting Intelligence: classify + extract career-relevant data
    const toAnalyze = newMeetings.filter(m => m.transcript && !m.type);
    if (toAnalyze.length > 0 && state.settings.baseUrl) {
      if (statusEl) { statusEl.className = 'api-status checking'; statusEl.textContent = `Analyzing ${toAnalyze.length} meeting${toAnalyze.length === 1 ? '' : 's'}...`; }
      for (let i = 0; i < toAnalyze.length; i++) {
        const meeting = toAnalyze[i];
        if (statusEl && toAnalyze.length > 1) { statusEl.textContent = `Analyzing meeting ${i + 1}/${toAnalyze.length}...`; }
        try {
          const result = await callClaude(
            buildMeetingSystemPrompt(),
            buildMeetingIntelligencePrompt(meeting),
            2000
          );
          const parsed = parseMeetingJson(result);
          meeting.type = parsed.type && MEETING_TYPES[parsed.type] ? parsed.type : 'other';
          meeting.typeConfidence = parsed.confidence || 0;
          meeting.summary = parsed.summary || '';
          meeting.actionItems = parsed.actionItems || '';
          meeting.insights = parsed.insights || {};
          parseActionItemsToTodos(meeting);
        } catch (e) {
          console.warn('Intelligence extraction failed for meeting:', meeting.id, e);
          // Fallback: try simple summary
          try {
            const fallback = await callClaude(
              'You summarize meeting transcripts. Return a JSON object with "summary" (2-3 sentences) and "actionItems" (bullet list or empty string). Return ONLY valid JSON.',
              `Meeting: ${meeting.title || 'Untitled'}\nParticipants: ${meeting.participants || 'Unknown'}\n\nTranscript:\n${(meeting.transcript || '').substring(0, 200000)}`,
              500
            );
            const parsed = parseMeetingJson(fallback);
            meeting.type = 'other';
            meeting.typeConfidence = 0;
            meeting.summary = parsed.summary || '';
            meeting.actionItems = parsed.actionItems || '';
            meeting.insights = {};
            parseActionItemsToTodos(meeting);
          } catch (e2) {
            console.warn('Fallback summary also failed:', meeting.id, e2);
            meeting.type = 'other';
            meeting.typeConfidence = 0;
            meeting.insights = {};
          }
        }
      }
      saveState();
      renderSettings();
    }
    // Extract insights for pre-typed recurring meetings (type remembered, but need extraction)
    if (preTyped.length > 0 && state.settings.baseUrl) {
      if (statusEl) { statusEl.className = 'api-status checking'; statusEl.textContent = `Extracting ${preTyped.length} recurring meeting${preTyped.length === 1 ? '' : 's'}...`; }
      for (const meeting of preTyped) {
        try {
          const typeLabel = MEETING_TYPES[meeting.type]?.label || meeting.type;
          const prompt = buildMeetingIntelligencePrompt(meeting) +
            `\n\nIMPORTANT: This meeting has been pre-classified as "${meeting.type}" (${typeLabel}). Use this type for extraction — do not reclassify. Set confidence to 1.0.`;
          const result = await callClaude(buildMeetingSystemPrompt(), prompt, 2000);
          const parsed = parseMeetingJson(result);
          meeting.summary = parsed.summary || '';
          meeting.actionItems = parsed.actionItems || '';
          meeting.insights = parsed.insights || {};
          parseActionItemsToTodos(meeting);
        } catch (e) {
          console.warn('Extraction failed for pre-typed meeting:', meeting.id, e);
        }
      }
      saveState();
      renderSettings();
    }
    if (statusEl) { statusEl.className = 'api-status valid'; statusEl.textContent = `Synced — ${state.meetings.length} meeting${state.meetings.length === 1 ? '' : 's'}`; }
    showToast(newMeetings.length > 0 ? `${newMeetings.length} new meeting${newMeetings.length === 1 ? '' : 's'} fetched` : 'Meetings up to date');
  } catch (e) {
    console.error('Fetch meetings failed:', e);
    if (statusEl) { statusEl.className = 'api-status invalid'; statusEl.textContent = 'Fetch failed'; }
    showToast('Failed to fetch meetings');
  }
}

async function reprocessMeeting(meetingId, overrideType) {
  const meeting = state.meetings.find(m => m.id === meetingId);
  if (!meeting || !meeting.transcript) return;

  // Save the type override immediately
  meeting.type = overrideType;
  // Remember this title→type mapping for future recurring meetings
  if (meeting.title) {
    if (!state.settings.meetingTypeOverrides) state.settings.meetingTypeOverrides = {};
    const normTitle = meeting.title.trim().toLowerCase();
    state.settings.meetingTypeOverrides[normTitle] = overrideType;
  }
  saveState();
  renderSettings();

  if (!state.settings.baseUrl) return;

  const statusEl = document.getElementById('meetingSyncStatus');
  if (statusEl) { statusEl.className = 'api-status checking'; statusEl.textContent = 'Re-analyzing meeting...'; }

  try {
    const typeLabel = MEETING_TYPES[overrideType]?.label || overrideType;
    const prompt = buildMeetingIntelligencePrompt(meeting) +
      `\n\nIMPORTANT: The user has manually classified this meeting as "${overrideType}" (${typeLabel}). Use this type for extraction — do not reclassify. Set confidence to 1.0.`;

    const result = await callClaude(buildMeetingSystemPrompt(), prompt, 2000);
    const parsed = parseMeetingJson(result);
    meeting.type = overrideType; // preserve override
    meeting.typeConfidence = 1.0;
    meeting.summary = parsed.summary || meeting.summary || '';
    meeting.actionItems = parsed.actionItems || meeting.actionItems || '';
    meeting.insights = parsed.insights || {};
    parseActionItemsToTodos(meeting);

    if (statusEl) { statusEl.className = 'api-status valid'; statusEl.textContent = 'Re-analysis complete'; }
    showToast('Meeting re-analyzed as ' + typeLabel);
  } catch (e) {
    console.warn('Reprocess failed:', meetingId, e);
    if (statusEl) { statusEl.className = 'api-status invalid'; statusEl.textContent = 'Re-analysis failed'; }
    showToast('Re-analysis failed — type saved');
  }

  saveState();
  renderSettings();
}

function editMeetingTitle(meetingId, el) {
  const meeting = state.meetings.find(m => m.id === meetingId);
  if (!meeting) return;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = meeting.title || '';
  input.style.cssText = 'font:14px var(--font-family);font-weight:600;border:1px solid var(--accent-interactive);border-radius:var(--radius-sm);padding:2px 6px;width:100%;';
  input.onblur = () => {
    const val = input.value.trim();
    if (val && val !== meeting.title) {
      meeting.title = val;
      saveState();
      renderMeetings();
      showToast('Meeting title updated');
    } else {
      input.replaceWith(el);
      el.style.display = '';
    }
  };
  input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = meeting.title || ''; input.blur(); } };
  el.style.display = 'none';
  el.parentNode.insertBefore(input, el);
  input.focus();
  input.select();
}

function editMeetingDate(meetingId, el) {
  const meeting = state.meetings.find(m => m.id === meetingId);
  if (!meeting) return;
  const current = meeting.date ? meeting.date.slice(0, 10) : '';
  const input = document.createElement('input');
  input.type = 'date';
  input.value = current;
  input.style.cssText = 'font:12px var(--font-family);border:1px solid var(--accent-interactive);border-radius:var(--radius-sm);padding:2px 4px;';
  input.onblur = () => {
    if (input.value && input.value !== current) {
      meeting.date = input.value + 'T12:00:00.000Z';
      saveState();
      renderMeetings();
      showToast('Meeting date updated');
    } else {
      input.replaceWith(el);
      el.style.display = '';
    }
  };
  input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = current; input.blur(); } };
  el.style.display = 'none';
  el.parentNode.insertBefore(input, el);
  input.focus();
}

async function reanalyzeMeeting(meetingId, btn) {
  const meeting = state.meetings.find(m => m.id === meetingId);
  if (!meeting || !meeting.transcript) { showToast('No transcript to analyze'); return; }
  if (!state.settings.baseUrl) { showToast('Set up AI in Settings first'); return; }
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  try {
    const currentType = meeting.type || 'other';
    const typeLabel = MEETING_TYPES[currentType]?.label || currentType;
    const prompt = buildMeetingIntelligencePrompt(meeting) +
      `\n\nUse type "${currentType}" (${typeLabel}) for extraction. Set confidence to 1.0.`;
    const result = await callClaude(buildMeetingSystemPrompt(), prompt, 2000);
    console.log('Reanalyze raw response:', result);
    const parsed = parseMeetingJson(result);
    meeting.type = parsed.type && MEETING_TYPES[parsed.type] ? parsed.type : currentType;
    meeting.typeConfidence = parsed.confidence || 1.0;
    meeting.summary = parsed.summary || '';
    meeting.actionItems = parsed.actionItems || '';
    meeting.insights = parsed.insights || {};
    parseActionItemsToTodos(meeting);
    saveState();
    renderMeetings();
    showToast('Meeting re-analyzed');
  } catch (e) {
    console.warn('Reanalyze failed:', meetingId, e);
    btn.disabled = false;
    btn.textContent = origText;
    const reason = e.message === 'invalid_key' ? 'invalid API key' :
                   e.message === 'rate_limited' ? 'rate limited — try again' :
                   e.message === 'no_key' ? 'no API configured' :
                   e.message === 'api_error' ? 'API error' :
                   e.message === 'no_json' ? 'AI returned no JSON — check console' : 'parse error — check console';
    showToast('Re-analysis failed: ' + reason);
  }
}

/* ========================================
   To-Do Parsing
   ======================================== */
function parseActionItemsToTodos(meeting) {
  if (!meeting || !meeting.actionItems) return;
  const lines = meeting.actionItems.split('\n')
    .map(l => l.replace(/^[\s\-•*·▸▹►]+/, '').trim())
    .filter(l => l.length >= 5);
  if (!lines.length) return;

  const existing = (state.todos || []).filter(t => t.meetingId === meeting.id);
  const existingNorms = new Set(existing.map(t => t.text.substring(0, 40).toLowerCase().replace(/\s+/g, ' ')));

  for (const line of lines) {
    const norm = line.substring(0, 40).toLowerCase().replace(/\s+/g, ' ');
    if (existingNorms.has(norm)) continue;
    existingNorms.add(norm);
    const id = 'todo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    state.todos.push({
      id,
      text: line,
      meetingId: meeting.id,
      meetingTitle: meeting.title || 'Untitled',
      meetingDate: meeting.date || '',
      status: 'open',
      priority: 'inbox',
      createdAt: new Date().toISOString(),
      completedAt: null,
      addedToIntention: null,
      addedToPlan: null
    });
  }
}

function deleteMeeting(meetingId) {
  const idx = state.meetings.findIndex(m => m.id === meetingId);
  if (idx === -1) return;
  const removed = state.meetings.splice(idx, 1)[0];
  if (!state.deletedMeetingIds) state.deletedMeetingIds = [];
  state.deletedMeetingIds.push(meetingId);
  saveState();
  renderMeetings();
  showToast('Meeting deleted', 5000, () => {
    // Undo: restore meeting and remove from deleted list
    state.meetings.push(removed);
    state.meetings.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    state.deletedMeetingIds = state.deletedMeetingIds.filter(id => id !== meetingId);
    saveState();
    renderMeetings();
  });
}

/* ---- Meeting Import ---- */

function parseTactiqTranscript(text) {
  const lines = text.split('\n');
  let title = '', date = '', participants = '', link = '', transcript = '', duration = 0;

  // Line 2: extract Tactiq link
  for (let i = 0; i < Math.min(5, lines.length); i++) {
    const urlMatch = lines[i].match(/https?:\/\/[^\s)]+tactiq[^\s)]+/i) || lines[i].match(/https?:\/\/[^\s)]+/);
    if (urlMatch && lines[i].toLowerCase().includes('transcript')) { link = urlMatch[0]; break; }
  }

  // Find date | title line
  for (let i = 0; i < Math.min(10, lines.length); i++) {
    const dateTitle = lines[i].match(/^(\d{1,2}\s+\w+\s+\d{4})\s*\|\s*(.+)$/);
    if (dateTitle) {
      const d = new Date(dateTitle[1]);
      if (!isNaN(d)) date = d.toISOString().slice(0, 10);
      title = dateTitle[2].trim();
      break;
    }
  }

  // Attendees line
  for (let i = 0; i < Math.min(10, lines.length); i++) {
    const att = lines[i].match(/^Attendees:\s*(.+)$/i);
    if (att) { participants = att[1].trim(); break; }
  }

  // Find "Transcript" delimiter — everything after is the real transcript
  let transcriptStart = -1;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].trim() === 'Transcript') { transcriptStart = i + 1; break; }
  }
  if (transcriptStart > 0) {
    transcript = lines.slice(transcriptStart).join('\n').trim();
  } else {
    // Fallback: use everything after "Highlights" section ends (after first blank line gap)
    transcript = lines.slice(7).join('\n').trim();
  }

  // Estimate duration from last timestamp in transcript
  const timestamps = transcript.match(/^(\d{1,2}:\d{2}(?::\d{2})?)\s/gm);
  if (timestamps && timestamps.length > 0) {
    const last = timestamps[timestamps.length - 1].trim();
    const parts = last.split(':').map(Number);
    duration = parts.length === 3 ? parts[0] * 3600 + parts[1] * 60 + parts[2] : parts[0] * 60 + parts[1];
  }

  return { title, date, participants, link, transcript, duration: String(duration) };
}

    <button class="sub-nav-btn${meetingsSubTab === 'entries' ? ' active' : ''}" onclick="meetingsSubTab='entries';renderMeetings()">Entries</button>
    <button class="sub-nav-btn${meetingsSubTab === 'insights' ? ' active' : ''}" onclick="meetingsSubTab='insights';renderMeetings()">Insights</button>
  </div>`;
  panel.innerHTML = subNav + `
    <div class="settings-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-lg)">
        <div style="font-weight:600">Import from Tactiq</div>
        <button class="btn-ghost" onclick="renderMeetings()">← Back</button>
      </div>
      <div class="form-hint" style="margin-bottom:var(--space-md)">Paste the full text of a Tactiq Google Doc below. You can paste multiple transcripts — separate them with a blank line between each. The parser extracts title, date, participants, link, and transcript automatically.</div>
      <textarea class="form-textarea" id="importMeetingText" rows="10" placeholder="Paste Tactiq transcript text here..."></textarea>

function previewMeetingImport() {
  const raw = document.getElementById('importMeetingText').value;
  if (!raw.trim()) { showToast('Paste a transcript first'); return; }

  // Split on Tactiq header to support multiple transcripts
  const chunks = raw.split(/(?=Transcript delivered by Tactiq)/i).filter(c => c.trim());
  const parsed = chunks.map(c => parseTactiqTranscript(c));

  const preview = document.getElementById('importPreview');
  if (parsed.length === 0) { preview.innerHTML = '<div style="color:var(--text-muted)">Could not parse any transcripts.</div>'; return; }

  const existingIds = new Set(state.meetings.map(m => m.title + '|' + m.date));

  preview.innerHTML = `
    <div style="font-weight:600;margin-bottom:var(--space-md)">${parsed.length} transcript${parsed.length === 1 ? '' : 's'} found</div>
    ${parsed.map((p, i) => {
      const isDupe = existingIds.has(p.title + '|' + p.date);
      return `<div class="meeting-card" style="margin-bottom:var(--space-md);${isDupe ? 'opacity:0.5' : ''}">
        <div class="meeting-card-header">
          <span class="meeting-card-date">${p.date || 'No date'}</span>
          ${isDupe ? '<span style="font-size:11px;color:var(--accent-negative)">Already imported</span>' : `<label style="font-size:12px;cursor:pointer"><input type="checkbox" class="import-check" data-idx="${i}" checked> Import</label>`}
        </div>
        <div class="meeting-card-title" style="margin-top:var(--space-xs)">${escapeHtml(p.title || 'Untitled')}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">
          ${escapeHtml(p.participants || 'No participants')} · ${meetingDuration({duration: p.duration}) ? Math.round(meetingDuration({duration: p.duration}) / 60) + ' min' : 'unknown duration'}
          ${p.link ? ` · <a href="${escapeHtml(p.link)}" target="_blank" style="color:var(--accent)">Tactiq link</a>` : ''}
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:var(--space-xs)">${p.transcript ? p.transcript.substring(0, 150).replace(/\n/g, ' ') + '...' : 'No transcript'}</div>
      </div>`;
    }).join('')}
    <button class="btn-secondary btn-accent" style="margin-top:var(--space-md)" onclick="executeImport()">Import Selected</button>`;

  // Store parsed data for import
  window._importParsed = parsed;
}

function executeImport() {
  const parsed = window._importParsed;
  if (!parsed) { showToast('No parsed data'); return; }

  const checks = document.querySelectorAll('.import-check');
  const selectedIdx = new Set();
  checks.forEach(cb => { if (cb.checked) selectedIdx.add(parseInt(cb.dataset.idx)); });

  if (selectedIdx.size === 0) { showToast('No meetings selected'); return; }

  const existingIds = new Set(state.meetings.map(m => m.title + '|' + m.date));
  let imported = 0;

  selectedIdx.forEach(i => {
    const p = parsed[i];
    if (existingIds.has(p.title + '|' + p.date)) return;
    const meeting = {
      id: 'import-' + Date.now() + '-' + i,
      title: p.title || 'Untitled',
      date: p.date ? p.date + 'T12:00:00.000Z' : new Date().toISOString(),
      participants: p.participants || '',
      duration: p.duration || '',
      transcript: p.transcript || '',
      link: p.link || '',
      summary: '',
      actionItems: ''
    };
    state.meetings.push(meeting);
    imported++;
  });

  state.meetings.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  saveState();
  showToast(`${imported} meeting${imported === 1 ? '' : 's'} imported`);
  renderMeetings();
}

function renderMeetingCard(m) {
  const typeInfo = MEETING_TYPES[m.type] || MEETING_TYPES['other'];
  const typeOptions = Object.entries(MEETING_TYPES).map(([k, v]) =>
    `<option value="${k}" ${k === (m.type || 'other') ? 'selected' : ''}>${escapeHtml(v.label)}</option>`
  ).join('');

  const dateStr = m.date ? new Date(m.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) : '';

  // Separate career relevance from other insights
  let careerRelevance = '';
  let expandedSections = '';
  if (m.insights && Object.keys(m.insights).length > 0) {
    Object.entries(m.insights)
      .filter(([k, v]) => v && v.trim && v.trim() !== '')
      .forEach(([k, v]) => {
        const label = k.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
        if (k === 'careerRelevance') {
          careerRelevance = `<div class="meeting-card-section">
            <div class="meeting-card-section-label">${escapeHtml(label)}</div>
            <div class="meeting-card-section-body">${formatBulletList(v)}</div>
          </div>`;
        } else {
          expandedSections += `<div class="meeting-card-section">
            <div class="meeting-card-section-label">${escapeHtml(label)}</div>
            <div class="meeting-card-section-body">${formatBulletList(v)}</div>
          </div>`;
        }
      });
  }

  const actionItemsHtml = m.actionItems ? formatBulletList(m.actionItems) : '';

  const participation = computeParticipation(m);
  const metaParts = [];
  if (meetingDuration(m)) metaParts.push(Math.round(meetingDuration(m) / 60) + ' min');
  if (participation !== null) {
    const mins = Math.floor(participation.speakingTime / 60);
    const secs = participation.speakingTime % 60;
    const timeLabel = mins > 0 ? `${mins}m ${secs}s speaking` : `${secs}s speaking`;
    metaParts.push(`<span title="${timeLabel}">${participation.pct}%</span>`);
  }
  if (m.link) metaParts.push(`<a href="${escapeHtml(m.link)}" target="_blank" style="color:var(--accent)">link</a>`);
  const truncated = (m.transcript || '').length > 200000;

  const metaHtml = metaParts.length ? metaParts.join(' &middot; ') : '';

  return `<div class="meeting-card" data-meeting-id="${escapeHtml(m.id)}">
    <div class="meeting-card-header">
      <div class="meeting-card-header-left">
        <span class="meeting-card-date" style="cursor:pointer" title="Click to edit date" onclick="editMeetingDate('${escapeHtml(m.id)}', this)">${dateStr || 'No date'}</span>
        ${truncated ? `<span style="font-size:10px;font-weight:600;color:var(--text-muted);background:var(--bg-primary);padding:2px 6px;border-radius:var(--radius-full);border:1px solid var(--border-default)" title="Transcript is ${Math.round((m.transcript || '').length / 1000)}K chars — analysis used first 40K">Truncated</span>` : ''}
        <select class="meeting-type-select" style="color:${typeInfo.color.text};background-color:${typeInfo.color.bg}" onchange="reprocessMeeting('${escapeHtml(m.id)}', this.value)">
          ${typeOptions}
        </select>
      </div>
      ${metaHtml ? `<div class="meeting-card-header-right">${metaHtml}</div>` : ''}
    </div>
    <div class="meeting-card-title-row">
      <span class="meeting-card-title${(m.title || '') === 'Meeting Transcription' ? ' meeting-title-placeholder' : ''}" style="cursor:pointer" title="Click to edit title" onclick="editMeetingTitle('${escapeHtml(m.id)}', this)">${escapeHtml(m.title || 'Untitled')}${(m.title || '') === 'Meeting Transcription' ? ' <span style="font-size:11px;font-weight:400;color:var(--text-muted)">— click to rename</span>' : ''}</span>
      <span class="meeting-card-actions">
        <button class="btn-reanalyze" onclick="reanalyzeMeeting('${escapeHtml(m.id)}', this)">Reanalyze</button>
        <button class="btn-reanalyze" style="color:var(--accent-negative)" onclick="event.stopPropagation();deleteMeeting('${escapeHtml(m.id)}')">Delete</button>
      </span>
    </div>
    ${m.summary ? `
    <div class="meeting-card-section">
      <div class="meeting-card-section-label">Summary</div>
      <div class="meeting-card-section-body">${formatBulletList(m.summary)}</div>
    </div>` : ''}
    ${m.actionItems ? `
    <div class="meeting-card-section">
      <div class="meeting-card-section-label">Action Items</div>
      <div class="meeting-card-section-body">${actionItemsHtml}</div>
    </div>` : ''}
    ${careerRelevance}
    ${expandedSections ? `
    <div class="meeting-card-section">
      <div class="meeting-card-section-label" style="cursor:pointer" onclick="const b=this.nextElementSibling;b.classList.toggle('hidden');this.querySelector('span').textContent=b.classList.contains('hidden')?'▸ Show details':'▾ Hide details'"><span>▸ Show details</span></div>
      <div class="hidden">${expandedSections}</div>
    </div>` : ''}
    ${!m.summary && m.transcript ? `
    <div class="meeting-card-section">
      <div class="meeting-card-section-label">Transcript</div>
      <div class="meeting-card-section-body">${escapeHtml(m.transcript.substring(0, 200))}${m.transcript.length > 200 ? '...' : ''}</div>
    </div>` : ''}
  </div>`;
}

function copyMeetingSetup(elementId) {
  const el = document.getElementById(elementId);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    showToast('Copied to clipboard');
  }).catch(() => {
    // Fallback: select the text
    const range = document.createRange();
    range.selectNodeContents(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    showToast('Text selected — press Ctrl+C to copy');
  });
}

/* ========================================
   Date Utilities
   ======================================== */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function getDayName(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long' });
}

function getDayShort(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short' }).slice(0, 3);
}

function formatDateDisplay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDateWithYear(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function isMonday(dateStr) { return new Date(dateStr + 'T12:00:00').getDay() === 1; }
function isFriday(dateStr) { return new Date(dateStr + 'T12:00:00').getDay() === 5; }

function getWeekMonday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d);
  mon.setDate(mon.getDate() + diff);
  return mon.toISOString().split('T')[0];
}

function getWeekDates(mondayStr) {
  const dates = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(mondayStr + 'T12:00:00');
    d.setDate(d.getDate() + i);
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates;
}

function getWeekFriday(mondayStr) {
  const d = new Date(mondayStr + 'T12:00:00');
  d.setDate(d.getDate() + 4);
  return d.toISOString().split('T')[0];
}

function getNextWeekday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + 1);
  if (d.getDay() === 6) d.setDate(d.getDate() + 2);
  if (d.getDay() === 0) d.setDate(d.getDate() + 1);
  return d.toISOString().split('T')[0];
}

function formatWeekRange(mondayStr) {
  return formatDateShort(mondayStr) + ' – ' + formatDateShort(getWeekFriday(mondayStr));
}

function getCurrentWeekEntries() {
  const monday = getWeekMonday(todayStr());
  const weekDates = getWeekDates(monday);
  return state.entries.filter(e => weekDates.includes(e.date)).sort((a, b) => a.date.localeCompare(b.date));
}

function getEntryForDate(dateStr) {
  return state.entries.find(e => e.date === dateStr);
}

function getRecentEntries(count = 3) {
  const today = todayStr();
  return state.entries
    .filter(e => e.date < today)
    .sort((a, b) => b.date.localeCompare(a.date))
    .slice(0, count);
}

function getAccumulatedPlanItems() {
  const today = todayStr();
  const monday = getWeekMonday(today);

  // All entries this week before today with planTomorrow, sorted desc
  const priorEntries = state.entries
    .filter(e => e.date >= monday && e.date < today && e.planTomorrow)
    .sort((a, b) => b.date.localeCompare(a.date));

  const yesterdayPlan = priorEntries[0]?.planTomorrow || null;

  // Collect unchecked items from earlier entries (skip most recent = yesterday's)
  const carriedOver = [];
  for (let i = 1; i < priorEntries.length; i++) {
    const entry = priorEntries[i];
    const items = getPlanItems(entry.planTomorrow);
    const nextDay = getNextWeekday(entry.date);
    const checked = state.dayPlanChecked[nextDay] || [];

    items.forEach((text, idx) => {
      const key = `${entry.date}:${idx}`;
      if (!checked.includes(idx) && !state.carriedOverChecked[key]) {
        carriedOver.push({ text, fromDate: entry.date, key });
      }
    });
  }

  // Collect uncompleted visibility tasks from earlier this week
  const weekDates = getWeekDates(monday);
  for (let i = 0; i < weekDates.length; i++) {
    const dateStr = weekDates[i];
    if (dateStr >= today) break;
    const rhythm = typeof WEEKLY_RHYTHM !== 'undefined' ? WEEKLY_RHYTHM[i] : null;
    if (!rhythm) continue;
    const hasActivity = state.visibilityActivities.some(a => a.date === dateStr);
    if (!hasActivity) {
      const key = `visib:${dateStr}`;
      if (!state.carriedOverChecked[key]) {
        carriedOver.push({ text: rhythm.label, fromDate: dateStr, key, isVisibility: true });
      }
    }
  }

  return { yesterdayPlan, carriedOver };
}

function toggleCarriedOverCheck(checkbox) {
  const key = checkbox.dataset.key;
  if (checkbox.checked) {
    state.carriedOverChecked[key] = true;
  } else {
    delete state.carriedOverChecked[key];
  }
  saveState();
  const item = checkbox.closest('.plan-check-item');
  if (item) item.classList.toggle('done', checkbox.checked);
  const text = checkbox.dataset.text;
  if (text) {
    if (checkbox.checked) appendToWorkDone(text);
    else removeFromWorkDone(text);
  }
}

function renderCarriedOverItems(carriedOver) {
  if (!carriedOver.length) return '';
  return `<div class="carried-over-section">
    <div class="carried-over-label">Carried over</div>
    ${carriedOver.map(item => {
      const d = new Date(item.fromDate + 'T12:00:00');
      const dayLabel = d.toLocaleDateString('en-US', { weekday: 'short' });
      if (item.isVisibility) {
        return `<div class="plan-check-item carried-over">
          <input type="checkbox" data-key="${item.key}" data-text="${escapeHtml(item.text)}" onchange="toggleCarriedOverCheck(this)">
          <span><a href="#" onclick="event.preventDefault();visibView='log';visibLogType='';visibLogSubtype='';switchTab('visibility')" style="color:var(--accent-coaching);text-decoration:none;font-weight:500">${escapeHtml(item.text)}</a></span>
          <span class="carried-over-date">${dayLabel}</span>
        </div>`;
      }
      return `<div class="plan-check-item carried-over">
        <input type="checkbox" data-key="${item.key}" data-text="${escapeHtml(item.text)}" onchange="toggleCarriedOverCheck(this)">
        <span>${formatPlanItemText(item.text)}</span>
        <span class="carried-over-date">${dayLabel}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function openDayPlanAdd() {
  const block = document.getElementById('planAddItemBlock');
  if (!block) return;
  block.style.display = 'block';
  const input = block.querySelector('input');
  if (input) input.focus();
}

function addDayPlanItem() {
  const input = document.getElementById('addPlanItemInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const today = todayStr();
  if (!state.dayPlanAdded[today]) state.dayPlanAdded[today] = [];
  state.dayPlanAdded[today].push(text);
  saveState();
  input.value = '';
  renderLogTab();
}

function getStreak() {
  let streak = 0;
  const d = new Date();
  while (true) {
    const dateStr = d.toISOString().split('T')[0];
    const dayOfWeek = d.getDay();
    if (dayOfWeek === 0 || dayOfWeek === 6) {
      d.setDate(d.getDate() - 1);
      continue;
    }
    if (getEntryForDate(dateStr)) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else if (dateStr === todayStr()) {
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function getPreviousWeekBrief() {
  const currentMonday = getWeekMonday(todayStr());
  return state.weeklyBriefs
    .filter(b => b.weekOf < currentMonday)
    .sort((a, b) => b.weekOf.localeCompare(a.weekOf))[0] || null;
}

function getCurrentWeekBrief() {
  const monday = getWeekMonday(todayStr());
  return state.weeklyBriefs.find(b => b.weekOf === monday) || null;
}

function getConfirmedWins() {
  return state.wins.filter(w => w.status === 'confirmed').sort((a, b) => b.date.localeCompare(a.date));
}

/* ========================================
   Toast
   ======================================== */
let toastTimeout = null;

function showToast(message, duration = 3000, undoCallback = null, actionLabel = 'Undo') {
  const container = document.getElementById('toast-container');
  container.innerHTML = '';
  if (toastTimeout) clearTimeout(toastTimeout);

  const isError = /fail|error|warning|nearly full/i.test(message);
  const toast = document.createElement('div');
  toast.className = 'toast' + (isError ? ' toast-error' : '');

  const dismiss = isError ? ' <span class="toast-dismiss">&times;</span>' : '';
  toast.innerHTML = message + (undoCallback ? ` <span class="toast-undo">${actionLabel}</span>` : '') + dismiss;
  container.appendChild(toast);

  if (undoCallback) {
    toast.querySelector('.toast-undo').onclick = () => {
      undoCallback();
      container.innerHTML = '';
      if (toastTimeout) clearTimeout(toastTimeout);
    };
  }

  if (isError) {
    toast.querySelector('.toast-dismiss').onclick = () => {
      toast.classList.add('exiting');
      setTimeout(() => { container.innerHTML = ''; }, 300);
    };
  } else if (duration > 0) {
    toastTimeout = setTimeout(() => {
      toast.classList.add('exiting');
      setTimeout(() => { container.innerHTML = ''; }, 300);
    }, duration);
  }
}

/* ========================================
   To-Dos Tab
   ======================================== */
function todoAge(createdAt) {
  const ms = Date.now() - new Date(createdAt).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return 'just now';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + 'd ago';
  const weeks = Math.floor(days / 7);
  if (weeks < 5) return weeks + 'w ago';
  const months = Math.floor(days / 30);
  return months + 'mo ago';
}

function getTodoCounts() {
  const todos = state.todos || [];
  const open = todos.filter(t => t.status === 'open');
  return {
    inbox: open.filter(t => t.priority === 'inbox').length,
    today: open.filter(t => t.priority === 'today').length,
    tomorrow: open.filter(t => t.priority === 'tomorrow').length,
    'this-week': open.filter(t => t.priority === 'this-week').length,
    backlog: open.filter(t => t.priority === 'backlog' || t.priority === 'later').length,
    done: todos.filter(t => t.status === 'done').length
  };
}

function renderTodos() {
  const panel = document.getElementById('panel-todos');
  if (!panel) return;
  const counts = getTodoCounts();
  const filters = [
    { key: 'inbox', label: 'Inbox' },
    { key: 'today', label: 'Today' },
    { key: 'tomorrow', label: 'Tomorrow' },
    { key: 'this-week', label: 'This Week' },
    { key: 'backlog', label: 'Backlog' },
    { key: 'done', label: 'Done' }
  ];

  let items;
  if (todosFilter === 'done') {
    items = (state.todos || []).filter(t => t.status === 'done').sort((a, b) => (b.starred ? 1 : 0) - (a.starred ? 1 : 0) || (b.completedAt || '').localeCompare(a.completedAt || ''));
  } else {
    items = (state.todos || []).filter(t => t.status === 'open' && (t.priority === todosFilter || (todosFilter === 'backlog' && t.priority === 'later'))).sort((a, b) => (b.starred ? 1 : 0) - (a.starred ? 1 : 0) || (a.createdAt || '').localeCompare(b.createdAt || ''));
  }

  // Apply age filter
  if (todosAgeFilter !== 'all' && items.length > 0) {
    const now = Date.now();
    const cutoffs = { '1d': 86400000, '1w': 604800000, '2w': 1209600000, '1m': 2592000000 };
    const cutoff = cutoffs[todosAgeFilter];
    if (cutoff) items = items.filter(t => t.createdAt && (now - new Date(t.createdAt).getTime()) >= cutoff);
  }

  const isMobile = window.innerWidth <= 600;
  const filterHtml = filters.map(f => {
    const count = !isMobile && counts[f.key] ? ' (' + counts[f.key] + ')' : '';
    return `<button class="sub-nav-btn${todosFilter === f.key ? ' active' : ''}" onclick="todosFilter='${f.key}';todosAgeFilter='all';renderTodos()">${f.label}${count}</button>`;
  }).join('');

  const triageBtnHtml = todosFilter === 'inbox' && items.length > 0
    ? `<button class="btn-secondary btn-accent" style="font-size:${isMobile ? '15px' : '12px'};${isMobile ? 'width:100%;padding:var(--space-lg) var(--space-xl);display:flex;justify-content:center;align-items:center' : ''}" onclick="openMobileTriage('inbox')">Triage To-Dos (${items.length})</button>`
    : '';

  const emptyMessages = {
    inbox: 'No new action items. Meeting action items will appear here automatically.',
    today: 'No items for today. Move items here from Inbox.',
    'this-week': 'No items for this week.',
    later: 'No items in the backlog.',
    done: 'No completed items yet.'
  };

  let listHtml;
  if (!items.length) {
    listHtml = `<div class="todo-empty">${emptyMessages[todosFilter]}</div>`;
  } else if (todosFilter === 'inbox') {
    listHtml = items.map(t => renderTodoItem(t)).join('');
  } else {
    listHtml = items.map(t => renderTodoItem(t)).join('');
  }

  panel.innerHTML = `
    <div style="margin-bottom:var(--space-xl)">
      <div class="sub-nav" style="margin-bottom:0">${filterHtml}</div>
      ${triageBtnHtml ? `<div style="margin-top:var(--space-md)">${triageBtnHtml}</div>` : ''}
    </div>
    ${todosFilter !== 'done' ? `<div class="todo-add-item" style="display:flex;gap:var(--space-sm);align-items:center">
      <input type="text" id="addManualTodoInput" style="flex:1" placeholder="Add a to-do..." onkeydown="if(event.key==='Enter'){addManualTodo();event.preventDefault()}">
      <button class="todo-add-recurrence${newTodoRecurrence ? ' active' : ''}" onclick="toggleNewTodoRecurrenceMenu(this)">${recurrenceLabel(newTodoRecurrence)}</button>
    </div>` : ''}
    <div class="todo-list">${listHtml}</div>
  `;
}

function renderTodoItem(todo) {
  const isDone = todo.status === 'done';
  const isManual = !todo.meetingId;
  const meeting = isManual ? null : state.meetings.find(m => m.id === todo.meetingId);
  const meetingDeleted = !meeting && todo.meetingId;
  let sourceLabel, sourceClick, sourceClass;
  if (todo.source === 'recurring') {
    sourceLabel = 'Recurring';
    sourceClick = '';
    sourceClass = 'todo-source';
  } else if (isManual) {
    sourceLabel = 'Manually added';
    sourceClick = '';
    sourceClass = 'todo-source';
  } else {
    sourceLabel = meetingDeleted
      ? `${escapeHtml(todo.meetingTitle)} (deleted)`
      : escapeHtml(todo.meetingTitle || 'Unknown meeting');
    sourceClick = meeting ? `onclick="navigateToMeeting('${escapeHtml(todo.meetingId)}')"` : '';
    sourceClass = meeting ? 'todo-source clickable' : 'todo-source';
  }

  // No priority buttons for inbox items — use triage flow instead
  let priorityBtns = '';
  if (!isDone && todo.priority !== 'inbox') {
    const allPriorities = ['today', 'tomorrow', 'this-week', 'backlog'];
    const labels = { inbox: 'Inbox', today: 'Today', tomorrow: 'Tomorrow', 'this-week': 'This Week', backlog: 'Backlog', later: 'Backlog' };
    const available = allPriorities.filter(p => p !== todo.priority);
    const gridItems = [...available.slice(0, 3), 'inbox'].slice(0, 4);
    priorityBtns = gridItems.map(p =>
      `<button class="todo-priority-btn" onclick="setTodoPriority('${todo.id}','${p}')">${labels[p] || p}</button>`
    ).join('');
  }

  const addedIndicators = [];
  if (todo.addedToIntention) addedIndicators.push('Added to intention');
  if (todo.addedToPlan) addedIndicators.push('Added to plan');
  const addedHtml = addedIndicators.length ? `<span class="todo-added-indicator">${addedIndicators.join(' · ')}</span>` : '';

  const recurrenceMeta = todo.recurrence
    ? `<span class="todo-recurrence-badge" onclick="toggleTodoRecurrenceMenu('${todo.id}', this)" title="Change recurrence">🔄 ${recurrenceLabel(todo.recurrence)}</span>`
    : (!isDone ? `<button class="todo-recurrence-btn" onclick="toggleTodoRecurrenceMenu('${todo.id}', this)">+ repeat</button>` : '');

  return `<div class="todo-item${isDone ? ' done' : ''}${todo.starred ? ' starred' : ''}" data-todo-id="${todo.id}">
    <div class="todo-item-main">
      <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleTodo('${todo.id}')">
      <button class="todo-star${todo.starred ? ' starred' : ''}" onclick="toggleTodoStar('${todo.id}')" title="${todo.starred ? 'Unstar' : 'Star'}">${todo.starred ? '★' : '☆'}</button>
      <div class="todo-item-content">
        <div class="todo-text" ondblclick="startEditTodo('${todo.id}')">${escapeHtml(todo.text)}</div>
        <div class="todo-meta">
          <span class="${sourceClass}" ${sourceClick}>${sourceLabel}</span>
          ${!isManual && todo.meetingDate ? `<span class="todo-date">${(todo.meetingDate || '').substring(0, 10)}</span>` : ''}
          <span class="todo-age">${todoAge(todo.createdAt)}</span>
          ${recurrenceMeta}
          ${addedHtml}
        </div>
      </div>
    </div>
    ${priorityBtns ? `<div class="todo-actions">${priorityBtns}</div>` : ''}
    ${isDone ? '' : `<button class="todo-dismiss-btn" onclick="dismissTodo('${todo.id}')" title="Dismiss">&times;</button>`}
  </div>`;
}

function setTodoPriority(id, priority) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo) return;
  todo.priority = priority;
  todo.triagedAt = new Date().toISOString();
  saveState();
  renderTodos();
}

function toggleTodo(id) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo) return;
  if (todo.status === 'done') {
    todo.status = 'open';
    todo.completedAt = null;
    saveState();
    renderTodos();
  } else {
    todo.status = 'done';
    todo.completedAt = new Date().toISOString();
    const todayEntry = getEntryForDate(todayStr());
    if (todayEntry && todayEntry.workDone && !todayEntry.workDone.includes(todo.text)) {
      todayEntry.workDone += '\n✓ ' + todo.text;
    }
    // Spawn next recurring instance
    if (todo.recurrence) {
      const hasOpenChild = state.todos.some(t => t.parentId === todo.id && t.status === 'open');
      if (!hasOpenChild) {
        spawnRecurringInstance(todo);
        showToast('Next recurring to-do created');
      }
    }
    saveState();
    renderTodos();
    showFollowUpPrompt(id, 'todos');
  }
}

function toggleTodoStar(id) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo) return;
  todo.starred = !todo.starred;
  saveState();
  renderTodos();
}

function showFollowUpPrompt(todoId, context) {
  // Check chain depth
  const todo = state.todos.find(t => t.id === todoId);
  if (!todo) return;
  let depth = 0;
  let parent = todo;
  while (parent.parentId && depth < 5) {
    parent = state.todos.find(t => t.id === parent.parentId);
    if (!parent) break;
    depth++;
  }

  const containerId = context === 'todos' ? `todo-item-${todoId}` : `focus-item-${todoId}`;
  const container = document.getElementById(containerId) || document.querySelector(`[data-todo-id="${todoId}"]`);
  if (!container) return;

  // Remove any existing follow-up prompt
  const existing = document.getElementById('followUpPrompt');
  if (existing) existing.remove();

  const prompt = document.createElement('div');
  prompt.id = 'followUpPrompt';
  prompt.className = 'follow-up-prompt';
  prompt.innerHTML = `
    <div class="follow-up-header">+ Follow up?${depth >= 3 ? ' <span style="color:var(--text-muted);font-size:11px">(chain depth: ' + depth + ')</span>' : ''}</div>
    <input class="form-input follow-up-input" id="followUpText" placeholder="What's the next step?">
    <div class="follow-up-schedule">
      <button class="follow-up-when" data-days="0">Today</button>
      <button class="follow-up-when active" data-days="1">Tomorrow</button>
      <button class="follow-up-when" data-days="3">3 days</button>
      <button class="follow-up-when" data-days="7">1 week</button>
      <button class="btn-secondary follow-up-create" onclick="createFollowUp('${todoId}')">Create</button>
    </div>`;
  container.after(prompt);

  // Wire up schedule buttons
  prompt.querySelectorAll('.follow-up-when').forEach(btn => {
    btn.addEventListener('click', () => {
      prompt.querySelectorAll('.follow-up-when').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  const input = document.getElementById('followUpText');
  input.focus();
  input.addEventListener('keydown', e => { if (e.key === 'Enter') createFollowUp(todoId); if (e.key === 'Escape') prompt.remove(); });

  // Auto-dismiss after 8 seconds of no interaction
  let dismissTimer = setTimeout(() => prompt.remove(), 8000);
  prompt.addEventListener('mouseenter', () => clearTimeout(dismissTimer));
  prompt.addEventListener('mouseleave', () => { dismissTimer = setTimeout(() => prompt.remove(), 5000); });
}

function createFollowUp(parentId) {
  const input = document.getElementById('followUpText');
  const text = input ? input.value.trim() : '';
  if (!text) return;

  const prompt = document.getElementById('followUpPrompt');
  const activeWhen = prompt?.querySelector('.follow-up-when.active');
  const days = parseInt(activeWhen?.dataset.days || '1');

  const scheduled = new Date();
  scheduled.setDate(scheduled.getDate() + days);
  const scheduledFor = days === 0 ? null : scheduled.toISOString().split('T')[0];

  const id = 'todo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  state.todos.push({
    id, text, status: 'open',
    priority: days === 0 ? 'today' : 'backlog',
    source: 'follow-up', parentId,
    scheduledFor,
    createdAt: new Date().toISOString(),
    completedAt: null, triagedAt: null
  });
  saveState();

  if (prompt) prompt.remove();
  showToast('Follow-up created' + (scheduledFor ? ' — scheduled for ' + scheduledFor : ''));
}

function dismissTodo(id) {
  const todo = state.todos.find(t => t.id === id);
  if (!todo) return;
  todo.status = 'dismissed';
  todo.completedAt = new Date().toISOString();
  saveState();
  renderTodos();
  showToast('To-do dismissed', 5000, () => {
    todo.status = 'open';
    todo.completedAt = null;
    saveState();
    renderTodos();
  });
}

/* ---- Recurring To-Dos ---- */
function recurrenceLabel(freq) {
  const map = { daily: 'Daily', weekdays: 'Weekdays', weekly: 'Weekly', biweekly: 'Biweekly', monthly: 'Monthly' };
  return map[freq] || 'Once';
}

function getNextRecurrenceDate(frequency, fromDate) {
  const d = fromDate ? new Date(fromDate + 'T00:00:00') : new Date();
  switch (frequency) {
    case 'daily': d.setDate(d.getDate() + 1); break;
    case 'weekdays':
      d.setDate(d.getDate() + 1);
      while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() + 1);
      break;
    case 'weekly': d.setDate(d.getDate() + 7); break;
    case 'biweekly': d.setDate(d.getDate() + 14); break;
    case 'monthly': d.setMonth(d.getMonth() + 1); break;
    default: return null;
  }
  return d.toISOString().split('T')[0];
}

function spawnRecurringInstance(todo) {
  const newTodo = {
    id: 'todo_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    text: todo.text,
    meetingId: null, meetingTitle: null, meetingDate: null,
    status: 'open',
    priority: 'inbox',
    source: 'recurring',
    recurrence: todo.recurrence,
    scheduledFor: getNextRecurrenceDate(todo.recurrence, todayStr()),
    parentId: todo.id,
    createdAt: new Date().toISOString(),
    completedAt: null,
    triagedAt: null,
    starred: false
  };
  state.todos.push(newTodo);
  return newTodo;
}

function checkRecurringTodos() {
  const today = todayStr();
  let changed = false;
  for (const todo of (state.todos || [])) {
    if (todo.status !== 'open' || !todo.recurrence || !todo.scheduledFor) continue;
    if (todo.scheduledFor > today) continue;
    // Don't spawn if an open child already exists
    const hasOpenChild = state.todos.some(t => t.parentId === todo.id && t.status === 'open');

    spawnRecurringInstance(todo);
    todo.scheduledFor = getNextRecurrenceDate(todo.recurrence, today);
    changed = true;
  }
  if (changed) saveState();
}

function getSystemPrompt() {

async function callClaude(systemPrompt, userPrompt, maxTokens) {
  if (!state.settings.baseUrl) throw new Error('no_key');

  const model = state.settings.model === 'opus' ? 'claude-opus-4-6' : 'claude-sonnet-4-6';
  const baseUrl = state.settings.baseUrl.replace(/\/+$/, '');

  const headers = { 'Content-Type': 'application/json' };
  if (state.settings.projectId) {
    headers['x-netflix-copilot-project-id'] = state.settings.projectId;
  }
  if (state.settings.apiKey) {
    headers['Authorization'] = 'Bearer ' + state.settings.apiKey;
  }

  const res = await fetch(baseUrl + '/v1/chat/completions', {
    method: 'POST',
    headers,
    body: JSON.stringify({
      model,
      max_tokens: maxTokens,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userPrompt }
      ]
    })
  });

  if (!res.ok) {
    if (res.status === 401 || res.status === 403) throw new Error('invalid_key');
    if (res.status === 429) throw new Error('rate_limited');
    let detail = '';
    try { const errBody = await res.text(); detail = errBody.substring(0, 500); } catch (_) {}
    console.error('API error:', res.status, detail);
    throw new Error('api_error: ' + res.status + ' ' + detail);
  }

  const data = await res.json();
  return data.choices[0].message.content;
}

function parseWeeklyBrief(text) {
  const sections = { patterns: '', vectorCheckIn: '', winsRaw: '', oneOnOnePrep: '' };
  const parts = text.split(/^## /m).filter(Boolean);

  for (const part of parts) {
    const firstLine = part.split('\n')[0].trim().toUpperCase();
    const content = part.split('\n').slice(1).join('\n').trim();
    if (firstLine.includes('PATTERN')) sections.patterns = content;
    else if (firstLine.includes('VECTOR')) sections.vectorCheckIn = content;
    else if (firstLine.includes('WIN')) sections.winsRaw = content;
    else if (firstLine.includes('1:1') || firstLine.includes('PREP')) sections.oneOnOnePrep = content;
  }

  const wins = [];
  const winRegex = /WIN:\s*(.+?)(?:\n)IMPACT:\s*(.+?)(?:\n)VECTOR:\s*(.+?)(?=\n\s*\n|\n*WIN:|\s*$)/gs;
  let match;
  while ((match = winRegex.exec(sections.winsRaw)) !== null) {
    wins.push({ description: match[1].trim(), impact: match[2].trim(), vector: match[3].trim() });
  }

  return { ...sections, winsDetected: wins };
}

function meetingDateStr(m) {
  // Normalize meeting date (ISO string or YYYY-MM-DD) to YYYY-MM-DD in local timezone
  if (!m.date) return '';
  if (m.date.length <= 10) return m.date;
  const d = new Date(m.date);
  if (isNaN(d.getTime())) return m.date.substring(0, 10);
  // Use local date parts to avoid UTC offset issues (e.g., 2026-03-20T04:00Z = Mar 19 in Pacific)
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${mo}-${day}`;
}

function findMeetingsForPrep(record) {
  const since = record.lastConnected;
  if (!since) return [];
  const names = record.stakeholders.map(s => s.name.trim().toLowerCase());
  const titleMatch = record.recurringTitle ? record.recurringTitle.trim().toLowerCase() : '';
  return state.meetings.filter(m => {
    const mDate = meetingDateStr(m);
    if (!mDate || mDate < since) return false;
    const participantsLower = (m.participants || '').toLowerCase();
    const transcriptLower = (m.transcript || '').toLowerCase().substring(0, 2000);
    const titleLower = (m.title || '').toLowerCase();
    if (titleMatch && titleLower.includes(titleMatch)) return true;
    return names.some(n => participantsLower.includes(n) || transcriptLower.includes(n));
  }).sort((a, b) => meetingDateStr(b).localeCompare(meetingDateStr(a))).slice(0, 5);
}

function meetingTitleMatches(meetingTitle, recurringTitle) {
  const mt = (meetingTitle || '').toLowerCase();
  const rt = recurringTitle.toLowerCase();
  if (mt.includes(rt) || rt.includes(mt)) return true;
  // Also match by stakeholder names in the title (e.g., "Sharania / Mo" matches a prep with stakeholder "Sharania")
  return false;
}

function findUnprocessedMeetings(record) {
  const titleMatch = record.recurringTitle ? record.recurringTitle.trim().toLowerCase() : '';
  if (!titleMatch) return [];
  const syntheses = record.syntheses || [];
  const processedIds = new Set(syntheses.map(s => s.meetingId));
  const stakeholderNames = record.stakeholders.map(s => s.name.trim().toLowerCase());
  return state.meetings
    .filter(m => {
      if (!meetingDateStr(m)) return false;
      if (processedIds.has(m.id)) return false;
      const mt = (m.title || '').toLowerCase();
      // Match by title inclusion (bidirectional)
      if (mt.includes(titleMatch) || titleMatch.includes(mt)) return true;
      // Match by stakeholder name appearing in meeting title
      if (stakeholderNames.some(n => mt.includes(n))) return true;
      return false;
    })
    .sort((a, b) => meetingDateStr(b).localeCompare(meetingDateStr(a)));
}

    }).join('\n---\n');
  }

  const entries = state.entries.filter(e => e.date && e.date >= since).sort((a, b) => a.date.localeCompare(b.date));
  let entriesText = '';

    ).join('\n');
  }

  const prevPrep = record.preps.length > 0 ? record.preps[0] : null;
  let prevText = '';
  if (prevPrep) {
    prevText = `Previous conversation arc: ${prevPrep.conversationArc || 'none'}\nPrevious commitments: ${prevPrep.commitments || 'none'}`;
  }

  const toneGuide = {
    strategic: 'Frame talking points at a strategic level — big picture positioning, org-level impact, long-term trajectory. Avoid tactical minutiae.',
    tactical: 'Frame talking points at a tactical level — specific deliverables, timelines, execution details, blockers. Be concrete and actionable.',
    coaching: 'Frame talking points around growth, feedback, and development — what you learned, where you stretched, what you need guidance on. Be reflective.',
    visibility: 'Frame talking points to showcase impact and influence — what you shipped, who you influenced, what changed because of your work. Emphasize reach and outcomes.'
  };

  return `<promotion_context>
${promo}
</promotion_context>

<stakeholders>
${stakeholderList}
</stakeholders>

<meeting_context>
Purpose: ${record.meetingPurpose || 'general check-in'}

Last connected: ${since}
</meeting_context>

${meetings.length > 0 ? `<relevant_meetings_since_${since}>
${meetingsText}
</relevant_meetings_since_${since}>

` : '<no_meetings_found>No meeting transcripts found since last connected date.</no_meetings_found>\n\n'}${entries.length > 0 ? `<journal_entries_since_${since}>
${entriesText}
</journal_entries_since_${since}>

` : '<no_entries>No journal entries found since last connected date.</no_entries>\n\n'}${prevText ? `<previous_prep>
${prevText}
</previous_prep>

` : ''}${(() => {
  const syntheses = record.syntheses || [];
  if (syntheses.length === 0) return '';
  const synthText = syntheses.map(s =>
    `[${s.meetingDate}] ${s.meetingTitle}\nReflection: ${s.reflection}\nSynthesis: ${s.synthesis}\nAction Items: ${s.actionItems}`
  ).join('\n---\n');
  return `<post_meeting_syntheses>\n${synthText}\n</post_meeting_syntheses>\n\n`;
})()}Tone guidance: ${(Array.isArray(record.meetingTone) ? record.meetingTone : [record.meetingTone || 'strategic']).map(t => toneGuide[t]).filter(Boolean).join(' ')}

Generate a meeting prep brief with these exact sections:

## SINCE LAST TIME
What you've worked on since ${since}. Key accomplishments, shifts in focus, things the stakeholder should know about. Be specific.

## COMMITMENT TRACKER
Things you said you'd do (from meeting action items, journal entries, and previous prep):
Format each as: - [commitment] → DONE / OPEN / STALE
If no commitments found, say so honestly.

## THEIR SIGNALS
Things these stakeholders raised in past meetings — their priorities, feedback they gave, concerns they expressed, decisions they made. Reference specific meetings and quote when possible.

## PATTERN FLAGS
Repeated blockers you never escalated, recurring themes across meetings, sentiment shifts, or patterns that warrant attention. Flag if you mentioned something 2+ times without resolution. If none, say so.

## SUGGESTED FRAMING
3-4 talking points adapted to the stakeholder roles (${record.stakeholders.map(s => s.role).join(', ')}) and the ${formatTones(record.meetingTone)} tone. Each should be 2-3 sentences with specific evidence from your work or past meetings. These should be ready to speak aloud.

## CONVERSATION ARC
How your relationship with these stakeholders has evolved based on available evidence. What themes keep recurring? What's shifting? Where is the dynamic heading?`;
}

function parseMeetingPrep(text) {
  const sections = {
    sinceLastTime: '', commitments: '', theirSignals: '',
    patternFlags: '', suggestedFraming: '', conversationArc: ''
  };
  const parts = text.split(/^## /m).filter(Boolean);
  for (const part of parts) {
    const firstLine = part.split('\n')[0].trim().toUpperCase();
    const content = part.split('\n').slice(1).join('\n').trim();
    if (firstLine.includes('SINCE')) sections.sinceLastTime = content;
    else if (firstLine.includes('COMMITMENT')) sections.commitments = content;
    else if (firstLine.includes('SIGNAL')) sections.theirSignals = content;
    else if (firstLine.includes('PATTERN')) sections.patternFlags = content;
    else if (firstLine.includes('FRAMING') || firstLine.includes('TALKING')) sections.suggestedFraming = content;
    else if (firstLine.includes('ARC')) sections.conversationArc = content;
  }
  return sections;
}

async function startGenerateMeetingPrep(prepId) {
  const record = state.meetingPreps.find(p => p.id === prepId);
  if (!record) { showToast('Prep record not found'); return; }
  if (!state.settings.baseUrl) { showToast('Set up AI in Settings first'); return; }

  currentMeetingPrepId = prepId;
  meetingPrepView = 'loading';
  briefsSubView = 'meeting-prep';
  renderBriefs();

  try {
    const prompt = buildMeetingPrepPrompt(record);
    const systemPrompt = getSystemPrompt() + '\n\nFor this meeting prep, produce a structured response in exactly the format specified. Be specific, reference actual meetings and entries. Never fabricate.';
    const text = await callClaude(systemPrompt, prompt, 2500);
    const parsed = parseMeetingPrep(text);

    const prep = {
      id: Date.now(),
      generatedAt: new Date().toISOString(),
      lastConnected: record.lastConnected,
      ...parsed,
      raw: text
    };
    record.preps.unshift(prep);
    record.lastConnected = todayStr();
    saveState();

    meetingPrepView = 'detail';

    showToast('Meeting prep generated');
  } catch (e) {

    meetingPrepView = 'detail';

    const reason = e.message === 'invalid_key' ? 'invalid API key' :
                   e.message === 'rate_limited' ? 'rate limited' :
                   e.message === 'no_key' ? 'no API configured' : 'generation failed';
    showToast('Meeting prep failed: ' + reason);
  }
}

function buildSynthesisPrompt(record, meeting, reflection) {
  const stakeholderList = record.stakeholders.map(s => `${s.name} — ${s.role}`).join('\n');
  const syntheses = record.syntheses || [];

  let transcriptText = '';
  if (meeting.transcript) transcriptText = meeting.transcript.substring(0, 12000);

  let meetingContext = `[${meetingDateStr(meeting)}] ${meeting.title || 'Untitled'}`;
  if (meeting.summary) meetingContext += `\nSummary: ${meeting.summary}`;
  if (meeting.actionItems) meetingContext += `\nAction items from transcript: ${meeting.actionItems}`;
  if (meeting.insights) {
    const insightEntries = Object.entries(meeting.insights).filter(([k, v]) => v && typeof v === 'string' && v.trim());
    if (insightEntries.length > 0) meetingContext += '\nInsights: ' + insightEntries.map(([k, v]) => `${k}: ${v}`).join(' | ');
  }

  let pastSynthesesText = '';
  if (syntheses.length > 0) {
    pastSynthesesText = syntheses.map(s =>
      `[${s.meetingDate}] ${s.meetingTitle}\nReflection: ${s.reflection}\nSynthesis: ${s.synthesis}\nAction Items: ${s.actionItems}`
    ).join('\n---\n');
  }

  return `<stakeholders>
${stakeholderList}
</stakeholders>

<meeting_context>
Purpose: ${record.meetingPurpose || 'general check-in'}
Tone: ${formatTones(record.meetingTone)}
</meeting_context>

<meeting_details>
${meetingContext}
</meeting_details>

${transcriptText ? `<meeting_transcript>
${transcriptText}
</meeting_transcript>

` : ''}<post_meeting_reflection>
${reflection}
</post_meeting_reflection>

${pastSynthesesText ? `<previous_syntheses>
${pastSynthesesText}
</previous_syntheses>

` : ''}You are synthesizing a post-meeting reflection. The user just attended this meeting and wrote their reflection above. Combine the meeting transcript, any summary/action items, and the user's reflection into a concise synthesis.

Generate exactly these two sections:

## SYNTHESIS
Distilled takeaways from this meeting. What was discussed, what decisions were made, what shifted. Be specific and reference the transcript. Connect to themes from previous syntheses if relevant.

## ACTION ITEMS
Concrete next steps with owners where identifiable. Format each as: - [action] (owner if known)
Include items from the transcript, the user's reflection, and any that emerge from the synthesis.`;
}

function parseSynthesis(text) {
  const result = { synthesis: '', actionItems: '' };
  const parts = text.split(/^## /m).filter(Boolean);
  for (const part of parts) {
    const firstLine = part.split('\n')[0].trim().toUpperCase();
    const content = part.split('\n').slice(1).join('\n').trim();
    if (firstLine.includes('SYNTHESIS')) result.synthesis = content;
    else if (firstLine.includes('ACTION')) result.actionItems = content;
  }
  return result;
}

async function startGenerateSynthesis(prepId, reflection) {
  const record = state.meetingPreps.find(p => p.id === prepId);
  if (!record) { showToast('Prep record not found'); return; }
  if (!state.settings.baseUrl) { showToast('Set up AI in Settings first'); return; }

  const meeting = state.meetings.find(m => m.id === selectedSynthesisMeetingId);
  if (!meeting) { showToast('Selected meeting not found'); return; }

  try {
    const prompt = buildSynthesisPrompt(record, meeting, reflection);
    const systemPrompt = getSystemPrompt() + '\n\nSynthesize the post-meeting reflection with the transcript. Be specific, reference actual content. Never fabricate.';
    const text = await callClaude(systemPrompt, prompt, 1500);
    const parsed = parseSynthesis(text);

    const synthId = Date.now();
    if (!record.syntheses) record.syntheses = [];
    record.syntheses.unshift({
      id: synthId,
      meetingId: meeting.id,
      meetingDate: meetingDateStr(meeting),
      meetingTitle: meeting.title || 'Untitled',
      reflection,
      synthesis: parsed.synthesis,
      actionItems: parsed.actionItems,
      generatedAt: new Date().toISOString(),
      raw: text
    });
    // Add action items to todos inbox
    if (parsed.actionItems) {
      parseActionItemsToTodos({ id: 'synth-' + synthId, actionItems: parsed.actionItems, title: meeting.title || 'Untitled', date: meeting.date });
    }
    selectedSynthesisMeetingId = null;
    synthesisLoadingForPrepId = null;
    lastGeneratedSynthesisId = synthId;
    saveState();
    renderBriefs();
    showToast('Synthesis generated');
  } catch (e) {
    console.warn('Synthesis generation failed:', e);
    synthesisLoadingForPrepId = null;
    // Save the reflection even on failure so it's not lost
    if (!record.syntheses) record.syntheses = [];
    record.syntheses.unshift({
      id: Date.now(),
      meetingId: meeting.id,
      meetingDate: meetingDateStr(meeting),
      meetingTitle: meeting.title || 'Untitled',
      reflection,
      synthesis: '',
      actionItems: '',
      generatedAt: new Date().toISOString(),
      raw: '',
      failed: true
    });
    selectedSynthesisMeetingId = null;
    saveState();
    renderBriefs();
    const reason = e.message === 'invalid_key' ? 'invalid API key' :
                   e.message === 'rate_limited' ? 'rate limited' :
                   e.message === 'no_key' ? 'no API configured' : 'generation failed';
    showToast('Synthesis failed: ' + reason);
  }
}

let dismissedNudges = new Set(); // in-memory only, resets on reload

function getMeetingNudges() {
  const today = todayStr();
  const twoDaysAgo = new Date();
  twoDaysAgo.setDate(twoDaysAgo.getDate() - 2);
  const cutoff = twoDaysAgo.toISOString().split('T')[0];
  const nudges = [];
  for (const record of (state.meetingPreps || [])) {
    const unprocessed = findUnprocessedMeetings(record);
    for (const m of unprocessed) {
      if (meetingDateStr(m) < cutoff) continue; // only nudge for meetings within last 2 days
      if (dismissedNudges.has(m.id)) continue;
      nudges.push({ meeting: m, record });
    }
  }
  return nudges.sort((a, b) => meetingDateStr(b.meeting).localeCompare(meetingDateStr(a.meeting))).slice(0, 3);
}

function renderMeetingNudgeBanners() {
  const nudges = getMeetingNudges();
  if (nudges.length === 0) return '';
  return nudges.map(n => {
    const d = new Date(meetingDateStr(n.meeting) + 'T00:00:00');
    const ds = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const stakeholderStr = n.record.stakeholders.map(s => s.name).join(', ');
    const meetingIdEsc = escapeHtml(JSON.stringify(n.meeting.id));
    return `<div class="meeting-nudge-banner" onclick='openNudgeReflection(${n.record.id}, ${meetingIdEsc})'>
      <button class="meeting-nudge-banner-dismiss" onclick='event.stopPropagation();dismissedNudges.add(${meetingIdEsc});document.getElementById("meetingNudges").innerHTML=renderMeetingNudgeBanners()'>×</button>
      <div class="meeting-nudge-banner-text">
        <div class="meeting-nudge-banner-title">${escapeHtml(n.meeting.title || 'Untitled')} · ${ds}</div>
        <div class="meeting-nudge-banner-meta">with ${escapeHtml(stakeholderStr)}</div>
      </div>
      <div class="meeting-nudge-banner-cta">Write reflection →</div>
    </div>`;
  }).join('');
}

async function retrySynthesis(prepId, synthIndex) {
  const record = state.meetingPreps.find(p => p.id === prepId);
  if (!record || !record.syntheses[synthIndex]) return;
  const failedSynth = record.syntheses[synthIndex];
  if (!state.settings.baseUrl) { showToast('Set up AI in Settings first'); return; }

  const meeting = state.meetings.find(m => m.id === failedSynth.meetingId);
  if (!meeting) { showToast('Original meeting not found'); return; }

  synthesisLoadingForPrepId = prepId;
  renderBriefs();

  try {
    const prompt = buildSynthesisPrompt(record, meeting, failedSynth.reflection);
    const systemPrompt = getSystemPrompt() + '\n\nSynthesize the post-meeting reflection with the transcript. Be specific, reference actual content. Never fabricate.';
    const text = await callClaude(systemPrompt, prompt, 1500);
    const parsed = parseSynthesis(text);

    failedSynth.synthesis = parsed.synthesis;
    failedSynth.actionItems = parsed.actionItems;
    failedSynth.raw = text;
    delete failedSynth.failed;
    failedSynth.generatedAt = new Date().toISOString();

    // Add action items to todos inbox
    if (parsed.actionItems) {
      parseActionItemsToTodos({ id: 'synth-' + failedSynth.id, actionItems: parsed.actionItems, title: meeting.title || 'Untitled', date: meeting.date });
    }

    synthesisLoadingForPrepId = null;
    lastGeneratedSynthesisId = failedSynth.id;
    saveState();
    renderBriefs();
    showToast('Synthesis generated');
  } catch (e) {
    console.error('Retry synthesis failed:', e);
    synthesisLoadingForPrepId = null;
    renderBriefs();
    showToast('Retry failed: ' + e.message);
  }
}

async function submitIntention() {
  const text = document.getElementById('intentionText')?.value.trim();
  if (!text) { logMode = 'form'; renderLogTab(); return; }

  // Save raw immediately, then refine
  saveIntention(text);
  logMode = 'form';
  renderLogTab();

  if (state.settings.baseUrl) {
    try {
      const refined = await callClaude(
        'You sharpen a rambling weekly intention into a tight checklist. Ruthlessly compress — each item should be a punchy verb phrase (3-8 words). Merge overlapping ideas. Drop filler. Rewrite freely; do not preserve the original wording. Output each item on its own line prefixed with "- [ ] ". Nothing else.',
        `Distill into a checklist:\n"${text}"`,
        300
      );
      const clean = refined.trim().replace(/^["']|["']$/g, '').replace(/\.$/, '');
      if (clean) saveIntention(clean);
      renderLogTab();
    } catch (_) { /* keep the raw text */ }
  }
}

function skipIntention() {

  renderLogTab();
}

function getIntentionLines(text) {
  return text.split('\n').filter(l => l.trim()).map(line => ({
    text: line.replace(/^-\s*\[[ x]\]\s*/, '').replace(/^-\s*/, ''),
    checked: /^-\s*\[x\]/i.test(line)
  }));
}

function formatIntentionChecklist(text) {
  const lines = getIntentionLines(text);
  // Count unchecked items to determine top-3 priority
  let uncheckedSeen = 0;
  return lines.map((item, i) => {
    const isPriority = !item.checked && uncheckedSeen < 3;
    if (!item.checked) uncheckedSeen++;
    const classes = ['intention-check-item', item.checked ? 'done' : '', isPriority ? 'priority' : ''].filter(Boolean).join(' ');
    return `<div class="${classes}" draggable="true" data-idx="${i}"><span class="drag-handle">⠿</span><input type="checkbox" ${item.checked ? 'checked' : ''} data-idx="${i}" onchange="toggleIntentionItem(this)"><span>${escapeHtml(item.text)}</span></div>`;
  }).join('');
}

function appendToWorkDone(text) {
  const textarea = document.getElementById('workDone');
  if (!textarea) return;
  const current = textarea.value.trim();
  const line = `- ${text}`;
  if (current.includes(line)) return;
  textarea.value = current ? `${current}\n${line}` : line;
  saveDraft();
}

function removeFromWorkDone(text) {
  const textarea = document.getElementById('workDone');
  if (!textarea) return;
  const line = `- ${text}`;
  textarea.value = textarea.value.split('\n').filter(l => l.trim() !== line).join('\n');
  saveDraft();
}

function toggleIntentionItem(checkbox) {
  const monday = getWeekMonday(todayStr());
  const intention = state.intentions[monday];
  if (!intention) return;
  const idx = parseInt(checkbox.dataset.idx);
  const lines = intention.split('\n').filter(l => l.trim());
  if (idx < 0 || idx >= lines.length) return;
  const clean = lines[idx].replace(/^-\s*\[[ x]\]\s*/, '').replace(/^-\s*/, '');
  lines[idx] = `- [${checkbox.checked ? 'x' : ' '}] ${clean}`;
  state.intentions[monday] = lines.join('\n');
  saveState();
  // Update visual state without full re-render
  const label = checkbox.closest('.intention-check-item');
  if (label) label.classList.toggle('done', checkbox.checked);
  // Auto-log to work done
  if (checkbox.checked) appendToWorkDone(clean);
  else removeFromWorkDone(clean);
}

function initIntentionDragDrop() {
  const container = document.querySelector('.intention-checklist');
  if (!container) return;
  let dragIdx = null;

  container.addEventListener('dragstart', (e) => {
    const item = e.target.closest('.intention-check-item');
    if (!item) return;
    dragIdx = parseInt(item.dataset.idx);
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });

  container.addEventListener('dragend', (e) => {
    const item = e.target.closest('.intention-check-item');
    if (item) item.classList.remove('dragging');
    container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragIdx = null;
  });

  container.addEventListener('dragover', (e) => {
    e.preventDefault();
    const item = e.target.closest('.intention-check-item');
    if (!item || parseInt(item.dataset.idx) === dragIdx) return;
    container.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    item.classList.add('drag-over');
  });

  container.addEventListener('dragleave', (e) => {
    const item = e.target.closest('.intention-check-item');
    if (item) item.classList.remove('drag-over');
  });

  container.addEventListener('drop', (e) => {
    e.preventDefault();
    const target = e.target.closest('.intention-check-item');
    if (!target || dragIdx === null) return;
    const dropIdx = parseInt(target.dataset.idx);
    if (dropIdx === dragIdx) return;

    const monday = getWeekMonday(todayStr());
    const intention = state.intentions[monday];
    if (!intention) return;
    const lines = intention.split('\n').filter(l => l.trim());
    const moved = lines.splice(dragIdx, 1)[0];
    lines.splice(dropIdx, 0, moved);
    state.intentions[monday] = lines.join('\n');
    saveState();
    renderLogTab();
  });
}

function parsePlanRowData(planText) {
  if (!planText) return [];
  return planText.split('\n').filter(l => l.trim()).map(line => {
    const clean = line.replace(/^[-•]\s*/, '').replace(/^\d+[.)]\s*/, '').trim();
    const match = clean.match(/^@(\S+)\s+(.+)$/);
    if (match) return { who: match[1], action: match[2] };
    return { who: '', action: clean };
  });
}

function renderPlanRows(planText) {
  const rows = parsePlanRowData(planText);
  if (!rows.length) rows.push({ who: '', action: '' });
  return rows.map((r, i) => renderPlanRowHtml(i, r.who, r.action)).join('');
}

function renderPlanRowHtml(idx, who, action) {
  return `<div class="plan-row" data-row="${idx}">
    <input class="plan-row-who" type="text" placeholder="@who" value="${escapeHtml(who ? (who.startsWith('@') ? who : '@' + who) : '')}" />
    <input class="plan-row-action" type="text" placeholder="Action item..." value="${escapeHtml(action)}" />
    <span class="plan-row-remove" onclick="removePlanRow(this)" title="Remove">&times;</span>
  </div>`;
}

function addPlanRow(focus = true) {
  const container = document.getElementById('planTomorrowRows');
  if (!container) return;
  const idx = container.children.length;
  container.insertAdjacentHTML('beforeend', renderPlanRowHtml(idx, '', ''));
  if (focus) {
    container.lastElementChild.querySelector('.plan-row-who').focus();
  }
}

function autoGrowPlanRows() {
  const container = document.getElementById('planTomorrowRows');
  if (!container) return;
  const rows = container.querySelectorAll('.plan-row');
  if (!rows.length) return;
  const lastRow = rows[rows.length - 1];
  const action = lastRow.querySelector('.plan-row-action').value.trim();
  if (action) addPlanRow(false);
}

function removePlanRow(el) {
  const row = el.closest('.plan-row');
  const container = document.getElementById('planTomorrowRows');
  if (container && container.children.length > 1) {
    row.remove();
  } else {
    // Last row — just clear it
    row.querySelector('.plan-row-who').value = '';
    row.querySelector('.plan-row-action').value = '';
  }
}

function renderPlanTodoSuggestions() {

function getPlanItems(planText) {

    .filter(Boolean);
}

function getDayOrder(itemCount) {
  const today = todayStr();
  const order = state.dayPriorities[today];
  // Validate: must be an array of correct length with all indices present
  if (Array.isArray(order) && order.length === itemCount && [...order].sort((a,b)=>a-b).every((v,i)=>v===i)) {
    return order;
  }
  return null; // no custom order yet
}

function saveDayOrder(order) {
  const today = todayStr();
  state.dayPriorities[today] = order;
  saveState();
}

function resetDayOrder() {
  const today = todayStr();
  delete state.dayPriorities[today];
  saveState();
  renderLogTab();
}

function togglePlanCheck(checkbox) {
  const today = todayStr();
  if (!state.dayPlanChecked[today]) state.dayPlanChecked[today] = [];
  const idx = parseInt(checkbox.dataset.idx);
  const arr = state.dayPlanChecked[today];
  const pos = arr.indexOf(idx);
  if (checkbox.checked && pos < 0) arr.push(idx);
  if (!checkbox.checked && pos >= 0) arr.splice(pos, 1);
  saveState();
  const item = checkbox.closest('.plan-check-item');
  if (item) item.classList.toggle('done', checkbox.checked);
  // Auto-log to work done
  const wrapper = document.getElementById('planReminderWrapper');
  if (wrapper) {
    const items = JSON.parse(wrapper.dataset.items || '[]');
    const text = items[idx] || '';
    if (checkbox.checked) appendToWorkDone(text);
    else removeFromWorkDone(text);
  }
}

function formatPlanItemText(text) {
